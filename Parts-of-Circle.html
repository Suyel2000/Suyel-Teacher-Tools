<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circle Radar Explorer</title>
    <style>
        :root {
            --center-color: #e74c3c;
            --radius-color: #3498db;
            --diameter-color: #9b59b6;
            --circum-color: #27ae60;
        }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #f0faff; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .radar-screen { 
            width: 350px; height: 350px; background: #2c3e50; 
            margin: 20px auto; border-radius: 50%; position: relative;
            border: 5px solid #bdc3c7; overflow: hidden;
        }

        /* Circle Parts */
        #main-circle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid var(--circum-color);
            transition: width 0.2s, height 0.2s;
        }

        #center-point {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: var(--center-color);
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10;
        }

        #radius-line {
            position: absolute; top: 50%; left: 50%;
            height: 4px; background: var(--radius-color);
            transform-origin: left center; z-index: 5;
        }

        #diameter-line {
            position: absolute; top: 50%; left: 50%;
            height: 2px; background: var(--diameter-color);
            transform: translate(-50%, -50%); z-index: 4;
            border-top: 2px dashed var(--diameter-color);
        }

        /* UI Elements */
        .controls { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input[type=range] { width: 80%; cursor: pointer; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: left; }
        .data-item { padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .c-text { color: var(--center-color); border: 1px solid var(--center-color); }
        .r-text { color: var(--radius-color); border: 1px solid var(--radius-color); }
        .d-text { color: var(--diameter-color); border: 1px solid var(--diameter-color); }
        .circ-text { color: var(--circum-color); border: 1px solid var(--circum-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>📡 Circle Radar Explorer</h1>
    <p>Grow the circle to see how its parts change!</p>

    <div class="radar-screen">
        <div id="main-circle"></div>
        <div id="center-point"></div>
        <div id="radius-line"></div>
        <div id="diameter-line"></div>
    </div>

    <div class="controls">
        <label>Adjust Radius: <span id="r-val">50</span> units</label><br>
        <input type="range" id="radius-slider" min="10" max="150" value="50">
    </div>

    <div class="data-grid">
        <div class="data-item c-text">📍 Center: The middle point.</div>
        <div class="data-item r-text">📏 Radius (r): <span id="r-stat">50</span></div>
        <div class="data-item d-text">↔️ Diameter (d): <span id="d-stat">100</span></div>
        <div class="data-item circ-text">🔄 Circumference: <span id="c-stat">314</span></div>
    </div>
    
    <p style="font-size: 12px; margin-top: 10px;">Formula: Diameter = 2 × Radius</p>
</div>

<script>
    const slider = document.getElementById('radius-slider');
    const circle = document.getElementById('main-circle');
    const radiusLine = document.getElementById('radius-line');
    const diameterLine = document.getElementById('diameter-line');
    
    function updateCircle() {
        const r = parseInt(slider.value);
        const d = r * 2;
        const circum = Math.round(2 * Math.PI * r);

        // Update Visuals
        circle.style.width = d + "px";
        circle.style.height = d + "px";
        
        radiusLine.style.width = r + "px";
        diameterLine.style.width = d + "px";

        // Update Text
        document.getElementById('r-val').innerText = r;
        document.getElementById('r-stat').innerText = r;
        document.getElementById('d-stat').innerText = d;
        document.getElementById('c-stat').innerText = circum;
    }

    slider.oninput = updateCircle;
    updateCircle();
</script>

</body>
</html>
