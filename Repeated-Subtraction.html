<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Subtraction Rocket</title>
    <style>
        :root {
            --space-bg: #0f172a;
            --rocket-fuel: #f59e0b;
            --pod-blue: #3b82f6;
            --success: #10b981;
        }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: var(--space-bg); color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; border: 4px solid var(--pod-blue); box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        
        .setup-panel { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; align-items: center; }
        
        .fuel-tank {
            background: #334155; border: 3px solid #64748b; border-radius: 15px;
            padding: 20px; min-height: 100px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            margin-bottom: 20px; position: relative;
        }
        .fuel-tank::after { content: '🚀 MAIN TANK'; position: absolute; top: -12px; left: 15px; background: #ef4444; padding: 2px 8px; font-size: 11px; border-radius: 4px; font-weight: bold; }

        .pods-container {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; min-height: 100px;
        }

        .energy-unit { width: 22px; height: 22px; background: var(--rocket-fuel); border-radius: 4px; box-shadow: 0 0 8px var(--rocket-fuel); transition: 0.3s; }
        
        .transport-pod {
            background: var(--pod-blue); padding: 10px; border-radius: 10px;
            display: flex; gap: 4px; border-bottom: 4px solid #1d4ed8;
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { transform: scale(0); } to { transform: scale(1); } }

        .math-log { background: #000; padding: 20px; border-radius: 12px; border: 1px solid #475569; margin-top: 20px; }
        .log-entry { font-size: 24px; color: var(--success); font-family: 'Courier New', monospace; margin: 5px 0; }
        .final-stat { font-size: 32px; font-weight: bold; color: var(--pod-blue); margin-top: 15px; }

        input { width: 65px; padding: 10px; border-radius: 8px; border: none; font-size: 18px; text-align: center; font-weight: bold; }
        button { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s; font-size: 16px; }
        .primary-btn { background: var(--success); color: white; box-shadow: 0 4px 0 #059669; }
        .reset-btn { background: #ef4444; color: white; box-shadow: 0 4px 0 #b91c1c; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        button:disabled { background: #475569; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Subtraction Rocket</h1>
    <p>How many times can you take away a group until the tank is empty?</p>

    <div class="setup-panel">
        <div>
            <label>Start Units:</label><br>
            <input type="number" id="startUnits" value="12" min="1" max="40">
        </div>
        <div style="font-size: 24px;">÷</div>
        <div>
            <label>Group Size:</label><br>
            <input type="number" id="groupSize" value="3" min="1" max="10">
        </div>
        <button class="primary-btn" id="takeBtn">Take Group</button>
        <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <div class="fuel-tank" id="tank"></div>
    <div class="pods-container" id="pods"></div>

    <div class="math-log">
        <div id="logArea"></div>
        <div class="final-stat" id="finalResult"></div>
    </div>
</div>

<script>
    let total = 0;
    let originalTotal = 0;
    let subAmount = 0;
    let counter = 0;
    let started = false;

    const tank = document.getElementById('tank');
    const pods = document.getElementById('pods');
    const log = document.getElementById('logArea');
    const result = document.getElementById('finalResult');
    const takeBtn = document.getElementById('takeBtn');
    const startInp = document.getElementById('startUnits');
    const groupInp = document.getElementById('groupSize');

    function init() {
        originalTotal = parseInt(startInp.value);
        subAmount = parseInt(groupInp.value);
        total = originalTotal;
        counter = 0;
        started = true;

        startInp.disabled = true;
        groupInp.disabled = true;

        renderTank();
    }

    function renderTank() {
        tank.innerHTML = '';
        for(let i=0; i<total; i++) {
            const dot = document.createElement('div');
            dot.className = 'energy-unit';
            tank.appendChild(dot);
        }
    }

    takeBtn.addEventListener('click', () => {
        if (!started) init();

        if (total < subAmount) {
            alert("Not enough units left for a full group!");
            return;
        }

        const oldTotal = total;
        total -= subAmount;
        counter++;

        // Add Pod
        const pod = document.createElement('div');
        pod.className = 'transport-pod';
        for(let i=0; i<subAmount; i++) {
            const dot = document.createElement('div');
            dot.className = 'energy-unit';
            pod.appendChild(dot);
        }
        pods.appendChild(pod);

        // Update Tank
        renderTank();

        // Log Math
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerText = `${oldTotal} - ${subAmount} = ${total}`;
        log.appendChild(entry);

        // Check if finished
        if (total === 0) {
            result.innerText = `Mission Complete! ${originalTotal} ÷ ${subAmount} = ${counter}`;
            takeBtn.disabled = true;
        } else if (total < subAmount) {
            result.innerText = `Finished with ${total} left over!`;
            takeBtn.disabled = true;
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        started = false;
        total = 0;
        counter = 0;
        startInp.disabled = false;
        groupInp.disabled = false;
        tank.innerHTML = '';
        pods.innerHTML = '';
        log.innerHTML = '';
        result.innerText = '';
        takeBtn.disabled = false;
    });
</script>

</body>
</html>
