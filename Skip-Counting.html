<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jungle Jump: Skip Counting</title>
    <style>
        :root {
            --water: #3498db;
            --leaf: #2ecc71;
            --frog: #f1c40f;
        }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #e8f6f3; text-align: center; padding: 20px; }
        .jungle-card { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 25px; border: 6px solid #27ae60; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .controls { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 2px dashed #2ecc71; }
        
        .pond {
            display: flex; overflow-x: auto; gap: 10px; padding: 30px 10px;
            background: var(--water); border-radius: 15px; border-bottom: 8px solid #2980b9;
            margin-bottom: 20px; align-items: center; min-height: 120px;
        }

        .lilypad {
            min-width: 50px; height: 50px; background: var(--leaf); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 18px; position: relative;
            box-shadow: 0 4px 0 #27ae60; transition: 0.3s;
        }

        .lilypad.landed {
            background: var(--frog); transform: scale(1.2); color: #000;
            box-shadow: 0 0 15px var(--frog);
        }

        .lilypad.landed::after { content: '🐸'; position: absolute; top: -25px; font-size: 24px; }

        .math-readout { background: #2d3436; color: #fff; padding: 20px; border-radius: 15px; }
        .pattern-text { font-size: 32px; color: #55efc4; letter-spacing: 5px; min-height: 45px; }
        
        button { padding: 12px 25px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        .jump-btn { background: #e67e22; color: white; box-shadow: 0 5px 0 #d35400; }
        .reset-btn { background: #95a5a6; color: white; }
        button:active { transform: translateY(3px); box-shadow: none; }
        
        input[type=number] { width: 60px; padding: 10px; font-size: 20px; border-radius: 8px; border: 2px solid #ccc; text-align: center; }
    </style>
</head>
<body>

<div class="jungle-card">
    <h1>🐸 Jungle Jump</h1>
    <p>Pick a jump size and watch the pattern grow!</p>

    <div class="controls">
        <label>Jump by:</label>
        <input type="number" id="skipVal" value="2" min="2" max="10">
        <button class="jump-btn" onclick="nextJump()">Next Jump!</button>
        <button class="reset-btn" onclick="resetPond()">Reset</button>
    </div>

    <div class="pond" id="pond"></div>

    <div class="math-readout">
        <div class="pattern-text" id="sequence">0</div>
        <p id="description">The frog is at the start!</p>
    </div>
</div>

<script>
    let currentPos = 0;
    let sequence = [0];
    const pond = document.getElementById('pond');
    const skipInp = document.getElementById('skipVal');
    const seqDisplay = document.getElementById('sequence');
    const desc = document.getElementById('description');

    function createPond() {
        pond.innerHTML = '';
        for (let i = 0; i <= 50; i++) {
            const pad = document.createElement('div');
            pad.className = 'lilypad';
            pad.id = 'pad-' + i;
            pad.innerText = i;
            pond.appendChild(pad);
        }
        updateVisuals();
    }

    function nextJump() {
        const skip = parseInt(skipInp.value);
        if (isNaN(skip) || skip < 1) return;

        skipInp.disabled = true;
        currentPos += skip;
        
        if (currentPos > 50) {
            alert("The frog reached the other side!");
            return;
        }

        sequence.push(currentPos);
        updateVisuals();
        
        // Scroll to the current frog position
        const activePad = document.getElementById('pad-' + currentPos);
        activePad.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }

    function updateVisuals() {
        // Clear all frogs first
        document.querySelectorAll('.lilypad').forEach(p => p.classList.remove('landed'));
        
        // Mark all visited pads
        sequence.forEach(pos => {
            const pad = document.getElementById('pad-' + pos);
            if (pad) pad.classList.add('landed');
        });

        seqDisplay.innerText = sequence.join(', ');
        const skip = skipInp.value;
        desc.innerText = `Counting by ${skip}s: We added ${skip} to get to ${currentPos}!`;
    }

    function resetPond() {
        currentPos = 0;
        sequence = [0];
        skipInp.disabled = false;
        createPond();
        seqDisplay.innerText = "0";
        desc.innerText = "The frog is at the start!";
    }

    // Initialize
    createPond();
</script>

</body>
</html>
