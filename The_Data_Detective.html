<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Data Detective Dashboard</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --bg: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            text-align: center; 
            padding: 20px; 
        }

        .dashboard { 
            max-width: 700px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary);
        }

        .graph-frame { 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-around; 
            height: 300px; 
            border-bottom: 4px solid var(--primary); 
            border-left: 4px solid var(--primary); 
            margin: 40px 20px;
            position: relative;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px);
            background-size: 100% 30px; /* 10 horizontal grid lines */
        }

        .bar-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 80px; 
        }
        
        .bar { 
            width: 45px; 
            background: #3498db;
            transition: height 0.3s ease; 
            border-radius: 5px 5px 0 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: white;
            font-weight: bold;
            padding-top: 5px;
        }

        .label-input { 
            width: 90%; 
            text-align: center; 
            border: 1px solid #ddd; 
            margin: 10px 0;
            border-radius: 4px;
        }

        .btn-group { display: flex; gap: 5px; }
        
        button { 
            cursor: pointer; 
            border: none; 
            border-radius: 4px; 
            width: 30px; 
            height: 30px; 
            font-weight: bold;
            color: white;
        }
        .plus { background: #27ae60; }
        .minus { background: #e74c3c; }
        
        .stats {
            background: #fdf2e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>🕵️ The Data Detective</h1>
    <p>Click <b>+</b> to add evidence and <b>-</b> to remove it!</p>

    <div class="graph-frame">
        <div class="bar-container">
            <div id="bar0" class="bar">0</div>
            <input class="label-input" value="Suspect 1">
            <div class="btn-group">
                <button class="minus" onclick="changeVal(0, -1)">-</button>
                <button class="plus" onclick="changeVal(0, 1)">+</button>
            </div>
        </div>

        <div class="bar-container">
            <div id="bar1" class="bar">0</div>
            <input class="label-input" value="Suspect 2">
            <div class="btn-group">
                <button class="minus" onclick="changeVal(1, -1)">-</button>
                <button class="plus" onclick="changeVal(1, 1)">+</button>
            </div>
        </div>

        <div class="bar-container">
            <div id="bar2" class="bar">0</div>
            <input class="label-input" value="Suspect 3">
            <div class="btn-group">
                <button class="minus" onclick="changeVal(2, -1)">-</button>
                <button class="plus" onclick="changeVal(2, 1)">+</button>
            </div>
        </div>

        <div class="bar-container">
            <div id="bar3" class="bar">0</div>
            <input class="label-input" value="Suspect 4">
            <div class="btn-group">
                <button class="minus" onclick="changeVal(3, -1)">-</button>
                <button class="plus" onclick="changeVal(3, 1)">+</button>
            </div>
        </div>
    </div>

    <div class="stats">
        Total Evidence Collected: <span id="totalDisplay">0</span>
    </div>
</div>

<script>
    // Store data in an array for "Zero Error" logic
    let barData = [0, 0, 0, 0];
    const colors = ['#3498db', '#9b59b6', '#f1c40f', '#e67e22'];

    function changeVal(index, amount) {
        // Update the array
        barData[index] += amount;

        // Prevent negative numbers
        if (barData[index] < 0) barData[index] = 0;
        
        // Prevent bars from going off-screen (max 10)
        if (barData[index] > 10) barData[index] = 10;

        render();
    }

    function render() {
        let total = 0;
        barData.forEach((value, i) => {
            const barEl = document.getElementById('bar' + i);
            
            // Update text inside bar
            barEl.innerText = value;
            
            // Update height (30px per unit)
            barEl.style.height = (value * 30) + "px";
            
            // Set color
            barEl.style.background = colors[i];
            
            total += value;
        });

        document.getElementById('totalDisplay').innerText = total;
    }

    // Initial render to set everything to 0
    render();
</script>

</body>
</html>
