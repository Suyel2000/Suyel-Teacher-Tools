<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 1 - Content Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            border-top: 8px solid #ffcc00; /* Construction Yellow accent */
        }
        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .main-text {
            color: #5a6b7c;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .explore-box {
            background-color: #f7f9fc;
            border-left: 4px solid #3498db;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }
        .explore-text {
            color: #2c3e50;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 500;
        }
        .footer-text {
            color: #7f8c8d;
            font-size: 1.05rem;
            font-weight: 600;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JSVKBDWEV5"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JSVKBDWEV5');

<body>

    <div class="container">
        <div class="icon">🚧</div>
        <h1>Class-wise Content Coming Soon!</h1>
        <p class="main-text">We're working on exciting interactive lessons, NCERT solutions, quizzes, worksheets, and activities for this class.</p>
        
        <div class="explore-box">
            <p class="explore-text">✨ Please explore our Teaching & Learning Tools, Interactive Games, and Quizzes in the meantime.</p>
        </div>
        
        <p class="footer-text">Thank you for your patience. Happy Learning! 📚🌟</p>
    </div>

</body>
</html>
