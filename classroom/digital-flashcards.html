<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Topic-wise Digital Flashcards</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --card-front-bg: #ffffff;
            --card-back-bg: #e0f2fe;
            --text-color: #1e293b;
            --text-light: #475569;
            --accent-color: #ff6b81;
            --primary-btn: #4ecdc4;
            --shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-front-bg: #1e293b;
            --card-back-bg: #0f172a;
            --text-color: #f8fafc;
            --text-light: #cbd5e1;
            --primary-btn: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: var(--text-color);
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 2.3rem;
            color: #1e293b;
            margin-bottom: 5px;
        }
        [data-theme="dark"] header h1 { color: #f8fafc; }

        header p {
            font-size: 1.1rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* Selector Strip Setup */
        .selector-bar {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
        }

        .dropdown-group {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            flex-wrap: wrap;
        }

        select, input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.7);
            color: #1e293b;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            min-width: 160px;
            transition: all 0.3s ease;
        }
        [data-theme="dark"] select, [data-theme="dark"] input {
            background: rgba(30, 41, 59, 0.8);
            color: #f8fafc;
        }

        .stats-panel {
            font-size: 0.95rem;
            font-weight: bold;
            background: rgba(255,255,255,0.4);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            color: #1e293b;
        }
        [data-theme="dark"] .stats-panel { background: rgba(0,0,0,0.2); color: #f8fafc; }

        /* Main Presentation Window */
        .stage {
            width: 100%;
            max-width: 900px;
            height: 52vh;
            min-height: 360px;
            perspective: 1500px;
            margin-bottom: 20px;
        }

        .card-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow);
            border-radius: 32px;
            cursor: pointer;
        }

        .card-wrapper.flipped {
            transform: rotateY(180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 32px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 3px solid var(--glass-border);
            overflow-y: auto;
        }

        .side-front {
            background: var(--card-front-bg);
            color: var(--text-color);
        }

        .side-back {
            background: var(--card-back-bg);
            color: var(--text-color);
            transform: rotateY(180deg);
        }

        .tag-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--accent-color);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .counter-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-light);
        }

        .card-content {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1.4;
            max-width: 900px;
            word-wrap: break-word;
            animation: textZoom 0.4s ease;
        }

        @keyframes textZoom {
            from { transform: scale(0.95); opacity: 0.7; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Classroom Layout Variations */
        body.smartboard .stage {
            max-width: 96vw;
            height: 75vh;
        }
        body.smartboard .card-content {
            font-size: 3.8rem;
        }

        /* Minimal Fixed Action Bar Setup */
        .navigation-row {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .btn:active { transform: scale(0.95); }

        .btn-nav {
            background: var(--glass-bg);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            flex: 1;
            max-width: 160px;
        }
        [data-theme="dark"] .btn-nav { color: #f8fafc; }
        .btn-nav:hover { background: rgba(255,255,255,0.4); }

        .btn-flip {
            background: var(--accent-color);
            color: white;
            flex: 1.5;
            max-width: 240px;
            font-size: 1.3rem;
        }
        .btn-flip:hover { background: #ff4757; box-shadow: 0 8px 20px rgba(255,107,129,0.4); }

        /* Setup / Configuration Panel Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0; right: -420px;
            width: 400px; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            padding: 35px;
            overflow-y: auto;
            color: #1e293b;
        }
        [data-theme="dark"] .drawer-overlay {
            background: rgba(15, 23, 42, 0.98);
            color: #f8fafc;
        }
        .drawer-overlay.visible { right: 0; }

        .drawer-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 15px;
        }
        [data-theme="dark"] .drawer-title { border-color: rgba(255,255,255,0.05); }

        .close-icon {
            font-size: 1.6rem;
            background: none; border: none; color: inherit; cursor: pointer;
        }

        .control-block {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-inline {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .control-block label { font-weight: 700; font-size: 1.05rem; }

        /* Custom Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 56px; height: 30px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .switch-track {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .3s; border-radius: 34px;
        }
        .switch-track:before {
            position: absolute;
            content: "";
            height: 22px; width: 22px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .3s; border-radius: 50%;
        }
        input:checked + .switch-track { background-color: var(--primary-btn); }
        input:checked + .switch-track:before { transform: translateX(26px); }

        .btn-block {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #6366f1;
            color: white;
            margin-top: 10px;
        }

        /* Printable Sheet Media Query Configuration */
        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            header, .selector-bar, .navigation-row, .drawer-overlay { display: none !important; }
            .print-sheet {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 25px;
                width: 100%;
                padding: 30px;
            }
            .print-tile {
                border: 3px double #000;
                border-radius: 12px;
                padding: 25px;
                height: 260px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                page-break-inside: avoid;
            }
            .print-side {
                height: 48%;
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
            .print-q { font-weight: bold; font-size: 1.3rem; border-bottom: 1px dashed #94a3b8; }
            .print-a { font-style: italic; font-size: 1.1rem; }
        }

        .print-sheet { display: none; }

        @media (max-width: 650px) {
            header h1 { font-size: 1.7rem; }
            .card-content { font-size: 1.4rem; }
            .navigation-row { gap: 6px; }
            .btn { padding: 12px 14px; font-size: 0.9rem; border-radius: 12px; }
            .drawer-overlay { width: 100%; right: -100%; }
        }
    </style>

<body>

    <header>
        <h1>📚 Topic-wise Digital Flashcards</h1>
        <p>Learn • Revise • Remember</p>
    </header>

    <div class="selector-bar">
        <div class="dropdown-group">
            <select id="subject-dropdown" onchange="handleSubjectChange()">
                <option value="Mathematics">Mathematics</option>
                <option value="English">English</option>
                <option value="EVS">EVS</option>
                <option value="General Knowledge">General Knowledge</option>
            </select>
            <select id="topic-dropdown" onchange="loadTopicDeck()">
                </select>
            <input type="text" id="global-search" placeholder="🔍 Search curriculum..." oninput="searchFilterCurrentDeck()">
        </div>
        <div class="stats-panel">
            <span>Card: <span id="stat-current">0/10</span></span>
            <span>Seen: <span id="stat-seen">0</span></span>
            <span>Left: <span id="stat-left">10</span></span>
        </div>
    </div>

    <div class="stage">
        <div class="card-wrapper" id="main-card" onclick="flipCard()">
            <div class="card-side side-front">
                <span class="tag-badge" id="badge-front">Subject</span>
                <span class="counter-badge" id="counter-front">0 / 10</span>
                <div class="card-content" id="text-front">Loading cards...</div>
            </div>
            <div class="card-side side-back">
                <span class="tag-badge" id="badge-back">Subject</span>
                <div class="card-content" id="text-back">Loading answer...</div>
            </div>
        </div>
    </div>

    <div class="navigation-row">
        <button class="btn btn-nav" onclick="stepCard(-1); event.stopPropagation();">◀ Previous</button>
        <button class="btn btn-flip" onclick="flipCard(); event.stopPropagation();">🔄 Flip</button>
        <button class="btn btn-nav" onclick="stepCard(1); event.stopPropagation();">▶ Next</button>
        <button class="btn btn-nav" onclick="toggleSettingsDrawer(true); event.stopPropagation();">⚙ Settings</button>
    </div>

    <div class="drawer-overlay" id="settings-drawer">
        <div class="drawer-title">
            <h2>App Settings</h2>
            <button class="close-icon" onclick="toggleSettingsDrawer(false)">✕</button>
        </div>

        <div class="control-block control-inline">
            <label>Shuffle Active Cards</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-shuffle" onchange="handleShuffleToggle(this.checked)">
                <span class="switch-track"></span>
            </label>
        </div>

        <div class="control-block control-inline">
            <label>Autoplay Engine Loop</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-autoplay" onchange="handleAutoplayToggle(this.checked)">
                <span class="switch-track"></span>
            </label>
        </div>

        <div class="control-block">
            <label>Loop Flipping Interval: <span id="lbl-speed">4</span> seconds</label>
            <input type="range" id="slider-speed" min="3" max="10" value="4" oninput="changeAutoplayInterval(this.value)">
        </div>

        <div class="control-block control-inline">
            <label>Sound FX (Web Audio)</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-sound" checked>
                <span class="switch-track"></span>
            </label>
        </div>

        <div class="control-block control-inline">
            <label>Dark Mode Theme</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-dark" onchange="handleDarkModeToggle(this.checked)">
                <span class="switch-track"></span>
            </label>
        </div>

        <div class="control-block control-inline">
            <label>Smartboard Presentation View</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-smartboard" onchange="handleSmartboardToggle(this.checked)">
                <span class="switch-track"></span>
            </label>
        </div>

        <button class="btn-block" onclick="triggerPrintEngine()">🖨 Print Current Topic Deck (A4 Layout)</button>
    </div>

    <div class="print-sheet" id="print-sheet-target"></div>

        // Sound Synthesis API Controller
        const SoundFX = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                if (!document.getElementById('toggle-sound').checked) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                const timeNow = this.ctx.currentTime;

                if (type === 'click') {
                    osc.frequency.setValueAtTime(500, timeNow);
                    gain.gain.setValueAtTime(0.1, timeNow);
                    gain.gain.exponentialRampToValueAtTime(0.01, timeNow + 0.05);
                    osc.start(timeNow); osc.stop(timeNow + 0.05);
                } else if (type === 'flip') {
                    osc.frequency.setValueAtTime(250, timeNow);
                    osc.frequency.exponentialRampToValueAtTime(500, timeNow + 0.15);
                    gain.gain.setValueAtTime(0.12, timeNow);
                    gain.gain.exponentialRampToValueAtTime(0.01, timeNow + 0.15);
                    osc.start(timeNow); osc.stop(timeNow + 0.15);
                } else if (type === 'nav') {
                    osc.frequency.setValueAtTime(450, timeNow);
                    gain.gain.setValueAtTime(0.06, timeNow);
                    gain.gain.exponentialRampToValueAtTime(0.01, timeNow + 0.08);
                    osc.start(timeNow); osc.stop(timeNow + 0.08);
                }
            }
        };

            const topics = Object.keys(flashcardDatabase[currentSubject]);

                const opt = document.createElement('option');
                opt.value = topic;
                opt.innerText = topic;
                if (topic === currentTopic) opt.selected = true;
                topicDropdown.appendChild(opt);
            });
        }

            SoundFX.play('click');

        }

        function loadTopicDeck() {
            currentTopic = document.getElementById('topic-dropdown').value;
            const originalDeck = flashcardDatabase[currentSubject][currentTopic];
            
            // Shallow clone mapping array context
            activeDeck = originalDeck.map((card, index) => ({...card, originalIndex: index}));
            
            currentIndex = 0;
            seenSet.clear();
            
            if (document.getElementById('toggle-shuffle').checked) {
                activeDeck.sort(() => Math.random() - 0.5);
            }

            renderCardState();
            saveStateToStorage();
        }

        function renderCardState() {
            const cardObj = document.getElementById('main-card');
            cardObj.classList.remove('flipped');

            if (activeDeck.length === 0) {
                document.getElementById('text-front').innerText = "No flashcards match your search constraints.";
                document.getElementById('text-back').innerText = "";
                updateMetricsUI(0);
                return;
            }

            const currentCard = activeDeck[currentIndex];
            document.getElementById('text-front').innerText = currentCard.f;
            document.getElementById('text-back').innerText = currentCard.b;

            // Badges string injection
            document.getElementById('badge-front').innerText = currentSubject;
            document.getElementById('badge-back').innerText = currentTopic;
            
            // Progress tracker counter tracking adjustment
            const trackingText = `${currentIndex + 1} / ${activeDeck.length}`;
            document.getElementById('counter-front').innerText = trackingText;

            seenSet.add(currentCard.originalIndex);
            updateMetricsUI(trackingText);
        }

        function updateMetricsUI(trackingText) {
            document.getElementById('stat-current').innerText = trackingText || "0/0";
            document.getElementById('stat-seen').innerText = seenSet.size;
            document.getElementById('stat-left').innerText = Math.max(0, activeDeck.length - seenSet.size);
        }

        function flipCard() {
            SoundFX.play('flip');
            document.getElementById('main-card').classList.toggle('flipped');
        }

        function stepCard(dir) {
            if (activeDeck.length <= 1) return;
            SoundFX.play('nav');
            currentIndex += dir;
            
            if (currentIndex >= activeDeck.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = activeDeck.length - 1;

            renderCardState();
        }

        // Search engine filter processing algorithm
        function searchFilterCurrentDeck() {
            const query = document.getElementById('global-search').value.toLowerCase().trim();
            const originalDeck = flashcardDatabase[currentSubject][currentTopic];

            if (!query) {
                loadTopicDeck();
                return;
            }

            activeDeck = originalDeck.filter(card => {
                return card.f.toLowerCase().includes(query) || 
                       card.b.toLowerCase().includes(query) ||
                       currentSubject.toLowerCase().includes(query) ||
                       currentTopic.toLowerCase().includes(query);
            });

            currentIndex = 0;
            renderCardState();
        }

        // Utility configuration state mechanics
        function toggleSettingsDrawer(open) {
            SoundFX.play('click');
            document.getElementById('settings-drawer').classList.toggle('visible', open);
        }

        function handleShuffleToggle(checked) {
            SoundFX.play('click');
            loadTopicDeck();
        }

        function handleAutoplayToggle(checked) {
            SoundFX.play('click');
            if (checked) {
                runAutoplayLoop();
            } else {
                clearInterval(autoplayTimer);
            }
        }

        function changeAutoplayInterval(val) {
            document.getElementById('lbl-speed').innerText = val;
            autoplaySpeed = val * 1000;
            if (document.getElementById('toggle-autoplay').checked) {
                runAutoplayLoop();
            }
        }

        function runAutoplayLoop() {
            clearInterval(autoplayTimer);
            let modeTogglePhase = 0; 
            autoplayTimer = setInterval(() => {
                if (activeDeck.length === 0) return;
                if (modeTogglePhase === 0) {
                    flipCard();
                    modeTogglePhase = 1;
                } else {
                    stepCard(1);
                    modeTogglePhase = 0;
                }
            }, autoplaySpeed);
        }

        function handleDarkModeToggle(checked) {
            SoundFX.play('click');
            document.body.setAttribute('data-theme', checked ? 'dark' : 'light');
            localStorage.setItem('cfg_dark', checked);
        }

        function handleSmartboardToggle(checked) {
            SoundFX.play('click');
            document.body.classList.toggle('smartboard', checked);
            localStorage.setItem('cfg_smartboard', checked);
        }

        function triggerPrintEngine() {
            SoundFX.play('click');
            const target = document.getElementById('print-sheet-target');
            target.innerHTML = ''; // Clear prior data
            
            const originalDeck = flashcardDatabase[currentSubject][currentTopic];
            originalDeck.forEach(card => {
                const box = document.createElement('div');
                box.className = 'print-tile';
                box.innerHTML = `
                    <div class="print-side print-q">[${currentSubject} - ${currentTopic}] ${card.f}</div>
                    <div class="print-side print-a">${card.b}</div>
                `;
                target.appendChild(box);
            });
            window.print();
        }

        // Local Storage State Persistence Systems
        function saveStateToStorage() {
            localStorage.setItem('state_subject', currentSubject);
            localStorage.setItem('state_topic', currentTopic);
        }

        function restoreStateFromStorage() {
            if (localStorage.getItem('state_subject')) {
                currentSubject = localStorage.getItem('state_subject');
                document.getElementById('subject-dropdown').value = currentSubject;
            }
            if (localStorage.getItem('state_topic')) {
                currentTopic = localStorage.getItem('state_topic');
            }
            if (localStorage.getItem('cfg_dark') === 'true') {
                document.getElementById('toggle-dark').checked = true;
                document.body.setAttribute('data-theme', 'dark');
            }
            if (localStorage.getItem('cfg_smartboard') === 'true') {
                document.getElementById('toggle-smartboard').checked = true;
                document.body.classList.add('smartboard');
            }
        }
    </script>
</body>
</html>
