<head>

        /* --- RESET & VARIABLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            --glass-border: rgba(255, 255, 255, 0.25);

            --text-dark: #2d3748;
            --primary: #4a5568;
            --easy-color: #48bb78;
            --medium-color: #ecc94b;
            --hard-color: #f56565;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* --- TYPOGRAPHY & HEADERS --- */
        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        /* --- CONTAINER & GLASSMORPHISM --- */
        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            animation: fadeIn 1s ease;
        }

        /* --- CONFIGURATION CONTROLS --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        select, input {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-dark);
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
        }

        /* --- BUTTONS --- */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            color: white;
        }

        .btn-generate { background-color: #4c51bf; }
        .btn-new { background-color: #319795; }
        .btn-print { background-color: #2b6cb0; }
        .btn-settings { background-color: #4a5568; }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(255,255,255,0.25);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* --- THE EXIT TICKET CARD --- */
        .ticket-wrapper {
            background: white;
            color: var(--text-dark);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .ticket-wrapper.refreshing {
            transform: scale(0.95) translateY(10px);
            opacity: 0;
        }

        .ticket-border {
            border: 3px dashed #cbd5e0;
            padding: 2rem;
            border-radius: 8px;
            background: #fff;
        }

        .ticket-header {
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .ticket-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a202c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .student-meta {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .meta-line {
            border-bottom: 2px solid #718096;
            padding-bottom: 0.2rem;
            white-space: nowrap;
        }

        /* --- QUESTIONS ARCHITECTURE --- */
        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .question-item {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
        }

        .answer-space {
            margin-top: 0.4rem;
        }

        /* Question Variants Formatting */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 0.4rem;
        }

        .option-box {
            border: 1px solid #cbd5e0;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .checkbox-mock {
            width: 18px;
            height: 18px;
            border: 2px solid #718096;
            border-radius: 4px;
            display: inline-block;
        }

        .line-space {
            border-bottom: 1px dotted #a0aec0;
            height: 2.5rem;
            width: 100%;
        }

        .double-line-space {
            border-bottom: 1px dotted #a0aec0;
            height: 2.5rem;
            width: 100%;
            box-shadow: 0 1.2rem 0 -1px white, 0 1.3rem 0 0 #a0aec0;
            margin-bottom: 1rem;
        }

        .emoji-rating {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .emoji-box {
            border: 1px solid #cbd5e0;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- COLLAPSIBLE SETTINGS METER --- */
        .settings-panel {
            max-height: 500px;
            transition: max-height 0.3s ease-in-out, padding 0.3s ease;
            overflow: hidden;
        }

        .settings-panel.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-top: none;
            border-bottom: none;
            margin: 0;
        }

        /* --- PRINT STYLES --- */
        @media print {
            body {
                background: white !important;
                color: black !important;
                padding: 0;
                margin: 0;
            }
            header, .panel, .btn, .action-buttons {
                display: none !important;
            }
            .container {
                max-width: 100%;
                box-shadow: none !important;
            }
            .ticket-wrapper {
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }
            .ticket-border {
                border: 2px dashed #000 !important;
                padding: 1.5rem !important;
            }
            @page {

                margin: 15mm;

        /* --- SMARTBOARD / TABLET OPTIMIZATIONS --- */
        @media(max-width: 768px) {
            h1 { font-size: 2rem; }
            .student-meta {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .options-grid {
                grid-template-columns: 1fr;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

        /* --- AUDIO SYNTH ENGINE (WEB AUDIO API) --- */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log("Audio not allowed yet"); }
        }

        function playSound(style) {
            if(style === 'click') playTone(600, 'sine', 0.08);
            if(style === 'generate') {
                playTone(440, 'triangle', 0.1);
                setTimeout(() => playTone(880, 'triangle', 0.15), 80);
            }
            if(style === 'print') {
                playTone(300, 'sawtooth', 0.1);
                setTimeout(() => playTone(500, 'sawtooth', 0.1), 100);
            }

        /* --- STATE ENGINE & STORAGE MANAGMENT --- */
        const DOM = {
            subject: document.getElementById('subjectSelect'),
            count: document.getElementById('countSelect'),
            difficulty: document.getElementById('difficultySelect'),
            settingsPanel: document.getElementById('settingsPanel'),
            toggleSettingsBtn: document.getElementById('toggleSettingsBtn'),
            generateBtn: document.getElementById('generateBtn'),
            newTicketBtn: document.getElementById('newTicketBtn'),
            printBtn: document.getElementById('printBtn'),
            displaySubject: document.getElementById('displaySubject'),
            questionsOutput: document.getElementById('questionsOutput'),
            ticketContainer: document.getElementById('ticketContainer')
        };

        // Initialize state configuration from cache or default
        let config = {
            subject: localStorage.getItem('et_subject') || 'general',
            count: parseInt(localStorage.getItem('et_count')) || 3,
            difficulty: localStorage.getItem('et_difficulty') || 'medium',
            lastTicket: localStorage.getItem('et_last_ticket') ? JSON.parse(localStorage.getItem('et_last_ticket')) : null
        };

        function saveConfig() {
            localStorage.setItem('et_subject', config.subject);
            localStorage.setItem('et_count', config.count);
            localStorage.setItem('et_difficulty', config.difficulty);
            if(config.lastTicket) {
                localStorage.setItem('et_last_ticket', JSON.stringify(config.lastTicket));
            }
        }

        function applyUiFromConfig() {
            DOM.subject.value = config.subject;
            DOM.count.value = config.count;
            DOM.difficulty.value = config.difficulty;
        }

        /* --- TICKET LOGIC ARCHITECTURE --- */
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function generateTicket() {
            const pools = questionBank[config.subject][config.difficulty];
            // Deep copy pool to allow mutation/shuffling safety
            let poolCopy = [...pools];
            shuffle(poolCopy);
            
            // Build subset based on configurations
            let selection = poolCopy.slice(0, Math.min(config.count, poolCopy.length));
            
            config.lastTicket = {
                subjectText: DOM.subject.options[DOM.subject.selectedIndex].text,
                questions: selection
            };
            
            saveConfig();
            renderTicket(config.lastTicket);
        }

        function renderTicket(ticketData) {
            if(!ticketData) return;
            
            DOM.displaySubject.innerText = ticketData.subjectText + " - Exit Ticket";
            DOM.questionsOutput.innerHTML = "";

            ticketData.questions.forEach((q, idx) => {
                const qItem = document.createElement('div');
                qItem.className = 'question-item';

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${idx + 1}. ${q.t}`;
                qItem.appendChild(qText);

                const ansSpace = document.createElement('div');
                ansSpace.className = 'answer-space';

                // Factory conditional formatters based on schema types
                if(q.type === 'short') {
                    ansSpace.className = 'double-line-space';
                } else if(q.type === 'oneword') {
                    ansSpace.className = 'line-space';
                } else if(q.type === 'yesno') {
                    ansSpace.innerHTML = `
                        <div class="options-grid">
                            <div class="option-box"><span class="checkbox-mock"></span> Yes</div>
                            <div class="option-box"><span class="checkbox-mock"></span> No</div>
                        </div>`;
                } else if(q.type === 'emoji') {
                    ansSpace.innerHTML = `
                        <div class="emoji-rating">
                            <div class="emoji-box">😊</div>
                            <div class="emoji-box">😐</div>
                            <div class="emoji-box">😟</div>
                        </div>`;
                } else if(q.type === 'mc' || q.type === 'tick') {
                    let optsHtml = '<div class="options-grid">';
                    q.o.forEach(opt => {
                        optsHtml += `<div class="option-box"><span class="checkbox-mock"></span> ${opt}</div>`;
                    });
                    optsHtml += '</div>';
                    ansSpace.innerHTML = optsHtml;
                }

                qItem.appendChild(ansSpace);
                DOM.questionsOutput.appendChild(qItem);
            });
        }

        function triggerRefreshAnimation() {
            DOM.ticketContainer.classList.add('refreshing');
            setTimeout(() => {
                generateTicket();
                DOM.ticketContainer.classList.remove('refreshing');
            }, 400);
        }

        /* --- EVENTS INITIALIZATION CONTROLLER --- */
        // Listeners for Live Configuration Modifications
        DOM.subject.addEventListener('change', (e) => { config.subject = e.target.value; saveConfig(); });
        DOM.count.addEventListener('change', (e) => { config.count = parseInt(e.target.value); saveConfig(); });
        DOM.difficulty.addEventListener('change', (e) => { config.difficulty = e.target.value; saveConfig(); });

        // Functional Button Trigger Listeners
        DOM.toggleSettingsBtn.addEventListener('click', () => {
            playSound('click');
            DOM.settingsPanel.classList.toggle('collapsed');
        });

        DOM.generateBtn.addEventListener('click', () => {
            playSound('generate');
            triggerRefreshAnimation();
        });

        DOM.newTicketBtn.addEventListener('click', () => {
            playSound('generate');
            triggerRefreshAnimation();
        });

        DOM.printBtn.addEventListener('click', () => {
            playSound('print');
            window.print();
        });

        // Initialize Core View
        applyUiFromConfig();
        if(config.lastTicket) {
            renderTicket(config.lastTicket);
        } else {
            generateTicket();
        }
