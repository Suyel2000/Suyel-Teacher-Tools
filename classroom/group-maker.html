<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Classroom Group Maker</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-color: #2c3e50;
            --text-muted: #606f7b;
            --primary-btn: #4a90e2;
            --primary-hover: #357abd;
            --reset-btn: #e3342f;
            --reset-hover: #cc1f1a;
            --print-btn: #38c172;
            --print-hover: #2f9e5a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        /* Glassmorphism Header */
        header {
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        header h1 {
            font-size: 2.5rem;
            color: #1a202c;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Input Controls Panel */
        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            font-size: 1.1rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            background: rgba(255,255,255,0.7);
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-btn);
        }

        /* Radio Group Strategy styling */
        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .radio-option input[type="radio"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--primary-btn);
        }

        .strategy-input-container {
            margin-left: 34px;
            max-width: 150px;
        }

        /* Action Buttons */
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            user-select: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary { background-color: var(--primary-btn); color: white; flex: 2; min-width: 200px; justify-content: center;}
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: #f3f4f6; color: #1f2937; justify-content: center; }
        .btn-secondary:hover { background-color: #e5e7eb; }

        .btn-print { background-color: var(--print-btn); color: white; justify-content: center; }
        .btn-print:hover { background-color: var(--print-hover); }

        .btn-danger { background-color: var(--reset-btn); color: white; justify-content: center; }
        .btn-danger:hover { background-color: var(--reset-hover); }

        /* Animation Overlay Screen */
        .animation-overlay {
            display: none;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            margin-top: 25px;
        }

        .shuffling-numbers {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary-btn);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }

        /* Generated Groups Output Grid */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 25px;
            width: 100%;
        }

        .group-card {
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.4s forwards ease-out;
            transition: transform 0.3s;
        }

        .group-card:hover {
            transform: translateY(-5px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .group-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(0,0,0,0.06);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-count {
            font-size: 0.9rem;
            background: rgba(0,0,0,0.07);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            width: 45px;
            height: 45px;
            background: #ffffff;
            color: #1a202c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.03);
            transform: scale(0);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        /* Classroom Smartboards and Large Display optimizations */
        @media (min-width: 1200px) {
            body { padding: 40px; }
            header h1 { font-size: 3.5rem; }
            input[type="number"], .btn, label, .radio-option { font-size: 1.4rem; }
            .chip { width: 55px; height: 55px; font-size: 1.3rem; }
            .group-title { font-size: 1.7rem; }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 10px; }
            .panel { padding: 20px; }
            .btn { width: 100%; }
            .btn-container { flex-direction: column; }
        }

        /* PRINT VIEW STYLES */
        @media print {
            body {
                background: none !important;
                color: #000 !important;
                padding: 0;
            }
            .panel, .btn-container, .animation-overlay {
                display: none !important;
            }
            header {
                background: none !important;
                border: none !important;
                box-shadow: none !important;
                padding: 10px 0 !important;
                margin-bottom: 20px !important;
            }
            header p { color: #000 !important; }
            .groups-grid {
                display: block !important;
            }
            .group-card {
                background: none !important;
                border: 1px solid #000 !important;
                page-break-inside: avoid;
                margin-bottom: 20px !important;
                opacity: 1 !important;
                transform: none !important;
                box-shadow: none !important;
                color: #000 !important;
            }
            .group-title {
                border-bottom: 1px solid #000 !important;
                color: #000 !important;
            }
            .chip {
                background: none !important;
                border: 1px solid #000 !important;
                box-shadow: none !important;
                color: #000 !important;
                transform: none !important;
                display: inline-flex !important;
                margin-right: 5px;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>👥 Classroom Group Maker</h1>
            <p>Random • Fair • Quick</p>
        </header>

        <div class="panel" id="config-panel">
            <div class="row">
                <div class="col">
                    <div class="section-title">Roll Number Range</div>
                    <div class="form-group">
                        <label for="roll-from">From</label>
                        <input type="number" id="roll-from" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label for="roll-to">To</label>
                        <input type="number" id="roll-to" value="40" min="1">
                    </div>
                </div>

                <div class="col">
                    <div class="section-title">Create Groups By</div>
                    
                    <label class="radio-option">
                        <input type="radio" name="strategy" id="strat-count" value="count" checked>
                        Number of Groups
                    </label>
                    <div class="strategy-input-container">
                        <input type="number" id="val-count" value="5" min="1">
                    </div>

                    <label class="radio-option" style="margin-top: 20px;">
                        <input type="radio" name="strategy" id="strat-size" value="size">
                        Students Per Group
                    </label>
                    <div class="strategy-input-container">
                        <input type="number" id="val-size" value="4" min="1" disabled>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <button class="btn btn-primary" id="btn-generate">👥 Generate Groups</button>
                <button class="btn btn-secondary" id="btn-shuffle" style="display:none;">🔀 Shuffle Again</button>
                <button class="btn btn-print" id="btn-print" style="display:none;">🖨 Print</button>
                <button class="btn btn-danger" id="btn-reset">🔄 Reset</button>
            </div>
        </div>

        <div class="animation-overlay" id="loader-view">
            <div class="section-title">Shuffling Roll Numbers...</div>
            <div class="shuffling-numbers" id="scrambler-box">--</div>
        </div>

        <div class="groups-grid" id="output-view"></div>
    </div>

    <script>
        // --- Web Audio Synthesizer Node System Configuration ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'shuffle') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150 + Math.random() * 300, now);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'ready') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        // --- Application Architecture & State Management Modules ---
        const DOM = {
            rollFrom: document.getElementById('roll-from'),
            rollTo: document.getElementById('roll-to'),
            stratCount: document.getElementById('strat-count'),
            stratSize: document.getElementById('strat-size'),
            valCount: document.getElementById('val-count'),
            valSize: document.getElementById('val-size'),
            btnGenerate: document.getElementById('btn-generate'),
            btnShuffle: document.getElementById('btn-shuffle'),
            btnPrint: document.getElementById('btn-print'),
            btnReset: document.getElementById('btn-reset'),
            loaderView: document.getElementById('loader-view'),
            scramblerBox: document.getElementById('scrambler-box'),
            outputView: document.getElementById('output-view')
        };

        // Highly compatible, inviting classroom friendly pastel colors palette matrix mapping
        const pastelColors = [
            '#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', 
            '#e8c4ff', '#fed7ec', '#ccfbf1', '#fef08a', '#fed7aa'
        ];

        // --- Event Listeners Initialization Framework ---
        document.querySelectorAll('input[name="strategy"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                playSound('click');
                if (e.target.value === 'count') {
                    DOM.valCount.disabled = false;
                    DOM.valSize.disabled = true;
                } else {
                    DOM.valCount.disabled = true;
                    DOM.valSize.disabled = false;
                }
                saveConfiguration();
            });
        });

        DOM.btnGenerate.addEventListener('click', () => { playSound('click'); executeGroupingPipeline(); });
        DOM.btnShuffle.addEventListener('click', () => { playSound('click'); executeGroupingPipeline(); });
        DOM.btnReset.addEventListener('click', () => { playSound('click'); resetToFactoryDefaults(); });
        DOM.btnPrint.addEventListener('click', () => { playSound('click'); window.print(); });
        
        [DOM.rollFrom, DOM.rollTo, DOM.valCount, DOM.valSize].forEach(input => {
            input.addEventListener('change', saveConfiguration);
        });

        // --- System Functional Core Logics ---
        function getConfiguration() {
            return {
                from: parseInt(DOM.rollFrom.value) || 1,
                to: parseInt(DOM.rollTo.value) || 40,
                strategy: DOM.stratCount.checked ? 'count' : 'size',
                countVal: parseInt(DOM.valCount.value) || 5,
                sizeVal: parseInt(DOM.valSize.value) || 4
            };
        }

        function saveConfiguration() {
            const config = getConfiguration();
            localStorage.setItem('cc_maker_config', JSON.stringify(config));
        }

        function restoreConfiguration() {
            const saved = localStorage.getItem('cc_maker_config');
            if (saved) {
                try {
                    const config = JSON.parse(saved);
                    DOM.rollFrom.value = config.from;
                    DOM.rollTo.value = config.to;
                    if (config.strategy === 'count') {
                        DOM.stratCount.checked = true;
                        DOM.valCount.value = config.countVal;
                        DOM.valCount.disabled = false;
                        DOM.valSize.disabled = true;
                    } else {
                        DOM.stratSize.checked = true;
                        DOM.valSize.value = config.sizeVal;
                        DOM.valCount.disabled = true;
                        DOM.valSize.disabled = false;
                    }
                } catch(e) { console.error("Error local state decoding mapping: ", e); }
            }

            const cachedGroups = localStorage.getItem('cc_maker_last_output');
            if (cachedGroups) {
                try {
                    renderGroups(JSON.parse(cachedGroups));
                    toggleSubControls(true);
                } catch(e) { console.clear(); }
            }
        }

        function resetToFactoryDefaults() {
            localStorage.removeItem('cc_maker_config');
            localStorage.removeItem('cc_maker_last_output');
            DOM.rollFrom.value = 1;
            DOM.rollTo.value = 40;
            DOM.stratCount.checked = true;
            DOM.valCount.value = 5;
            DOM.valSize.value = 4;
            DOM.valCount.disabled = false;
            DOM.valSize.disabled = true;
            DOM.outputView.innerHTML = '';
            toggleSubControls(false);
        }

        function toggleSubControls(hasData) {
            if (hasData) {
                DOM.btnShuffle.style.display = 'inline-flex';
                DOM.btnPrint.style.display = 'inline-flex';
                DOM.btnGenerate.style.display = 'none';
            } else {
                DOM.btnShuffle.style.display = 'none';
                DOM.btnPrint.style.display = 'none';
                DOM.btnGenerate.style.display = 'inline-flex';
            }
        }

        // Fisher–Yates Perfect Fair Distribution Randomizing Shuffle Core Array Engine
        function fisherYatesShuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function executeGroupingPipeline() {
            const config = getConfiguration();
            
            if (config.from > config.to) {
                alert("Error: 'From' roll number cannot be greater than 'To' roll number.");
                return;
            }

            // Create collection array pool mapping from structural ranges bounded boundaries
            const initialPool = [];
            for (let i = config.from; i <= config.to; i++) {
                initialPool.push(i);
            }

            if (initialPool.length === 0) return;

            const totalStudents = initialPool.length;
            let targetGroupCount = config.countVal;

            if (config.strategy === 'size') {
                targetGroupCount = Math.max(1, Math.round(totalStudents / config.sizeVal));
            }

            if (targetGroupCount <= 0) targetGroupCount = 1;

            // Instantiate Array of Struct Multi-nodes
            const targetGroupsLayout = Array.from({ length: targetGroupCount }, () => []);

            // Execute Fair Random Process Array Shuffle
            const randomizedPool = fisherYatesShuffle([...initialPool]);

            // Balanced Sequential Distribution across structural groups array allocations mapping
            randomizedPool.forEach((rollNum, index) => {
                const targetedBucketIndex = index % targetGroupCount;
                targetGroupsLayout[targetedBucketIndex].push(rollNum);
            });

            // Re-sort numeric values internally within individual distributed structural nodes for fast assessment
            targetGroupsLayout.forEach(group => group.sort((a, b) => a - b));

            // Execute Visual FX Core Engine Pipelines
            executeShuffleVisualEffects(() => {
                renderGroups(targetGroupsLayout);
                localStorage.setItem('cc_maker_last_output', JSON.stringify(targetGroupsLayout));
                toggleSubControls(true);
                playSound('ready');
            });
        }

        function executeShuffleVisualEffects(completionCallback) {
            DOM.outputView.innerHTML = '';
            DOM.loaderView.style.display = 'block';
            
            let iterationCount = 0;
            const maxIterations = 20; 
            const speedInterval = 100; // ms

            const intervalToken = setInterval(() => {
                const config = getConfiguration();
                const fakeRandomRoll = Math.floor(Math.random() * (config.to - config.from + 1)) + config.from;
                DOM.scramblerBox.innerText = fakeRandomRoll;
                playSound('shuffle');
                
                iterationCount++;
                if (iterationCount >= maxIterations) {
                    clearInterval(intervalToken);
                    DOM.loaderView.style.display = 'none';
                    completionCallback();
                }
            }, speedInterval);
        }

        function generateAlphaLabel(index) {
            let label = '';
            while (index >= 0) {
                label = String.fromCharCode((index % 26) + 65) + label;
                index = Math.floor(index / 26) - 1;
            }
            return `Group ${label}`;
        }

        function renderGroups(groups) {
            DOM.outputView.innerHTML = '';
            
            groups.forEach((studentsArray, index) => {
                if (studentsArray.length === 0) return; // Skip displaying empty groups

                const colorHex = pastelColors[index % pastelColors.length];
                
                const card = document.createElement('div');
                card.className = 'group-card';
                card.style.backgroundColor = colorHex;
                card.style.animationDelay = `${index * 0.05}s`;

                const titleBlock = document.createElement('div');
                titleBlock.className = 'group-title';
                
                const labelSpan = document.createElement('span');
                labelSpan.innerText = generateAlphaLabel(index);
                
                const badgeCount = document.createElement('span');
                badgeCount.className = 'group-count';
                badgeCount.innerText = `${studentsArray.length} Students`;

                titleBlock.appendChild(labelSpan);
                titleBlock.appendChild(badgeCount);
                card.appendChild(titleBlock);

                const chipsWrapper = document.createElement('div');
                chipsWrapper.className = 'chips-container';

                studentsArray.forEach((rollNo, rollIndex) => {
                    const chip = document.createElement('div');
                    chip.className = 'chip';
                    chip.innerText = rollNo;
                    chip.style.animationDelay = `${(index * 0.05) + (rollIndex * 0.03)}s`;
                    chipsWrapper.appendChild(chip);
                });

                card.appendChild(chipsWrapper);
                DOM.outputView.appendChild(card);
            });
        }

        // Initialize and setup environment lifecycle mapping
        window.addEventListener('DOMContentLoaded', () => {
            restoreConfiguration();
        });
    </script>
</body>
</html>
