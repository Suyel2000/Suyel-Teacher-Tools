<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔊 Classroom Noise Meter</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            
            /* Status Colors */
            --color-green: #2ecc71;
            --color-yellow: #f1c40f;
            --color-orange: #e67e22;
            --color-red: #e74c3c;
            
            --current-status-color: var(--color-green);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Layout Grid */
        .main-display {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (min-width: 600px) {
            .main-display {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Cards styling */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Meter Card Styling */
        .meter-container {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            border: 6px solid var(--glass-border);
            transition: border-color 0.3s ease;
        }

        .meter-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--current-status-color) 0%, transparent 0%);
            transform: rotate(-180deg);
            transition: background 0.3s ease;
        }

        .meter-core {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(40, 40, 60, 0.9);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #percentage-text {
            font-size: 2.2rem;
            font-weight: bold;
        }

        #label-text {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Feedback Card Styling */
        #emoji-feedback {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #status-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--current-status-color);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            transition: color 0.3s ease;
        }

        /* Canvas Soundwave */
        .wave-container {
            width: 100%;
            height: 60px;
            margin-top: 15px;
            background: rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Dynamic Banner Alerts */
        .alert-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(231, 76, 60, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 20px;
        }

        .alert-banner.active {
            transform: translateY(0);
        }

        .alert-banner span {
            font-size: 4rem;
            margin-bottom: 5px;
        }

        .alert-banner p {
            font-size: 1.6rem;
            font-weight: bold;
        }

        /* Controls Area */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        button.active-btn {
            background: #2ecc71;
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        button.active-btn:hover {
            background: #27ae60;
        }

        /* Settings Drawer / Area */
        .settings-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
            display: none;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 650px) {
            .settings-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            width: 100%;
        }

        select option {
            background: #34495e;
            color: white;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            user-select: none;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Error Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .overlay p {
            font-size: 1.2rem;
            color: #bdc3c7;
            max-width: 500px;
            margin-bottom: 25px;
        }

        /* Confetti Overlay */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99;
            display: none;
        }

        /* Flash overlay effect */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(231, 76, 60, 0.4);
            pointer-events: none;
            z-index: 98;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        /* Smartboard adjustment Optimization */
        @media (min-height: 800px) and (min-width: 1000px) {
            .container {
                max-width: 1100px;
                padding: 50px;
            }
            header h1 { font-size: 4rem; }
            header p { font-size: 1.6rem; }
            .meter-container { width: 240px; height: 240px; border-width: 8px;}
            .meter-core { width: 200px; height: 200px; }
            #percentage-text { font-size: 3.5rem; }
            #emoji-feedback { font-size: 8rem; }
            #status-text { font-size: 2.5rem; }
            button { font-size: 1.5rem; padding: 18px 36px; }
        }
    </style>

<body>

    <div id="flash-overlay"></div>

    <canvas id="confetti-canvas"></canvas>

    <div id="permission-overlay" class="overlay" style="display: none;">
        <h2>🎙️ Microphone Access Required</h2>
        <p id="permission-message">To start monitoring classroom sounds and helping students stay on track, please grant microphone permission.</p>
        <button id="btn-retry" onclick="initAudio()">🎤 Grant Permission / Retry</button>
    </div>

    <div class="container">
        <header>
            <h1>Classroom Noise Meter</h1>
            <p>Quiet Classroom • Better Learning</p>
        </header>

        <main>
            <div class="main-display">
                <div class="card">
                    <div class="meter-container">
                        <div class="meter-fill" id="meter-fill"></div>
                        <div class="meter-core">
                            <div id="percentage-text">0%</div>
                            <div id="label-text">Noise</div>
                        </div>
                    </div>
                    <div class="wave-container">
                        <canvas id="wave-canvas"></canvas>
                    </div>
                </div>

                <div class="card" style="justify-content: space-between; min-height: 235px;">
                    <div id="emoji-feedback">🤫</div>
                    <div id="status-text">Ready</div>

                    <div id="alert-banner" class="alert-banner">
                        <span>🔴</span>
                        <p>Too Much Noise!</p>
                    </div>
                    
                    <div id="celebration-banner" class="alert-banner" style="background: rgba(46, 204, 113, 0.95);">
                        <span>🎉</span>
                        <p>Excellent Classroom!</p>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-start" onclick="toggleTracking()">🎤 Start</button>
                <button id="btn-pause" onclick="pauseTracking()" disabled>⏸ Pause</button>
                <button id="btn-reset" onclick="resetTracker()">🔄 Reset</button>
                <button id="btn-settings" onclick="toggleSettings()">⚙ Settings</button>
            </div>

            <div id="settings-panel" class="settings-panel">
                <div class="settings-grid">
                    <div class="setting-item">
                        <label for="select-goal">🎯 Classroom Goal Mode</label>
                        <select id="select-goal" onchange="updateGoalMode()">
                            <option value="exam">Examination Mode (Super Quiet)</option>
                            <option value="quiet" selected>Quiet Time (Standard Focus)</option>
                            <option value="discussion">Discussion Mode (Moderate Talk)</option>
                            <option value="group">Group Activity (High Energy allowed)</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <label for="select-sensitivity">🎚️ Mic Sensitivity</label>
                        <select id="select-sensitivity" onchange="updateSensitivity()">
                            <option value="low">Low Sensitivity (For loud rooms/mics)</option>
                            <option value="medium" selected>Medium Sensitivity (Normal)</option>
                            <option value="high">High Sensitivity (Picks up whispers)</option>
                        </select>
                    </div>

                    <div class="setting-item" style="grid-column: span 1;">
                        <label>🔊 Alert & Action Triggers</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="chk-sound" checked onchange="saveSettings()"> Alert Tone
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="chk-flash" checked onchange="saveSettings()"> Red Flash
                            </label>
                        </div>
                    </div>

                    <div class="setting-item" style="grid-column: span 1;">
                        <label>✨ Rewards</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label" style="grid-column: span 2;">
                                <input type="checkbox" id="chk-celebrate" checked onchange="saveSettings()"> 30s Celebration 🎉
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- State Management ---
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let dataArray = [];
        let animationFrameId = null;
        
        let isRunning = false;
        let smoothedVolume = 0;
        
        // Threshold Configurations
        let thresholds = { yellow: 25, orange: 45, red: 60 };
        let sensitivityMultiplier = 1.0;

        // Counter states
        let consecutiveLoudTime = 0; // tracking for > 5 seconds
        let consecutiveQuietTime = 0; // tracking for 30s celebration
        let lastUpdateTime = Date.now();

        // Canvas setups
        const waveCanvas = document.getElementById('wave-canvas');
        const waveCtx = waveCanvas.getContext('2d');
        const confCanvas = document.getElementById('confetti-canvas');
        const confCtx = confCanvas.getContext('2d');
        let confettiParticles = [];

        // --- App Initialization & LocalStorage ---
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedSettings();
            resizeCanvases();
            window.addEventListener('resize', resizeCanvases);
            checkInitialPermissions();
        });

        function checkInitialPermissions() {
            // Check if permission was previously granted or just prompt cleanly via overlay
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                document.getElementById('permission-overlay').style.display = 'flex';
            } else {
                showError("Your browser does not support audio recording features.");
            }
        }

        function loadSavedSettings() {
            if (localStorage.getItem('cm_goal')) {
                document.getElementById('select-goal').value = localStorage.getItem('cm_goal');
                document.getElementById('select-sensitivity').value = localStorage.getItem('cm_sensitivity');
                document.getElementById('chk-sound').checked = localStorage.getItem('cm_sound') === 'true';
                document.getElementById('chk-flash').checked = localStorage.getItem('cm_flash') === 'true';
                document.getElementById('chk-celebrate').checked = localStorage.getItem('cm_celebrate') === 'true';
            }
            updateGoalMode();
            updateSensitivity();
        }

        function saveSettings() {
            localStorage.setItem('cm_goal', document.getElementById('select-goal').value);
            localStorage.setItem('cm_sensitivity', document.getElementById('select-sensitivity').value);
            localStorage.setItem('cm_sound', document.getElementById('chk-sound').checked);
            localStorage.setItem('cm_flash', document.getElementById('chk-flash').checked);
            localStorage.setItem('cm_celebrate', document.getElementById('chk-celebrate').checked);
        }

        function updateGoalMode() {
            const mode = document.getElementById('select-goal').value;
            if (mode === 'exam') {
                thresholds = { yellow: 15, orange: 25, red: 35 };
            } else if (mode === 'quiet') {
                thresholds = { yellow: 25, orange: 45, red: 60 };
            } else if (mode === 'discussion') {
                thresholds = { yellow: 45, orange: 65, red: 75 };
            } else if (mode === 'group') {
                thresholds = { yellow: 60, orange: 75, red: 88 };
            }
            saveSettings();
        }

        function updateSensitivity() {
            const level = document.getElementById('select-sensitivity').value;
            if (level === 'low') sensitivityMultiplier = 0.6;
            if (level === 'medium') sensitivityMultiplier = 1.0;
            if (level === 'high') sensitivityMultiplier = 1.6;
            saveSettings();
        }

        // --- Synth Audio Engine Effects (No external assets) ---
        function playTone(freq, type, duration) {
            if (!document.getElementById('chk-sound').checked) return;
            try {
                const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = type;
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) { console.log(e); }
        }

        function playButtonClick() {
            playTone(600, 'sine', 0.08);
        }

        function playAlertTone() {
            playTone(350, 'triangle', 0.3);
            setTimeout(() => playTone(350, 'triangle', 0.3), 400);
        }

        function playCelebrationTone() {
            let notes = [523.25, 659.25, 783.99, 1046.50]; // C Major Chord sweep
            notes.forEach((note, index) => {
                setTimeout(() => playTone(note, 'sine', 0.4), index * 120);
            });
        }

        // --- Web Audio Pipeline Initialization ---
        async function initAudio() {
            playButtonClick();
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                let bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                document.getElementById('permission-overlay').style.display = 'none';
                startTracking();
            } catch (err) {
                showError("Microphone permission is required to measure classroom noise. Please allow access and try again.");
            }
        }

        function showError(msg) {
            document.getElementById('permission-overlay').style.display = 'flex';
            document.getElementById('permission-message').innerText = msg;
        }

        // --- Run / Stop Pipeline Controls ---
        function toggleTracking() {
            playButtonClick();
            if (!audioContext) {
                initAudio();
                return;
            }
            startTracking();
        }

        function startTracking() {
            if (isRunning) return;
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            isRunning = true;
            document.getElementById('btn-start').classList.add('active-btn');
            document.getElementById('btn-start').innerHTML = "🟢 Running";
            document.getElementById('btn-pause').disabled = false;
            
            lastUpdateTime = Date.now();
            updateLoop();
        }

        function pauseTracking() {
            playButtonClick();
            if (!isRunning) return;
            isRunning = false;
            document.getElementById('btn-start').classList.remove('active-btn');
            document.getElementById('btn-start').innerHTML = "🎤 Start";
            document.getElementById('btn-pause').disabled = true;
            cancelAnimationFrame(animationFrameId);
        }

        function resetTracker() {
            playButtonClick();
            consecutiveLoudTime = 0;
            consecutiveQuietTime = 0;
            smoothedVolume = 0;
            dismissBanners();
            updateUI(0);
        }

        function toggleSettings() {
            playButtonClick();
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function dismissBanners() {
            document.getElementById('alert-banner').classList.remove('active');
            document.getElementById('celebration-banner').classList.remove('active');
            document.getElementById('flash-overlay').style.opacity = 0;
            confCanvas.style.display = "none";
            confettiParticles = [];
        }

        // --- Core Processing Loop (approx 30fps balanced frame mapping) ---
        function updateLoop() {
            if (!isRunning) return;
            animationFrameId = requestAnimationFrame(updateLoop);

            let now = Date.now();
            let dt = (now - lastUpdateTime) / 1000; // time delta in seconds
            lastUpdateTime = now;

            // Extract microphone volume data
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            
            // Map relative sound structure dynamically into clean visual percentage metrics
            let rawTargetPercentage = (average / 128) * 100 * sensitivityMultiplier;
            rawTargetPercentage = Math.min(Math.max(rawTargetPercentage, 0), 100);

            // Audio smoothing to prevent harsh visual jitter
            smoothedVolume += (rawTargetPercentage - smoothedVolume) * 0.18;
            let currentVol = Math.round(smoothedVolume);

            updateUI(currentVol);
            drawWaveform();

            // Safety System Rule checks: Alert Logic (> 5 seconds loud)
            if (currentVol >= thresholds.red) {
                consecutiveLoudTime += dt;
                consecutiveQuietTime = 0; // reset quiet window reward tracking
                
                if (consecutiveLoudTime >= 5.0) {
                    triggerAlertBanner();
                }
            } else {
                consecutiveLoudTime = 0;
                
                // Reward System: Classroom stayed beautifully behaved under the warning threshold
                if (currentVol < thresholds.yellow) {
                    consecutiveQuietTime += dt;
                    if (consecutiveQuietTime >= 30.0 && document.getElementById('chk-celebrate').checked) {
                        triggerCelebration();
                    }
                } else {
                    // reset time if it pushes into moderate zones depending on configurations
                    consecutiveQuietTime = 0; 
                }
            }

            if (confettiParticles.length > 0) {
                updateAndDrawConfetti();
            }
        }

        // --- Interface Graphic Updaters ---
        function updateUI(volume) {
            document.getElementById('percentage-text').innerText = volume + '%';
            
            // Generate circular conic indicator degree fill
            const fillDegrees = (volume / 100) * 360;
            const fillElement = document.getElementById('meter-fill');
            
            let statusEmoji = "🤫";
            let statusText = "Excellent!";
            let rootColor = 'var(--color-green)';

            if (volume >= thresholds.red) {
                statusEmoji = "🚨";
                statusText = "Please Be Quiet!";
                rootColor = 'var(--color-red)';
            } else if (volume >= thresholds.orange) {
                statusEmoji = "😟";
                statusText = "Too Loud";
                rootColor = 'var(--color-orange)';
            } else if (volume >= thresholds.yellow) {
                statusEmoji = "😐";
                statusText = "Getting Noisy";
                rootColor = 'var(--color-yellow)';
            } else if (volume > 5) {
                statusEmoji = "😊";
                statusText = "Good";
                rootColor = 'var(--color-green)';
            }

            document.documentElement.style.setProperty('--current-status-color', rootColor);
            fillElement.style.background = `conic-gradient(${rootColor} ${fillDegrees}deg, transparent ${fillDegrees}deg)`;
            
            // Only update emoji/text frames if alerts aren't blocking active views
            if(!document.getElementById('alert-banner').classList.contains('active') && 
               !document.getElementById('celebration-banner').classList.contains('active')) {
                document.getElementById('emoji-feedback').innerText = statusEmoji;
                document.getElementById('status-text').innerText = statusText;
            }
        }

        function triggerAlertBanner() {
            const alertBanner = document.getElementById('alert-banner');
            if(!alertBanner.classList.contains('active')) {
                alertBanner.classList.add('active');
                playAlertTone();
                if(document.getElementById('chk-flash').checked) {
                    const flash = document.getElementById('flash-overlay');
                    flash.style.opacity = 1;
                    setTimeout(() => flash.style.opacity = 0, 400);
                }
                // Dismiss banner naturally after 4 seconds to check status updates smoothly again
                setTimeout(() => {
                    alertBanner.classList.remove('active');
                    consecutiveLoudTime = 0;
                }, 4000);
            }
        }

        function triggerCelebration() {
            consecutiveQuietTime = 0; 
            const celebrateBanner = document.getElementById('celebration-banner');
            celebrateBanner.classList.add('active');
            playCelebrationTone();
            
            // Launch procedural confetti stream
            confCanvas.style.display = "block";
            for (let i = 0; i < 100; i++) {
                confettiParticles.push(createConfettiParticle());
            }

            setTimeout(() => {
                celebrateBanner.classList.remove('active');
            }, 5000);
        }

        // --- Live Waveform Rendering ---
        function resizeCanvases() {
            waveCanvas.width = waveCanvas.parentElement.clientWidth;
            waveCanvas.height = waveCanvas.parentElement.clientHeight;
            confCanvas.width = window.innerWidth;
            confCanvas.height = window.innerHeight;
        }

        function drawWaveform() {
            waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
            waveCtx.lineWidth = 3;
            waveCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--current-status-color');
            waveCtx.beginPath();

            let sliceWidth = waveCanvas.width / dataArray.length;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = (v * waveCanvas.height) / 2;

                // Center dynamic line offsets inside bounds
                if (i === 0) {
                    waveCtx.moveTo(x, y);
                } else {
                    waveCtx.lineTo(x, y);
                }
                x += sliceWidth;
            }

            waveCtx.lineTo(waveCanvas.width, waveCanvas.height / 2);
            waveCtx.stroke();
        }

        // --- Custom Mathematical Particle Engines (Confetti) ---
        function createConfettiParticle() {
            return {
                x: Math.random() * confCanvas.width,
                y: Math.random() * confCanvas.height - confCanvas.height,
                r: Math.random() * 6 + 4,
                d: Math.random() * confCanvas.height,
                color: `rgba(${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, 1)`,
                tilt: Math.random() * 10 - 5,
                tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                tiltAngle: 0
            };
        }

        function updateAndDrawConfetti() {
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
            let activeParticles = false;

            confettiParticles.forEach((p) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - p.r/2) * 10;

                if (p.y <= confCanvas.height) {
                    activeParticles = true;
                }

                confCtx.beginPath();
                confCtx.lineWidth = p.r;
                confCtx.strokeStyle = p.color;
                confCtx.moveTo(p.x + p.tilt + p.r/2, p.y);
                confCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r/2);
                confCtx.stroke();
            });

            // Cleanup when falls entirely past active viewer threshold boundaries
            if (!activeParticles) {
                confCanvas.style.display = "none";
                confettiParticles = [];
            }
        }
    </script>
</body>
