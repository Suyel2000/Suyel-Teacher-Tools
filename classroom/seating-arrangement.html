<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪑 Classroom Seating Arrangement Generator</title>
    <style>
        /* --- CSS VARIABLES & THEMES --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #0ea5e9;
            --secondary-hover: #0284c7;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --teacher-bg: #f59e0b;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        /* --- BASIC SETUP --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            z-index: 1;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: #1a202c;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* --- GLASS CARD CONFIG PANEL --- */
        .config-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: rgba(255,255,255,0.8);
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .stat-display {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0.75rem 0;
        }

        .stat-display span {
            color: var(--primary);
            font-size: 1.1rem;
        }

        /* --- CONTROLS --- */
        .controls-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            grid-column: 1 / -1;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: var(--secondary-hover); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: var(--success-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }

        .btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* --- CLASSROOM VIEW AREA --- */
        .classroom-area {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            min-height: 300px;
        }

        .teacher-desk {
            background: var(--teacher-bg);
            color: white;
            font-weight: 700;
            padding: 0.75rem 3rem;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
            text-align: center;
            letter-spacing: 1px;
            margin-top: -2.5rem;
        }

        /* --- LAYOUT GRID --- */
        .seating-grid {
            display: grid;
            gap: 1rem;
            width: 100%;
            overflow-x: auto;
            padding: 0.5rem;
        }

        /* --- DESK DESIGN --- */
        .desk {
            background: #fff;
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: var(--radius-md);
            aspect-ratio: 4 / 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: deskFade 0.5s ease backwards;
        }

        .desk-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(0,0,0,0.4);
            margin-bottom: 2px;
            font-weight: 700;
        }

        .desk-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* State Modifiers */
        .desk.empty {
            background: rgba(0, 0, 0, 0.04) !important;
            border: 2px dashed rgba(0,0,0,0.15);
        }
        .desk.empty .desk-value {
            color: rgba(0,0,0,0.2);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* --- ANIMATIONS --- */
        @keyframes deskFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shuffle-anim .desk-value {
            animation: numPop 0.15s infinite alternate;
        }

        @keyframes numPop {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.1); opacity: 0.9; }
        }

        .reveal-active {
            animation: completeGlow 0.6s ease-out;
        }

        @keyframes completeGlow {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(79, 70, 229, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px 10px rgba(79, 70, 229, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(79, 70, 229, 0); }
        }

        /* --- PRINT ELEMENT (HIDDEN ON SCREEN) --- */
        .print-header-info {
            display: none;
        }

        /* --- PRINT STYLES --- */
        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
            body {
                background: white;
                color: black;
                padding: 0;
                min-height: auto;
            }
            .config-card, .btn, .desk-label {
                display: none !important;
            }
            .container {
                max-width: 100%;
            }
            .classroom-area {
                background: transparent;
                border: none;
                box-shadow: none;
                padding: 0;
            }
            .print-header-info {
                display: block;
                text-align: center;
                margin-bottom: 2rem;
                width: 100%;
            }
            .print-header-info h2 {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }
            .print-header-info p {
                font-size: 1rem;
                color: #555;
            }
            .teacher-desk {
                border: 2px solid black;
                background: #f0f0f0 !important;
                color: black;
                box-shadow: none;
                margin-top: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .seating-grid {
                overflow: visible;
                gap: 8px;
            }
            .desk {
                border: 1.5px solid #000 !important;
                background: white !important;
                box-shadow: none !important;
                animation: none !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .desk.empty {
                background: #fafafa !important;
                border: 1.5px dashed #aaa !important;
            }
            .desk-value {
                color: black !important;
                font-size: 1.4rem;
            }
        }
    </style>

<body>

    <div class="container">
        <header>
            <h1>🪑 Classroom Seating Generator</h1>
            <p>Arrange • Randomize • Organize</p>
        </header>

        <section class="config-card">
            <div class="input-group">
                <label>Roll Number Range</label>
                <div class="input-row">
                    <input type="number" id="rollFrom" value="1" min="1" placeholder="From">
                    <input type="number" id="rollTo" value="40" min="1" placeholder="To">
                </div>
            </div>

            <div class="input-group">
                <label>Classroom Layout</label>
                <div class="input-row">
                    <input type="number" id="rows" value="5" min="1" placeholder="Rows">
                    <input type="number" id="cols" value="8" min="1" placeholder="Cols">
                </div>
            </div>

            <div class="input-group">
                <label>Empty Seats / Broken Desks (Optional)</label>
                <input type="text" id="emptySeats" placeholder="e.g., 5, 12, 20">
            </div>

            <div class="input-group">
                <div class="stat-display">Total Layout Seats: <span id="totalSeatsDisplay">40</span></div>
            </div>

            <div class="controls-wrapper">
                <button class="btn btn-primary" id="btnGenerate">🪑 Generate</button>
                <button class="btn btn-secondary" id="btnShuffle" disabled>🔀 Shuffle Again</button>
                <button class="btn btn-success" id="btnPrint">🖨 Print</button>
                <button class="btn btn-danger" id="btnReset">🔄 Reset</button>
            </div>
        </section>

        <div class="print-header-info">
            <h2 id="printTitle">Classroom Seating Arrangement</h2>
            <p id="printDate"></p>
        </div>

        <main class="classroom-area">
            <div class="teacher-desk">👩‍🏫 Teacher Desk</div>
            <div class="seating-grid" id="seatingGrid"></div>
        </main>
    </div>

    <script>
        /* --- PRODUCIBLE AUDIO SYNTHESIZER (WEB AUDIO API) --- */
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioCtx();
        }

        function playSound(type) {
            try {
                initAudio();
                if (!audioCtx) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } else if (type === 'shuffle') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(300, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'complete') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                }
            } catch (e) {
                console.log("Audio play blocked or unsupported:", e);
            }
        }

        /* --- APP STATE & DOM MAP --- */
        const dom = {
            rollFrom: document.getElementById('rollFrom'),
            rollTo: document.getElementById('rollTo'),
            rows: document.getElementById('rows'),
            cols: document.getElementById('cols'),
            emptySeats: document.getElementById('emptySeats'),
            totalSeatsDisplay: document.getElementById('totalSeatsDisplay'),
            btnGenerate: document.getElementById('btnGenerate'),
            btnShuffle: document.getElementById('btnShuffle'),
            btnPrint: document.getElementById('btnPrint'),
            btnReset: document.getElementById('btnReset'),
            seatingGrid: document.getElementById('seatingGrid'),
            printDate: document.getElementById('printDate')
        };

        // Generates a random aesthetic soft pastel color palette for desks
        const deskColors = [
            '#e0f2fe', '#f0fdf4', '#fef2f2', '#fff7ed', '#fae8ff', 
            '#f5f3ff', '#ecfdf5', '#eff6ff', '#fff1f2', '#f0fdfa'
        ];

        let isAnimating = false;

        /* --- SYSTEM CORE CORE ENGINE --- */

        function init() {
            setupEventListeners();
            loadState();
            updateTotalSeatsDisplay();
        }

        function setupEventListeners() {
            dom.rows.addEventListener('input', updateTotalSeatsDisplay);
            dom.cols.addEventListener('input', updateTotalSeatsDisplay);
            
            dom.btnGenerate.addEventListener('click', () => { playSound('click'); runGeneration(); });
            dom.btnShuffle.addEventListener('click', () => { playSound('click'); runGeneration(); });
            dom.btnReset.addEventListener('click', () => { playSound('click'); resetApplication(); });
            dom.btnPrint.addEventListener('click', () => { playSound('click'); prepareAndPrint(); });
        }

        function updateTotalSeatsDisplay() {
            const r = parseInt(dom.rows.value) || 0;
            const c = parseInt(dom.cols.value) || 0;
            dom.totalSeatsDisplay.textContent = r * c;
        }

        // Fisher-Yates Complete Randomization Algorithm
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function parseEmptySeats() {
            return dom.emptySeats.value.split(',')
                .map(s => parseInt(s.trim()))
                .filter(num => !isNaN(num) && num > 0);
        }

        function runGeneration() {
            if (isAnimating) return;

            const from = parseInt(dom.rollFrom.value);
            const to = parseInt(dom.rollTo.value);
            const r = parseInt(dom.rows.value);
            const c = parseInt(dom.cols.value);
            const staticEmpties = parseEmptySeats();

            // Computations & Valids
            if (isNaN(from) || isNaN(to) || from > to) {
                alert("Please enter a valid Roll Number range (From ≤ To).");
                return;
            }
            if (isNaN(r) || r < 1 || isNaN(c) || c < 1) {
                alert("Please specify valid layout Row and Column dimensions.");
                return;
            }

            const studentCount = (to - from) + 1;
            const totalGridCapacity = r * c;
            const uniqueStaticEmpties = [...new Set(staticEmpties)].filter(index => index <= totalGridCapacity);
            const usableSeatsCount = totalGridCapacity - uniqueStaticEmpties.length;

            if (studentCount > usableSeatsCount) {
                alert(`Layout Configuration Error!\n\nYou have ${studentCount} students but only ${usableSeatsCount} usable layout locations remaining after computing custom empty seat flags.`);
                return;
            }

            saveState();
            executeSeatingPipeline(from, to, r, c, uniqueStaticEmpties, totalGridCapacity);
        }

        function executeSeatingPipeline(from, to, rows, cols, uniqueStaticEmpties, totalCapacity) {
            isAnimating = true;
            dom.btnGenerate.disabled = true;
            dom.btnShuffle.disabled = true;

            // Prepare student elements list
            let students = [];
            for (let i = from; i <= to; i++) {
                students.push(String(i).padStart(2, '0'));
            }
            shuffleArray(students);

            // Structure grid mappings
            let assignments = new Array(totalCapacity).fill(null);

            // Enforce explicit structural overrides
            uniqueStaticEmpties.forEach(index => {
                assignments[index - 1] = "EMPTY";
            });

            // Populate layout array with distributed elements
            let studentIdx = 0;
            for (let i = 0; i < totalCapacity; i++) {
                if (assignments[i] === null) {
                    if (studentIdx < students.length) {
                        assignments[i] = students[studentIdx++];
                    } else {
                        assignments[i] = "EMPTY"; // Auto structural padding fill
                    }
                }
            }

            // Render Layout Base Elements
            dom.seatingGrid.style.gridTemplateColumns = `repeat(${cols}, minmax(80px, 1fr))`;
            dom.seatingGrid.innerHTML = '';

            const fragment = document.createDocumentFragment();
            const deskElementRefs = [];

            for (let i = 0; i < totalCapacity; i++) {
                const desk = document.createElement('div');
                desk.classList.add('desk');
                desk.style.animationDelay = `${(i % cols) * 0.03}s`;
                
                // Color mapping logic
                if (assignments[i] !== "EMPTY") {
                    desk.style.backgroundColor = deskColors[Math.floor(Math.random() * deskColors.length)];
                }

                const label = document.createElement('span');
                label.classList.add('desk-label');
                label.textContent = `Seat ${i + 1}`;

                const val = document.createElement('span');
                val.classList.add('desk-value');

                desk.appendChild(label);
                desk.appendChild(val);
                fragment.appendChild(desk);

                deskElementRefs.push({
                    domElement: desk,
                    valElement: val,
                    finalValue: assignments[i]
                });
            }
            dom.seatingGrid.appendChild(fragment);

            // Trigger Shuffle Sound Loop Integration
            let shuffleInterval = setInterval(() => {
                playSound('shuffle');
                deskElementRefs.forEach(item => {
                    if (item.finalValue !== "EMPTY") {
                        item.valElement.textContent = Math.floor(Math.random() * (to - from + 1) + from).toString().padStart(2, '0');
                    } else {
                        item.domElement.classList.add('empty');
                        item.valElement.textContent = "Empty";
                    }
                });
            }, 150);

            dom.seatingGrid.classList.add('shuffle-anim');

            // Final Presentation Delivery
            setTimeout(() => {
                clearInterval(shuffleInterval);
                dom.seatingGrid.classList.remove('shuffle-anim');

                deskElementRefs.forEach(item => {
                    if (item.finalValue === "EMPTY") {
                        item.domElement.classList.add('empty');
                        item.valElement.textContent = "Empty";
                    } else {
                        item.valElement.textContent = item.finalValue;
                    }
                });

                playSound('complete');
                
                // Add contextual highlight transition effects
                const wrapperBox = document.querySelector('.classroom-area');
                wrapperBox.classList.add('reveal-active');
                setTimeout(() => wrapperBox.classList.remove('reveal-active'), 600);

                isAnimating = false;
                dom.btnGenerate.disabled = false;
                dom.btnShuffle.disabled = false;

                saveCurrentLayoutSnapshot(assignments);
            }, 1800);
        }

        /* --- STORAGE PERSISTENCE ENGINE --- */

        function saveState() {
            localStorage.setItem('cssg_rollFrom', dom.rollFrom.value);
            localStorage.setItem('cssg_rollTo', dom.rollTo.value);
            localStorage.setItem('cssg_rows', dom.rows.value);
            localStorage.setItem('cssg_cols', dom.cols.value);
            localStorage.setItem('cssg_emptySeats', dom.emptySeats.value);
        }

        function saveCurrentLayoutSnapshot(assignments) {
            localStorage.setItem('cssg_lastLayout', JSON.stringify(assignments));
        }

        function loadState() {
            if (localStorage.getItem('cssg_rollFrom')) dom.rollFrom.value = localStorage.getItem('cssg_rollFrom');
            if (localStorage.getItem('cssg_rollTo')) dom.rollTo.value = localStorage.getItem('cssg_rollTo');
            if (localStorage.getItem('cssg_rows')) dom.rows.value = localStorage.getItem('cssg_rows');
            if (localStorage.getItem('cssg_cols')) dom.cols.value = localStorage.getItem('cssg_cols');
            if (localStorage.getItem('cssg_emptySeats')) dom.emptySeats.value = localStorage.getItem('cssg_emptySeats');

            const savedLayout = localStorage.getItem('cssg_lastLayout');
            if (savedLayout) {
                try {
                    const arr = JSON.parse(savedLayout);
                    const cols = parseInt(dom.cols.value) || 1;
                    dom.seatingGrid.style.gridTemplateColumns = `repeat(${cols}, minmax(80px, 1fr))`;
                    dom.seatingGrid.innerHTML = '';

                    arr.forEach((val, i) => {
                        const desk = document.createElement('div');
                        desk.classList.add('desk');
                        if (val !== "EMPTY") {
                            desk.style.backgroundColor = deskColors[Math.floor(Math.random() * deskColors.length)];
                        } else {
                            desk.classList.add('empty');
                        }

                        const label = document.createElement('span');
                        label.classList.add('desk-label');
                        label.textContent = `Seat ${i + 1}`;

                        const valSpan = document.createElement('span');
                        valSpan.classList.add('desk-value');
                        valSpan.textContent = (val === "EMPTY") ? "Empty" : val;

                        desk.appendChild(label);
                        desk.appendChild(valSpan);
                        dom.seatingGrid.appendChild(desk);
                    });
                    dom.btnShuffle.disabled = false;
                } catch (e) {
                    console.error("Error formatting recovered local map layout storage sequence snapshot:", e);
                }
            }
        }

        function resetApplication() {
            if(confirm("Are you sure you want to restore default application settings? This will clear current seating layouts.")) {
                localStorage.clear();
                dom.rollFrom.value = 1;
                dom.rollTo.value = 40;
                dom.rows.value = 5;
                dom.cols.value = 8;
                dom.emptySeats.value = '';
                dom.seatingGrid.innerHTML = '';
                dom.btnShuffle.disabled = true;
                updateTotalSeatsDisplay();
            }
        }

        function prepareAndPrint() {
            dom.printDate.textContent = `Generated on: ${new Date().toLocaleDateString()} at ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            window.print();
        }

        // Execution Initializer entry sequence point load trigger hook context
        window.addEventListener('DOMContentLoaded', init);
    </script>
