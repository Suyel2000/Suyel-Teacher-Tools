<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔤 English Quiz Zone</title>
    <style>
        /* --- DESIGN SYSTEM & CSS VARIABLES --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            --primary-color: #4a00e0;
            --accent-color: #ff007f;
            --text-dark: #2d3748;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --radius-lg: 24px;
            --radius-md: 16px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- GLOBAL RESETS & STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- FLOATING DECORATIONS --- */
        .floating-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0.15;
            animation: floatAround 12s linear infinite;
        }

        @keyframes floatAround {
            0% { transform: translateY(110vh) rotate(0deg) translateX(0); }
            50% { transform: translateY(50vh) rotate(180deg) translateX(50px); }
            100% { transform: translateY(-10vh) rotate(360deg) translateX(0); }
        }

        /* --- APPARATUS / CONTAINERS --- */
        .container {
            width: 92%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding: 4rem 1rem 3rem;
            animation: fadeIn 1s ease-out;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: #2b2d42;
            text-shadow: 2px 4px 0px rgba(255,255,255,0.8);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.4rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 2rem;
        }

        .hero-illustration {
            font-size: 4rem;
            display: inline-block;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            box-shadow: var(--glass-shadow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CATEGORY CATEGORIZATION BLOCK --- */
        .category-section {
            margin-bottom: 4rem;
        }

        .category-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 6px solid var(--primary-color);
            border-radius: 4px;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- QUIZ CARDS GRID --- */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .quiz-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Hover animations and Glow effect */
        .quiz-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(74, 0, 224, 0.25);
            border-color: rgba(255, 255, 255, 0.9);
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0; left: -75%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .quiz-card:hover::before {
            left: 125%;
        }

        /* Image Placeholder Zone */
        .media-container {
            width: 100%;
            height: 140px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .media-container .fallback-emoji {
            font-size: 4rem;
            transition: transform 0.3s ease;
        }

        .quiz-card:hover .fallback-emoji {
            transform: scale(1.2) rotate(5deg);
        }

        .quiz-details h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 0.5rem;
        }

        .quiz-details p {
            font-size: 0.95rem;
            color: #4a5568;
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        /* Action Buttons */
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .quiz-card:hover .start-btn {
            background: linear-gradient(135deg, #ff007f 0%, #764ba2 100%);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.4);
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        /* --- DASHBOARD FOOTER CONTROLS --- */
        footer {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid var(--glass-border);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.05);
        }

        .footer-branding h4 {
            font-size: 1.1rem;
            color: #1a202c;
        }
        .footer-branding p {
            font-size: 0.85rem;
            color: #718096;
        }

        .footer-nav {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: #edf2f7;
            border: 1px solid #cbd5e0;
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            color: #4a5568;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        /* --- RESPONSIVE ADAPTATIONS (Smartboard, Tablet, Mobile) --- */
        @media (max-width: 1024px) {
            .hero h1 { font-size: 2.8rem; }
            .quiz-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }

        @media (max-width: 768px) {
            .hero { padding: 3rem 1rem 2rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero p { font-size: 1.1rem; }
            footer {
                flex-direction: column;
                gap: 0.8rem;
                text-align: center;
                padding: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .quiz-grid { grid-template-columns: 1fr; }
            .hero-illustration { font-size: 2.5rem; padding: 0.5rem 1.5rem; }
        }
    </style>
</head>
<body>

    <script>
        const AudioDriver = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                if (type === 'hover') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(350, now);
                    osc.frequency.exponentialRampToValueAtTime(450, now + 0.08);
                    gain.gain.setValueAtTime(0.04, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.12);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    osc.start(now);
                    osc.stop(now + 0.12);
                } else if (type === 'load') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { AudioDriver.play('load'); }, 500);
        });
    </script>

    <script>
        // Generate Floating Atmospheric Entities
        function buildFloatingAtmosphere() {
            const container = document.getElementById('floatingContainer');
            const items = ['A', 'B', 'C', '⭐', '🎈', '✏️', '📚', 'M', 'Z', '✨'];
            const screenCount = window.innerWidth < 600 ? 8 : 20;

            for (let i = 0; i < screenCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'floating-item';
                bubble.innerText = items[Math.floor(Math.random() * items.length)];
                bubble.style.left = `${Math.random() * 100}vw`;
                bubble.style.top = `${Math.random() * 100}vh`;
                bubble.style.animationDelay = `${Math.random() * 8}s`;
                bubble.style.animationDuration = `${10 + Math.random() * 15}s`;
                container.appendChild(bubble);
            }
        }

        // Programmatically Build the Complete Glassmorphic UI Dashboard
        function paintDashboard() {
            const targetHub = document.getElementById('quizHub');
            
            quizDataset.forEach(section => {
                const segment = document.createElement('section');
                segment.className = 'category-section';

                const header = document.createElement('h2');
                header.className = 'category-title';
                header.innerText = section.category;
                segment.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'quiz-grid';

                section.topics.forEach(topic => {
                    const card = document.createElement('div');
                    card.className = 'quiz-card';
                    card.setAttribute('onclick', `AudioDriver.play('click'); setTimeout(()=>{ window.location.href='${topic.file}'; }, 150);`);
                    card.setAttribute('onmouseenter', "AudioDriver.play('hover')");

                    // Media zone supporting automated PNG checking with fallback to emojis
                    const mediaBox = document.createElement('div');
                    mediaBox.className = 'media-container';

                    const imgTag = document.createElement('img');
                    imgTag.src = `images/${topic.img}`;
                    imgTag.alt = topic.name;
                    
                    const fallback = document.createElement('span');
                    fallback.className = 'fallback-emoji';
                    fallback.innerText = topic.emoji;

                    imgTag.onload = () => { imgTag.style.display = 'block'; fallback.style.display = 'none'; };
                    imgTag.onerror = () => { imgTag.style.display = 'none'; fallback.style.display = 'inline-block'; };

                    mediaBox.appendChild(imgTag);
                    mediaBox.appendChild(fallback);

                    // Context details construction
                    const details = document.createElement('div');
                    details.className = 'quiz-details';
                    
                    const title = document.createElement('h3');
                    title.innerText = topic.name;
                    
                    const narrative = document.createElement('p');
                    narrative.innerText = topic.desc;

                    details.appendChild(title);
                    details.appendChild(narrative);

                    const interactiveButton = document.createElement('button');
                    interactiveButton.className = 'start-btn';
                    interactiveButton.innerText = 'Start Quiz';

                    card.appendChild(mediaBox);
                    card.appendChild(details);
                    card.appendChild(interactiveButton);

                    grid.appendChild(card);
                });

                segment.appendChild(grid);
                targetHub.appendChild(segment);
            });
        }

        // Initialize Everything
        buildFloatingAtmosphere();
        paintDashboard();
    </script>

            <button class="nav-btn" onclick="AudioDriver.play('click'); window.location.reload();">🧠 Quiz Home</button>
        </nav>

</body>
