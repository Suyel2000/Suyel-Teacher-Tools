    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg-gradient-1: #A8E6CF;
            --bg-gradient-2: #DCEDC1;
            --bg-gradient-3: #FFD3B6;
            --bg-gradient-4: #FFAAA5;
            --text-dark: #2D3436;
            --text-light: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: linear-gradient(45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-4));
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .stat-badge {
            background: rgba(255,255,255,0.6);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 2rem;
            animation: fadeIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Welcome Screen Styling */
        #screen-welcome {
            justify-content: center;
            text-align: center;
            min-height: 70vh;
        }

        .floating-icons {
            font-size: 4.5rem;
            margin-bottom: 2rem;
            animation: float 4s ease-in-out infinite;
            letter-spacing: 15px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
        }

        .btn-large {
            background: linear-gradient(135deg, var(--primary), #FF8E53);
            color: white;
            border: none;
            padding: 1.5rem 4rem;
            font-size: 2.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            margin-top: 2.5rem;
        }

        .btn-large:hover {
            transform: scale(1.08);
            box-shadow: 0 18px 30px rgba(255, 107, 107, 0.6);
        }

        /* Dashboard Screen Categories Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            padding: 1rem;
        }

        .category-card {
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.65);
        }

        .category-card:hover {
            transform: translateY(-12px) scale(1.03);
            background: rgba(255,255,255,0.9);
            border-color: var(--primary);
        }

        .category-icon {
            font-size: 5.5rem;
            margin-bottom: 1.2rem;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.1));
        }

        .category-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2D3436;
            margin-bottom: 0.5rem;
        }

        /* Learning & Flashcard Arena */
        .flashcard-container {
            perspective: 1200px;
            width: 100%;
            max-width: 650px;
            height: 450px;
            margin: 2rem auto;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 28px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .flashcard-front {
            background: linear-gradient(135deg, #FFFFFF, #F5F7FA);
            border: 6px solid var(--secondary);
        }

        .flashcard-back {
            background: linear-gradient(135deg, var(--accent), #FFF3B0);
            transform: rotateY(180deg);
            border: 6px solid var(--primary);
        }

        .word-image { font-size: 10rem; filter: drop-shadow(0 10px 12px rgba(0,0,0,0.12)); }
        .word-text { font-size: 4.5rem; font-weight: 800; color: var(--primary); margin: 0.8rem 0; letter-spacing: 1px; }
        .word-sentence { font-size: 1.8rem; font-weight: 500; color: #333333; line-height: 1.4; margin-top: 1rem; }

        /* Control Framework */
        .controls {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            align-items: center;
        }

        .btn {
            padding: 1rem 2.2rem;
            border: none;
            border-radius: 18px;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-primary:hover { background: #3dbcb3; }
        
        .btn-audio { 
            background: var(--primary); 
            color: white; 
            border-radius: 50%; 
            width: 70px; 
            height: 70px; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.8rem; 
        }
        .btn-audio:hover { background: #ff5252; transform: scale(1.05); }

        /* Word Builder Gameplay Arena */
        #word-builder {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .letter-slots {
            display: flex;
            gap: 12px;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slot {
            width: 70px;
            height: 70px;
            border: 4px dashed var(--primary);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 800;
            background: rgba(255,255,255,0.7);
            transition: all 0.3s ease;
        }

        .letter-bank {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
            background: rgba(255,255,255,0.4);
            padding: 1.5rem;
            border-radius: 20px;
        }

        .letter-btn {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--secondary), #3BA99F);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 2.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        .letter-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .letter-btn:disabled {
            opacity: 0.25;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.5);
            padding: 1rem;
            border-radius: 20px;
        }

        /* Responsive UI Adjustments */
        @media(max-width: 768px) {
            .flashcard-container { height: 380px; }
            .word-image { font-size: 7rem; }
            .word-text { font-size: 3.2rem; }
            .word-sentence { font-size: 1.4rem; }
            .slot, .letter-btn { width: 50px; height: 50px; font-size: 1.6rem; }
            header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>

                    const savedStats = localStorage.getItem('vocabLabStats_Premium');
                    if (savedStats) {
                        this.stats = JSON.parse(savedStats);
                        this.updateStatsUI();
                    }
                } catch (e) {
                    console.warn("localStorage initialization bypass active.");

                try {
                    localStorage.setItem('vocabLabStats_Premium', JSON.stringify(this.stats));
                } catch (e) {}
                this.updateStatsUI();
            },

            updateStatsUI() {
                document.getElementById('stars-display').innerText = `⭐ ${this.stats.stars} Stars`;
                document.getElementById('words-display').innerText = `📚 ${this.stats.wordsLearned} Learned`;
            },

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${screenId}`).classList.add('active');
                this.currentScreen = screenId;
                window.speechSynthesis.cancel();
            },

            renderDashboard() {
                const grid = document.getElementById('category-grid');
                grid.innerHTML = '';
                
                Object.keys(vocabularyData).forEach(key => {
                    const cat = vocabularyData[key];
                    const card = document.createElement('div');
                    card.className = 'glass category-card';
                    card.innerHTML = `
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-title">${cat.title}</div>
                        <div style="font-weight:bold; color: var(--primary); margin-top:5px;">${cat.words.length} Dynamic Words</div>
                    `;
                    card.onclick = () => this.startCategory(key);
                    grid.appendChild(card);
                });
            },

                this.showScreen('learning');

                }
            },

            flipCard() {
                const card = document.getElementById('active-flashcard');
                card.classList.toggle('is-flipped');
                
                if (card.classList.contains('is-flipped')) {
                    this.stats.wordsLearned++;
                    this.saveStats();
                    this.speakWord(false);
                }
            },

            nextWord() {
                const words = vocabularyData[this.currentCategory].words;
                if (this.currentIndex < words.length - 1) {
                    this.currentIndex++;
                    this.renderWord();
                } else {
                    this.speakText("Fantastic deck discovery! Five bonus stars achieved!");
                    this.stats.stars += 5;
                    this.saveStats();
                    setTimeout(() => this.showScreen('dashboard'), 2200);
                }
            },

            prevWord() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.renderWord();
                }
            },

            speakWord(slow = false) {
                const word = vocabularyData[this.currentCategory].words[this.currentIndex].word;
                this.speakText(word, slow);
            },

            speakText(text, slow = false) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = slow ? 0.45 : 0.9;
                    utterance.pitch = 1.25; // Adjusted higher pitch optimizes vocal response clarity for primary grade rooms
                    window.speechSynthesis.speak(utterance);
                }
            },

            toggleMode() {
                this.isGameMode = !this.isGameMode;
                const toggleBtn = document.getElementById('mode-toggle-btn');
                if (this.isGameMode) {
                    toggleBtn.innerText = "🖼️ Study Flashcards";
                    document.getElementById('flashcard-mode').style.display = 'none';
                    document.getElementById('game-mode').style.display = 'block';
                    this.initWordBuilder();
                } else {
                    toggleBtn.innerText = "🎮 Play Spelling Match";
                    document.getElementById('flashcard-mode').style.display = 'flex';
                    document.getElementById('game-mode').style.display = 'none';
                    this.renderWord();
                }
            },

            initWordBuilder() {
                const wordData = vocabularyData[this.currentCategory].words[this.currentIndex];
                this.targetWord = wordData.word.toUpperCase();
                this.spelledWord = "";
                
                document.getElementById('game-image').innerText = wordData.icon;
                
                const slotsContainer = document.getElementById('letter-slots');
                slotsContainer.innerHTML = '';
                
                for(let i=0; i < this.targetWord.length; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.id = `slot-${i}`;
                    slotsContainer.appendChild(slot);
                }

                let letters = this.targetWord.split('');
                // Include systematic random alphabetic noise padding to dynamically scale gameplay complexity
                while(letters.length < this.targetWord.length + 3) {
                    const randomLetter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                    letters.push(randomLetter);
                }
                letters.sort(() => Math.random() - 0.5);

                const bankContainer = document.getElementById('letter-bank');
                bankContainer.innerHTML = '';

                letters.forEach((letter) => {
                    const btn = document.createElement('button');
                    btn.className = 'letter-btn';
                    btn.innerText = letter;
                    btn.onclick = () => this.handleLetterClick(letter, btn);
                    bankContainer.appendChild(btn);
                });
            },

            handleLetterClick(letter, btnElement) {
                const currentSlotIndex = this.spelledWord.length;
                
                if (letter === this.targetWord[currentSlotIndex]) {
                    this.spelledWord += letter;
                    const targetedSlot = document.getElementById(`slot-${currentSlotIndex}`);
                    targetedSlot.innerText = letter;
                    targetedSlot.style.background = '#A8E6CF';
                    targetedSlot.style.borderColor = 'var(--secondary)';
                    btnElement.disabled = true;
                    
                    this.speakText(letter);

                    if (this.spelledWord === this.targetWord) {
                        this.stats.stars += 2;
                        this.saveStats();
                        setTimeout(() => {
                            this.speakText("Incredible spelling success! " + this.targetWord);
                            document.getElementById('game-image').style.transform = 'scale(1.25) rotate(5deg)';
                            setTimeout(() => {
                                document.getElementById('game-image').style.transform = 'none';
                                this.nextWord();
                            }, 1800);
                        }, 400);
                    }
                } else {
                    btnElement.style.background = '#FF6B6B';
                    this.speakText("Try again");
                    setTimeout(() => {
                        btnElement.style.background = 'linear-gradient(135deg, var(--secondary), #3BA99F)';
                    }, 600);
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
