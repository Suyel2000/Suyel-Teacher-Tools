<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Through Lines</title>
    <style>
        :root {
            --line1-color: #FF5722;
            --line2-color: #2196F3;
            --total-color: #8BC34A;
            --panel-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 700px;
            width: 100%;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 { color: #333; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 30px; }

        /* --- Input Bar --- */
        .math-input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        input {
            width: 70px;
            height: 70px;
            font-size: 2.2rem;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        #num1 { border-color: var(--line1-color); color: var(--line1-color); }
        #num2 { border-color: var(--line2-color); color: var(--line2-color); }

        .plus-sign { font-size: 2.5rem; font-weight: bold; color: #999; }

        /* --- Visualization Area --- */
        .work-area {
            border-top: 2px solid #eee;
            padding-top: 30px;
            min-height: 300px;
        }

        .line-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
            min-height: 60px;
        }

        .line {
            width: 8px;
            height: 50px;
            border-radius: 4px;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-section {
            margin-top: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            display: none;
        }

        .answer-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--total-color);
            margin: 10px 0;
        }

        /* --- Buttons --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-combine { background: var(--total-color); color: white; }
        .btn-reset { background: #eee; color: #666; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JSVKBDWEV5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JSVKBDWEV5');
</script>
<body>

    <div class="app-container">
        <h1>Addition Through Lines</h1>
        <p>Type numbers in the boxes to see the lines appear!</p>

        <div class="math-input-row">
            <input type="number" id="num1" placeholder="0" oninput="showInitialLines()">
            <span class="plus-sign">+</span>
            <input type="number" id="num2" placeholder="0" oninput="showInitialLines()">
        </div>

        <div class="work-area">
            <div id="lines1" class="line-group"></div>
            <div id="lines2" class="line-group"></div>
            
            <div id="result-area" class="result-section">
                <div style="font-weight: bold; color: #888;">TOTAL COMBINED:</div>
                <div id="total-lines" class="line-group"></div>
                <div class="answer-text" id="final-sum">0</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-combine" onclick="combineLines()">Combine Lines</button>
            <button class="btn-reset" onclick="resetAll()">Clear</button>
        </div>
    </div>

    <script>
        function showInitialLines() {
            const v1 = Math.min(parseInt(document.getElementById('num1').value) || 0, 50);
            const v2 = Math.min(parseInt(document.getElementById('num2').value) || 0, 50);

            generateLines('lines1', v1, 'var(--line1-color)');
            generateLines('lines2', v2, 'var(--line2-color)');
            
            // Reset result area when numbers change
            document.getElementById('result-area').style.display = 'none';
        }

        function generateLines(containerId, count, color) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                const line = document.createElement('div');
                line.className = 'line';
                line.style.backgroundColor = color;
                container.appendChild(line);
            }
        }

        function combineLines() {
            const v1 = parseInt(document.getElementById('num1').value) || 0;
            const v2 = parseInt(document.getElementById('num2').value) || 0;
            const sum = v1 + v2;

            if (sum === 0) return;

            const resultArea = document.getElementById('result-area');
            const totalLinesContainer = document.getElementById('total-lines');
            const finalSumText = document.getElementById('final-sum');

            totalLinesContainer.innerHTML = '';
            resultArea.style.display = 'block';
            finalSumText.textContent = sum;

            // Animate building the total line group
            for(let i=0; i<v1; i++) {
                createDelayedLine(totalLinesContainer, 'var(--line1-color)', i);
            }
            for(let i=0; i<v2; i++) {
                createDelayedLine(totalLinesContainer, 'var(--line2-color)', v1 + i);
            }
        }

        function createDelayedLine(container, color, index) {
            setTimeout(() => {
                const line = document.createElement('div');
                line.className = 'line';
                line.style.backgroundColor = color;
                container.appendChild(line);
            }, index * 25);
        }

        function resetAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('lines1').innerHTML = '';
            document.getElementById('lines2').innerHTML = '';
            document.getElementById('result-area').style.display = 'none';
        }
    </script>
</body>
</html>
