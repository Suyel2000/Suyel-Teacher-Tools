<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Numbers v2.1 - Math Adventure</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --dark: #2c3e50;
            --bg: #f5f7fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%), var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 850px;
            padding: 30px;
            text-align: center;
            border: 4px solid #bae6fd;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title {
            font-size: 2rem;
            color: var(--dark);
            font-weight: 800;
        }

        .config-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .difficulty-selector select {
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--dark);
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .visual-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--dark);
            cursor: pointer;
            background: #f0f9ff;
            padding: 8px 14px;
            border-radius: 12px;
            border: 2px solid #bae6fd;
        }

        .visual-toggle-btn input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-box {
            background: #f0f9ff;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--dark);
            border: 2px solid #e0f2fe;
        }

        .stat-box span {
            color: var(--primary);
        }

        .comparison-zone {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            margin: 30px 0;
        }

        .column-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 240px;
        }

        .number-card {
            background: linear-gradient(145deg, #ffffff, #f0f4f8);
            border: 4px solid #cbd5e1;
            border-radius: 20px;
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--dark);
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }

        .sign-box-wrapper {
            display: flex;
            align-items: center;
            height: 160px;
        }

        .sign-box {
            width: 110px;
            height: 110px;
            background: #f8fafc;
            border: 4px dashed #94a3b8;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .sign-box.correct {
            border-style: solid;
            background: #dcfce7;
            border-color: var(--success);
            color: var(--success);
            transform: scale(1.1);
        }

        .sign-box.wrong {
            border-style: solid;
            background: #fee2e2;
            border-color: var(--danger);
            color: var(--danger);
            transform: scale(0.9);
        }

        /* Base-10 Blocks Visualization Style */
        .visual-display {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            min-height: 80px;
            width: 100%;
            padding: 12px;
            background: #f8fafc;
            border-radius: 16px;
            border: 2px dashed #cbd5e1;
        }

        .block-hundred {
            width: 36px;
            height: 36px;
            background-color: #2ecc71;
            border: 1px solid #27ae60;
            border-radius: 4px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.15);
        }

        .block-ten {
            width: 9px;
            height: 36px;
            background-color: #3498db;
            border: 1px solid #2980b9;
            border-radius: 2px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.15);
        }

        .block-one {
            width: 9px;
            height: 9px;
            background-color: #e74c3c;
            border: 1px solid #c0392b;
            border-radius: 2px;
            box-shadow: 1px 1px 1px rgba(0,0,0,0.15);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .btn-op {
            width: 110px;
            height: 110px;
            font-size: 3.5rem;
            font-weight: 800;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
        }

        .btn-less { background-color: #ff7675; }
        .btn-equal { background-color: #fdcb6e; color: #2c3e50; }
        .btn-greater { background-color: #55efc4; color: #2c3e50; }

        .btn-op:hover { transform: translateY(-2px); }
        .btn-op:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
        }

        .feedback-message {
            height: 40px;
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .animate-bounce { animation: bounce 0.4s ease-in-out; }

        @media (max-width: 650px) {
            .comparison-zone { gap: 10px; }
            .number-card { height: 100px; font-size: 2.5rem; }
            .sign-box-wrapper { height: 100px; }
            .sign-box { width: 70px; height: 70px; font-size: 2.2rem; }
            .btn-op { width: 80px; height: 80px; font-size: 2.5rem; }
            .block-hundred { width: 24px; height: 24px; }
            .block-ten { width: 6px; height: 24px; }
            .block-one { width: 6px; height: 6px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <div class="title">🔢 Compare Numbers v2.1</div>
            <div class="config-controls">
                <div class="difficulty-selector">
                    <select id="difficulty" onchange="resetGame()">
                        <option value="easy">Easy (0 - 9)</option>
                        <option value="medium" selected>Medium (10 - 99)</option>
                        <option value="hard">Hard (100 - 999)</option>
                    </select>
                </div>
                <label class="visual-toggle-btn">
                    <input type="checkbox" id="toggle-visuals" checked onchange="refreshVisuals()">
                    📊 Show Visual Blocks
                </label>
            </div>
            <div class="stats">
                <div class="stat-box">Score: <span id="score">0</span></div>
                <div class="stat-box">🔥 Streak: <span id="streak">0</span></div>
            </div>
        </header>

        <div class="comparison-zone">
            <div class="column-wrapper">
                <div class="number-card" id="num-left">?</div>
                <div class="visual-display" id="visual-left"></div>
            </div>
            
            <div class="sign-box-wrapper">
                <div class="sign-box" id="sign-display">?</div>
            </div>
            
            <div class="column-wrapper">
                <div class="number-card" id="num-right">?</div>
                <div class="visual-display" id="visual-right"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-op btn-less" onclick="submitAnswer('<')">&lt;</button>
            <button class="btn-op btn-equal" onclick="submitAnswer('=')">=</button>
            <button class="btn-op btn-greater" onclick="submitAnswer('&gt;')">&gt;</button>
        </div>

        <div class="feedback-message" id="feedback">Let's Play! Select an operator.</div>
    </div>

    <script>
        let score = 0;
        let streak = 0;
        let num1 = 0;
        let num2 = 0;
        let correctAnswer = '';
        let isAcceptingInput = true;
        
        // Anti-repetition system tracking list
        let questionHistory = [];
        const MAX_HISTORY_SIZE = 15;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(293.66, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(220.00, audioCtx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function generateQuestion() {
            const difficulty = document.getElementById('difficulty').value;
            let min = 0, max = 9;

            if (difficulty === 'medium') { min = 10; max = 99; } 
            else if (difficulty === 'hard') { min = 100; max = 999; }

            let uniqueFound = false;
            let attempts = 0;

            // Generate pairs until finding one that isn't in recent history cache
            while (!uniqueFound && attempts < 200) {
                if (Math.random() < 0.25) {
                    num1 = Math.floor(Math.random() * (max - min + 1)) + min;
                    num2 = num1;
                } else {
                    num1 = Math.floor(Math.random() * (max - min + 1)) + min;
                    num2 = Math.floor(Math.random() * (max - min + 1)) + min;
                }

                const questionKey = `${num1}_v_${num2}`;
                if (!questionHistory.includes(questionKey)) {
                    questionHistory.push(questionKey);
                    if (questionHistory.length > MAX_HISTORY_SIZE) {
                        questionHistory.shift(); // Remove oldest entry
                    }
                    uniqueFound = true;
                }
                attempts++;
            }

            if (num1 < num2) correctAnswer = '<';
            else if (num1 > num2) correctAnswer = '>';
            else correctAnswer = '=';

            document.getElementById('num-left').innerText = num1;
            document.getElementById('num-right').innerText = num2;
            
            const signDisplay = document.getElementById('sign-display');
            signDisplay.innerText = '?';
            signDisplay.className = 'sign-box';
            
            refreshVisuals();
            isAcceptingInput = true;
        }

        function renderBlocks(num, elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            
            const showVisuals = document.getElementById('toggle-visuals').checked;
            if (!showVisuals) {
                container.style.visibility = 'hidden';
                return;
            }
            container.style.visibility = 'visible';

            const hundreds = Math.floor(num / 100);
            const tens = Math.floor((num % 100) / 10);
            const ones = num % 10;

            // Render flats (100s)
            for (let i = 0; i < hundreds; i++) {
                const block = document.createElement('div');
                block.className = 'block-hundred';
                container.appendChild(block);
            }
            // Render rods (10s)
            for (let i = 0; i < tens; i++) {
                const block = document.createElement('div');
                block.className = 'block-ten';
                container.appendChild(block);
            }
            // Render units (1s)
            for (let i = 0; i < ones; i++) {
                const block = document.createElement('div');
                block.className = 'block-one';
                container.appendChild(block);
            }
        }

        function refreshVisuals() {
            renderBlocks(num1, 'visual-left');
            renderBlocks(num2, 'visual-right');
        }

        function submitAnswer(selectedOperator) {
            if (!isAcceptingInput) return;
            isAcceptingInput = false;

            const signDisplay = document.getElementById('sign-display');
            const feedback = document.getElementById('feedback');
            signDisplay.innerText = selectedOperator;

            if (selectedOperator === correctAnswer) {
                playSound('success');
                score += 10;
                streak += 1;
                
                signDisplay.classList.add('correct', 'animate-bounce');
                feedback.innerHTML = "<span style='color: var(--success);'>🎉 Brilliant! That's correct!</span>";
            } else {
                playSound('fail');
                streak = 0;
                
                signDisplay.classList.add('wrong');
                signDisplay.innerText = correctAnswer; 
                feedback.innerHTML = `<span style='color: var(--danger);'>Oops! Look closely: ${num1} ${correctAnswer} ${num2}</span>`;
            }

            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;

            setTimeout(() => {
                feedback.innerHTML = "Get ready...";
                setTimeout(generateQuestion, 400);
            }, 2000);
        }

        function resetGame() {
            score = 0;
            streak = 0;
            questionHistory = []; // Clear unique track context history on setting changes
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            document.getElementById('feedback').innerText = "Game reset! Let's go!";
            generateQuestion();
        }

        window.onload = generateQuestion;
    </script>
</body>
</html>
