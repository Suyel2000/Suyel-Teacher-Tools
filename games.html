<!DOCTYPE html><html>
<head>
  <title>Learning Games</title>  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(to right, #fff3e0, #ffffff);
      text-align: center;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #ff9800, #e65100);
      color: white;
      padding: 25px;
    }

    .hero h1 {
      margin: 0;
    }

    /* CATEGORY BUTTONS */
    .categories {
      margin: 20px;
    }

    .categories button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      background: #ff9800;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .categories button.active {
      background: #4caf50;
    }

    /* GAME GRID */
    .games {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    /* GAME CARD */
    .game-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-decoration: none;
      color: black;
      transition: 0.3s;
    }

    /* 🔲 SQUARE IMAGE */
    .game-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .game-content {
      padding: 10px;
    }

    .game-content h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .play-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: #4caf50;
      color: white;
      border-radius: 15px;
      font-size: 13px;
    }

    .game-card:hover {
      transform: scale(1.05);
    }

    /* BACK */
    .back {
      display: inline-block;
      margin: 20px;
      padding: 10px 18px;
      background: #333;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

  </style></head><body><!-- HERO --><div class="hero">
  <h1>🎮 Learning Games</h1>
  <p>Play, Learn & Enjoy</p>
</div><!-- CATEGORIES --><div class="categories">
  <button onclick="filterGames('all', this)" class="active">All</button>
  <button onclick="filterGames('math', this)">Math</button>
  <button onclick="filterGames('english', this)">English</button>
  <button onclick="filterGames('hindi', this)">Hindi</button>
  <button onclick="filterGames('twau', this)">TWAU</button>
</div><!-- GAMES --><div class="games">  <!-- MATH -->  <a href="#" class="game-card math">
    <img src="image/addition-game.png">
    <div class="game-content">
      <h3>Addition Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>  <a href="multiplication-game.html" class="game-card math">
    <img src="image/multiplication-game.png">
    <div class="game-content">
      <h3>Multiplication Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>  <!-- ENGLISH -->  <a href="#" class="game-card english">
    <img src="image/spelling-game.png">
    <div class="game-content">
      <h3>Spelling Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>  <a href="#" class="game-card english">
    <img src="image/word-match.png">
    <div class="game-content">
      <h3>Word Match</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>  <!-- HINDI -->  <a href="#" class="game-card hindi">
    <img src="image/hindi-game.png">
    <div class="game-content">
      <h3>Hindi Varnamala</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>  <!-- TWAU -->  <a href="#" class="game-card twau">
    <img src="image/environment-game.png">
    <div class="game-content">
      <h3>EVS Match Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a></div><!-- BACK --><a href="index.html" class="back">⬅ Back to Home</a>

<script>
function filterGames(category, btn) {
  let games = document.querySelectorAll(".game-card");
  let buttons = document.querySelectorAll(".categories button");

  buttons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  games.forEach(game => {
    if(category === "all") {
      game.style.display = "block";
    } else {
      game.style.display = game.classList.contains(category) ? "block" : "none";
    }
  });
}
</script></body>
</html>
