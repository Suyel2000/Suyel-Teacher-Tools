<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Games</title> 
  <style>
    /* --- DESIGN CORE & THEME CONFIGURATION --- */
    :root {
      --font-family: 'Quicksand', 'Nunito', 'Arial', sans-serif;
      --glass-bg: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.35);
      --text-dark: #1a202c;
      --text-white: #ffffff;
      
      /* Vibrant Kids Theme Gradients */
      --g-math: linear-gradient(135deg, #11998e, #38ef7d);
      --g-english: linear-gradient(135deg, #0072ff, #00c6ff);
      --g-hindi: linear-gradient(135deg, #f12711, #f5af19);
      --g-twau: linear-gradient(135deg, #6441a5, #2a0845);
      --g-fun: linear-gradient(135deg, #ff007f, #ff758c);
    }

    /* --- GLOBAL BACKDROP & ANIMATION --- */
    body {
      font-family: var(--font-family);
      margin: 0;
      background: linear-gradient(-45deg, #4158d0, #c850c0, #ffcc70, #23d5ab);
      background-size: 400% 400%;
      animation: ambientShift 16s ease infinite;
      text-align: center;
      min-height: 100vh;
      padding-bottom: 40px;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes ambientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* --- AMBIENT FLOATING DECORATIVE BACKGROUND ELEMENTS --- */
    body::before, body::after {
      content: "⭐";
      position: fixed;
      font-size: 3rem;
      opacity: 0.15;
      animation: smoothFloat 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 1;
    }
    body::before { top: 15%; left: 8%; }
    body::after { content: "🧩"; bottom: 15%; right: 8%; animation-delay: -4s; }

    @keyframes smoothFloat {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-30px) rotate(20deg); }
    }

    /* --- HERO CONTAINER --- */
    .hero {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border);
      color: var(--text-white);
      padding: 45px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 25px;
      border-radius: 0 0 40px 40px;
    }

    .hero h1 {
      margin: 0;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .hero p {
      margin: 10px 0 0 0;
      font-size: 1.4rem;
      font-weight: 600;
      opacity: 0.95;
      text-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* --- INTERACTIVE CATEGORY FILTER BUTTONS --- */
    .categories {
      margin: 30px auto;
      max-width: 1000px;
      padding: 0 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .categories button {
      padding: 12px 26px;
      margin: 0;
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text-white);
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .categories button:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 10px 20px rgba(255,255,255,0.2);
    }

    .categories button.active {
      background: #ffffff;
      color: #2b6cb0;
      border-color: #ffffff;
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
    }

    /* --- RESPONSIVE ARCADE GAME GRID --- */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    /* --- GLASSMORPHIC GAME CARD OVERHAUL --- */
    .game-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      text-decoration: none;
      color: var(--text-dark);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Top Color Bar accentuation without changing HTML classes */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      z-index: 10;
    }
    .game-card.math::before { background: var(--g-math); }
    .game-card.english::before { background: var(--g-english); }
    .game-card.hindi::before { background: var(--g-hindi); }
    .game-card.twau::before { background: var(--g-twau); }
    .game-card.fungames::before { background: var(--g-fun); }

    /* Custom Color Map Adapters for Play Buttons dynamically mapped to card types */
    .game-card.math .play-btn { background: var(--g-math); }
    .game-card.english .play-btn { background: var(--g-english); }
    .game-card.hindi .play-btn { background: var(--g-hindi); }
    .game-card.twau .play-btn { background: var(--g-twau); }
    .game-card.fungames .play-btn { background: var(--g-fun); }

    .game-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 25px 45px rgba(255, 255, 255, 0.25);
    }

    /* Aspect Ratio Uniform Wrapper Image Formatting */
    .game-card img {
      width: 100%;
      aspect-ratio: 16 / 11; /* Slightly wider modern layout for beautiful kids graphics orientation */
      object-fit: cover;
      background: rgba(255, 255, 255, 0.15);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Core Content Block Elements */
    .game-content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-grow: 1;
      background: rgba(255, 255, 255, 0.4);
    }

    .game-content h3 {
      margin: 0 0 15px 0;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
    }

    /* Immersive Animated Call To Action Play Buttons */
    .play-btn {
      display: block;
      padding: 14px 20px;
      color: white !important;
      border-radius: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      transition: filter 0.2s ease, transform 0.1s ease;
    }

    .game-card:hover .play-btn {
      filter: brightness(1.1);
    }

    .game-card:active {
      transform: scale(0.98);
    }

    /* --- BACK SYSTEM NAVIGATION ACTION FOOTER --- */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 40px auto;
      padding: 14px 28px;
      background: #1a202c;
      color: white;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
    }

    .back:hover {
      background: #2d3748;
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }

    /* --- RESPONSIVE SMARTBOARD & MOBILE PORTFOLIO FRAME --- */
    @media (max-width: 768px) {
      .hero { padding: 30px 15px; }
      .hero h1 { font-size: 2.3rem; }
      .hero p { font-size: 1.1rem; }
      .categories button { padding: 10px 18px; font-size: 14px; }
      .games { gap: 20px; padding: 12px; }
      .game-content { padding: 18px; }
      .game-content h3 { font-size: 1.2rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="hero">
  <h1>🎮 Learning Games</h1>
  <p>Play, Learn & Enjoy</p>
</div>

<div class="categories">
  <button onclick="filterGames('all', this)" class="active">All</button>
  <button onclick="filterGames('math', this)">Math</button>
  <button onclick="filterGames('english', this)">English</button>
  <button onclick="filterGames('hindi', this)">Hindi</button>
  <button onclick="filterGames('twau', this)">TWAU</button>
  <button onclick="filterGames('fungames', this)">Fun Games</button>
</div>

<div class="games">
  <a href="#" class="game-card math">
    <img src="image/addition-game.png">
    <div class="game-content">
      <h3>Addition Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>

  <a href="multiplication-game.html" class="game-card math">
    <img src="image/multiplication-game.png">
    <div class="game-content">
      <h3>Multiplication Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>

  <a href="alphabet-adventure.html" class="game-card english">
    <img src="image/alphabet-adventure.png">
    <div class="game-content">
      <h3>Alphabet Adventure</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>

  <a href="#" class="game-card english">
    <img src="image/word-match.png">
    <div class="game-content">
      <h3>Word Match</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>

  <a href="#" class="game-card hindi">
    <img src="image/hindi-game.png">
    <div class="game-content">
      <h3>Hindi Varnamala</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>

  <a href="#" class="game-card twau">
    <img src="image/environment-game.png">
    <div class="game-content">
      <h3>EVS Match Game</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>

  <a href="tictactoe.html" class="game-card fungames">
    <img src="image/tictactoe.png">
    <div class="game-content">
      <h3>TIC TAC TOE</h3>
      <span class="play-btn">▶ Play</span>
    </div>
  </a>
</div>

<a href="index.html" class="back">⬅ Back to Home</a>

<script>
function filterGames(category, btn) {
  let games = document.querySelectorAll(".game-card");
  let buttons = document.querySelectorAll(".categories button");

  buttons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  games.forEach(game => {
    if(category === "all") {
      game.style.display = "block";
    } else {
      game.style.display = game.classList.contains(category) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
