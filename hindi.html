<!DOCTYPE html>
<html>
<head>
  <title>Hindi Tools</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: linear-gradient(to right, #fff3e0, #ffffff);
    }

    h1 {
      background: linear-gradient(to right, #FF9800, #e65100);
      color: white;
      padding: 20px;
      margin: 0;
      font-size: 28px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 40px auto;
      max-width: 600px;
    }

    .card {
      padding: 25px;
      width: 180px;
      border-radius: 15px;
      color: white;
      font-size: 18px;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
      font-weight: bold;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Colors */
    .varnamala { background: linear-gradient(135deg, #4CAF50, #2e7d32); }
    .matra { background: linear-gradient(135deg, #9C27B0, #4a148c); }

    .back {
      display: block;
      margin-top: 30px;
      text-decoration: none;
      font-size: 16px;
      color: #333;
    }

  </style>
</head>

<body>

<h1>📘 Hindi Tools</h1>

<div class="container">

  <a href="hindi/varnamala.html" class="card varnamala">
    🔤<br>वर्णमाला
  </a>

  <a href="hindi/matra.html" class="card matra">
    ✍️<br>मात्राएँ
  </a>

</div>

<a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
