<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मात्रा पहचान | Hindi Matra Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@400;700&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary-orange: #ff9933;
            --primary-blue: #70d6ff;
            --primary-green: #2ecc71;
            --primary-pink: #ff85a1;
            --text-dark: #2c3e50;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', 'Hind', sans-serif;
            background: #a8e6cf;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 95%;
            max-width: 900px;
            background: white;
            margin: 20px auto;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 8px solid var(--primary-pink);
            text-align: center;
        }

        h1 {
            color: #d81b60;
            font-family: 'Hind', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Teacher Area */
        .teacher-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff0f5;
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 30px;
            border: 3px solid var(--primary-pink);
        }

        .avatar { font-size: 50px; margin-right: 15px; animation: bounce 2s infinite; }
        .bubble { font-size: 1.4rem; font-weight: 700; color: #ad1457; font-family: 'Hind', sans-serif; }

        /* Progress */
        .progress-container { width: 100%; height: 15px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary-green); transition: 0.4s; }

        /* Game Board */
        .matching-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item {
            padding: 15px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 15px;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: grab;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
            box-shadow: 0 4px 0 #eee;
        }

        .swar-item { border-color: var(--primary-blue); color: #0077b6; }
        .swar-item:hover { transform: scale(1.05); background: #e0f7fa; }

        .matra-slot { 
            border: 3px dashed #bbb; 
            background: #fafafa; 
            color: #555;
            font-size: 2.5rem;
        }

        .matra-slot.correct { 
            border-style: solid; 
            border-color: var(--primary-green); 
            background: #e8f5e9; 
            color: var(--primary-green);
            animation: pop 0.4s ease;
        }

        /* Buttons */
        .controls { margin-top: 30px; }
        .btn {
            padding: 12px 30px; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 50px;
            cursor: pointer; font-family: 'Hind', sans-serif; color: white; transition: 0.2s;
        }
        .btn-reset { background: var(--primary-orange); }
        .btn-reset:hover { filter: brightness(1.1); transform: scale(1.05); }

        /* Animations */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Celebration */
        #celebration {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }

        @media (max-width: 600px) {
            .matching-area { gap: 15px; }
            .item { font-size: 1.5rem; min-height: 50px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>स्वर को सही मात्रा से जोड़ें</h1>
    
    <div class="teacher-box">
        <div class="avatar">👩‍🏫</div>
        <div class="bubble" id="instruction">बच्चों, स्वर को उसकी सही मात्रा के साथ मिलाओ!</div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="matching-area" id="gameBoard">
        </div>

    <div class="controls">
        <button class="btn btn-reset" onclick="resetGame()">फिर से शुरू करें (Reset)</button>
    </div>
</div>

<div id="celebration">
    <div style="font-size: 5rem;">🏆⭐🎊</div>
    <h1 style="font-size: 3.5rem;">बहुत बढ़िया!</h1>
    <p style="font-size: 1.5rem; font-family: 'Hind';">आपने सभी मात्राएँ सही जोड़ीं!</p>
    <button class="btn btn-reset" style="font-size: 1.5rem; background: var(--primary-green);" onclick="location.reload()">दोबारा खेलें</button>
</div>

<script>
    const matraData = [
        { swar: "अ", matra: "x", text: "कोई मात्रा नहीं" },
        { swar: "आ", matra: "ा" },
        { swar: "इ", matra: "ि" },
        { swar: "ई", matra: "ी" },
        { swar: "उ", matra: "ु" },
        { swar: "ऊ", matra: "ू" },
        { swar: "ऋ", matra: "ृ" },
        { swar: "ए", matra: "े" },
        { swar: "ऐ", matra: "ै" },
        { swar: "ओ", matra: "ो" },
        { swar: "औ", matra: "ौ" },
        { swar: "अं", matra: "ं" },
        { swar: "अः", matra: "ः" }
    ];

    let matches = 0;
    let audioCtx = null;

    function playSound(freq) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function renderBoard() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = '';
        matches = 0;
        updateProgress();

        const leftCol = document.createElement('div');
        leftCol.className = 'column';
        const rightCol = document.createElement('div');
        rightCol.className = 'column';

        // Shuffle right side only
        const shuffledMatras = [...matraData].sort(() => Math.random() - 0.5);

        matraData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item swar-item';
            div.innerText = item.swar;
            div.draggable = true;
            div.id = "swar-" + item.swar;
            div.ondragstart = (e) => {
                e.dataTransfer.setData('text', item.swar);
                playSound(350);
            };
            leftCol.appendChild(div);
        });

        shuffledMatras.forEach(item => {
            const slot = document.createElement('div');
            slot.className = 'item matra-slot';
            slot.dataset.match = item.swar;
            slot.innerText = item.text || item.matra;
            
            if(item.swar === "अ") slot.style.fontSize = "1.2rem";

            slot.ondragover = (e) => e.preventDefault();
            slot.ondrop = (e) => {
                const draggedSwar = e.dataTransfer.getData('text');
                if (draggedSwar === slot.dataset.match) {
                    slot.classList.add('correct');
                    document.getElementById("swar-" + draggedSwar).style.visibility = 'hidden';
                    playSound(523);
                    matches++;
                    updateProgress();
                    document.getElementById('instruction').innerText = "शाबाश! अगला ढूँढो।";
                    if (matches === matraData.length) {
                        setTimeout(() => document.getElementById('celebration').style.display = 'flex', 600);
                    }
                } else {
                    slot.classList.add('shake');
                    playSound(200);
                    document.getElementById('instruction').innerText = "गलत! फिर से कोशिश करो।";
                    setTimeout(() => slot.classList.remove('shake'), 400);
                }
            };
            rightCol.appendChild(slot);
        });

        board.appendChild(leftCol);
        board.appendChild(rightCol);
    }

    function updateProgress() {
        const percent = (matches / matraData.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }

    function resetGame() {
        document.getElementById('instruction').innerText = "बच्चों, स्वर को उसकी सही मात्रा के साथ मिलाओ!";
        renderBoard();
    }

    window.onload = renderBoard;
</script>

</body>
</html>
