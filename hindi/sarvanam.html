<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सर्वनाम मास्टर | Hindi Pronoun Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@400;700&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary-pink: #ff85a1;
            --primary-blue: #70d6ff;
            --primary-yellow: #ffd670;
            --primary-green: #2ecc71;
            --text-color: #2c3e50;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', 'Hind', sans-serif;
            background-color: #fdfcfb;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-wrapper {
            width: 95%;
            max-width: 1100px;
            background: white;
            margin: 20px auto;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 6px solid var(--primary-pink);
        }

        /* --- UI HEADER (FIXED AS PER IMAGE) --- */
        .teacher-box-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .teacher-bubble {
            background: #fff9e6;
            border: 4px solid var(--primary-yellow);
            border-radius: 100px;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 850px;
        }

        .teacher-img {
            width: 80px;
            height: 80px;
            background: url('https://fonts.gstatic.com/s/e/notoemoji/latest/1f469_200d_1f3eb/512.webp') no-repeat center;
            background-size: contain;
        }

        .teacher-text {
            color: #b45f04;
            font-family: 'Hind', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-family: 'Hind', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .tab-pink { background: var(--primary-pink); }
        .tab-gray { background: #e0e0e0; color: black; }
        .tab-pink.inactive { background: #e0e0e0; color: black; }
        .tab-gray.active { background: #757575; color: white; }

        .progress-bar-container { width: 100%; height: 15px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-green); transition: 0.5s; }

        .game-screen { display: none; }
        .game-screen.active { display: block; }

        .drag-zone { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 20px; background: #f0f7ff; border-radius: 20px; margin-bottom: 30px; }
        .pronoun-card {
            padding: 10px 25px; background: white; border: 3px solid var(--primary-blue);
            border-radius: 15px; font-size: 1.8rem; font-weight: bold; cursor: grab;
            font-family: 'Hind'; box-shadow: 0 5px 0 var(--primary-blue);
        }

        .sentence-container { 
            background: #fff; border: 3px solid #f1f1f1; border-radius: 20px; padding: 20px; 
            margin-bottom: 12px; text-align: center; font-size: 1.8rem; font-family: 'Hind';
        }

        .noun-drop-spot {
            display: inline-block; min-width: 110px; padding: 2px 10px;
            border-bottom: 4px solid var(--primary-pink); color: var(--primary-pink);
            font-weight: bold; margin: 0 5px; border-radius: 8px; transition: 0.3s;
        }
        .noun-drop-spot.correct { background: var(--primary-green); color: white; border: none; }

        .choice-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 30px; }
        .choice-btn {
            padding: 15px 35px; border: none; border-radius: 20px; font-size: 1.8rem;
            font-family: 'Hind'; font-weight: bold; cursor: pointer; background: white;
            border: 3px solid #ddd; transition: 0.2s;
        }
        .choice-btn:hover { background: #fffde7; border-color: var(--primary-yellow); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.4s; }

        #celebration {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .shuffle-btn {
            background: var(--primary-blue); color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-family: 'Hind'; cursor: pointer; margin-bottom: 10px; font-weight: bold;
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JSVKBDWEV5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JSVKBDWEV5');
</script>
<body>

<div class="game-wrapper">
    <div class="teacher-box-container">
        <div class="teacher-bubble">
            <div class="teacher-img"></div>
            <p class="teacher-text" id="teacher-msg">नमस्ते बच्चों! आज हम 'सर्वनाम' (Pronoun) सीखेंगे।</p>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn tab-pink" id="tab-replace" onclick="switchTab('replace')">1. संज्ञा के स्थान पर सर्वनाम लिखें</button>
        <button class="tab-btn tab-gray" id="tab-fill" onclick="switchTab('fill')">2. वाक्य में पहचानो</button>
    </div>

    <div class="progress-bar-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div id="replace-screen" class="game-screen active">
        <div style="text-align: right;"><button class="shuffle-btn" onclick="initReplace()">🔀 सवाल मिलाएँ</button></div>
        <div class="drag-zone" id="pronounBank"></div>
        <div id="replaceContent"></div>
    </div>

    <div id="fill-screen" class="game-screen">
        <div id="fillSentenceArea" class="sentence-container" style="border: 4px solid var(--primary-yellow); background: #fffbe6; padding: 50px;"></div>
        <div class="choice-grid" id="choiceBank"></div>
        <div style="text-align:center; font-family:'Hind'; margin-top:20px; font-size: 1.3rem;" id="fill-info">वाक्य 1 / 20</div>
    </div>
</div>

<div id="celebration">
    <h1 style="font-family:'Hind'; color:var(--primary-pink); font-size:4rem;">शाबाश! अद्भुत!</h1>
    <p style="font-size:1.8rem; font-family:'Hind';">आपने सर्वनाम का पूरा अभ्यास कर लिया!</p>
    <button onclick="location.reload()" style="padding:15px 40px; border-radius:50px; border:none; background:var(--primary-green); color:white; font-size:1.5rem; cursor:pointer; font-family:'Hind';">दोबारा खेलें</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // 20 Replacement Questions
    const replaceData = [
        {sentence: " विद्यालय जाता है।", noun: "राम", pronoun: "वह"},
        {sentence: " गाना गा रही है।", noun: "सीता", pronoun: "वह"},
        {sentence: " मैदान में खेल रहे हैं।", noun: "बच्चे", pronoun: "वे"},
        {sentence: " बाज़ार जा रहे हैं।", noun: "पापा", pronoun: "वे"},
        {sentence: " बहुत पुरानी है।", noun: "किताब", pronoun: "यह"},
        {sentence: " दूध पी रही है।", noun: "बिल्ली", pronoun: "यह"},
        {sentence: " पेड़ पर चढ़ गया।", noun: "बंदर", pronoun: "वह"},
        {sentence: " नाच रहा है।", noun: "मोर", pronoun: "वह"},
        {sentence: " बहुत मीठा है।", noun: "आम", pronoun: "यह"},
        {sentence: " दिल्ली में रहते हैं।", noun: "चाचाजी", pronoun: "वे"},
        {sentence: " लाल रंग की है।", noun: "कार", pronoun: "यह"},
        {sentence: " गुफा में सो रहा है।", noun: "शेर", pronoun: "वह"},
        {sentence: " कक्षा में पढ़ रहे हैं।", noun: "छात्र", pronoun: "वे"},
        {sentence: " खाना पका रही है।", noun: "माँ", pronoun: "वह"},
        {sentence: " तेज़ दौड़ता है।", noun: "घोड़ा", pronoun: "वह"},
        {sentence: " खिल रही है।", noun: "कली", pronoun: "यह"},
        {sentence: " शोर मचा रहे हैं।", noun: "लड़के", pronoun: "वे"},
        {sentence: " बहुत ठंडी है।", noun: "बर्फ", pronoun: "यह"},
        {sentence: " हल चला रहा है।", noun: "किसान", pronoun: "वह"},
        {sentence: " आकाश में उड़ रहे हैं।", noun: "पक्षी", pronoun: "वे"}
    ];

    // 20 Fill-in Questions
    const fillData = [
        {s: "____ आम खा रहा हूँ।", options: ["मैं", "हम", "वह"], correct: "मैं"},
        {s: "____ कल कहाँ गए थे?", options: ["तुम", "मैं", "वे"], correct: "तुम"},
        {s: "____ सब मिलकर खेलेंगे।", options: ["हम", "वह", "यह"], correct: "हम"},
        {s: "____ मेरा भाई है।", options: ["वह", "तुम", "मैं"], correct: "वह"},
        {s: "____ क्या कर रहे हैं?", options: ["वे", "मैं", "वह"], correct: "वे"},
        {s: "____ नाम क्या है?", options: ["आपका", "हम", "मैं"], correct: "आपका"},
        {s: "____ घर बहुत सुंदर है।", options: ["उनका", "मैं", "तुम"], correct: "उनका"},
        {s: "____ अपना काम स्वयं करो।", options: ["तुम", "हम", "वह"], correct: "तुम"},
        {s: "____ यहाँ क्यों आए हो?", options: ["आप", "हम", "वे"], correct: "आप"},
        {s: "____ बैग कहाँ रखा है?", options: ["तुम्हारा", "मैं", "वे"], correct: "तुम्हारा"},
        {s: "____ पेंसिल किसकी है?", options: ["यह", "मैं", "तुम"], correct: "यह"},
        {s: "____ सब भारतीय हैं।", options: ["हम", "वह", "यह"], correct: "हम"},
        {s: "____ फिल्म देखनी चाहिए।", options: ["उसे", "तुम", "हम"], correct: "उसे"},
        {s: "____ भाई डॉक्टर है।", options: ["मेरा", "हम", "वे"], correct: "मेरा"},
        {s: "____ कल छुट्टी पर रहेंगे।", options: ["वे", "मैं", "तुम"], correct: "वे"},
        {s: "____ पास बहुत सारी पुस्तकें हैं।", options: ["मेरे", "मैं", "हम"], correct: "मेरे"},
        {s: "____ खाना खा लिया?", options: ["तुमने", "हम", "वे"], correct: "तुमने"},
        {s: "____ मदद करनी चाहिए।", options: ["उनकी", "तुम", "मैं"], correct: "उनकी"},
        {s: "____ बहुत अच्छा गाते हैं।", options: ["आप", "यह", "मैं"], correct: "आप"},
        {s: "____ दोस्त बहुत ईमानदार है।", options: ["मेरा", "हम", "वे"], correct: "मेरा"}
    ];

    let score = 0;
    let currentFillIdx = 0;
    const totalGoal = replaceData.length + fillData.length;

    function initReplace() {
        const bank = document.getElementById('pronounBank');
        const content = document.getElementById('replaceContent');
        bank.innerHTML = '';
        content.innerHTML = '';

        ["मैं", "हम", "तुम", "वह", "वे", "यह", "ये"].forEach(p => {
            const div = document.createElement('div');
            div.className = 'pronoun-card';
            div.innerText = p;
            div.draggable = true;
            div.ondragstart = (e) => { e.dataTransfer.setData("text", p); playSfx(300, 'sine', 0.1); };
            bank.appendChild(div);
        });

        [...replaceData].sort(() => Math.random() - 0.5).forEach((item, idx) => {
            const row = document.createElement('div');
            row.className = 'sentence-container';
            row.innerHTML = `<span class="noun-drop-spot" id="drop-${idx}" ondragover="event.preventDefault()" ondrop="handleDrop(event, '${item.pronoun}', 'drop-${idx}')">${item.noun}</span> ${item.sentence}`;
            content.appendChild(row);
        });
    }

    function handleDrop(e, correct, dropId) {
        e.preventDefault();
        const dragged = e.dataTransfer.getData("text");
        const el = document.getElementById(dropId);
        if (dragged === correct) {
            el.innerText = dragged; el.classList.add('correct'); el.ondrop = null;
            updateScore(1, "शाबाश!"); playSfx(880, 'sine', 0.2);
        } else {
            el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400);
            updateScore(0, "फिर से कोशिश करो!"); playSfx(150, 'sawtooth', 0.4);
        }
    }

    function initFill() {
        const data = fillData[currentFillIdx];
        document.getElementById('fillSentenceArea').innerText = data.s;
        document.getElementById('fill-info').innerText = `वाक्य ${currentFillIdx + 1} / 20`;
        const bank = document.getElementById('choiceBank');
        bank.innerHTML = '';
        [...data.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if (opt === data.correct) {
                    playSfx(1000, 'sine', 0.2); updateScore(1, "बहुत बढ़िया!");
                    currentFillIdx++;
                    if (currentFillIdx < fillData.length) setTimeout(initFill, 600);
                } else {
                    playSfx(200, 'square', 0.3); btn.classList.add('shake');
                    setTimeout(() => btn.classList.remove('shake'), 400);
                }
            };
            bank.appendChild(btn);
        });
    }

    function switchTab(mode) {
        playSfx(600, 'sine', 0.1);
        document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
        const rTab = document.getElementById('tab-replace');
        const fTab = document.getElementById('tab-fill');
        if(mode === 'replace') {
            rTab.className = 'tab-btn tab-pink'; fTab.className = 'tab-btn tab-gray';
            document.getElementById('replace-screen').classList.add('active');
        } else {
            rTab.className = 'tab-btn tab-pink inactive'; fTab.className = 'tab-btn tab-gray active';
            document.getElementById('fill-screen').classList.add('active');
        }
    }

    function updateScore(p, m) {
        score += p;
        document.getElementById('teacher-msg').innerText = m;
        const progress = (score / totalGoal) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        if (progress >= 100) document.getElementById('celebration').style.display = 'flex';
    }

    window.onload = () => { initReplace(); initFill(); };
</script>
</body>
</html>
