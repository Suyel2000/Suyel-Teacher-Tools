<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिन्दी वर्णमाला एडवेंचर | Hindi Varnamala Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@400;700&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary-pink: #ff85a1;
            --primary-blue: #70d6ff;
            --primary-yellow: #ffd670;
            --primary-green: #99ffac;
            --classroom-bg: #fdfcfb;
            --text-color: #444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Hind', 'Quicksand', sans-serif;
            background: #a8e6cf;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Playground Container */
        .game-container {
            width: 95%;
            max-width: 1100px;
            background: white;
            border-radius: 40px;
            margin: 20px auto;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 10px solid var(--primary-pink);
            position: relative;
        }

        /* Teacher Avatar Section */
        .teacher-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: #fff9e6;
            padding: 15px;
            border-radius: 60px;
            border: 3px solid var(--primary-yellow);
        }

        .teacher-avatar {
            font-size: 60px;
            animation: bounce 2s infinite;
        }

        .speech-bubble {
            font-size: 1.4rem;
            font-weight: 700;
            color: #d81b60;
        }

        /* Tabs and Controls */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Hind', sans-serif;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn-swar { background: var(--primary-blue); color: white; }
        .btn-vyanjan { background: var(--primary-green); color: #333; }
        .btn-reset { background: #ffb3ba; color: white; }
        .btn-music { background: #bdb2ff; color: white; }

        button:active { transform: translateY(3px); box-shadow: none; }
        button.active { ring: 4px solid black; transform: scale(1.1); }

        /* Progress Bar */
        .progress-box {
            width: 80%;
            height: 15px;
            background: #eee;
            border-radius: 20px;
            margin: 10px auto 30px;
            border: 2px solid #ddd;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff85a1, #70d6ff);
            transition: 0.5s;
        }

        /* Board Styling */
        .drop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .slot {
            width: 70px;
            height: 85px;
            border: 3px dashed #ccc;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            font-size: 2rem;
            font-weight: bold;
            position: relative;
        }

        .slot.filled {
            border: 3px solid var(--primary-green);
            background: white;
            box-shadow: 0 5px 0 var(--primary-green);
            animation: pop 0.4s ease;
        }

        .hint-text {
            font-size: 0.7rem;
            color: #bbb;
            position: absolute;
            bottom: 5px;
        }

        /* Letter Bank */
        .letter-bank {
            background: #f0faff;
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            min-height: 100px;
            border: 2px solid var(--primary-blue);
        }

        .draggable-letter {
            width: 65px;
            height: 65px;
            background: white;
            border: 3px solid var(--primary-blue);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 6px 0 var(--primary-blue);
            user-select: none;
            transition: 0.1s;
        }

        .draggable-letter:hover { transform: scale(1.1); background: #fffde7; }
        .draggable-letter:active { cursor: grabbing; transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-blue); }

        /* Animations */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Celebration Screen */
        #celebration {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .confetti { font-size: 4rem; }

        /* Responsive Layout */
        @media (max-width: 600px) {
            .slot, .draggable-letter { width: 55px; height: 65px; font-size: 1.4rem; }
            .speech-bubble { font-size: 1rem; }
        }
    </style>

<body>

<div class="game-container">
    <div class="teacher-section">
        <div class="teacher-avatar">👩‍🏫</div>
        <div class="speech-bubble" id="instruction">नमस्ते! चलिए हिन्दी वर्णमाला सीखते हैं।</div>
    </div>

    <div class="mode-selector">
        <button class="btn-swar" onclick="initGame('swar')">स्वर (Swar)</button>
        <button class="btn-vyanjan" onclick="initGame('vyanjan')">व्यंजन (Vyanjan)</button>
        <button class="btn-reset" onclick="resetCurrent()">Reset</button>
        <button class="btn-music" id="musicBtn" onclick="toggleMusic()">🎵 Music Off</button>
    </div>

    <div class="progress-box">
        <div class="progress-fill" id="progressBar"></div>
    </div>

    <div class="drop-grid" id="dropGrid"></div>
    
    <div class="letter-bank" id="letterBank">
        </div>
</div>

<div id="celebration">
    <div class="confetti">🎉🌟🎊</div>
    <h1 style="font-size: 3rem; color: #d81b60;">शाबाश! (Excellent!)</h1>
    <p style="font-size: 1.5rem;">आपने पूरी वर्णमाला पूरी कर ली!</p>
    <button class="btn-swar" onclick="location.reload()">फिर से खेलें</button>
</div>

<script>
    const swarList = ["अ", "आ", "इ", "ई", "उ", "ऊ", "ऋ", "ए", "ऐ", "ओ", "औ", "अं", "अः"];
    const vyanjanList = [
        "क", "ख", "ग", "घ", "ङ",
        "च", "छ", "ज", "झ", "ञ",
        "ट", "ठ", "ड", "ढ", "ण",
        "त", "थ", "द", "ध", "न",
        "प", "फ", "ब", "भ", "म",
        "य", "र", "ल", "व", "श",
        "ष", "स", "ह", "क्ष", "त्र", "ज्ञ"
    ];

    let currentList = [];
    let placedCount = 0;
    let audioCtx = null;
    let isMusicPlaying = false;
    let musicOsc = null;

    // --- Audio System ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, type = 'sine', duration = 0.2) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function toggleMusic() {
        initAudio();
        const btn = document.getElementById('musicBtn');
        if (!isMusicPlaying) {
            isMusicPlaying = true;
            btn.innerText = "🎵 Music On";
            // Simple melodic drone
            playBackgroundLoop();
        } else {
            isMusicPlaying = false;
            btn.innerText = "🎵 Music Off";
        }
    }

    function playBackgroundLoop() {
        if (!isMusicPlaying) return;
        // Plays a soft bell sound occasionally
        playSound(440, 'triangle', 1.5);
        setTimeout(playBackgroundLoop, 3000);
    }

    // --- Game Logic ---
    function initGame(type) {
        currentList = type === 'swar' ? swarList : vyanjanList;
        placedCount = 0;
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('instruction').innerText = type === 'swar' ? "स्वरों को सही क्रम में लगाओ!" : "व्यंजनों को सही क्रम में लगाओ!";
        renderBoard();
    }

    function renderBoard() {
        const grid = document.getElementById('dropGrid');
        const bank = document.getElementById('letterBank');
        grid.innerHTML = '';
        bank.innerHTML = '';

        // Create Slots
        currentList.forEach((char, idx) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.correct = char;
            
            // Easy Mode Logic: Pre-fill some hints
            if (idx % 5 === 0) {
                slot.innerText = char;
                slot.classList.add('filled');
                placedCount++;
            }

            slot.ondragover = e => e.preventDefault();
            slot.ondrop = handleDrop;
            grid.appendChild(slot);
        });

        // Create Scrambled Letters
        const remaining = currentList.filter(char => {
            const filled = Array.from(grid.children).some(s => s.classList.contains('filled') && s.dataset.correct === char);
            return !filled;
        });

        remaining.sort(() => Math.random() - 0.5).forEach(char => {
            const el = document.createElement('div');
            el.className = 'draggable-letter';
            el.innerText = char;
            el.draggable = true;
            el.id = "letter-" + char;
            el.ondragstart = e => {
                e.dataTransfer.setData('text', char);
                playSound(300 + char.charCodeAt(0)); // Phonics-like feedback
            };
            el.onclick = () => playSound(300 + char.charCodeAt(0));
            bank.appendChild(el);
        });
        
        updateProgress();
    }

    function handleDrop(e) {
        e.preventDefault();
        const draggedChar = e.dataTransfer.getData('text');
        const correctChar = e.target.dataset.correct;

        if (draggedChar === correctChar && !e.target.classList.contains('filled')) {
            // SUCCESS
            e.target.innerText = draggedChar;
            e.target.classList.add('filled');
            document.getElementById("letter-" + draggedChar).remove();
            
            placedCount++;
            updateProgress();
            
            const msgs = ["शाबाश!", "बहुत बढ़िया!", "अद्भुत!", "सुंदर!"];
            document.getElementById('instruction').innerText = msgs[Math.floor(Math.random()*msgs.length)];
            
            playSound(523, 'sine', 0.3); // High ding
            
            if (placedCount === currentList.length) {
                setTimeout(showCelebration, 500);
            }
        } else {
            // FAIL
            e.target.classList.add('shake');
            document.getElementById('instruction').innerText = "फिर से कोशिश करो!";
            playSound(150, 'sawtooth', 0.2); // Low buzz
            setTimeout(() => e.target.classList.remove('shake'), 500);
        }
    }

    function updateProgress() {
        const percent = (placedCount / currentList.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }

    function showCelebration() {
        document.getElementById('celebration').style.display = 'flex';
        playSound(523, 'sine', 0.1);
        setTimeout(() => playSound(659, 'sine', 0.1), 100);
        setTimeout(() => playSound(783, 'sine', 0.3), 200);
    }

    function resetCurrent() {
        const type = currentList.length === swarList.length ? 'swar' : 'vyanjan';
        initGame(type);
    }

    // Default Start
    window.onload = () => initGame('swar');

</script>
</body>
</html>
