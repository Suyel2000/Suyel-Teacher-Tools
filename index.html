<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Classroom Hub</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(to right, #e3f2fd, #ffffff);
  text-align: center;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: linear-gradient(90deg, #2196F3, #1565C0);
  color: white;
}

/* LEFT SIDE */
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* LOGO */
.logo {
  width: 60px;
  height: 60px;
}

/* TITLE BLOCK */
.title-box {
  text-align: left;
}

/* MAIN TITLE */
.title-box h1 {
  font-size: 26px;
  margin: 0;
}

/* TAGLINE */
.tagline {
  font-size: 13px;
  opacity: 0.9;
}

/* MENU BIGGER */
.menu {
  font-size: 36px;   /* 🔥 increased */
  cursor: pointer;
  position: relative;
}

/* DROPDOWN */
.dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 45px;
  background: white;
  color: black;
  min-width: 160px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.dropdown a {
  display: block;
  padding: 12px;
  text-decoration: none;
  color: black;
  font-size: 15px;
}

.dropdown a:hover {
  background: #f1f1f1;
}

.dropdown.show {
  display: block;
}

/* HERO */
.hero {
  padding: 25px;
}

.start-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 20px;
  background: #ff9800;
  color: white;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
}

/* CLASS */
.class-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.class-list button {
  width: 220px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #673AB7, #9C27B0);
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.box {
  height: 120px;
  border-radius: 20px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-weight: bold;
}

/* COLORS */
.tools { background: #4CAF50; }
.games { background: #FF9800; }
.quiz { background: #E91E63; }
.worksheets { background: #673AB7; }
.fln { background: #009688; }
.ncert { background: #3F51B5; }

/* FOOTER */
.footer {
  margin-top: 30px;
  padding: 20px;
  font-size: 14px;
  color: #777;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="header-left">
    <img src="logo.png" class="logo">

    <div class="title-box">
      <h1>Digital Classroom Hub</h1>
      <div class="tagline">Connecting Minds | Empowering Learning</div>
    </div>
  </div>

  <div class="menu" onclick="toggleMenu()">
    &#8942;

    <div id="dropdownMenu" class="dropdown">
      <a href="index.html">🏠 Home</a>
      <a href="#">ℹ️ About</a>
      <a href="#">📞 Contact</a>
    </div>
  </div>

</div>

<!-- HERO -->
<div class="hero">
  <h2>🚀 Learn • Practice • Play</h2>
  <a href="quiz.html" class="start-btn">Start Learning</a>
</div>

<!-- CLASS -->
<h3>🎓 Choose Your Class</h3>
<div class="class-list">
  <button>Class 1</button>
  <button>Class 2</button>
  <button>Class 3</button>
  <button>Class 4</button>
  <button>Class 5</button>
</div>

<!-- GRID -->
<h2>📂 Explore Categories</h2>
<div class="grid">
  <a href="teacher-tools.html" class="box tools">Teacher Tools</a>
  <a href="games.html" class="box games">Games</a>
  <a href="quiz.html" class="box quiz">Quiz</a>
  <a href="worksheets.html" class="box worksheets">Worksheets</a>
  <a href="fln.html" class="box fln">FLN</a>
  <a href="https://ncert.nic.in/textbook.php" class="box ncert">NCERT</a>
</div>

<!-- FOOTER -->
<div class="footer">
   Made with ❤️ for Teachers and Students
</div>

<script>
function toggleMenu() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

window.onclick = function(e) {
  if (!e.target.closest('.menu')) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
}
</script>

</body>
</html>
