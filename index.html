<!DOCTYPE html>
<html>
<head>
  <title>Digital Classroom Hub</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: linear-gradient(to right, #e3f2fd, #ffffff);
    }

    h1 {
      background-color: #2196F3;
      color: white;
      padding: 20px;
      margin: 0;
      font-size: 32px;
    }

    p {
      margin-top: 10px;
      color: #555;
      font-size: 18px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-top: 50px;
    }

    .card {
      padding: 30px;
      width: 200px;
      border-radius: 15px;
      color: white;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 2px 2px 12px gray;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .tools { background-color: #4CAF50; }
    .games { background-color: #FF9800; }
    .quiz { background-color: #E91E63; }
    .worksheets { background-color: #9C27B0; }

  </style>
</head>

<body>

<h1>🎓 Digital Classroom Hub</h1>
<p>Learn • Practice • Play</p>

<div class="container">

  <a href="teacher-tools.html" class="card tools">
    📚 Teacher Tools
  </a>

  <a href="games.html" class="card games">
    🎮 Games
  </a>

  <a href="quiz.html" class="card quiz">
    🧠 Quiz
  </a>

  <a href="worksheets.html" class="card worksheets">
    📄 Worksheets
  </a>

</div>

</body>
</html>
