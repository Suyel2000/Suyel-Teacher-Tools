    <style>
        /* --- ENERGETIC DESIGN SYSTEM & VARIABLES --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #ccfbf1 0%, #e0f2fe 35%, #ffedd5 70%, #fee2e2 100%);
            --color-green: #16a34a;
            --color-blue: #2563eb;
            --color-orange: #ea580c;
            --color-red: #dc2626;
            --text-main: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 10px 32px -4px rgba(37, 99, 235, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- STYLING & BASE RESETS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: moveGradient 20s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 90px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LIGHTWEIGHT ATMOSPHERIC FLOATING ELEMENT CORE --- */
        .floating-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            animation: physicalFloat 14s linear infinite;
        }

        @keyframes physicalFloat {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); }
            50% { transform: translateY(50vh) translateX(50px) rotate(180deg); }
            100% { transform: translateY(-10vh) translateX(0) rotate(360deg); }
        }

        /* --- APPARATUS STRUCTURE --- */
        .container {
            width: 92%;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* --- HERO HEADER SECTION --- */
        .hero {
            text-align: center;
            padding: 4rem 1rem 2.5rem;
            animation: slideUpFade 1s ease-out;
        }

        .hero h1 {
            font-size: 3.8rem;
            color: var(--color-blue);
            text-shadow: 2px 3px 0px rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 1.5rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 2rem;
        }

        .hero-illustration {
            font-size: 4rem;
            display: inline-block;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            padding: 1rem 3rem;
            border-radius: 60px;
            box-shadow: var(--glass-shadow);
            animation: springAction 4s ease-in-out infinite;
        }

        @keyframes springAction {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.03); }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STATISTICS CARDS DISPLAY PANEL --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stat-card:hover {
            transform: translateY(-6px);
        }

        .stat-icon {
            font-size: 2.6rem;
            margin-bottom: 0.4rem;
        }

        .stat-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* --- SPORTS SECTIONS LAYOUT BLOCKS --- */
        .category-section {
            margin-bottom: 4.5rem;
        }

        .category-title {
            font-size: 2.1rem;
            margin-bottom: 1.8rem;
            padding-left: 1.2rem;
            border-left: 6px solid var(--color-orange);
            color: var(--text-main);
            display: flex;
            align-items: center;
            font-weight: 800;
        }

        /* --- GLASSMORPHIC QUIZ CARD ELEMENTS --- */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 2.5rem;
        }

        .quiz-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Lift, Hover and Dynamic Flare Glow Systems */
        .quiz-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 45px rgba(234, 88, 12, 0.18);
            border-color: rgba(255, 255, 255, 0.95);
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0; left: -75%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 100%);
            transform: skewX(-25deg);
            transition: 0.8s;
        }

        .quiz-card:hover::before {
            left: 125%;
        }

        /* Image Display Port */
        .media-container {
            width: 100%;
            height: 145px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .media-container .fallback-emoji {
            font-size: 4.2rem;
            transition: transform 0.3s ease;
        }

        .quiz-card:hover .fallback-emoji {
            transform: scale(1.22) rotate(-5deg);
        }

        .quiz-details h3 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .quiz-details p {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        /* Call-To-Action Controls */
        .start-btn {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
        }

        .quiz-card:hover .start-btn {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            box-shadow: 0 6px 18px rgba(234, 88, 12, 0.35);
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        /* --- STICKY ACCESS BAR FOOTER --- */
        footer {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 2px solid var(--glass-border);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -6px 30px rgba(0,0,0,0.04);
        }

        .footer-branding h4 {
            font-size: 1.15rem;
            color: var(--color-blue);
            font-weight: 700;
        }
        .footer-branding p {
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-nav {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 0.6rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--color-blue);
            color: white;
            border-color: var(--color-blue);
            transform: translateY(-2px);
        }

        /* --- SCREEN SIZE RESPONSIVE VIEWPORTS --- */
        @media (max-width: 1024px) {
            .hero h1 { font-size: 3rem; }
            .quiz-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.4rem; }
            .hero p { font-size: 1.15rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            footer {
                flex-direction: column;
                gap: 0.8rem;
                text-align: center;

        }

        @media (max-width: 480px) {

            .quiz-grid { grid-template-columns: 1fr; }
            .hero-illustration { font-size: 2.6rem; padding: 0.6rem 1.6rem; }
        }

    <script>
        const AudioDriver = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                if (type === 'hover') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(620, now + 0.05);
                    gain.gain.setValueAtTime(0.02, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(587.33, now); // D5
                    osc.frequency.exponentialRampToValueAtTime(987.77, now + 0.09); // B5
                    gain.gain.setValueAtTime(0.16, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
                    osc.start(now);
                    osc.stop(now + 0.09);
                } else if (type === 'load') {
                    // Fast pentatonic sports fanfare swoop
                    osc.type = 'sine';
                    const scale = [293.66, 329.63, 392.00, 440.00, 523.25]; // D4, E4, G4, A4, C5
                    scale.forEach((freq, idx) => {
                        osc.frequency.setValueAtTime(freq, now + (idx * 0.06));
                    });
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    osc.start(now);
                    osc.stop(now + 0.45);
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { AudioDriver.play('load'); }, 400);
        });
    </script>

    <script>
        // Draw Ambient Floating Apparatus Items
        function triggerAtmosphericStreamers() {
            const wrapper = document.getElementById('floatingContainer');
            const icons = ['⚽', '🧘', '🥇', '🏸', '🤸', '🏏', '🏀', '✨', '⭐', '🏅'];
            const targetCount = window.innerWidth < 600 ? 10 : 24;

            for (let i = 0; i < targetCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'floating-item';
                particle.innerText = icons[Math.floor(Math.random() * icons.length)];
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.top = `${Math.random() * 100}vh`;
                particle.style.animationDelay = `${Math.random() * 7}s`;
                particle.style.animationDuration = `${11 + Math.random() * 14}s`;
                wrapper.appendChild(particle);
            }
        }

        // Build Dynamic Matrix Grids UI
        function assembleDashboard() {
            const coreHub = document.getElementById('quizHub');

            khelYogaDataset.forEach(sectionBlock => {
                const layoutSection = document.createElement('section');
                layoutSection.className = 'category-section';

                const blockTitle = document.createElement('h2');
                blockTitle.className = 'category-title';
                blockTitle.innerText = sectionBlock.category;
                layoutSection.appendChild(blockTitle);

                const componentGrid = document.createElement('div');
                componentGrid.className = 'quiz-grid';

                sectionBlock.topics.forEach(element => {
                    const activeCard = document.createElement('div');
                    activeCard.className = 'quiz-card';
                    activeCard.setAttribute('onclick', `AudioDriver.play('click'); setTimeout(() => { window.location.href='${element.file}'; }, 150);`);
                    activeCard.setAttribute('onmouseenter', "AudioDriver.play('hover')");

                    // Media framing wrapper with active load validation channels
                    const visualBox = document.createElement('div');
                    visualBox.className = 'media-container';

                    const rawImg = document.createElement('img');
                    rawImg.src = `images/${element.img}`;
                    rawImg.alt = element.name;

                    const substituteEmoji = document.createElement('span');
                    substituteEmoji.className = 'fallback-emoji';
                    substituteEmoji.innerText = element.emoji;

                    // Network and local file asset verification routines
                    rawImg.onload = () => { rawImg.style.display = 'block'; substituteEmoji.style.display = 'none'; };
                    rawImg.onerror = () => { rawImg.style.display = 'none'; substituteEmoji.style.display = 'inline-block'; };

                    visualBox.appendChild(rawImg);
                    visualBox.appendChild(substituteEmoji);

                    // Text descriptor nodes block
                    const descriptionPanel = document.createElement('div');
                    descriptionPanel.className = 'quiz-details';

                    const itemHeader = document.createElement('h3');
                    itemHeader.innerText = element.name;

                    const itemNarrative = document.createElement('p');
                    itemNarrative.innerText = element.desc;

                    descriptionPanel.appendChild(itemHeader);
                    descriptionPanel.appendChild(itemNarrative);

                    const triggerBtn = document.createElement('button');
                    triggerBtn.className = 'start-btn';
                    triggerBtn.innerText = 'Start Quiz';

                    activeCard.appendChild(visualBox);
                    activeCard.appendChild(descriptionPanel);
                    activeCard.appendChild(triggerBtn);

                    componentGrid.appendChild(activeCard);
                });

                layoutSection.appendChild(componentGrid);
                coreHub.appendChild(layoutSection);
            });
        }

        // Initialize Application Contexts
        triggerAtmosphericStreamers();
        assembleDashboard();
    </script>
