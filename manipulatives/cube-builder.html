<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cube Builder</title>
<style>
  :root{
    --bg:#ffffff;
    --panel-bg:#ffffff;
    --border:#e2e8f0;
    --ink:#1e293b;
    --ink-soft:#64748b;
    --blue:#2f6fed;
    --blue-soft:#eaf1ff;
    --danger:#ef4444;
    --danger-soft:#fef2f2;
    --shadow: 0 8px 24px rgba(30,41,59,0.08);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:none;
    color:var(--ink);
  }
  #app{ position:fixed; inset:0; }
  #scene-container{ position:absolute; inset:0; }
  canvas{ display:block; touch-action:none; }

  /* ---------- Top bar ---------- */
  #topbar{
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    pointer-events:none;
  }
  #brand{
    font-weight:700; font-size:15px; letter-spacing:0.02em;
    color:var(--ink-soft);
    display:flex; align-items:center; gap:8px;
    pointer-events:auto;
    user-select:none;
  }
  #brand .dot{ width:10px; height:10px; border-radius:3px; background:var(--blue); display:inline-block; }

  /* ---------- Stats panel ---------- */
  #stats{
    pointer-events:auto;
    background:var(--panel-bg);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    border-radius:16px;
    padding:10px 16px;
    display:flex;
    gap:18px;
    font-size:13px;
    user-select:none;
  }
  #stats .stat{ display:flex; flex-direction:column; align-items:center; min-width:38px; }
  #stats .stat .val{ font-size:16px; font-weight:700; color:var(--ink); line-height:1.3; }
  #stats .stat .lbl{ font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em; }

  /* ---------- Mode toolbar (bottom) ---------- */
  #toolbar{
    position:absolute; left:50%; bottom:20px; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    background:var(--panel-bg);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    border-radius:22px;
    padding:10px;
    pointer-events:auto;
  }
  .btn{
    appearance:none; border:none; outline:none;
    background:transparent;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px;
    width:64px; height:56px;
    border-radius:16px;
    cursor:pointer;
    font-family:inherit;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.01em;
    transition: background 0.15s ease, transform 0.08s ease, color 0.15s ease;
    user-select:none;
  }
  .btn .icon{ font-size:22px; line-height:1; }
  .btn:hover{ background:var(--blue-soft); }
  .btn:active{ transform:scale(0.94); }
  .btn.active{ background:var(--blue); color:#fff; }
  .btn.active:hover{ background:var(--blue); }
  .btn.danger.active{ background:var(--danger); color:#fff; }
  .sep{ width:1px; height:36px; background:var(--border); margin:0 2px; }

  /* ---------- View buttons (right side) ---------- */
  #viewbar{
    position:absolute; right:18px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:8px;
    pointer-events:auto;
  }
  .view-btn{
    appearance:none; border:1px solid var(--border); outline:none;
    background:var(--panel-bg);
    color:var(--ink-soft);
    box-shadow:var(--shadow);
    width:52px; height:52px;
    border-radius:16px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:9px; font-weight:700; letter-spacing:0.02em;
    gap:2px;
    transition: background 0.15s ease, color 0.15s ease, transform 0.08s ease;
  }
  .view-btn .icon{ font-size:18px; }
  .view-btn:hover{ background:var(--blue-soft); color:var(--blue); }
  .view-btn:active{ transform:scale(0.94); }

  /* ---------- Reset (top right) ---------- */
  #resetbtn{
    pointer-events:auto;
    appearance:none; border:1px solid var(--border); outline:none;
    background:var(--panel-bg);
    color:var(--ink-soft);
    box-shadow:var(--shadow);
    width:44px; height:44px;
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:18px;
    transition: background 0.15s ease, color 0.15s ease, transform 0.08s ease;
  }
  #resetbtn:hover{ background:var(--danger-soft); color:var(--danger); }
  #resetbtn:active{ transform:scale(0.92) rotate(-40deg); }

  #topright{ display:flex; align-items:center; gap:10px; }

  /* ---------- Hint text ---------- */
  #hint{
    position:absolute; left:50%; top:20px; transform:translateX(-50%);
    background:rgba(47,111,237,0.95);
    color:#fff;
    padding:8px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    box-shadow:var(--shadow);
    pointer-events:none;
    opacity:0;
    transition: opacity 0.25s ease;
    white-space:nowrap;
    z-index:10;
  }
  #hint.show{ opacity:1; }

  /* ---------- Confirm dialog ---------- */
  #confirm-overlay{
    position:absolute; inset:0;
    background:rgba(30,41,59,0.28);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
    pointer-events:auto;
  }
  #confirm-overlay.show{ display:flex; }
  #confirm-box{
    background:#fff; border-radius:20px; box-shadow:0 16px 48px rgba(30,41,59,0.22);
    padding:26px 28px; max-width:300px; text-align:center;
  }
  #confirm-box p{ margin:0 0 18px 0; font-size:15px; color:var(--ink); line-height:1.4; }
  #confirm-box .row{ display:flex; gap:10px; justify-content:center; }
  #confirm-box button{
    appearance:none; border:none; outline:none; cursor:pointer;
    padding:10px 20px; border-radius:12px; font-weight:700; font-size:14px;
    font-family:inherit;
  }
  #confirm-box .cancel{ background:#f1f5f9; color:var(--ink); }
  #confirm-box .ok{ background:var(--danger); color:#fff; }

  @media (max-width: 700px){
    #brand span.label{ display:none; }
    #stats{ gap:12px; padding:8px 12px; }
    #stats .stat{ min-width:30px; }
    #stats .stat .val{ font-size:14px; }
    .btn{ width:54px; height:50px; }
    .view-btn{ width:44px; height:44px; }
    #toolbar{ bottom:14px; padding:8px; gap:6px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="scene-container"></div>

  <div id="topbar">
    <div id="brand"><span class="dot"></span><span class="label">Cube Builder</span></div>
    <div id="topright">
      <div id="stats">
        <div class="stat"><div class="val" id="stat-total">1</div><div class="lbl">Cubes</div></div>
        <div class="stat"><div class="val" id="stat-w">1</div><div class="lbl">Width</div></div>
        <div class="stat"><div class="val" id="stat-h">1</div><div class="lbl">Height</div></div>
        <div class="stat"><div class="val" id="stat-d">1</div><div class="lbl">Depth</div></div>
        <div class="stat"><div class="val" id="stat-layers">1</div><div class="lbl">Layers</div></div>
      </div>
      <button id="resetbtn" title="Reset">🔄</button>
    </div>
  </div>

  <div id="hint"></div>

  <div id="viewbar">
    <button class="view-btn" data-view="front"><span class="icon">📷</span>Front</button>
    <button class="view-btn" data-view="top"><span class="icon">📷</span>Top</button>
    <button class="view-btn" data-view="side"><span class="icon">📷</span>Side</button>
  </div>

  <div id="toolbar">
    <button class="btn active" id="mode-add" title="Add Cube"><span class="icon">➕</span>Add</button>
    <button class="btn danger" id="mode-remove" title="Remove Cube"><span class="icon">➖</span>Remove</button>
    <div class="sep"></div>
    <button class="btn active" id="toggle-grid" title="Show/Hide Grid"><span class="icon">👁</span>Grid</button>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-box">
      <p>Remove the last cube and start empty?</p>
      <div class="row">
        <button class="cancel" id="confirm-cancel">Cancel</button>
        <button class="ok" id="confirm-ok">Remove</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================================
   CUBE BUILDER — a virtual manipulative for exploring volume, layers,
   arrays and 3D structure with unit cubes.

   Structure of this file:
   1. Scene / camera / renderer setup
   2. Lighting
   3. Grid floor
   4. Cube data model (a Map of "x,y,z" -> mesh) + cube factory
   5. Placement / removal raycasting logic (mouse + touch)
   6. Orbit-style camera controls (rotate / zoom / pan) for mouse + touch
   7. UI wiring (buttons, stats, hint text, confirm dialog, camera views)
   ========================================================================= */

(function(){
  "use strict";

  // ---------------------------------------------------------------------
  // 1. SCENE / CAMERA / RENDERER
  // ---------------------------------------------------------------------
  const container = document.getElementById('scene-container');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  scene.fog = new THREE.Fog(0xffffff, 40, 90);

  const camera = new THREE.PerspectiveCamera(
    45, container.clientWidth / container.clientHeight, 0.1, 500
  );

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // Camera "rig": orbit a target point using spherical coordinates.
  const cameraRig = {
    target: new THREE.Vector3(0.5, 0.5, 0.5),
    radius: 10,
    theta: Math.PI * 0.28,
    phi: Math.PI * 0.36,
    minRadius: 3,
    maxRadius: 60,
    minPhi: 0.12,
    maxPhi: Math.PI - 0.12
  };

  function updateCameraFromRig(){
    const { target, radius, theta, phi } = cameraRig;
    const x = target.x + radius * Math.sin(phi) * Math.sin(theta);
    const y = target.y + radius * Math.cos(phi);
    const z = target.z + radius * Math.sin(phi) * Math.cos(theta);
    camera.position.set(x, y, z);
    camera.lookAt(target);
  }
  updateCameraFromRig();

  // ---------------------------------------------------------------------
  // 2. LIGHTING — soft, classroom-friendly, no harsh shadows
  // ---------------------------------------------------------------------
  const hemi = new THREE.HemisphereLight(0xffffff, 0xdfe8f5, 0.75);
  scene.add(hemi);

  const key = new THREE.DirectionalLight(0xffffff, 0.65);
  key.position.set(12, 18, 10);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.left = -20;
  key.shadow.camera.right = 20;
  key.shadow.camera.top = 20;
  key.shadow.camera.bottom = -20;
  key.shadow.camera.near = 1;
  key.shadow.camera.far = 60;
  key.shadow.bias = -0.0015;
  scene.add(key);

  const fillLight = new THREE.DirectionalLight(0xbfd4ff, 0.25);
  fillLight.position.set(-10, 8, -8);
  scene.add(fillLight);

  // ---------------------------------------------------------------------
  // 3. GRID FLOOR
  // ---------------------------------------------------------------------
  const GRID_EXTENT = 40;
  const gridHelper = new THREE.GridHelper(GRID_EXTENT, GRID_EXTENT, 0xbcd0f0, 0xe7edf7);
  scene.add(gridHelper);

  const floorGeo = new THREE.PlaneGeometry(GRID_EXTENT, GRID_EXTENT);
  const floorMat = new THREE.ShadowMaterial({ opacity: 0.12 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  let gridVisible = true;

  // ---------------------------------------------------------------------
  // 4. CUBE DATA MODEL
  // ---------------------------------------------------------------------
  // Cubes live on an integer lattice. Each occupied cell is keyed "x,y,z"
  // (y >= 0 sits on/above the floor). We keep a Map from key to mesh for
  // O(1) neighbor / face lookups.

  const cubes = new Map(); // key -> mesh
  const cubeGroup = new THREE.Group();
  scene.add(cubeGroup);

  function keyOf(x, y, z){ return x + ',' + y + ',' + z; }

  // Shared geometry reused across every cube instance for performance
  // at 500-1000 cubes.
  const boxGeo = new THREE.BoxGeometry(0.96, 0.96, 0.96); // slight gap for clear boundaries
  const edgesGeo = new THREE.EdgesGeometry(boxGeo);

  const CUBE_COLOR = 0x6ea3f5;
  const CUBE_COLOR_HOVER = 0x9dc4ff;

  function makeCubeMesh(){
    const mat = new THREE.MeshStandardMaterial({
      color: CUBE_COLOR,
      roughness: 0.55,
      metalness: 0.05,
    });
    const mesh = new THREE.Mesh(boxGeo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    const edges = new THREE.LineSegments(
      edgesGeo,
      new THREE.LineBasicMaterial({ color: 0x2c4a7c, transparent: true, opacity: 0.35 })
    );
    mesh.add(edges);
    mesh.userData.isCube = true;
    return mesh;
  }

  function addCubeAt(x, y, z, animate){
    const k = keyOf(x, y, z);
    if (cubes.has(k)) return null;
    const mesh = makeCubeMesh();
    mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
    mesh.userData.gridPos = { x, y, z };
    if (animate){
      mesh.scale.setScalar(0.001);
    }
    cubeGroup.add(mesh);
    cubes.set(k, mesh);
    if (animate) animateCubeIn(mesh);
    updateStats();
    return mesh;
  }

  function removeCubeAt(x, y, z){
    const k = keyOf(x, y, z);
    const mesh = cubes.get(k);
    if (!mesh) return;
    cubeGroup.remove(mesh);
    mesh.material.dispose();
    cubes.delete(k);
    if (hoveredMesh === mesh) hoveredMesh = null;
    updateStats();
  }

  // Small pop-in animation, driven each frame.
  const animating = new Set();
  function animateCubeIn(mesh){
    mesh.userData.animStart = performance.now();
    animating.add(mesh);
  }
  function stepAnimations(now){
    animating.forEach(mesh => {
      const t = Math.min(1, (now - mesh.userData.animStart) / 180);
      const eased = 1 - Math.pow(1 - t, 3);
      mesh.scale.setScalar(0.001 + eased * 0.999);
      if (t >= 1) animating.delete(mesh);
    });
  }

  // Seed: one cube at the origin cell (0,0,0)
  addCubeAt(0, 0, 0, false);

  // ---------------------------------------------------------------------
  // STATS PANEL
  // ---------------------------------------------------------------------
  function updateStats(){
    const total = cubes.size;
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,minZ=Infinity,maxZ=-Infinity;
    cubes.forEach(mesh => {
      const p = mesh.userData.gridPos;
      minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
      minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
      minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
    });
    const width = total ? (maxX - minX + 1) : 0;
    const height = total ? (maxY - minY + 1) : 0;
    const depth = total ? (maxZ - minZ + 1) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-w').textContent = width;
    document.getElementById('stat-h').textContent = height;
    document.getElementById('stat-d').textContent = depth;
    document.getElementById('stat-layers').textContent = height; // layers = vertical levels occupied
  }

  // ---------------------------------------------------------------------
  // 5. PLACEMENT / REMOVAL — raycasting against cube faces
  // ---------------------------------------------------------------------
  const raycaster = new THREE.Raycaster();
  const pointerNDC = new THREE.Vector2();

  // Preview (ghost) cube shown before confirming placement
  const previewMat = new THREE.MeshBasicMaterial({
    color: 0x2f6fed, transparent: true, opacity: 0.28, depthWrite: false
  });
  const previewMesh = new THREE.Mesh(new THREE.BoxGeometry(0.96,0.96,0.96), previewMat);
  previewMesh.visible = false;
  scene.add(previewMesh);
  const previewEdges = new THREE.LineSegments(
    edgesGeo, new THREE.LineBasicMaterial({ color: 0x2f6fed, transparent:true, opacity:0.7 })
  );
  previewMesh.add(previewEdges);

  let mode = 'add'; // 'add' | 'remove'
  let hoveredMesh = null;
  let pendingPlacement = null; // {x,y,z} awaiting a second confirming tap

  function setHover(mesh){
    if (hoveredMesh === mesh) return;
    if (hoveredMesh){
      hoveredMesh.material.color.setHex(CUBE_COLOR);
    }
    hoveredMesh = mesh;
    if (hoveredMesh){
      hoveredMesh.material.color.setHex(CUBE_COLOR_HOVER);
    }
  }

  function getPointerCubeIntersection(clientX, clientY){
    const rect = renderer.domElement.getBoundingClientRect();
    pointerNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    pointerNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointerNDC, camera);
    const meshes = Array.from(cubes.values());
    const hits = raycaster.intersectObjects(meshes, false);
    return hits.length ? hits[0] : null;
  }

  function faceNormalToGridOffset(face, mesh){
    const n = face.normal.clone();
    n.transformDirection(mesh.matrixWorld);
    return {
      x: Math.round(n.x),
      y: Math.round(n.y),
      z: Math.round(n.z)
    };
  }

  function clearPreview(){
    previewMesh.visible = false;
    pendingPlacement = null;
  }

  function showHintText(msg){
    const el = document.getElementById('hint');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(showHintText._t);
    showHintText._t = setTimeout(() => el.classList.remove('show'), 1600);
  }

  function handlePrimaryAction(clientX, clientY){
    const hit = getPointerCubeIntersection(clientX, clientY);

    if (mode === 'remove'){
      if (!hit) return;
      const p = hit.object.userData.gridPos;
      if (cubes.size <= 1){
        openConfirm();
        return;
      }
      removeCubeAt(p.x, p.y, p.z);
      clearPreview();
      return;
    }

    // ADD MODE
    if (!hit){
      clearPreview();
      return;
    }
    const p = hit.object.userData.gridPos;
    const offset = faceNormalToGridOffset(hit.face, hit.object);
    const target = { x: p.x + offset.x, y: p.y + offset.y, z: p.z + offset.z };
    if (target.y < 0) { clearPreview(); return; } // don't build below the floor
    const tKey = keyOf(target.x, target.y, target.z);

    if (pendingPlacement && keyOf(pendingPlacement.x,pendingPlacement.y,pendingPlacement.z) === tKey){
      addCubeAt(target.x, target.y, target.z, true);
      clearPreview();
    } else {
      pendingPlacement = target;
      previewMesh.position.set(target.x + 0.5, target.y + 0.5, target.z + 0.5);
      previewMesh.visible = true;
    }
  }

  // ---------------------------------------------------------------------
  // 6. CAMERA CONTROLS — rotate / zoom / pan for mouse + touch
  // ---------------------------------------------------------------------
  const dom = renderer.domElement;

  const pointers = new Map(); // pointerId -> {x,y}
  let dragMode = null;        // 'rotate' | 'pan' | 'pinch' | null
  let lastSingle = null;
  let lastPinchDist = null;
  let lastPinchMid = null;
  let dragMoved = false;
  let downPos = null;

  function getPinchInfo(){
    const pts = Array.from(pointers.values());
    if (pts.length < 2) return null;
    const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mid = { x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2 };
    return { dist, mid };
  }

  function panCamera(dxPx, dyPx){
    const scale = cameraRig.radius * 0.0015;
    const upVec = new THREE.Vector3(0,1,0);
    const camRight = new THREE.Vector3();
    camera.matrixWorld.extractBasis(camRight, new THREE.Vector3(), new THREE.Vector3());
    cameraRig.target.addScaledVector(camRight, -dxPx * scale);
    cameraRig.target.addScaledVector(upVec, dyPx * scale);
  }

  dom.addEventListener('contextmenu', e => e.preventDefault());

  dom.addEventListener('pointerdown', (e) => {
    dom.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    dragMoved = false;
    downPos = { x: e.clientX, y: e.clientY };

    if (pointers.size === 1){
      dragMode = (e.pointerType === 'mouse' && e.button === 2) ? 'pan' : 'rotate';
      lastSingle = { x: e.clientX, y: e.clientY };
    } else if (pointers.size === 2){
      dragMode = 'pinch';
      const info = getPinchInfo();
      lastPinchDist = info.dist;
      lastPinchMid = info.mid;
    }
  });

  dom.addEventListener('pointermove', (e) => {
    if (!pointers.has(e.pointerId)) {
      if (pointers.size === 0 && mode === 'add'){
        const hit = getPointerCubeIntersection(e.clientX, e.clientY);
        setHover(hit ? hit.object : null);
      }
      return;
    }
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (downPos){
      const dd = Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y);
      if (dd > 6) dragMoved = true;
    }

    if (dragMode === 'rotate' && pointers.size === 1){
      const dx = e.clientX - lastSingle.x;
      const dy = e.clientY - lastSingle.y;
      lastSingle = { x: e.clientX, y: e.clientY };
      cameraRig.theta -= dx * 0.006;
      cameraRig.phi -= dy * 0.006;
      cameraRig.phi = Math.max(cameraRig.minPhi, Math.min(cameraRig.maxPhi, cameraRig.phi));
      updateCameraFromRig();
    } else if (dragMode === 'pan' && pointers.size === 1){
      const dx = e.clientX - lastSingle.x;
      const dy = e.clientY - lastSingle.y;
      lastSingle = { x: e.clientX, y: e.clientY };
      panCamera(dx, dy);
      updateCameraFromRig();
    } else if (dragMode === 'pinch' && pointers.size === 2){
      const info = getPinchInfo();
      const distDelta = info.dist - lastPinchDist;
      cameraRig.radius -= distDelta * 0.03;
      cameraRig.radius = Math.max(cameraRig.minRadius, Math.min(cameraRig.maxRadius, cameraRig.radius));
      const mdx = info.mid.x - lastPinchMid.x;
      const mdy = info.mid.y - lastPinchMid.y;
      panCamera(mdx, mdy);
      lastPinchDist = info.dist;
      lastPinchMid = info.mid;
      updateCameraFromRig();
    }

    if (mode === 'add' && pointers.size === 1 && !dragMoved){
      const hit = getPointerCubeIntersection(e.clientX, e.clientY);
      setHover(hit ? hit.object : null);
    }
  });

  function endPointer(e){
    const wasTap = pointers.has(e.pointerId) && !dragMoved && pointers.size === 1;
    pointers.delete(e.pointerId);
    if (pointers.size === 0){
      if (wasTap){
        handlePrimaryAction(e.clientX, e.clientY);
      }
      dragMode = null;
      lastSingle = null;
      lastPinchDist = null;
    } else if (pointers.size === 1){
      const remaining = Array.from(pointers.values())[0];
      dragMode = 'rotate';
      lastSingle = { x: remaining.x, y: remaining.y };
    }
  }
  dom.addEventListener('pointerup', endPointer);
  dom.addEventListener('pointercancel', endPointer);
  dom.addEventListener('pointerleave', () => {
    if (pointers.size === 0){ setHover(null); }
  });

  dom.addEventListener('wheel', (e) => {
    e.preventDefault();
    cameraRig.radius += e.deltaY * 0.01;
    cameraRig.radius = Math.max(cameraRig.minRadius, Math.min(cameraRig.maxRadius, cameraRig.radius));
    updateCameraFromRig();
  }, { passive: false });

  // ---------------------------------------------------------------------
  // 7. UI WIRING
  // ---------------------------------------------------------------------
  const addBtn = document.getElementById('mode-add');
  const removeBtn = document.getElementById('mode-remove');
  const gridBtn = document.getElementById('toggle-grid');
  const resetBtn = document.getElementById('resetbtn');

  function setMode(m){
    mode = m;
    addBtn.classList.toggle('active', m === 'add');
    removeBtn.classList.toggle('active', m === 'remove');
    clearPreview();
    setHover(null);
    showHintText(m === 'add' ? 'Tap a face, then tap again to place' : 'Tap a cube to remove it');
  }
  addBtn.addEventListener('click', () => setMode('add'));
  removeBtn.addEventListener('click', () => setMode('remove'));

  gridBtn.addEventListener('click', () => {
    gridVisible = !gridVisible;
    gridHelper.visible = gridVisible;
    gridBtn.classList.toggle('active', gridVisible);
    showHintText(gridVisible ? 'Grid shown' : 'Grid hidden');
  });

  resetBtn.addEventListener('click', () => {
    Array.from(cubes.keys()).forEach(k => {
      const [x,y,z] = k.split(',').map(Number);
      removeCubeAt(x,y,z);
    });
    addCubeAt(0,0,0,true);
    cameraRig.target.set(0.5,0.5,0.5);
    cameraRig.radius = 10;
    cameraRig.theta = Math.PI * 0.28;
    cameraRig.phi = Math.PI * 0.36;
    updateCameraFromRig();
    clearPreview();
    showHintText('Workspace reset');
  });

  // Confirm dialog (only shown when trying to remove the very last cube)
  const overlay = document.getElementById('confirm-overlay');
  function openConfirm(){ overlay.classList.add('show'); }
  function closeConfirm(){ overlay.classList.remove('show'); }
  document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
  document.getElementById('confirm-ok').addEventListener('click', () => {
    const [k] = cubes.keys();
    if (k){
      const [x,y,z] = k.split(',').map(Number);
      removeCubeAt(x,y,z);
    }
    closeConfirm();
  });

  // Camera view presets, animated smoothly by tweening theta/phi/radius/target
  const viewButtons = document.querySelectorAll('.view-btn');
  let camTween = null;
  function animateCameraTo(theta, phi, radius, target){
    const start = {
      theta: cameraRig.theta, phi: cameraRig.phi, radius: cameraRig.radius,
      target: cameraRig.target.clone()
    };
    const end = { theta, phi, radius, target };
    const t0 = performance.now();
    const dur = 550;
    if (camTween) cancelAnimationFrame(camTween);
    function step(){
      const now = performance.now();
      const t = Math.min(1, (now - t0) / dur);
      const eased = t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; // easeInOutCubic
      cameraRig.theta = start.theta + (end.theta - start.theta) * eased;
      cameraRig.phi = start.phi + (end.phi - start.phi) * eased;
      cameraRig.radius = start.radius + (end.radius - start.radius) * eased;
      cameraRig.target.lerpVectors(start.target, end.target, eased);
      updateCameraFromRig();
      if (t < 1){ camTween = requestAnimationFrame(step); }
    }
    camTween = requestAnimationFrame(step);
  }

  function centerOfModel(){
    if (cubes.size === 0) return new THREE.Vector3(0.5,0.5,0.5);
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,minZ=Infinity,maxZ=-Infinity;
    cubes.forEach(mesh => {
      const p = mesh.userData.gridPos;
      minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
      minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
      minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z);
    });
    return new THREE.Vector3((minX+maxX+1)/2, (minY+maxY+1)/2, (minZ+maxZ+1)/2);
  }

  viewButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      const target = centerOfModel();
      const dist = Math.max(8, cameraRig.radius);
      if (view === 'front'){
        animateCameraTo(0, Math.PI/2, dist, target);
      } else if (view === 'top'){
        animateCameraTo(cameraRig.theta, 0.15, dist, target);
      } else if (view === 'side'){
        animateCameraTo(Math.PI/2, Math.PI/2, dist, target);
      }
      showHintText(view.charAt(0).toUpperCase()+view.slice(1)+' view');
    });
  });

  // ---------------------------------------------------------------------
  // RESIZE + RENDER LOOP
  // ---------------------------------------------------------------------
  function onResize(){
    const w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);

  function tick(now){
    stepAnimations(now);
    if (previewMesh.visible){
      previewMesh.rotation.y += 0.01;
    }
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  setTimeout(() => showHintText('Tap a face, then tap again to place'), 400);
  updateStats();
})();
</script>
</body>
</html>
