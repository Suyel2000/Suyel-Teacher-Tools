        :root {

        .toolbar {

            display: flex;

        button {
            font-size: 16px;

            padding: 12px 18px;
            border: none;

            transition: transform 0.1s ease, background-color 0.2s ease;
            box-shadow: var(--shadow);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-unit { background-color: var(--unit-color); color: #51400a; }
        .btn-ten { background-color: var(--ten-color); color: #2a3f07; }
        .btn-hundred { background-color: var(--hundred-color); color: #0f315f; }
        .btn-thousand { background-color: var(--thousand-color); color: #5c2b05; }
        
        .btn-action { background-color: #e5e7eb; color: var(--text-dark); }
        .btn-action:hover { background-color: #d1d5db; }
        .btn-active { background-color: #3b82f6; color: white; }

        .btn-danger { background-color: #fecaca; color: #991b1b; }
        .btn-danger:hover { background-color: #fca5a5; }

        /* --- WORKSPACE --- */
        .workspace-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--workspace-bg);
            cursor: grab;
            touch-action: none;
        }
        .workspace-container.drawing-mode { cursor: crosshair; }
        .workspace-container:active:not(.drawing-mode) { cursor: grabbing; }

        .workspace {
            position: absolute;
            top: 0;
            left: 0;
            width: 10000px;
            height: 10000px;
            transform-origin: 0 0;
            will-change: transform;
        }

        .grid-overlay {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),

            left: 0;
            width: 10000px;
            height: 10000px;
            pointer-events: none;

        /* --- DIENES BLOCKS GENERATION --- */
        .block {
            position: absolute;
            cursor: move;
            touch-action: none;
            display: grid;
            gap: 1px;
            padding: 1px;
            border-radius: 4px;
            box-shadow: var(--shadow);
            transform-origin: center;
            will-change: left, top;
        }

        .block:hover {
            box-shadow: var(--shadow-lg);
            filter: brightness(1.03);
        }

        .block.selected {
            outline: 3px solid #ef4444;
            outline-offset: 4px;
            z-index: 9999 !important;

        /* Internal Matrix Units */
        .u-cell {
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 2px;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.4), inset -1px -1px 1px rgba(0,0,0,0.1);
        }

        /* 1 Unit Cube: 24x24 px */
        .block-unit {
            width: 24px;
            height: 24px;
            background-color: var(--unit-border);
            grid-template-columns: 1fr;
        }
        .block-unit .u-cell { background-color: var(--unit-color); }

        /* 10 Rod */
        .block-ten {
            width: 24px;
            height: 204px;
            background-color: var(--ten-border);
            grid-template-rows: repeat(10, 1fr);
        }
        .block-ten .u-cell { background-color: var(--ten-color); }

        /* 100 Flat */
        .block-hundred {
            width: 204px;
            height: 204px;
            background-color: var(--hundred-border);
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
        }
        .block-hundred .u-cell { background-color: var(--hundred-color); }

        /* Improved 1000 Cube Isometric 3D Layer Styling */
        .block-thousand {
            width: 204px;
            height: 204px;
            background-color: var(--thousand-border);
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            position: absolute;
            transform: translate3d(0, 0, 0);
        }
        
        /* Top isometric layer mimicking depth layers */
        .block-thousand::before {
            content: '';
            position: absolute;
            top: -36px;
            left: 18px;
            width: 204px;
            height: 36px;
            background: #fdba74;
            transform: skewX(-45deg);
            border: 1px solid var(--thousand-border);
            background-image: linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20.4px 100%;
        }

        /* Right isometric side panel layer mimicking depth layers */
        .block-thousand::after {
            content: '';
            position: absolute;
            top: -18px;
            right: -36px;
            width: 36px;
            height: 204px;
            background: #ea580c;
            transform: skewY(-45deg);
            border: 1px solid var(--thousand-border);
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 100% 20.4px;
        }
        .block-thousand .u-cell { background-color: var(--thousand-color); }

        /* Animation class */
        .pop-in {
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }

        /* Controls Panel Bottom Right */
        .canvas-controls {

        /* --- RESPONSIVE WORK --- */

        @media print {

            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

            <button class="btn-action" onclick="undo()" title="Undo" aria-label="Undo action">↩️ Undo</button>

<script>
    // State Tracking
    let blocks = [];
    let selectedBlockId = null;
    let scale = 1.0;
    let panX = 40;
    let panY = 40;
    let currentMode = 'select'; // 'select', 'pencil'
    let isPanning = false;
    let isDrawing = false;
    let startX, startY;
    let blockIdCounter = 0;

    // Smooth tracking caches
    let panTargetX = panX;
    let panTargetY = panY;
    let panTicking = false;

    // Undo/Redo Stacks
    let undoStack = [];
    let redoStack = [];

    const workspace = document.getElementById('workspace');
    const wsContainer = document.getElementById('ws-container');
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');

    // App Initialization
    function init() {
        updateWorkspaceTransform();
        setupCanvasStyles();
        saveState();
        
        // Global Keyboard listeners
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            if (e.key === 'Delete' || e.key === 'Backspace') {
                deleteSelected();
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                undo();
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                redo();
            }
        });

        // Unified Pointer Events for smoother Smart Board and touch responses
        window.addEventListener('pointermove', handleGlobalPointerMove, { passive: false });
        window.addEventListener('pointerup', handleGlobalPointerUp);
        window.addEventListener('pointercancel', handleGlobalPointerUp);
    }

    function setupCanvasStyles() {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    // Mode Toggles
    function activatePencil() {
        deselectAll();
        if (currentMode === 'pencil') {
            currentMode = 'select';
            document.getElementById('btn-pencil').classList.remove('btn-active');
            wsContainer.classList.remove('drawing-mode');
        } else {
            currentMode = 'pencil';
            document.getElementById('btn-pencil').classList.add('btn-active');
            wsContainer.classList.add('drawing-mode');
        }
    }

    // --- CORE BLOCK SPAWNING ---
    function spawnBlock(type, x = null, y = null, triggerSave = true) {
        blockIdCounter++;
        const id = 'block_' + blockIdCounter;
        
        if (x === null || y === null) {
            const rect = wsContainer.getBoundingClientRect();
            x = (-panX + (rect.width / 2) - 100) / scale;
            y = (-panY + (rect.height / 2) - 100) / scale;
            x += (Math.random() * 40 - 20);
            y += (Math.random() * 40 - 20);
        }

        const blockData = { id, type, x, y, zIndex: blocks.length + 1 };
        blocks.push(blockData);

        renderBlockElement(blockData);

        if (triggerSave) saveState();
    }

    function renderBlockElement(data) {
        const el = document.createElement('div');
        el.id = data.id;
        el.className = `block block-${data.type} pop-in`;
        el.style.left = `${data.x}px`;
        el.style.top = `${data.y}px`;
        el.style.zIndex = data.zIndex;
        el.setAttribute('role', 'img');
        el.setAttribute('aria-label', `Base ten ${data.type} block`);

        let count = 1;
        if (data.type === 'ten') count = 10;
        if (data.type === 'hundred' || data.type === 'thousand') count = 100;

        for (let i = 0; i < count; i++) {
            const cell = document.createElement('div');
            cell.className = 'u-cell';
            el.appendChild(cell);
        }

        // High-responsiveness pointer down handling for dragging blocks smoothly
        el.addEventListener('pointerdown', (e) => {
            if (currentMode === 'pencil') return;
            startDrag(e, data.id);
        });
        
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            selectBlock(data.id);
        });

        workspace.appendChild(el);
    }

    // --- INTERACTION HANDLING (PAN, DRAW, DRAG) ---
    let activeDragId = null;
    let dragStartX, dragStartY;

    function handleWorkspacePointerDown(e) {
        const target = e.target;
        if (currentMode === 'pencil') {
            if (target !== wsContainer && target !== workspace && target !== canvas) return;
            isDrawing = true;
            const rect = workspace.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) / scale;
            const mouseY = (e.clientY - rect.top) / scale;
            ctx.beginPath();
            ctx.moveTo(mouseX, mouseY);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 4;
        } else {
            if (target !== wsContainer && target !== workspace && target !== canvas) return;
            isPanning = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            deselectAll();
            wsContainer.setPointerCapture(e.pointerId);
        }
    }

    function handleGlobalPointerMove(e) {
        if (isPanning) {
            e.preventDefault();
            panTargetX = e.clientX - startX;
            panTargetY = e.clientY - startY;
            
            if (!panTicking) {
                window.requestAnimationFrame(() => {
                    if (isPanning) {
                        panX = panTargetX;
                        panY = panTargetY;
                        updateWorkspaceTransform();
                    }
                    panTicking = false;
                });
                panTicking = true;
            }
        } else if (isDrawing && currentMode === 'pencil') {
            e.preventDefault();
            const rect = workspace.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) / scale;
            const mouseY = (e.clientY - rect.top) / scale;
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
        }
    }

    function handleGlobalPointerUp(e) {
        if (isPanning) {
            isPanning = false;
            try { wsContainer.releasePointerCapture(e.pointerId); } catch(err) {}
        }
        if (isDrawing) {
            isDrawing = false;
            saveState();
        }
    }

    function startDrag(e, id) {
        if (e.button !== 0 && e.pointerType === 'mouse') return;
        e.stopPropagation();
        e.preventDefault();
        selectBlock(id);
        activeDragId = id;

        const blockEl = document.getElementById(id);
        const blockData = blocks.find(b => b.id === id);

        const maxZ = blocks.reduce((max, b) => Math.max(max, b.zIndex), 0);
        blockData.zIndex = maxZ + 1;
        blockEl.style.zIndex = blockData.zIndex;

        dragStartX = e.clientX - blockData.x * scale;
        dragStartY = e.clientY - blockData.y * scale;

        blockEl.setPointerCapture(e.pointerId);

        let dragTargetX = blockData.x;
        let dragTargetY = blockData.y;
        let dragTicking = false;

        const moveHandler = (evt) => {
            if (activeDragId !== id) return;
            evt.stopPropagation();
            evt.preventDefault();

            dragTargetX = (evt.clientX - dragStartX) / scale;
            dragTargetY = (evt.clientY - dragStartY) / scale;

            if (!dragTicking) {
                window.requestAnimationFrame(() => {
                    if (activeDragId === id) {
                        blockData.x = dragTargetX;
                        blockData.y = dragTargetY;
                        blockEl.style.left = `${blockData.x}px`;
                        blockEl.style.top = `${blockData.y}px`;
                    }
                    dragTicking = false;
                });
                dragTicking = true;
            }
        };

        const stopHandler = (evt) => {
            blockEl.removeEventListener('pointermove', moveHandler);
            blockEl.removeEventListener('pointerup', stopHandler);
            blockEl.removeEventListener('pointercancel', stopHandler);
            try { blockEl.releasePointerCapture(evt.pointerId); } catch(err) {}
            if (activeDragId) {
                activeDragId = null;
                saveState();
            }
        };

        blockEl.addEventListener('pointermove', moveHandler, { passive: false });
        blockEl.addEventListener('pointerup', stopHandler);
        blockEl.addEventListener('pointercancel', stopHandler);
    }

    // --- CANVAS TRANSFORMS ---
    function zoom(amount) {
        scale = Math.min(Math.max(0.3, scale + amount), 3.0);
        updateWorkspaceTransform();
    }

    function resetZoom() {
        scale = 1.0;
        panX = 40;
        panY = 40;
        updateWorkspaceTransform();
    }

    function updateWorkspaceTransform() {
        window.requestAnimationFrame(() => {
            workspace.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${scale})`;
        });
    }

    // --- MANIPULATIVE SELECTION UTILITIES ---
    function selectBlock(id) {
        deselectAll();
        selectedBlockId = id;
        const el = document.getElementById(id);
        if (el) el.classList.add('selected');
    }

    function deselectAll() {
        selectedBlockId = null;
        document.querySelectorAll('.block').forEach(el => el.classList.remove('selected'));
    }

    function deleteSelected() {
        if (!selectedBlockId) return;
        blocks = blocks.filter(b => b.id !== selectedBlockId);
        const el = document.getElementById(selectedBlockId);
        if (el) {
            el.remove();
        }
        selectedBlockId = null;
        saveState();
    }

    function clearWorkspace() {
        document.querySelectorAll('.block').forEach(el => el.remove());
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        blocks = [];
        selectedBlockId = null;
        saveState();
    }

    // --- UNDO / REDO STATE MACHINE MANAGEMENT ---
    function saveState() {
        if (undoStack.length > 40) undoStack.shift(); 
        
        const stateSnapshot = {
            blocks: blocks.map(b => ({...b})),
            canvasDraw: canvas.toDataURL()
        };
        undoStack.push(JSON.stringify(stateSnapshot));
        redoStack = []; 
    }

    function undo() {
        if (undoStack.length <= 1) return; 
        
        const currentState = undoStack.pop();
        redoStack.push(currentState);

        const targetState = JSON.parse(undoStack[undoStack.length - 1]);
        applyState(targetState);
    }

    function redo() {
        if (redoStack.length === 0) return;
        
        const targetSnapshot = redoStack.pop();
        undoStack.push(targetSnapshot);
        
        applyState(JSON.parse(targetSnapshot));
    }

    function applyState(stateObj) {
        document.querySelectorAll('.block').forEach(el => el.remove());
        blocks = stateObj.blocks.map(b => ({...b}));
        blocks.forEach(b => renderBlockElement(b));
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (stateObj.canvasDraw) {
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
            };
            img.src = stateObj.canvasDraw;
        }
        
        deselectAll();
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                alert(`Error attempting to enable fullscreen mode: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    window.onload = init;
</script>
</body>
</html>
