<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Strips Playground</title>
    <style>
        :root {
            --bg-main: #f0fdf4; /* Soft, inviting mint tint */
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --border-heavy: #000000; /* Bold comic-book style lines */
            --primary: #4f46e5;
            
            /* Playful, eye-catchy palette */
            --c1: #ff4b4b;   /* Whole - Coral Red */
            --c2: #ff8a00;   /* Halves - Neon Orange */
            --c3: #ffcd00;   /* Thirds - Sunshine Yellow */
            --c4: #00e676;   /* Fourths - Bright Lime */
            --c5: #00b0ff;   /* Fifths - Sky Blue */
            --c6: #2979ff;   /* Sixths - Royal Blue */
            --c7: #651fff;   /* Sevenths - Electric Violet */
            --c8: #aa00ff;   /* Eighths - Magenta Purple */
            --c9: #f50057;   /* Nineths - Hot Pink */
            --c10: #ff1744;  /* Tenths - Deep Rose */
            --c11: #00e5ff;  /* Elevenths - Bright Turquoise */
            --c12: #78909c;  /* Twelfths - Cool Slate */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 0.4rem 1rem;
            border: 4px solid var(--border-heavy);
            border-radius: 16px;
            height: 48px;
            box-shadow: 4px 4px 0px var(--border-heavy);
        }

        header h1 {
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: 900;
            text-shadow: 2px 2px 0px #e0e7ff;
        }

        .instruction-tag {
            font-size: 0.8rem;
            font-weight: 800;
            color: #475569;
            background: #f1f5f9;
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            border: 2px solid var(--border-heavy);
        }

        .main-container {
            display: grid;
            grid-template-columns: 210px 1fr;
            gap: 0.6rem;
            height: calc(100vh - 62px);
        }

        .panel {
            background: var(--bg-card);
            border: 4px solid var(--border-heavy);
            border-radius: 18px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            height: 100%;
            position: relative;
            box-shadow: 5px 5px 0px var(--border-heavy);
        }

        .panel h2 {
            font-size: 0.9rem;
            color: var(--border-heavy);
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 3px solid var(--border-heavy);
            padding-bottom: 0.3rem;
            letter-spacing: 0.05em;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: #f8fafc;
            padding: 0.3rem;
            border-radius: 12px;
            border: 3px solid var(--border-heavy);
        }

        button {
            border: 3px solid var(--border-heavy);
            padding: 0.3rem 0.6rem;
            font-weight: 900;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            color: var(--border-heavy);
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            box-shadow: 2px 2px 0px var(--border-heavy);
            transition: all 0.1s ease;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-heavy);
        }

        .btn-active {
            background: #ff0055 !important;
            color: white !important;
        }

        .btn-danger {
            background: #ffe4e6;
            color: #b91c1c;
        }

        .btn-toggle-unit {
            background: #ccfbf1;
            color: #115e59;
        }
        .btn-toggle-unit.active-double {
            background: #10b981;
            color: white;
        }

        /* Sidebar - Compact, airy block buttons selector drawer */
        .source-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            overflow-y: auto;
            flex: 1;
            padding-right: 0.1rem;
        }

        .source-list::-webkit-scrollbar {
            width: 6px;
        }
        .source-list::-webkit-scrollbar-thumb {
            background: var(--border-heavy);
            border-radius: 3px;
        }

        .source-strip-item {
            background: #ffffff;
            border: 3px solid var(--border-heavy);
            padding: 0.3rem 0.4rem;
            border-radius: 12px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            transition: all 0.15s ease;
        }
        .source-strip-item:hover {
            transform: translateY(-2px);
            box-shadow: 3px 5px 0px var(--border-heavy);
            background: #fafafa;
        }

        /* Clean, airy block-only visual shortcut representation */
        .single-piece-unit {
            width: 38px;
            height: 24px;
            border: 3px solid var(--border-heavy);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 900;
            color: white;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .source-label {
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--border-heavy);
            text-transform: capitalize;
        }

        /* Sandbox Grid Area with spacious canvas margin padding */
        .workspace-canvas-wrapper {
            position: relative;
            flex: 1;
            border-radius: 12px;
            background: #f1f5f9; /* Smooth placeholder container backdrop */
            display: flex;
            flex-direction: column;
            gap: 5px; /* Added spacing buffers between fraction tracks */
            padding: 5px;
            overflow: hidden;
        }

        /* 10 dynamic line items framed in thick black borders */
        .work-box-row {
            display: grid;
            grid-template-columns: 24px 1fr 24px;
            align-items: center;
            gap: 0.5rem;
            background: #ffffff;
            border: 3px solid var(--border-heavy);
            padding: 0 0.5rem;
            border-radius: 10px;
            height: calc((100% - 45px) / 10);
            min-height: 28px;
            position: relative;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.04);
        }
        .work-box-row.drag-over {
            background: #e0f2fe;
            border-color: var(--primary);
        }

        .row-index-badge {
            font-weight: 900;
            font-size: 0.8rem;
            color: var(--border-heavy);
            background: #e2e8f0;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border-heavy);
        }

        /* Builder alignment track channels */
        .fraction-builder-track {
            display: flex;
            width: 100%;
            height: 72%;
            background: #fafafa;
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .work-segment-block {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.8rem;
            color: white;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            border-right: 3px solid var(--border-heavy);
            box-sizing: border-box;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .work-segment-block:last-child {
            border-right: none;
        }

        @keyframes popIn {
            0% { transform: scaleX(0.7); opacity: 0; }
            100% { transform: scaleX(1); opacity: 1; }
        }

        .unit-divider-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: #000000;
            z-index: 10;
            pointer-events: none;
        }

        .row-action-delete {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            box-shadow: none;
        }
        .row-action-delete:hover {
            color: #ef4444;
            transform: scale(1.2);
        }

        #annotation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        #annotation-overlay.drawing-active {
            pointer-events: auto;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <header>
        <h1>Fraction Strips Playground</h1>
        <div class="instruction-tag">Click text labels or drag colorful blocks to load sandbox rows!</div>
    </header>

    <main class="main-container">

        <!-- LEFT BAR: Creative Word-Based Unit Piece Blocks Factory -->
        <section class="panel">
            <h2>🧩 Unit Block Factory</h2>
            <div class="source-list" id="source-strips-container">
                <!-- Programmatically generated list targets word mappings -->
            </div>
        </section>

        <!-- RIGHT WORKSPACE: 10 Thick-Bordered Dynamic Sandbox Lanes -->
        <section class="panel" style="flex:1;">
            
            <div class="controls-row">
                <button id="unit-toggle-btn" class="btn-toggle-unit" onclick="lab.toggleUnitScaling()">📏 Double Unit: OFF</button>
                
                <div style="width: 3px; height: 18px; background: var(--border-heavy); margin: 0 0.2rem;"></div>

                <button id="tool-draw-btn" onclick="lab.setAnnotationTool('draw')">✏️ Write</button>
                <button id="tool-erase-btn" onclick="lab.setAnnotationTool('erase')">🧽 Erase</button>
                <button class="btn-danger" style="background:none; border-color:transparent; box-shadow:none;" onclick="lab.clearAnnotationInk()">❌ Clear Ink</button>
                
                <div style="width: 3px; height: 18px; background: var(--border-heavy); margin: 0 0.1rem; margin-left: auto;"></div>
                
                <button class="btn-danger" onclick="lab.clearAllWorkspaceSlots()">🔄 Clear Canvas Rows</button>
            </div>
            
            <div class="workspace-canvas-wrapper" id="canvas-container-frame">
                
                <!-- Transparent Floating whiteboard digital overlay frame -->
                <canvas id="annotation-overlay"></canvas>
                
                <div id="workspace-slots-target" style="display:flex; flex-direction:column; gap:5px; height:100%; width:100%; z-index:2;">
                    <!-- 10 Spaced-Out Heavy Highlighted Construction Rails Generated Here -->
                </div>

            </div>
        </section>

    </main>

    <script>
        class EngagingFractionLab {
            constructor() {
                // Config with written word names instead of fractional equations syntax
                this.fractionConfig = {
                    1:  { textLabel: 'whole',        display: '1',    color: 'var(--c1)' },
                    2:  { textLabel: 'half',         display: '½',    color: 'var(--c2)' },
                    3:  { textLabel: 'one third',    display: '⅓',    color: 'var(--c3)' },
                    4:  { textLabel: 'one fourth',   display: '¼',    color: 'var(--c4)' },
                    5:  { textLabel: 'one fifth',    display: '⅕',    color: 'var(--c5)' },
                    6:  { textLabel: 'one sixth',    display: '⅙',    color: 'var(--c6)' },
                    7:  { textLabel: 'one seventh',  display: '⅐',    color: 'var(--c7)' },
                    8:  { textLabel: 'one eighth',   display: '⅛',    color: 'var(--c8)' },
                    9:  { textLabel: 'one ninth',    display: '⅑',    color: 'var(--c9)' },
                    10: { textLabel: 'one tenth',    display: '¹/₁₀', color: 'var(--c10)' },
                    11: { textLabel: 'one eleventh', display: '¹/₁₁', color: 'var(--c11)' },
                    12: { textLabel: 'one twelfth',  display: '¹/₁₂', color: 'var(--c12)' }
                };

                this.totalSlotsCount = 10;
                this.slotStates = Array.from({ length: this.totalSlotsCount }, () => []);
                
                this.isDoubleUnitMode = false;
                this.draggedDenominator = null;

                this.activeTool = 'none'; 
                this.isDrawing = false;
                this.ctx = null;
                this.canvas = null;
            }

            init() {
                this.renderSourceStripsDrawer();
                this.renderWorkspaceSlotsGrid();
                this.initAnnotationCanvasEngine();
                
                window.addEventListener('resize', () => this.resizeAnnotationCanvasSize());
            }

            /**
             * Renders cleanly isolated verbal text labels mapped with standalone color preview boxes
             */
            renderSourceStripsDrawer() {
                const container = document.getElementById('source-strips-container');
                container.innerHTML = '';

                Object.keys(this.fractionConfig).map(Number).forEach(d => {
                    const cfg = this.fractionConfig[d];
                    
                    const item = document.createElement('div');
                    item.className = 'source-strip-item';
                    item.setAttribute('draggable', 'true');
                    
                    item.addEventListener('dragstart', () => { this.draggedDenominator = d; });
                    item.addEventListener('dragend', () => { this.draggedDenominator = null; });
                    item.addEventListener('click', () => { this.autoAddPieceToNextTrack(d); });

                    const labelText = document.createElement('div');
                    labelText.className = 'source-label';
                    labelText.innerText = cfg.textLabel;

                    const blockIcon = document.createElement('div');
                    blockIcon.className = 'single-piece-unit';
                    blockIcon.style.backgroundColor = cfg.color;
                    blockIcon.innerText = cfg.display;

                    item.appendChild(labelText);
                    item.appendChild(blockIcon);
                    container.appendChild(item);
                });
            }

            /**
             * Generates 10 spaced lines framed in thick bold borders with blank drop boxes
             */
            renderWorkspaceSlotsGrid() {
                const target = document.getElementById('workspace-slots-target');
                target.innerHTML = '';

                for (let idx = 0; idx < this.totalSlotsCount; idx++) {
                    const activePiecesList = this.slotStates[idx];

                    const row = document.createElement('div');
                    row.className = 'work-box-row';
                    
                    row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over'); });
                    row.addEventListener('dragleave', () => { row.classList.remove('drag-over'); });
                    row.addEventListener('drop', (e) => {
                        e.preventDefault();
                        row.classList.remove('drag-over');
                        if (this.draggedDenominator) this.addPieceToSlotIndex(idx, this.draggedDenominator);
                    });

                    const badge = document.createElement('div');
                    badge.className = 'row-index-badge';
                    badge.innerText = idx + 1;

                    const builderTrack = document.createElement('div');
                    builderTrack.className = 'fraction-builder-track';

                    if (activePiecesList.length === 0) {
                        builderTrack.style.justifyContent = 'center';
                        builderTrack.style.alignItems = 'center';
                        builderTrack.innerHTML = `<span style="color:#94a3b8; font-size:0.7rem; font-weight:800; letter-spacing:0.02em;">[ Place pieces here ]</span>`;
                    } else {
                        const maxDenominatorUnits = this.isDoubleUnitMode ? 2 : 1;

                        activePiecesList.forEach(denom => {
                            const cfg = this.fractionConfig[denom];
                            const segment = document.createElement('div');
                            segment.className = 'work-segment-block';
                            segment.style.backgroundColor = cfg.color;
                            
                            const baseWidthPercentage = (1 / denom) * (100 / maxDenominatorUnits);
                            segment.style.width = `${baseWidthPercentage}%`;
                            
                            segment.innerHTML = `<span>${cfg.display}</span>`;
                            if (denom > 8) segment.style.fontFamily = 'sans-serif';
                            builderTrack.appendChild(segment);
                        });

                        if (this.isDoubleUnitMode) {
                            const unitDivider = document.createElement('div');
                            unitDivider.className = 'unit-divider-line';
                            builderTrack.appendChild(unitDivider);
                        }
                    }

                    const delBtn = document.createElement('button');
                    delBtn.className = 'row-action-delete';
                    delBtn.innerHTML = '✕';
                    delBtn.onclick = () => { this.clearSingleTrackIndex(idx); };

                    row.appendChild(badge);
                    row.appendChild(builderTrack);
                    row.appendChild(delBtn);
                    target.appendChild(row);
                }
            }

            addPieceToSlotIndex(slotIdx, denom) {
                const currentTrackLength = this.slotStates[slotIdx].reduce((acc, d) => acc + (1 / d), 0);
                const limitMax = this.isDoubleUnitMode ? 2 : 1;

                if (currentTrackLength + (1 / denom) <= limitMax + 0.001) {
                    this.slotStates[slotIdx].push(denom);
                    this.renderWorkspaceSlotsGrid();
                }
            }

            autoAddPieceToNextTrack(denom) {
                const limitMax = this.isDoubleUnitMode ? 2 : 1;
                let targetRowIdx = this.slotStates.findIndex(pieces => {
                    const currentLength = pieces.reduce((acc, d) => acc + (1 / d), 0);
                    return currentLength + (1 / denom) <= limitMax + 0.001;
                });

                if (targetRowIdx !== -1) {
                    this.addPieceToSlotIndex(targetRowIdx, denom);
                } else {
                    this.slotStates[0] = [denom];
                    this.renderWorkspaceSlotsGrid();
                }
            }

            clearSingleTrackIndex(slotIdx) {
                this.slotStates[slotIdx] = [];
                this.renderWorkspaceSlotsGrid();
            }

            clearAllWorkspaceSlots() {
                this.slotStates = Array.from({ length: this.totalSlotsCount }, () => []);
                this.renderWorkspaceSlotsGrid();
            }

            toggleUnitScaling() {
                this.isDoubleUnitMode = !this.isDoubleUnitMode;
                const btn = document.getElementById('unit-toggle-btn');
                
                if (this.isDoubleUnitMode) {
                    btn.innerText = '📏 Double Unit: ON (2 Wholes)';
                    btn.classList.add('active-double');
                } else {
                    btn.innerText = '📏 Double Unit: OFF (1 Whole)';
                    btn.classList.remove('active-double');
                }
                this.renderWorkspaceSlotsGrid();
            }

            /**
             * Overlay Digital Whiteboard Vector Engine Core Realtime Pipeline Handles
             */
            initAnnotationCanvasEngine() {
                this.canvas = document.getElementById('annotation-overlay');
                this.ctx = this.canvas.getContext('2d');
                this.resizeAnnotationCanvasSize();

                this.canvas.addEventListener('mousedown', (e) => this.startDrawingSequence(e));
                this.canvas.addEventListener('mousemove', (e) => this.executeDrawingMove(e));
                this.canvas.addEventListener('mouseup', () => this.terminateDrawingSequence());
                this.canvas.addEventListener('mouseleave', () => this.terminateDrawingSequence());

                this.canvas.addEventListener('touchstart', (e) => {
                    const t = e.touches[0];
                    this.startDrawingSequence({ clientX: t.clientX, clientY: t.clientY });
                    e.preventDefault();
                }, { passive: false });
                this.canvas.addEventListener('touchmove', (e) => {
                    const t = e.touches[0];
                    this.executeDrawingMove({ clientX: t.clientX, clientY: t.clientY });
                    e.preventDefault();
                }, { passive: false });
                this.canvas.addEventListener('touchend', () => this.terminateDrawingSequence());
            }

            resizeAnnotationCanvasSize() {
                const container = document.getElementById('canvas-container-frame');
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = this.canvas.width;
                tempCanvas.height = this.canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(this.canvas, 0, 0);

                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;

                this.ctx.drawImage(tempCanvas, 0, 0);
                this.configureContextPenRenderingDefaults();
            }

            setAnnotationTool(toolChoice) {
                if (this.activeTool === toolChoice) {
                    this.activeTool = 'none';
                } else {
                    this.activeTool = toolChoice;
                }

                document.getElementById('tool-draw-btn').className = (this.activeTool === 'draw') ? 'btn-active' : '';
                document.getElementById('tool-erase-btn').className = (this.activeTool === 'erase') ? 'btn-active' : '';

                this.canvas.className = (this.activeTool === 'none') ? '' : 'drawing-active';
                this.configureContextPenRenderingDefaults();
            }

            configureContextPenRenderingDefaults() {
                if (!this.ctx) return;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';

                if (this.activeTool === 'erase') {
                    this.ctx.globalCompositeOperation = 'destination-out';
                    this.ctx.lineWidth = 28;
                } else {
                    this.ctx.globalCompositeOperation = 'source-over';
                    this.ctx.lineWidth = 5;
                    this.ctx.strokeStyle = '#4f46e5'; /* Electric Indigo marker ink choice */
                }
            }

            startDrawingSequence(e) {
                if (this.activeTool === 'none') return;
                this.isDrawing = true;
                const rect = this.canvas.getBoundingClientRect();
                this.ctx.beginPath();
                this.ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            }

            executeDrawingMove(e) {
                if (!this.isDrawing || this.activeTool === 'none') return;
                const rect = this.canvas.getBoundingClientRect();
                this.ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                this.ctx.stroke();
            }

            terminateDrawingSequence() {
                this.isDrawing = false;
            }

            clearAnnotationInk() {
                if (!this.ctx) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        const lab = new EngagingFractionLab();
        window.addEventListener('DOMContentLoaded', () => lab.init());
    </script>
</body>
</html>
