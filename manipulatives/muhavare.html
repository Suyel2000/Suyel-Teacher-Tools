<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मुहावरे डिजिटल मैनिपुलेटिव | प्राथमिक कक्षाओं के लिए संवादात्मक भाषा टूल</title>
    
    <!-- SEO Metadata -->
    <meta name="description" content="प्राथमिक कक्षाओं के लिए एक सरल और शक्तिशाली हिंदी मुहावरे डिजिटल मैनिपुलेटिव। कार्ड खींचकर या टैप करके अर्थ मिलाएँ और वाक्यों में प्रयोग सीखें। बिना किसी भटकाव का शुद्ध शिक्षण उपकरण।">
    <meta name="keywords" content="Hindi Muhavare, हिंदी मुहावरे, मुहावरे और अर्थ, मुहावरे वाक्य प्रयोग, Hindi idioms for kids, मुहावरे activity, interactive Hindi learning tool, Hindi TLM, primary Hindi learning tool, मुहावरा matching activity">
    <meta property="og:title" content="मुहावरे डिजिटल मैनिपुलेटिव - प्राथमिक हिंदी शिक्षण टूल">
    <meta property="og:description" content="बच्चों के लिए संवादात्मक मुहावरे अभ्यास बोर्ड। बिना स्कोर या विज्ञापनों के, शुद्ध और प्रभावी कक्षा शिक्षण के लिए उपयुक्त।">
    <link rel="canonical" href="">

    <!-- Typography: Noto Sans Devanagari -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-canvas: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --accent: #059669;
            --accent-light: #ecfdf5;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
            --radius-md: 12px;
            --radius-lg: 18px;
            --font-stack: 'Noto Sans Devanagari', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* Top Header Area */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
        }

        .brand-title h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .brand-title p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Teacher Interactive Prompt Component */
        .teacher-prompt-zone {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-light);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: 1px dashed var(--primary);
            flex: 1;
            max-width: 500px;
        }
        .teacher-prompt-zone label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }
        .teacher-prompt-zone input {
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-stack);
            font-size: 0.95rem;
            color: var(--text-main);
            width: 100%;
        }

        /* Master View & Filter Bar */
        .navigation-filter-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .view-toggle-group, .filter-toggle-group, .board-size-group {
            display: flex;
            background: #f1f5f9;
            padding: 0.3rem;
            border-radius: 10px;
            gap: 0.2rem;
        }

        .nav-btn, .filter-btn, .size-btn {
            font-family: var(--font-stack);
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-btn.active, .filter-btn.active, .size-btn.active {
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        /* Main Workspace Grid Container */
        .workspace-root {
            display: grid;
            grid-template-columns: 1fr 320px;
            flex: 1;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Primary Teaching Canvas */
        .teaching-canvas {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Mode 1: Single Match Area */
        .single-match-view {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 450px;
        }

        .target-muhavara-container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .workspace-instruction {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .display-phrase {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        /* Dynamic Droppable Area Mat */
        .meaning-matching-mat {
            min-height: 80px;
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-md);
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: all 0.2s ease;
        }
        .meaning-matching-mat.drag-over {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .meaning-matching-mat.matched {
            background: var(--accent-light);
            border-color: var(--accent);
            border-style: solid;
        }

        .mat-placeholder {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Reveal Section Style */
        .reveal-sentence-box {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--border);
            text-align: left;
            animation: fadeIn 0.4s ease forwards;
        }
        .reveal-sentence-box h4 {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 0.4rem;
            font-weight: 600;
        }
        .reveal-sentence-box p {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: 500;
        }
        .reveal-sentence-box p span.highlight {
            background-color: #fef08a;
            color: #854d0e;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-weight: 700;
        }

        /* Movable Cards Tray Container */
        .meaning-cards-tray {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin-top: 1rem;
        }

        /* Generic Card Style Rule */
        .movable-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.85rem 1.4rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: grab;
            box-shadow: var(--shadow-sm);
            user-select: none;
            touch-action: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .movable-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: #cbd5e1;
        }
        .movable-card:active {
            cursor: grabbing;
        }
        .movable-card.selected-tap {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }
        .movable-card.incorrect-shake {
            animation: shake 0.4s ease;
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        /* Mode 2: Milan Board Grid */
        .milan-board-view {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            position: relative;
        }

        .milan-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .milan-column h3 {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-align: center;
        }

        .milan-interactive-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.1rem;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            position: relative;
        }
        .milan-interactive-card:hover {
            border-color: #cbd5e1;
            box-shadow: var(--shadow-md);
        }
        .milan-interactive-card.selected {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }
        .milan-interactive-card.connected {
            border-color: var(--accent);
            background-color: var(--accent-light);
            color: var(--accent);
            cursor: default;
        }

        /* Persistent Action Panel / Controls Base */
        .control-toolbar-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .action-button {
            font-family: var(--font-stack);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }
        .action-button:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }
        .action-button.primary-action {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }
        .action-button.primary-action:hover {
            background: #2563eb;
        }

        /* Feedback Status Alert Text Overlay */
        .live-feedback-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-muted);
            min-height: 24px;
            text-align: center;
            transition: color 0.2s ease;
        }
        .live-feedback-text.error { color: #dc2626; }
        .live-feedback-text.success { color: var(--accent); }

        /* Sidebar / Right Column Drawers */
        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .learned-collection-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            max-height: 550px;
            box-shadow: var(--shadow-sm);
        }
        .learned-collection-box h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 0.5rem;
        }
        .collection-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-right: 0.25rem;
        }
        .collection-item {
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 0.6rem 0.85rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .collection-item:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        /* Compact Card Inspector Modal Placeholder alternative */
        .inspector-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .inspector-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .inspector-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            position: relative;
            transform: scale(0.95);
            transition: transform 0.25s ease;
        }
        .inspector-overlay.active .inspector-card {
            transform: scale(1);
        }
        .close-inspector {
            position: absolute;
            top: 1rem; right: 1rem;
            background: #f1f5f9; border: none;
            width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; font-weight: bold; color: var(--text-muted);
        }

        /* Keyframe Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* Scalable Responsive Layout adjustments */
        @media(max-width: 1024px) {
            .workspace-root {
                grid-template-columns: 1fr;
            }
            .sidebar-panel {
                display: grid;
                grid-template-columns: 1fr;
            }
            .learned-collection-box {
                max-height: 300px;
            }
        }

        @media(max-width: 640px) {
            header { padding: 1rem; }
            .navigation-filter-bar { padding: 0.5rem 1rem; }
            .workspace-root { padding: 1rem; }
            .milan-board-view { grid-template-columns: 1fr; gap: 1.5rem; }
            .control-toolbar-panel { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <!-- Top Header Area Container -->
    <header>
        <div class="brand-title">
            <h1>मुहावरे डिजिटल मैनिपुलेटिव</h1>
            <p>प्राथमिक कक्षाओं के लिए संवादात्मक भाषा कार्ड</p>
        </div>
        
        <!-- Editable Teacher Task Input Field Container -->
        <div class="teacher-prompt-zone">
            <label for="teacherPrompt">आज का अभ्यास:</label>
            <input type="text" id="teacherPrompt" value="मुहावरे का सही अर्थ खोजो और वाक्य में प्रयोग पढ़ो।" placeholder="कक्षा निर्देश यहाँ लिखें...">
        </div>
    </header>

    <!-- Navigation Tab View controls and Categories Area Container -->
    <div class="navigation-filter-bar">
        <div class="view-toggle-group">
            <button class="nav-btn active" onclick="switchView('single')">एक-एक अभ्यास</button>
            <button class="nav-btn" onclick="switchView('board')">मिलान बोर्ड</button>
        </div>

        <!-- Size Selection Area Container inside board view context -->
        <div class="board-size-group" id="boardSizeGroup" style="display: none;">
            <button class="size-btn" onclick="changeBoardSize(4)">4 जोड़ियाँ</button>
            <button class="size-btn active" onclick="changeBoardSize(6)">6 जोड़ियाँ</button>
            <button class="size-btn" onclick="changeBoardSize(8)">8 जोड़ियाँ</button>
        </div>

        <div class="filter-toggle-group" id="categoryFilterGroup">
            <button class="filter-btn active" onclick="filterCategory('सभी')">सभी</button>
            <button class="filter-btn" onclick="filterCategory('शरीर')">शरीर</button>
            <button class="filter-btn" onclick="filterCategory('मेहनत')">मेहनत</button>
            <button class="filter-btn" onclick="filterCategory('खुशी')">खुशी</button>
            <button class="filter-btn" onclick="filterCategory('कठिनाई')">कठिनाई</button>
        </div>
    </div>

    <!-- Master Layout Frame Setup Grid -->
    <div class="workspace-root">
        
        <!-- Main Interactive Application Field Layout Column -->
        <section class="teaching-canvas">
            
            <!-- View Mode 1: Single Item Interactive Matching Setup Layer -->
            <div class="single-match-view" id="singleMatchView">
                <div class="target-muhavara-container">
                    <div class="workspace-instruction">इस मुहावरे का अर्थ सोचो</div>
                    <div class="display-phrase" id="targetPhraseText">--</div>
                    
                    <!-- Matching Target Droppable Mat Element Container -->
                    <div class="meaning-matching-mat" id="matchingTargetMat">
                        <span class="mat-placeholder">सही अर्थ कार्ड यहाँ खींचें या नीचे से टैप करें</span>
                    </div>

                    <!-- Example Sentence Container Segment Hidden Initially -->
                    <div class="reveal-sentence-box" id="revealSentenceBox" style="display: none;">
                        <h4>वाक्य में प्रयोग:</h4>
                        <p id="revealSentenceText">--</p>
                    </div>
                </div>

                <!-- Meaning Interactive Container Option Row Array Tray -->
                <div class="meaning-cards-tray" id="meaningTrayContainer"></div>
            </div>

            <!-- View Mode 2: Full Classroom Milan Matching Grid Board Layout Container Layer -->
            <div class="milan-board-view" id="milanBoardView">
                <div class="milan-column">
                    <h3>मुहावरे</h3>
                    <div id="milanPhrasesColumn"></div>
                </div>
                <div class="milan-column">
                    <h3>सरल अर्थ</h3>
                    <div id="milanMeaningsColumn"></div>
                </div>
            </div>

            <!-- Real-time Validation text status panel element layout container -->
            <div class="live-feedback-text" id="liveFeedbackStatus"></div>

            <!-- Tool Control Action Button Panel Configuration -->
            <div class="control-toolbar-panel">
                <button class="action-button" onclick="triggerSpeech()">
                    <span>🔊</span> सुनें
                </button>
                <button class="action-button primary-action" id="nextActionButton" onclick="handlePrimaryActionRoute()">
                    नया मुहावरा
                </button>
                <button class="action-button" onclick="clearCurrentCanvasState()">
                    साफ करें
                </button>
            </div>
        </section>

        <!-- Right Side Panel Column Layout Module (Collection Drawer View) -->
        <aside class="sidebar-panel">
            <div class="learned-collection-box">
                <h2>सीखे हुए मुहावरे</h2>
                <ul class="collection-list" id="collectionItemsList">
                    <!-- Dynamic updates feed items sequentially without duplications -->
                </ul>
            </div>
        </aside>
    </div>

    <!-- Inspector Modal Component Element Layer -->
    <div class="inspector-overlay" id="cardInspectorOverlay" onclick="closeInspectorCard()">
        <div class="inspector-card" onclick="event.stopPropagation()">
            <button class="close-inspector" onclick="closeInspectorCard()">×</button>
            <div class="workspace-instruction" style="margin-bottom:1rem;">मुहावरा परिचय</div>
            <h2 id="inspectPhrase" style="font-size:1.8rem; margin-bottom:0.5rem; color:var(--primary);">--</h2>
            <p id="inspectMeaning" style="font-size:1.2rem; font-weight:600; margin-bottom:1rem; color:var(--accent);">--</p>
            <div style="border-top:1px dashed var(--border); padding-top:1rem;">
                <h4 style="font-size:0.9rem; color:var(--text-muted); margin-bottom:0.25rem;">वाक्य में प्रयोग:</h4>
                <p id="inspectSentence" style="font-size:1.1rem; font-weight:500;">--</p>
            </div>
        </div>
    </div>

    <script>
        // Curated Comprehensive 60 Verified Primary-Level Muhavare Database Engine Structure Arrays
        const DATA_POOL = [
            { id: 1, phrase: "आँखों का तारा", meaning: "बहुत प्यारा व्यक्ति", sentence: "रीना अपने माता-पिता की आँखों का तारा है।", category: "शरीर" },

        // Fisher-Yates Core Optimization Shuffle Algorithm Function
        function shuffleDataset(array) {
            let optimizedArray = [...array];
            for (let i = optimizedArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optimizedArray[i], optimizedArray[j]] = [optimizedArray[j], optimizedArray[i]];
            }
            return optimizedArray;
        }

        function rebuildShuffleBag() {
            let targetFilterSet = DATA_POOL;
            if (activeCategoryFilter !== 'सभी') {
                targetFilterSet = DATA_POOL.filter(item => item.category === activeCategoryFilter);
            }
            // Fallback safety guard for sparse classifications
            if(targetFilterSet.length === 0) targetFilterSet = DATA_POOL;
            
            singleShuffleBag = shuffleDataset(targetFilterSet);
        }

            finalOptionsList.forEach((meaningText, index) => {
                const card = document.createElement('div');
                card.className = 'movable-card';
                card.textContent = meaningText;
                card.setAttribute('draggable', 'true');
                card.dataset.meaning = meaningText;
                card.id = `single-card-${index}`;
                
                // Native drag-and-drop registration fallbacks for modern desktops
                card.addEventListener('dragstart', (e) => {
                    if(singleMatchCompleted) return;
                    e.dataTransfer.setData('text/plain', card.id);
                });

                tray.appendChild(card);
            });
        }

        // Unified Pointer Interaction Core Setup for Hybrid Smartboards/Mice Inputs
        function setupUnifiedInputInteractionHandlers() {
            const mat = document.getElementById('matchingTargetMat');

            // Drag Over Desktop Handlers
            mat.addEventListener('dragover', (e) => {
                e.preventDefault();
                if(!singleMatchCompleted) mat.classList.add('drag-over');
            });

            mat.addEventListener('dragleave', () => {
                mat.classList.remove('drag-over');
            });

            mat.addEventListener('drop', (e) => {
                e.preventDefault();
                mat.classList.remove('drag-over');
                if(singleMatchCompleted) return;

                const cardId = e.dataTransfer.getData('text/plain');
                const draggedCard = document.getElementById(cardId);
                if (draggedCard) {
                    evaluateSingleMatchChoice(draggedCard.dataset.meaning, draggedCard);
                }
            });

            // Tap-To-Select Fallback Pointer Input Tap Capture Mapping Logic
            document.getElementById('meaningTrayContainer').addEventListener('click', (e) => {
                const clickedCard = e.target.closest('.movable-card');
                if (!clickedCard || singleMatchCompleted) return;

                document.querySelectorAll('#meaningTrayContainer .movable-card').forEach(c => c.classList.remove('selected-tap'));
                
                activeSelectedTapCard = clickedCard;
                activeSelectedTapCard.classList.add('selected-tap');

                // Instant evaluation upon tapping option card
                evaluateSingleMatchChoice(activeSelectedTapCard.dataset.meaning, activeSelectedTapCard);
            });
        }

        // Engine match evaluation processor
        function evaluateSingleMatchChoice(chosenMeaning, cardElement) {
            if (chosenMeaning === activeSingleItem.meaning) {
                // Execute Match Operations
                singleMatchCompleted = true;
                setFeedbackState("बहुत बढ़िया! सही मिलान।", "success");
                
                const mat = document.getElementById('matchingTargetMat');
                mat.className = "meaning-matching-mat matched";
                mat.innerHTML = `<div class="movable-card" style="cursor:default; margin:0; border-color:var(--accent); background:var(--accent-light); color:var(--accent); font-weight:700;">${chosenMeaning}</div>`;
                
                // Safely scrub option source items elements tray
                document.getElementById('meaningTrayContainer').innerHTML = '';
                
                // Highlight text element and display execution layout segment
                revealSentenceUsageMarkup();
                registerLearnedCollectionRegistry(activeSingleItem);
            } else {
                // Trigger non-locking penalty animation layout responses
                setFeedbackState("फिर सोचो! दोबारा प्रयास करें।", "error");
                if (cardElement) {
                    cardElement.classList.remove('selected-tap');
                    cardElement.classList.add('incorrect-shake');
                    setTimeout(() => {
                        cardElement.classList.remove('incorrect-shake');
                    }, 400);
                }
            }
        }

        function revealSentenceUsageMarkup() {
            const box = document.getElementById('revealSentenceBox');
            const textElement = document.getElementById('revealSentenceText');
            
            let rawSentence = activeSingleItem.sentence;
            let targetPhrase = activeSingleItem.phrase;
            
            // Build dynamic text parsing regex to protect Devanagari ligatures
            let regexMatchSegment = new RegExp(`(${targetPhrase})`, 'g');
            
            // Structural fallback checks handling variations inside standard data samples entries
            if (!regexMatchSegment.test(rawSentence)) {
                // Fallback core substring parser test configuration sequence
                let rootCoreToken = targetPhrase.split(' ')[0]; 
                regexMatchSegment = new RegExp(`(${rootCoreToken}[^\\s।]*)`, 'g');
            }

            let parsedHtmlMarkup = rawSentence.replace(regexMatchSegment, `<span class="highlight">$1</span>`);
            textElement.innerHTML = parsedHtmlMarkup;
            box.style.display = 'block';
        }


        /* 
           ============= MODE 2: MILAN MULTI-PAIR MATCH BOARD INTERACTION =============
        */
        function generateMilanBoardCanvasGrid() {
            selectedBoardPhraseElement = null;
            selectedBoardMeaningElement = null;
            boardTotalMatchedCount = 0;
            setFeedbackState("", "neutral");

            let basePool = DATA_POOL;
            if (activeCategoryFilter !== 'सभी') {
                basePool = DATA_POOL.filter(item => item.category === activeCategoryFilter);
            }
            if (basePool.length < currentBoardPairCount) {
                basePool = DATA_POOL; // Overflow fallback reset protection
            }

            // Slice out deterministic pairs size
            let pickedItems = shuffleDataset(basePool).slice(0, currentBoardPairCount);

            boardPhrasesList = shuffleDataset(pickedItems);
            boardMeaningsList = shuffleDataset(pickedItems);

            const phrasesColumn = document.getElementById('milanPhrasesColumn');
            const meaningsColumn = document.getElementById('milanMeaningsColumn');

            phrasesColumn.innerHTML = '';
            meaningsColumn.innerHTML = '';

            boardPhrasesList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'milan-interactive-card';
                el.textContent = item.phrase;
                el.dataset.id = item.id;
                el.onclick = () => selectBoardElement(el, 'phrase');
                phrasesColumn.appendChild(el);
            });

            boardMeaningsList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'milan-interactive-card';
                el.textContent = item.meaning;
                el.dataset.id = item.id;
                el.onclick = () => selectBoardElement(el, 'meaning');
                meaningsColumn.appendChild(el);
            });
        }

        function selectBoardElement(element, type) {
            if (element.classList.contains('connected')) return;

            if (type === 'phrase') {
                document.querySelectorAll('#milanPhrasesColumn .milan-interactive-card').forEach(c => c.classList.remove('selected'));
                if (selectedBoardPhraseElement === element) {
                    selectedBoardPhraseElement = null;
                } else {
                    selectedBoardPhraseElement = element;
                    selectedBoardPhraseElement.classList.add('selected');
                }
            } else {
                document.querySelectorAll('#milanMeaningsColumn .milan-interactive-card').forEach(c => c.classList.remove('selected'));
                if (selectedBoardMeaningElement === element) {
                    selectedBoardMeaningElement = null;
                } else {
                    selectedBoardMeaningElement = element;
                    selectedBoardMeaningElement.classList.add('selected');
                }
            }

            // Evaluate Cross Matrix Match Logic Check
            if (selectedBoardPhraseElement && selectedBoardMeaningElement) {
                let phraseId = selectedBoardPhraseElement.dataset.id;
                let meaningId = selectedBoardMeaningElement.dataset.id;

                if (phraseId === meaningId) {
                    // Match Success Operation Sequence
                    selectedBoardPhraseElement.className = "milan-interactive-card connected";
                    selectedBoardMeaningElement.className = "milan-interactive-card connected";
                    
                    let targetObjectMatch = DATA_POOL.find(item => item.id == phraseId);
                    registerLearnedCollectionRegistry(targetObjectMatch);

                    selectedBoardPhraseElement = null;
                    selectedBoardMeaningElement = null;
                    boardTotalMatchedCount++;

                    setFeedbackState("सही जोड़ी बनी!", "success");

                    if (boardTotalMatchedCount === currentBoardPairCount) {
                        setFeedbackState("अद्भुत! पूरा बोर्ड सही हल किया गया।", "success");
                    }
                } else {
                    // Fail mismatch response setup block configuration loop
                    setFeedbackState("गलत मिलान! फिर सोचें।", "error");
                    
                    let el1 = selectedBoardPhraseElement;
                    let el2 = selectedBoardMeaningElement;
                    el1.classList.add('incorrect-shake');
                    el2.classList.add('incorrect-shake');

                    selectedBoardPhraseElement.classList.remove('selected');
                    selectedBoardMeaningElement.classList.remove('selected');
                    selectedBoardPhraseElement = null;
                    selectedBoardMeaningElement = null;

                    setTimeout(() => {
                        el1.classList.remove('incorrect-shake');
                        el2.classList.remove('incorrect-shake');
                    }, 400);
                }
            }
        }


        /* 
           ============= GLOBAL UTILITIES & RUNTIME SIDEBAR LOGIC =============
        */
        function setFeedbackState(msg, semanticType) {
            const bar = document.getElementById('liveFeedbackStatus');
            bar.textContent = msg;
            bar.className = "live-feedback-text " + (semanticType === "neutral" ? "" : semanticType);
        }

        function registerLearnedCollectionRegistry(itemObject) {
            if (learnedItemsRegistry.has(itemObject.id)) return;
            
            learnedItemsRegistry.add(itemObject.id);
            const listContainer = document.getElementById('collectionItemsList');

            const li = document.createElement('li');
            li.className = "collection-item";
            li.textContent = itemObject.phrase;
            li.title = "विवरण देखने के लिए टैप करें";
            li.onclick = () => openInspectorCard(itemObject);

            listContainer.appendChild(li);
        }

        // Compact Card Inspector UI Modal Operations Manager Context
        function openInspectorCard(itemObject) {
            document.getElementById('inspectPhrase').textContent = itemObject.phrase;
            document.getElementById('inspectMeaning').textContent = itemObject.meaning;
            document.getElementById('inspectSentence').textContent = itemObject.sentence;
            document.getElementById('cardInspectorOverlay').classList.add('active');
            
            // Auto narrate inspection sequence context safely
            setTimeout(() => {
                executeVocalizeStream(`${itemObject.phrase}। अर्थ है, ${itemObject.meaning}। वाक्य प्रयोग, ${itemObject.sentence}`);
            }, 300);
        }

        function closeInspectorCard() {
            document.getElementById('cardInspectorOverlay').classList.remove('active');
            if(soundOutputChannel.speaking) {
                soundOutputChannel.cancel();
            }
        }

        // Speech Synthesis Audio Engine Output Controller Pipeline Mapping
        function triggerSpeech() {
            if (appViewState === 'single') {
                if (!activeSingleItem) return;
                let statement = activeSingleItem.phrase;
                if (singleMatchCompleted) {
                    statement += `। अर्थ है, ${activeSingleItem.meaning}। वाक्य प्रयोग, ${activeSingleItem.sentence}`;
                }
                executeVocalizeStream(statement);
            } else {
                executeVocalizeStream("मुहावरे और अर्थ को आपस में मिलाकर जोड़ियाँ बनाइए।");
            }
        }

        function executeVocalizeStream(textToSpeak) {
            if (!('speechSynthesis' in window)) return;
            
            soundOutputChannel.cancel(); // Terminate concurrent reading outputs streams immediately
            
            const utteranceInstance = new SpeechSynthesisUtterance(textToSpeak);
            utteranceInstance.lang = 'hi-IN';
            utteranceInstance.rate = 0.85; // Calibrated for primary level listeners comprehension indexes
            
            // Attempt allocation of native Hindi audio drivers where available in system profiles
            let availableVoices = soundOutputChannel.getVoices();
            let regionalVoiceNode = availableVoices.find(voice => voice.lang.includes('hi-IN') || voice.lang.includes('hi'));
            if(regionalVoiceNode) {
                utteranceInstance.voice = regionalVoiceNode;
            }

            soundOutputChannel.speak(utteranceInstance);
        }
    </script>
