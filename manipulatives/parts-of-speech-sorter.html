<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Parts of Speech Sorter | Grammar Manipulative</title>
    <meta name="description" content="An interactive Parts of Speech sorting manipulative for primary school students. Learn nouns, verbs, adjectives, and more with dynamic classroom word cards and endless practice modes.">
    <meta name="keywords" content="interactive parts of speech sorter, noun verb adjective game, grammar sorting activity, English grammar manipulative, parts of speech game for kids, primary English learning tool, digital word sorting activity, grammar TLM">
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="Interactive Parts of Speech Sorter | Grammar Learning Manipulative">
    <meta property="og:description" content="A child-friendly digital classroom manipulative to drag, tap, and sort words into correct grammar categories with real-time feedback.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="">

    <style>
        :root {
            --bg-app: #f4f7f9;
            --surface: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --accent: #0ea5e9;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --danger: #ef4444;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --drop-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --font-stack: 'Segoe UI', system-ui, -apple-system, sans-serif;
            
            /* Category Colors for Visual Anchoring */
            --clr-noun: #fecdd3;       --text-noun: #9f1239;
            --clr-pronoun: #fef08a;    --text-pronoun: #854d0e;
            --clr-verb: #bbf7d0;       --text-verb: #166534;
            --clr-adjective: #bfdbfe;  --text-adjective: #1e40af;
            --clr-adverb: #e9d5ff;     --text-adverb: #6b21a8;
            --clr-preposition: #fed7aa;--text-preposition: #9a3412;
            --clr-conjunction: #ccfbf1;--text-conjunction: #115e59;
            --clr-interjection: #fbcfe8;--text-interjection: #9d174d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-app);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Nav Modes Layout */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: var(--surface);
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: var(--card-shadow);
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            transform: translateY(-1px);
            border-color: var(--primary-light);
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Workspace Grid Split */
        .workspace {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* Left Controls Panel */
        .controls-panel {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }

        .panel-section h3 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 5px;
        }

        .toggle-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chip-label {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-app);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            user-select: none;
            transition: background 0.2s;
        }

        .chip-label:hover {
            background: #e2e8f0;
        }

        .chip-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .select-input {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 2px solid #e2e8f0;
            background: var(--surface);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
        }

        .select-input:focus {
            border-color: var(--primary);
        }

        /* Teacher Tools Collapsible */
        .teacher-panel summary {
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 5px 0;
        }

        .teacher-form {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg-app);
            padding: 12px;
            border-radius: var(--radius-sm);
        }

        /* Main Play Area */
        .main-board {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Card Tray Area */
        .tray-container {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            border: 3px dashed var(--primary-light);
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-tray {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        /* Word Cards */
        .word-card {
            background: var(--surface);
            border: 2px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: grab;
            user-select: none;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            text-align: center;
            display: inline-block;
        }

        .word-card:active {
            cursor: grabbing;
        }

        .word-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.3);
            transform: scale(1.05);
        }

        .word-card.correct {
            border-color: var(--success);
            background-color: var(--success-light);
            color: var(--text-verb);
            cursor: default;
        }

        /* Action Controls Tray */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            box-shadow: var(--card-shadow);
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { background: #0284c7; }

        .feedback-banner {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--success);
            min-height: 27px;
        }

        /* Sorting Box Grid Layout */
        .sorting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .sorting-box {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--card-shadow);
            border: 2px solid transparent;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .sorting-box.drag-over {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: scale(1.01);
        }

        .box-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f1f5f9;
        }

        .box-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .box-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        .box-contents {
            flex-grow: 1;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-content: flex-start;
            min-height: 80px;
            border-radius: var(--radius-sm);
            padding: 4px;
        }

        /* Color Customization Variants for Categories */
        .box-noun { border-top: 6px solid var(--text-noun); }
        .box-noun .box-title { color: var(--text-noun); }
        .box-pronoun { border-top: 6px solid var(--text-pronoun); }
        .box-pronoun .box-title { color: var(--text-pronoun); }
        .box-verb { border-top: 6px solid var(--text-verb); }
        .box-verb .box-title { color: var(--text-verb); }
        .box-adjective { border-top: 6px solid var(--text-adjective); }
        .box-adjective .box-title { color: var(--text-adjective); }
        .box-adverb { border-top: 6px solid var(--text-adverb); }
        .box-adverb .box-title { color: var(--text-adverb); }
        .box-preposition { border-top: 6px solid var(--text-preposition); }
        .box-preposition .box-title { color: var(--text-preposition); }
        .box-conjunction { border-top: 6px solid var(--text-conjunction); }
        .box-conjunction .box-title { color: var(--text-conjunction); }
        .box-interjection { border-top: 6px solid var(--text-interjection); }
        .box-interjection .box-title { color: var(--text-interjection); }

        /* Highlight state for progressive hints */
        .box-highlight {
            animation: pulse-border 1s infinite alternate;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 2px #cbd5e1; }
            100% { box-shadow: 0 0 0 6px var(--warning); }
        }

        /* Feedback overlays/animations */
        .incorrect-shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Utility classes */
        .hidden { display: none !important; }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Parts of Speech Sorter</h1>
            <p>Drag, tap, and classify words into their correct grammar homes!</p>
        </header>

        <!-- Main Mode Switcher Navigation -->
        <nav class="mode-selector" role="tablist" aria-label="Learning Modes">
            <button class="mode-btn active" data-mode="learn" role="tab" aria-selected="true">🎓 Learn & Sort</button>
            <button class="mode-btn" data-mode="quick" role="tab" aria-selected="false">⚡ Quick Sort</button>
            <button class="mode-btn" data-mode="endless" role="tab" aria-selected="false">🔄 Endless Practice</button>
        </nav>

        <div class="workspace">
            
            <!-- Side Control Dashboard -->
            <aside class="controls-panel">
                
                <div class="panel-section" id="config-difficulty">
                    <h3>⭐ Difficulty</h3>
                    <select id="difficulty-select" class="select-input" aria-label="Select Difficulty Level">
                        <option value="easy">Easy (Concrete Words)</option>
                        <option value="medium">Medium (More Variety)</option>
                        <option value="challenge">Challenge (Advanced)</option>
                    </select>
                </div>

                <div class="panel-section" id="config-categories">
                    <h3>⚙️ Active Categories</h3>
                    <div class="toggle-grid" id="category-toggles">
                        <!-- Toggles dynamically generated by setup -->
                    </div>
                </div>

                <div class="panel-section">
                    <h3>🛠️ System Rules</h3>
                    <label class="chip-label">
                        <input type="checkbox" id="toggle-instant-feedback">
                        <span>Instant Feedback</span>
                    </label>
                </div>

                <!-- Teacher Custom Configuration Tools Box -->
                <details class="teacher-panel">
                    <summary>🔒 Teacher Custom Words</summary>
                    <div class="teacher-form">
                        <input type="text" id="custom-word" class="select-input" placeholder="e.g., spaceship" aria-label="Custom word text">
                        <select id="custom-pos" class="select-input" aria-label="Custom word parts of speech category">
                            <option value="nouns">Noun</option>
                            <option value="verbs">Verb</option>
                            <option value="adjectives">Adjective</option>
                            <option value="adverbs">Adverb</option>
                            <option value="pronouns">Pronoun</option>
                            <option value="prepositions">Preposition</option>
                            <option value="conjunctions">Conjunction</option>
                            <option value="interjections">Interjection</option>
                        </select>
                        <button type="button" id="btn-add-custom" class="action-btn btn-primary" style="padding: 6px; justify-content: center; font-size: 0.9rem;">Add Word</button>
                        <button type="button" id="btn-clear-custom" class="action-btn btn-secondary" style="padding: 6px; justify-content: center; font-size: 0.9rem;">Clear Custom</button>
                    </div>
                </details>
            </aside>

            <!-- Main Interactive Manipulative Sandbox Layout -->
            <main class="main-board">
                
                <!-- Card Display Tray Box Container -->
                <section class="tray-container" aria-label="Word Sorting Tray">
                    <div id="tray-content" class="card-tray">
                        <!-- Word Cards Loaded Here Dynamically -->
                    </div>
                </section>

                <!-- Board Auxiliary Feedback Action Rows -->
                <section class="action-row">
                    <div class="feedback-banner" id="game-feedback-text" role="status" aria-live="polite"></div>
                    <div class="btn-group">
                        <button class="action-btn btn-secondary" id="btn-hint">💡 Hint</button>
                        <button class="action-btn btn-secondary" id="btn-reset">🔄 Reset</button>
                        <button class="action-btn btn-accent" id="btn-check">✔️ Check Sorting</button>
                        <button class="action-btn btn-primary hidden" id="btn-next">➡️ Next Round</button>
                    </div>
                </section>

                <!-- Interactive Drop Zone Category Target Boxes -->
                <section class="sorting-grid" id="sorting-grid-boxes" aria-label="Grammar Category Target Boxes">
                    <!-- Target Boxes Injected via Javascript Render Cycles -->
                </section>
            </main>
        </div>
    </div>

    <script>
        /**
         * Real Classroom Parts of Speech Sorting Manipulative Logic Core Engine
         */

        // Unambiguous Core Educational Vocabulary Banks Optimized By Difficulty Tier
        const partsOfSpeechData = {
            nouns: {
                easy: ['cat', 'school', 'pencil', 'dog', 'apple', 'teacher', 'river', 'garden', 'ball', 'tiger'],
                medium: ['enormous', 'whisper', 'blanket', 'shadow', 'library', 'astronaut', 'kitchen', 'laughter', 'feather', 'village'],
                challenge: ['justice', 'strategy', 'foundation', 'patience', 'orchestra', 'illusion', 'horizon', 'ecosystem', 'velocity', 'boundary']
            },
            verbs: {
                easy: ['run', 'jump', 'swim', 'read', 'write', 'sing', 'dance', 'fly', 'eat', 'sleep'],
                medium: ['whisper', 'scamper', 'explore', 'create', 'ponder', 'wriggle', 'shout', 'bounce', 'gather', 'twirl'],
                challenge: ['accelerate', 'flourish', 'contradict', 'navigate', 'transform', 'investigate', 'dissolve', 'analyze', 'originate']
            },
            adjectives: {
                easy: ['big', 'small', 'happy', 'sad', 'red', 'blue', 'tall', 'short', 'funny', 'bright'],
                medium: ['enormous', 'beautiful', 'careful', 'friendly', 'ancient', 'sparkling', 'clumsy', 'gentle', 'brave', 'chilly'],
                challenge: ['conspicuous', 'monumental', 'intricate', 'ambiguous', 'hazardous', 'prosperous', 'reputable', 'diligent']
            },
            adverbs: {
                easy: ['quickly', 'slowly', 'loudly', 'softly', 'happily', 'neatly', 'quietly', 'carefully', 'today', 'soon'],
                medium: ['suddenly', 'bravely', 'eagerly', 'patiently', 'cheerfully', 'gracefully', 'wildly', 'instantly', 'politely'],
                challenge: ['deliberately', 'reluctants', 'consequently', 'simultaneously', 'exclusively', 'spontaneously', 'inevitably']
            },
            pronouns: {
                easy: ['I', 'you', 'he', 'she', 'it', 'we', 'they'],
                medium: ['me', 'him', 'her', 'us', 'them', 'my', 'your', 'our'],
                challenge: ['myself', 'himself', 'themselves', 'someone', 'anyone', 'everyone', 'nobody']
            },
            prepositions: {
                easy: ['in', 'on', 'under', 'behind', 'near', 'beside', 'between', 'over', 'at', 'by'],
                medium: ['through', 'across', 'against', 'towards', 'inside', 'outside', 'during', 'before', 'after'],
                challenge: ['throughout', 'underneath', 'beneath', 'amidst', 'concerning', 'despite', 'regarding']
            },
            conjunctions: {
                easy: ['and', 'but', 'or', 'so', 'because'],
                medium: ['when', 'if', 'while', 'since', 'until', 'before', 'after'],
                challenge: ['although', 'unless', 'whereas', 'provided', 'whenever', 'wherever', 'therefore']
            },
            interjections: {
                easy: ['wow', 'oh', 'oops', 'ouch', 'yay'],
                medium: ['hurray', 'bravo', 'alas', 'ahoy', 'yikes', 'hello'],
                challenge: ['eureka', 'behold', 'goodness', 'nonsense', 'astonishing']
            }
        };

        // Structural UI Manifest Meta Definitions
        const categoryMeta = {
            nouns: { label: "Noun", desc: "Naming Word", class: "box-noun" },
            pronouns: { label: "Pronoun", desc: "Replaces Noun", class: "box-pronoun" },
            verbs: { label: "Verb", desc: "Action Word", class: "box-verb" },
            adjectives: { label: "Adjective", desc: "Describing Word", class: "box-adjective" },
            adverbs: { label: "Adverb", desc: "Tells How/When", class: "box-adverb" },
            prepositions: { label: "Preposition", desc: "Shows Position", class: "box-preposition" },
            conjunctions: { label: "Conjunction", desc: "Joining Word", class: "box-conjunction" },
            interjections: { label: "Interjection", desc: "Shows Feeling", class: "box-interjection" }
        };

        const praiseMessages = ["Great Sorting!", "Well Done!", "Excellent!", "Perfect Match!", "Grammar Star!", "Wonderful Work!", "Great Thinking!"];

        // Unified Global Application State Engine Management
        let state = {
            currentMode: 'learn', // learn | quick | endless
            difficulty: 'easy',
            activeCategories: ['nouns', 'verbs', 'adjectives'],
            historyBag: [], // Tracks recently used items across rounds to avoid rapid repeating cycles
            currentWords: [], // Array of operational item objects in the current playground session
            selectedCardElement: null, // Tracks pointer tap-to-select instances
            hintProgress: 0, // Click tier counter for tracking guided remediation steps
            customWords: {
                nouns: [], pronouns: [], verbs: [], adjectives: [],
                adverbs: [], prepositions: [], conjunctions: [], interjections: []
            }
        };

        // Cache DOM Hook Targets
        const trayContent = document.getElementById('tray-content');
        const sortingGridBoxes = document.getElementById('sorting-grid-boxes');
        const feedbackText = document.getElementById('game-feedback-text');
        const categoryTogglesContainer = document.getElementById('category-toggles');
        const difficultySelect = document.getElementById('difficulty-select');
        const instantFeedbackCheckbox = document.getElementById('toggle-instant-feedback');

        // Action Buttons Setup References
        const btnHint = document.getElementById('btn-hint');
        const btnReset = document.getElementById('btn-reset');
        const btnCheck = document.getElementById('btn-check');
        const btnNext = document.getElementById('btn-next');

        /**
         * Initialize App Components & Setup Listeners
         */
        window.addEventListener('DOMContentLoaded', () => {
            initCategoryToggles();
            setupGlobalEventListeners();
            switchMode('learn');
        });

        function initCategoryToggles() {
            categoryTogglesContainer.innerHTML = '';
            Object.keys(categoryMeta).forEach(key => {
                const label = document.createElement('label');
                label.className = 'chip-label';
                
                const checked = state.activeCategories.includes(key) ? 'checked' : '';
                label.innerHTML = `
                    <input type="checkbox" data-cat="${key}" ${checked}>
                    <span>${categoryMeta[key].label}</span>
                `;
                categoryTogglesContainer.appendChild(label);
            });
        }

        function setupGlobalEventListeners() {
            // Mode buttons navigation routing
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.mode-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    e.target.classList.add('active');
                    e.target.setAttribute('aria-selected', 'true');
                    switchMode(e.target.getAttribute('data-mode'));
                });
            });

            // Active category dynamic selection rules
            categoryTogglesContainer.addEventListener('change', (e) => {
                if (e.target.hasAttribute('data-cat')) {
                    const cat = e.target.getAttribute('data-cat');
                    if (e.target.checked) {
                        if (!state.activeCategories.includes(cat)) state.activeCategories.push(cat);
                    } else {
                        if (state.activeCategories.length > 2) {
                            state.activeCategories = state.activeCategories.filter(c => c !== cat);
                        } else {
                            e.target.checked = true; // Force preserve minimum 2 checked buckets
                            showFeedback("Keep at least two categories active!", false);
                        }
                    }
                    renderSortingBoxes();
                    regenerateRound();
                }
            });

            // Parameter Change Trigger Actions
            difficultySelect.addEventListener('change', (e) => {
                state.difficulty = e.target.value;
                regenerateRound();
            });

            // Action Buttons Workflow Wiring
            btnCheck.addEventListener('click', checkRoundSorting);
            btnReset.addEventListener('click', resetCurrentRound);
            btnNext.addEventListener('click', () => {
                regenerateRound();
                btnNext.classList.add('hidden');
                btnCheck.classList.remove('hidden');
            });
            btnHint.addEventListener('click', triggerProgressiveHint);

            // Setup Custom Teacher Tools Engine Submission Paths
            document.getElementById('btn-add-custom').addEventListener('click', () => {
                const wordInput = document.getElementById('custom-word');
                const posSelect = document.getElementById('custom-pos');
                const word = wordInput.value.trim().toLowerCase();
                if (word) {
                    state.customWords[posSelect.value].push(word);
                    wordInput.value = '';
                    showFeedback(`Added "${word}" to custom list!`, true);
                    // Automatically include category into view if not present
                    if (!state.activeCategories.includes(posSelect.value)) {
                        state.activeCategories.push(posSelect.value);
                        initCategoryToggles();
                        renderSortingBoxes();
                    }
                    regenerateRound();
                }
            });

            document.getElementById('btn-clear-custom').addEventListener('click', () => {
                Object.keys(state.customWords).forEach(k => state.customWords[k] = []);
                showFeedback("Custom teacher words cleared.", true);
                regenerateRound();
            });

            // Handle Desktop Global Drop Interceptors to avoid breaking components during drops
            document.addEventListener('dragover', (e) => e.preventDefault());
        }

        /**
         * State Router Configuration
         */
        function switchMode(mode) {
            state.currentMode = mode;
            state.hintProgress = 0;
            clearFeedback();
            
            // Adjust panel configuration setups to optimize UI depending on target mode
            const catSection = document.getElementById('config-categories');
            const diffSection = document.getElementById('config-difficulty');

            btnNext.classList.add('hidden');
            btnCheck.classList.remove('hidden');

            if (mode === 'learn') {
                state.activeCategories = ['nouns', 'verbs', 'adjectives'];
                state.difficulty = 'easy';
                difficultySelect.value = 'easy';
                catSection.classList.remove('hidden');
                diffSection.classList.add('hidden'); // Fixed learning progression track
                initCategoryToggles();
            } else if (mode === 'quick') {
                catSection.classList.remove('hidden');
                diffSection.classList.remove('hidden');
            } else if (mode === 'endless') {
                catSection.classList.remove('hidden');
                diffSection.classList.remove('hidden');
            }

            renderSortingBoxes();
            regenerateRound();
        }

        /**
         * Shuffle Bag Implementation Engine logic ensuring historical distance tracking
         */
        function getSafeItemsFromPool(count) {
            let combinedPool = [];

            // Word Sorter Pipeline building
            state.activeCategories.forEach(cat => {
                const baseWords = partsOfSpeechData[cat][state.difficulty] || [];
                const teacherWords = state.customWords[cat] || [];
                const fullPool = [...baseWords, ...teacherWords];

                fullPool.forEach(w => {
                    combinedPool.push({ word: w, category: cat });
                });
            });

            // Filter out elements residing inside history safety buffer
            let validPool = combinedPool.filter(item => !state.historyBag.includes(item.word));
            if (validPool.length < count) {
                // Flush tracking bag if exhausted or pool configuration requires repeats
                state.historyBag = state.historyBag.filter(w => !combinedPool.some(cp => cp.word === w));
                validPool = combinedPool;
            }

            // Shuffle valid pool elements
            validPool.sort(() => Math.random() - 0.5);
            const selection = validPool.slice(0, Math.min(count, validPool.length));
            
            // Push output tokens into history buffer tracks
            selection.forEach(item => state.historyBag.push(item.word));
            if (state.historyBag.length > 30) state.historyBag.shift();

            return selection.map((item, idx) => ({
                id: `word-${idx}-${Date.now()}`,
                word: item.word,
                displayText: item.word,
                correctCategory: item.category,
                hint: null,
                userPlacedIn: null
            }));
        }

        /**
         * Core Round Building Framework Lifecycle
         */
        function regenerateRound() {
            clearFeedback();
            state.hintProgress = 0;
            state.selectedCardElement = null;
            removeBoxHighlights();

            let targetCardCount = 6;
            if (state.currentMode === 'quick') targetCardCount = 1;
            else if (state.currentMode === 'endless') {
                if (state.difficulty === 'easy') targetCardCount = 6;
                else if (state.difficulty === 'medium') targetCardCount = 10;
                else targetCardCount = 14;
            }

            state.currentWords = getSafeItemsFromPool(targetCardCount);

            renderWordCardsTray();
            updateSortingBoxesCounters();
        }

        /**
         * Component Rendering UI Layers
         */
        function renderSortingBoxes() {
            sortingGridBoxes.innerHTML = '';
            
            // Sort boxes sequence to make it reproducible across actions
            const sortedKeys = Object.keys(categoryMeta).filter(k => state.activeCategories.includes(k));
            
            sortedKeys.forEach(key => {
                const data = categoryMeta[key];
                const box = document.createElement('div');
                box.className = `sorting-box ${data.class}`;
                box.setAttribute('data-category', key);
                box.setAttribute('role', 'dropzone');
                box.setAttribute('aria-label', `${data.label} container zone`);

                box.innerHTML = `
                    <div class="box-header">
                        <span class="box-title">${data.label}</span>
                        <span class="box-desc">${data.desc}</span>
                    </div>
                    <div class="box-contents" data-box-dir="${key}"></div>
                `;

                // Wire Container Events for Drop Targets
                box.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    box.classList.add('drag-over');
                });

                box.addEventListener('dragleave', () => {
                    box.classList.remove('drag-over');
                });

                box.addEventListener('drop', (e) => {
                    e.preventDefault();
                    box.classList.remove('drag-over');
                    const cardId = e.dataTransfer.getData('text/plain');
                    handleCardPlacement(cardId, key);
                });

                // Tap-to-place click handler setup for mobile/smartboards
                box.addEventListener('click', () => {
                    if (state.selectedCardElement) {
                        const cardId = state.selectedCardElement.getAttribute('data-card-id');
                        handleCardPlacement(cardId, key);
                    }
                });

                sortingGridBoxes.appendChild(box);
            });
        }

        function renderWordCardsTray() {
            trayContent.innerHTML = '';

            // Word Card Rendering Standard Pipeline Flow
            const trayWrapper = document.createElement('div');
            trayWrapper.className = 'card-tray';

            state.currentWords.forEach(item => {
                if (item.userPlacedIn === null) {
                    const card = document.createElement('div');
                    card.className = 'word-card';
                    card.textContent = item.displayText;
                    setupCardInteractionBindings(card, item.id);
                    trayWrapper.appendChild(card);
                }
            });
            trayContent.appendChild(trayWrapper);
        }

        function setupCardInteractionBindings(element, cardId) {
            element.setAttribute('data-card-id', cardId);
            element.setAttribute('draggable', 'true');
            element.setAttribute('role', 'button');
            element.setAttribute('tabindex', '0');

            // Accessibility operational hooks
            const wordData = state.currentWords.find(w => w.id === cardId);
            if (wordData && wordData.isCorrect) {
                element.classList.add('correct');
                element.setAttribute('draggable', 'false');
                return; // freeze mutations on locked verified components
            }

            // HTML5 Drag Event Bindings
            element.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', cardId);
                element.classList.add('selected');
                state.selectedCardElement = element;
            });

            element.addEventListener('dragend', () => {
                element.classList.remove('selected');
            });

            // Tap/Click Hybrid Action Implementations
            element.addEventListener('click', (e) => {
                e.stopPropagation(); // Avoid instant clearing conditions
                if (state.selectedCardElement) {
                    state.selectedCardElement.classList.remove('selected');
                }
                
                if (state.selectedCardElement === element) {
                    state.selectedCardElement = null; // Toggle off if clicked twice
                } else {
                    state.selectedCardElement = element;
                    element.classList.add('selected');
                }
            });

            // Support Keyboard Native Spaces/Enter fires
            element.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    element.click();
                }
            });
        }

        /**
         * State Mutation & Rule Processing Mechanics
         */
        function handleCardPlacement(cardId, targetCategory) {
            const wordItem = state.currentWords.find(w => w.id === cardId);
            if (!wordItem) return;

            // De-select current element configuration references
            if (state.selectedCardElement) {
                state.selectedCardElement.classList.remove('selected');
                state.selectedCardElement = null;
            }

            if (instantFeedbackCheckbox.checked) {
                // INSTANT FEEDBACK EVALUATION PIPELINE RULE EXECUTION
                if (wordItem.correctCategory === targetCategory) {
                    wordItem.userPlacedIn = targetCategory;
                    wordItem.isCorrect = true;
                    showFeedback(getRandomPraise(), true);
                    
                    if (state.currentMode === 'quick') {
                        executeSingleItemAutoAdvance();
                    } else {
                        animateCardIntoBox(cardId, targetCategory);
                        checkAutoRoundCompletion();
                    }
                } else {
                    showFeedback("Try placing that one again!", false);
                    triggerBoxShakeEffect(targetCategory);
                }
            } else {
                // STANDARD BATCH CHECKING PIPELINE RULE EXECUTION
                wordItem.userPlacedIn = targetCategory;
                animateCardIntoBox(cardId, targetCategory);
            }
            updateSortingBoxesCounters();
        }

        function animateCardIntoBox(cardId, categoryKey) {
            const wordItem = state.currentWords.find(w => w.id === cardId);
            const targetContainer = document.querySelector(`[data-box-dir="${categoryKey}"]`);
            if (!targetContainer) return;

            // Clear card if already existing inside another DOM branch node
            const existingDOMNode = document.querySelector(`[data-card-id="${cardId}"]`);
            if (existingDOMNode) existingDOMNode.remove();

            const card = document.createElement('div');
            card.className = 'word-card';
            card.textContent = wordItem.displayText;
            if (wordItem.isCorrect) card.classList.add('correct');
            
            // Wire card container reference data to allow shifting cards out of box directly back onto other boxes
            setupCardInteractionBindings(card, cardId);

            // Allow returning elements back to central tray upon directly tapping word inside targeted category boxes
            card.addEventListener('dblclick', () => {
                wordItem.userPlacedIn = null;
                renderWordCardsTray();
                card.remove();
                updateSortingBoxesCounters();
            });

            targetContainer.appendChild(card);
            
            // Clean up visual artifact trails left over across original master array slots
            renderWordCardsTray();
        }

        function updateSortingBoxesCounters() {
            // Accessible summary reporting logic update step
            Object.keys(categoryMeta).forEach(cat => {
                const container = document.querySelector(`[data-box-dir="${cat}"]`);
                if (container) {
                    const count = state.currentWords.filter(w => w.userPlacedIn === cat).length;
                    const header = container.parentElement.querySelector('.box-title');
                    // Strip old counter tracking segments
                    const cleanLabel = header.textContent.replace(/\s\(\d+\)/g, '');
                    header.textContent = count > 0 ? `${cleanLabel} (${count})` : cleanLabel;
                }
            });
        }

        /**
         * Interactive Batch Verification Process Operations
         */
        function checkRoundSorting() {
            let allPlaced = state.currentWords.every(w => w.userPlacedIn !== null);
            if (!allPlaced && state.currentMode !== 'quick') {
                showFeedback("Place all cards before checking your work!", false);
                return;
            }

            let perfectRound = true;
            state.currentWords.forEach(item => {
                if (item.userPlacedIn === item.correctCategory) {
                    item.isCorrect = true;
                    // Find DOM instance node element and add matching theme classes
                    const node = document.querySelector(`[data-card-id="${item.id}"]`);
                    if (node) {
                        node.classList.add('correct');
                        node.setAttribute('draggable', 'false');
                    }
                } else {
                    perfectRound = false;
                    item.isCorrect = false;
                    item.userPlacedIn = null; // Kick item out from invalid slots back into the master pool tray array
                    
                    // Trigger visual shake alerts on faulty container targets
                    if(item.userPlacedIn) triggerBoxShakeEffect(item.userPlacedIn);
                }
            });

            // Re-render interfaces to synchronize positions
            renderWordCardsTray();
            
            // Re-map elements that survived verified passing filtering safely inside target tracks
            state.currentWords.forEach(item => {
                if (item.isCorrect && item.userPlacedIn) {
                    animateCardIntoBox(item.id, item.userPlacedIn);
                }
            });

            updateSortingBoxesCounters();

            if (perfectRound) {
                showFeedback(getRandomPraise(), true);
                btnCheck.classList.add('hidden');
                btnNext.classList.remove('hidden');
            } else {
                showFeedback("Some cards returned to the tray. Try these cards again!", false);
            }
        }

        function checkAutoRoundCompletion() {
            const finished = state.currentWords.every(w => w.isCorrect);
            if (finished) {
                showFeedback(getRandomPraise(), true);
                btnCheck.classList.add('hidden');
                btnNext.classList.remove('hidden');
            }
        }

        function executeSingleItemAutoAdvance() {
            setTimeout(() => {
                regenerateRound();
            }, 1200);
        }

        function resetCurrentRound() {
            state.currentWords.forEach(w => {
                w.userPlacedIn = null;
                w.isCorrect = false;
            });
            renderSortingBoxes();
            renderWordCardsTray();
            clearFeedback();
            removeBoxHighlights();
            state.hintProgress = 0;
            btnNext.classList.add('hidden');
            btnCheck.classList.remove('hidden');
        }

        /**
         * Progressive Context Remediation Hint System Infrastructure
         */
        function triggerProgressiveHint() {
            // Locate target active evaluation token reference candidate elements
            const activeUnsolvedItem = state.currentWords.find(w => !w.isCorrect);
            if (!activeUnsolvedItem) return;

            state.hintProgress++;
            removeBoxHighlights();

            const correctCat = activeUnsolvedItem.correctCategory;
            const targetBox = document.querySelector(`[data-category="${correctCat}"]`);

            // Word Sorter Hint States
            const shortDef = categoryMeta[correctCat].desc;
            
            if (state.hintProgress === 1) {
                showFeedback(`"${activeUnsolvedItem.word}" fits the role of a: ${shortDef}`, true);
            } else if (state.hintProgress === 2) {
                // Highlight real target box container plus one alternative distracter tracking path
                if (targetBox) targetBox.classList.add('box-highlight');
                const standardKeys = state.activeCategories.filter(k => k !== correctCat);
                if (standardKeys.length > 0) {
                    const randomDistracterBox = document.querySelector(`[data-category="${standardKeys[0]}"]`);
                    if (randomDistracterBox) randomDistracterBox.classList.add('box-highlight');
                }
                showFeedback(`It's down to these two options!`, true);
            } else {
                if (targetBox) targetBox.classList.add('box-highlight');
                showFeedback(`The correct box is highlighted!`, true);
            }
        }

        function removeBoxHighlights() {
            document.querySelectorAll('.sorting-box').forEach(box => {
                box.classList.remove('box-highlight');
            });
        }

        /**
         * Animation and Effects Helpers
         */
        function triggerBoxShakeEffect(categoryKey) {
            const targetBox = document.querySelector(`[data-category="${categoryKey}"]`);
            if (targetBox) {
                targetBox.classList.add('incorrect-shake');
                setTimeout(() => {
                    targetBox.classList.remove('incorrect-shake');
                }, 400);
            }
        }

        function showFeedback(text, isPositive) {
            feedbackText.textContent = text;
            feedbackText.style.color = isPositive ? 'var(--success)' : 'var(--danger)';
        }

        function clearFeedback() {
            feedbackText.textContent = '';
        }

        function getRandomPraise() {
            return praiseMessages[Math.floor(Math.random() * praiseMessages.length)];
        }
    </script>
</body>
