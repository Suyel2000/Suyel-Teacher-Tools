<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पर्यायवाची शब्द - Interactive Hindi Vocabulary Manipulative</title>
    <meta name="description" content="Explore and learn Hindi synonyms (पर्यायवाची शब्द) with this interactive classroom manipulative. Perfect for smart-boards, teacher demonstrations, and primary students.">
    <meta name="keywords" content="पर्यायवाची शब्द, Paryayvachi Shabd, Hindi synonyms for kids, समान अर्थ वाले शब्द, पर्यायवाची शब्द activity, interactive Hindi vocabulary tool, Hindi TLM">
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="पर्यायवाची शब्द - Interactive Hindi Vocabulary Manipulative">
    <meta property="og:description" content="A clean, child-friendly digital classroom manipulative for sorting, grouping, and exploring Hindi synonyms.">
    <meta property="og:type" content="website">

    <!-- Google Font for accurate Devanagari rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #fcfaf7;
            --bg-card: #ffffff;
            --text-primary: #2d3748;
            --text-muted: #718096;
            --color-brand: #4a5568;
            --color-accent: #319795;
            --color-accent-light: #e6fffa;
            --color-success: #2f855a;
            --color-success-light: #f0fff4;
            --border-radius-card: 14px;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 10px rgba(0,0,0,0.08);
            --shadow-hover: 0 6px 14px rgba(0,0,0,0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans Devanagari', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        header {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto 15px auto;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            color: #1a202c;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* Top Bar Configuration Controls */
        .config-panel {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto 20px auto;
            background: var(--bg-card);
            padding: 15px;
            border-radius: var(--border-radius-card);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .teacher-prompt-zone {
            flex: 1;
            min-width: 280px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .teacher-label {
            font-weight: 700;
            color: var(--color-brand);
            white-space: nowrap;
        }

        .teacher-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-primary);
            background-color: #f7fafc;
        }

        .category-filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #edf2f7;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--color-brand);
            color: white;
        }

        /* Mode Selector Tab Bar */
        .mode-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-tab {
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: 500;
            border: 2px solid #e2e8f0;
            background: var(--bg-card);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-tab.active {
            background-color: var(--color-accent-light);
            border-color: var(--color-accent);
            color: var(--color-accent);
            font-weight: 700;
        }

        /* Workspace Core Layout */
        .workspace {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* View State Management */
        .view-section {
            display: none;
            flex-direction: column;
            gap: 25px;
        }

        .view-section.active {
            display: flex;
        }

        /* Single Mode Layout */
        .mat-container {
            background: #ffffff;
            border: 3px dashed #cbd5e0;
            border-radius: 20px;
            padding: 30px;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background-color 0.3s;
        }

        .mat-title {
            position: absolute;
            top: 12px;
            left: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .mat-completion-status {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .main-anchor-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .main-word-card {
            background: #edf2f7;
            border: 2px solid #cbd5e0;
            padding: 14px 35px;
            border-radius: var(--border-radius-card);
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a202c;
            box-shadow: var(--shadow-sm);
            text-align: center;
            min-width: 160px;
        }

        .cluster-arrow {
            font-size: 1.5rem;
            color: var(--text-muted);
            user-select: none;
        }

        .synonym-drop-zone {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 70px;
            width: 100%;
            padding: 10px;
        }

        /* Movable Cards Design */
        .word-tray {
            background: #edf2f7;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        .word-card {
            background: var(--bg-card);
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: var(--border-radius-card);
            font-size: 1.4rem;
            font-weight: 500;
            cursor: grab;
            user-select: none;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            text-align: center;
            line-height: 1.5;
            display: inline-block;
            touch-action: manipulation;
        }

        .word-card:active {
            cursor: grabbing;
        }

        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .word-card.selected-fallback {
            border: 3px solid var(--color-accent);
            background-color: var(--color-accent-light);
        }

        /* Feedback styling */
        .feedback-message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            min-height: 30px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .feedback-success {
            color: var(--color-success);
            font-weight: 700;
        }

        /* Context Sentence Feature */
        .context-sentence-box {
            background: var(--color-success-light);
            border: 1px solid #c6f6d5;
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.3rem;
            color: #22543d;
            display: none;
        }

        /* Multi-Group Board Layout */
        .board-size-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .size-btn {
            background: var(--bg-card);
            border: 1px solid #cbd5e0;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .size-btn.active {
            background: var(--color-brand);
            color: white;
            border-color: var(--color-brand);
        }

        .multi-group-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .group-column-bin {
            background: var(--bg-card);
            border: 2px dashed #cbd5e0;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 280px;
            align-items: center;
        }

        .group-column-bin.drag-over {
            border-color: var(--color-accent);
            background-color: #f0fff4;
        }

        .column-anchor-header {
            background: #edf2f7;
            border-bottom: 2px solid #e2e8f0;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: 700;
            width: 100%;
            text-align: center;
        }

        .column-drop-target {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: flex-start;
            min-height: 180px;
        }

        /* Saved Collections Bin */
        .collection-section {
            background: var(--bg-card);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px 20px;
            box-shadow: var(--shadow-sm);
        }

        .collection-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .collection-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .collection-item {
            padding: 6px 12px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .collection-item:hover {
            background: #edf2f7;
        }

        /* Persistent Action Controls Footer */
        .control-action-bar {
            max-width: 1100px;
            width: 100%;
            margin: 20px auto 0 auto;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .btn-control {
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--color-accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: #287e7c;
        }

        .btn-secondary {
            background-color: #edf2f7;
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        /* Responsive Adapters */
        @media (max-width: 768px) {
            .multi-group-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
            .word-card {
                font-size: 1.2rem;
                padding: 10px 18px;
            }
            .main-word-card {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>पर्यायवाची शब्द अभ्यास पत्र</h1>
        <div class="subtitle">समान अर्थ वाले शब्द खोजें, मिलाएँ और अपना शब्द समूह बनाएँ</div>
    </header>

    <!-- Config & Teacher Prompt Board -->
    <div class="config-panel">
        <div class="teacher-prompt-zone">
            <span class="teacher-label">आज का अभ्यास:</span>
            <input type="text" class="teacher-input" id="teacherPrompt" value="इसके समान अर्थ वाले शब्द खोजो और समूह पूरा करो।">
        </div>
        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn active" data-category="सभी">सभी</button>
            <button class="filter-btn" data-category="प्रकृति">प्रकृति</button>
            <button class="filter-btn" data-category="व्यक्ति">व्यक्ति</button>
            <button class="filter-btn" data-category="स्थान">स्थान</button>
            <button class="filter-btn" data-category="भावना">भावना</button>
            <button class="filter-btn" data-category="वस्तु">वस्तु</button>
        </div>
    </div>

    <!-- Central Workspace Mode Toggles -->
    <div class="mode-container">
        <button class="mode-tab active" id="modeSingleBtn" onclick="switchMode('single')">मुख्य शब्द अभ्यास</button>
        <button class="mode-tab" id="modeBoardBtn" onclick="switchMode('board')">समूह बोर्ड (वर्गीकरण)</button>
    </div>

    <!-- Main Dynamic Workspace Structure -->
    <div class="workspace">
        
        <!-- VIEW 1: SINGLE WORD MATCHING MAT MODE -->
        <div id="viewSingle" class="view-section active">
            <div class="mat-container" id="singleDropMat">
                <div class="mat-title">पर्यायवाची शब्द समूह मैट</div>
                <div class="mat-completion-status" id="completionStatus">0 / 0 शब्द मिले</div>
                
                <div class="main-anchor-cluster">
                    <div class="main-word-card" id="mainWordDisplay">---</div>
                    <div class="cluster-arrow">↓</div>
                    <div class="synonym-drop-zone" id="matchedSynonymsZone">
                        <!-- Correct dropped cards land here -->
                    </div>
                </div>
            </div>

            <div class="feedback-message" id="singleFeedback"></div>
            <div class="context-sentence-box" id="contextSentenceDisplay"></div>
        </div>

        <!-- VIEW 2: MULTI-GROUP SORTING BOARD MODE -->
        <div id="viewBoard" class="view-section">
            <div class="board-size-selector">
                <button class="size-btn" onclick="changeBoardSize(2)" id="sizeBtn2">2 समूह</button>
                <button class="size-btn active" onclick="changeBoardSize(3)" id="sizeBtn3">3 समूह</button>
                <button class="size-btn" onclick="changeBoardSize(4)" id="sizeBtn4">4 समूह</button>
            </div>

            <div class="multi-group-grid" id="multiGroupGridLayout">
                <!-- Group Columns generated dynamically -->
            </div>

            <div class="feedback-message" id="boardFeedback"></div>
        </div>

        <!-- SHARED SYSTEM: Movable Candidate Card Tray -->
        <div class="word-tray" id="candidateTrayZone">
            <!-- Movable Cards go here -->
        </div>

        <!-- SHARED SYSTEM: My Words History Log -->
        <div class="collection-section">
            <div class="collection-title">मेरे शब्द समूह (History)</div>
            <div class="collection-list" id="historyLogCollection">
                <!-- Completed sets appear here -->
            </div>
        </div>

    </div>

    <!-- Fixed Core Control Interactions -->
    <div class="control-action-bar">
        <div style="display: flex; gap: 10px;">
            <button class="btn-control btn-secondary" onclick="triggerAudioSynthesis()">🔊 सुनें</button>
            <button class="btn-control btn-secondary" onclick="clearCurrentWorkspace()">साफ करें</button>
        </div>
        <button class="btn-control btn-primary" onclick="loadNextSessionSet()">नया शब्द / बोर्ड →</button>
    </div>

    <script>
        // Large verified primary educational level database
        const paryayvachiDatabase = [
            { mainWord: "सूर्य", synonyms: ["सूरज", "रви", "दिनकर", "भानु"], category: "प्रकृति", context: "सूर्य पूर्व दिशा से निकलता है और संसार को प्रकाश देता है।" },
            { mainWord: "जल", synonyms: ["पानी", "नीर", "वारि"], category: "प्रकृति", context: "जल ही जीवन है, हमें इसका संरक्षण करना चाहिए।" },
            { mainWord: "वन", synonyms: ["जंगल", "कानन"], category: "प्रकृति", context: "वन में अनेक प्रकार के पेड़-पौधे और जंगली पशु रहते हैं।" },
            { mainWord: "चंद्रमा", synonyms: ["चाँद", "शशि", "इंदु"], category: "प्रकृति", context: "रात में चंद्रमा अपनी शीतल चाँदनी बिखेरता है।" },
            { mainWord: "पृथ्वी", synonyms: ["धरती", "भूमि", "धरा"], category: "प्रकृति", context: "पृथ्वी हमारा घर है जो हमें जीवन का आधार देती है।" },
            { mainWord: "आकाश", synonyms: ["गगन", "नभ", "आसमान"], category: "प्रकृति", context: "नीले आकाश में पक्षी आज़ादी से उड़ रहे हैं।" },
            { mainWord: "अग्नि", synonyms: ["आग", "अनल"], category: "प्रकृति", context: "यज्ञ के समय पवित्र अग्नि जलाई जाती है।" },
            { mainWord: "वायु", synonyms: ["हवा", "पवन", "समीर"], category: "प्रकृति", context: "सुबह-सुबह ताज़ी और ठंडी वायु चल रही है।" },
            { mainWord: "पर्वत", synonyms: ["पहाड़", "गिरि"], category: "प्रकृति", context: "हिमालय भारत का सबसे ऊँचा और सुंदर पर्वत है।" },
            { mainWord: "नदी", synonyms: ["सरिता", "तटिनी"], category: "प्रकृति", context: "पहाड़ों से निकलकर नदी मैदानों की ओर बहती है।" },
            { mainWord: "समुद्र", synonyms: ["सागर", "सिंधु"], category: "प्रकृति", context: "समुद्र का विशाल पानी दूर-दूर तक फैला हुआ है।" },
            { mainWord: "बादल", synonyms: ["मेघ", "घन"], category: "प्रकृति", context: "आकाश में काले बादल छाते ही बारिश शुरू हो गई।" },
            { mainWord: "वर्षा", synonyms: ["बारिश", "बरसात"], category: "प्रकृति", context: "वर्षा की बूँदें गिरते ही मोर नाचने लगा।" },
            { mainWord: "फूल", synonyms: ["पुष्प", "सुमन"], category: "प्रकृति", context: "बगीचे में रंग-बिरंगे और सुंदर फूल खिले हैं।" },
            { mainWord: "कमल", synonyms: ["पंकज", "नीरज", "सरोज"], category: "प्रकृति", context: "कमल हमारा राष्ट्रीय पुष्प है जो कीचड़ में भी खिलता है।" },
            { mainWord: "घर", synonyms: ["गृह", "मकान", "आवास"], category: "स्थान", context: "मेरा घर बहुत साफ़-सुथरा और हवादार है।" },
            { mainWord: "विद्यालय", synonyms: ["स्कूल", "पाठशाला"], category: "स्थान", context: "हम सब रोज़ सुबह समय पर विद्यालय पढ़ने जाते हैं।" },
            { mainWord: "रास्ता", synonyms: ["मार्ग", "पथ"], category: "स्थान", context: "हमें हमेशा सच्चाई और अच्छाई के रास्ते पर चलना चाहिए।" },
            { mainWord: "राजा", synonyms: ["नरेश", "नृप", "भूप"], category: "व्यक्ति", context: "न्यायप्रिय राजा अपनी प्रजा की भलाई का सदा ध्यान रखता है।" },
            { mainWord: "मित्र", synonyms: ["दोस्त", "सखा", "मीत"], category: "व्यक्ति", context: "सच्चा मित्र वही है जो मुसीबत में हमारी मदद करे।" },
            { mainWord: "शत्रु", synonyms: ["दुश्मन", "अरि"], category: "व्यक्ति", context: "हमें कभी किसी को अपना शत्रु नहीं समझना चाहिए।" },
            { mainWord: "माता", synonyms: ["माँ", "जननी"], category: "व्यक्ति", context: "माता अपने बच्चों से बहुत गहरा स्नेह करती है।" },
            { mainWord: "पिता", synonyms: ["पितृ", "जनक"], category: "व्यक्ति", context: "पिता हमारे परिवार के रक्षक और मार्गदर्शक होते हैं।" },
            { mainWord: "शिक्षक", synonyms: ["अध्यापक", "गुरु"], context: "शिक्षक हमें जीवन में ज्ञान और सही संस्कार देते हैं।", category: "व्यक्ति" },
            { mainWord: "बालक", synonyms: ["लड़का", "कुमार"], category: "व्यक्ति", context: "वह छोटा बालक मैदान में फुटबाल खेल रहा है।" },
            { mainWord: "बालिका", synonyms: ["लड़की", "कन्या"], category: "व्यक्ति", context: "बालिका सुंदर और मधुर गीत गा रही है।" },
            { mainWord: "स्त्री", synonyms: ["नारी", "महिला"], category: "व्यक्ति", context: "हर क्षेत्र में आज स्त्री सफलता के कदम बढ़ा रही है।" },
            { mainWord: "मनुष्य", synonyms: ["मानव", "इंसान"], category: "व्यक्ति", context: "सच्चा मनुष्य वही है जो सब पर दया भाव रखता है।" },
            { mainWord: "खुशी", synonyms: ["प्रसन्नता", "आनंद", "हर्ष"], category: "भावना", context: "परीक्षा में प्रथम आने पर घर में बड़ी खुशी हुई।" },
            { mainWord: "दुख", synonyms: ["शोक", "दुःख", "विषाद"], category: "भावना", context: "दूसरों को दुख में देखकर हमें उनकी सहायता करनी चाहिए।" },
            { mainWord: "सुबह", synonyms: ["प्रातः", "सवेरा"], category: "प्रकृति", context: "सुबह जल्दी उठना स्वास्थ्य के लिए बहुत लाभकारी है।" },
            { mainWord: "शाम", synonyms: ["संध्या", "साँझ"], category: "प्रकृति", context: "शाम होते ही सभी पक्षी अपने घोंसलों में लौट आते हैं।" },
            { mainWord: "रात", synonyms: ["रात्रि", "निशा"], category: "प्रकृति", context: "रात के समय आकाश में सुंदर तारे टिमटिमाते हैं।" },
            { mainWord: "दिन", synonyms: ["दिवस", "वार"], category: "प्रकृति", context: "आज का दिन हमारे लिए बहुत शुभ और मंगलमय हो।" },
            { mainWord: "आँख", synonyms: ["नेत्र", "नयन"], category: "वस्तु", context: "आँखें हमारे शरीर का सबसे महत्वपूर्ण और सुंदर अंग हैं।" },
            { mainWord: "हाथ", synonyms: ["हस्त", "कर"], category: "वस्तु", context: "हमें भोजन करने से पूर्व अपने हाथ अच्छी तरह धोने चाहिए।" },
            { mainWord: "मुँह", synonyms: ["मुख", "वदन"], category: "वस्तु", context: "सुबह उठकर ठंडे पानी से अपना मुँह साफ़ करना चाहिए।" },
            { mainWord: "घोड़ा", synonyms: ["अश्व", "हय"], category: "प्रकृति", context: "घोड़ा बहुत तेज़ दौड़ने वाला व स्वामीभक्त जानवर है।" },
            { mainWord: "हाथी", synonyms: ["गज", "हस्ती"], category: "प्रकृति", context: "हाथी जंगल का सबसे विशाल और बुद्धिमान प्राणी है।" },
            { mainWord: "पक्षी", synonyms: ["पंछी", "खग"], category: "प्रकृति", context: "पक्षी पेड़ों की डालियों पर मधुर चहचहाहट करते हैं।" },
            { mainWord: "साँप", synonyms: ["सर्प", "नाग"], category: "प्रकृति", context: "साँप धीरे-धीरे घास पर रेंगते हुए आगे बढ़ता है।" }
        ];

        // Application State Management
        let appMode = 'single'; // 'single' or 'board'
        let currentCategory = 'सभी';
        let currentSingleItem = null;
        let boardSize = 3;
        let activeBoardItems = [];
        let singleDiscoveredCount = 0;
        let selectedFallbackCard = null; // For click-to-place fallback interaction

        // Shuffle Bag Arrays to avoid immediate repetition
        let singleShuffleBag = [];
        let audioPlayingSequence = false;

        window.addEventListener('DOMContentLoaded', () => {
            initAppEventHandlers();
            buildShuffleBag();
            loadNextSessionSet();
        });

        function initAppEventHandlers() {
            // Category Filter setup
            const filters = document.querySelectorAll('#categoryFilters .filter-btn');
            filters.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filters.forEach(f => f.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.getAttribute('data-category');
                    buildShuffleBag();
                    loadNextSessionSet();
                });
            });

            // Implement Drag Over prevention for HTML5 Drag-Drop
            const singleMat = document.getElementById('singleDropMat');
            singleMat.addEventListener('dragover', (e) => e.preventDefault());
            singleMat.addEventListener('drop', handleSingleDropEvent);
        }

        function switchMode(mode) {
            appMode = mode;
            document.getElementById('modeSingleBtn').classList.toggle('active', mode === 'single');
            document.getElementById('modeBoardBtn').classList.toggle('active', mode === 'board');
            document.getElementById('viewSingle').classList.toggle('active', mode === 'single');
            document.getElementById('viewBoard').classList.toggle('active', mode === 'board');
            
            selectedFallbackCard = null;
            clearFeedback();
            loadNextSessionSet();
        }

        function buildShuffleBag() {
            let filteredIndices = [];
            paryayvachiDatabase.forEach((item, index) => {
                if (currentCategory === 'सभी' || item.category === currentCategory) {
                    filteredIndices.push(index);
                }
            });

            // Fail-safe check for category emptiness
            if (filteredIndices.length === 0) {
                filteredIndices = paryayvachiDatabase.map((_, i) => i);
            }

            // Fisher-Yates Shuffle
            for (let i = filteredIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filteredIndices[i], filteredIndices[j]] = [filteredIndices[j], filteredIndices[i]];
            }
            singleShuffleBag = filteredIndices;
        }

        function getNextBagItem() {
            if (singleShuffleBag.length === 0) {
                buildShuffleBag();
            }
            return paryayvachiDatabase[singleShuffleBag.pop()];
        }

        function loadNextSessionSet() {
            clearFeedback();
            selectedFallbackCard = null;
            
            if (appMode === 'single') {
                setupSingleWordView();
            } else {
                setupMultiGroupBoardView();
            }
        }

        function clearFeedback() {
            document.getElementById('singleFeedback').innerText = '';
            document.getElementById('singleFeedback').className = 'feedback-message';
            document.getElementById('boardFeedback').innerText = '';
            document.getElementById('boardFeedback').className = 'feedback-message';
            document.getElementById('contextSentenceDisplay').style.display = 'none';
        }

        // ================= SINGLE WORD VIEW LOGIC =================
        function setupSingleWordView() {
            const item = getNextBagItem();
            if (!item) return;

            // Apply Reverse Exploration mechanism dynamically (25% probability)
            let anchorWord = item.mainWord;
            let targetSynonyms = [...item.synonyms];

            if (Math.random() < 0.25 && item.synonyms.length > 0) {
                const randomIndex = Math.floor(Math.random() * item.synonyms.length);
                anchorWord = item.synonyms[randomIndex];
                targetSynonyms = [item.mainWord, ...item.synonyms.filter((_, idx) => idx !== randomIndex)];
            }

            currentSingleItem = {
                displayAnchor: anchorWord,
                validTargets: targetSynonyms,
                context: item.context,
                rawGroup: item
            };

            document.getElementById('mainWordDisplay').innerText = currentSingleItem.displayAnchor;
            document.getElementById('matchedSynonymsZone').innerHTML = '';
            
            singleDiscoveredCount = 0;
            updateSingleStatusTracker();

            // Distractor Assembly Logic
            const totalTrayCards = 6;
            const correctTrayCount = currentSingleItem.validTargets.length;
            
            // Gather all potential distractors safely
            let distractorPool = [];
            paryayvachiDatabase.forEach(d => {
                if (d.mainWord !== item.mainWord) {
                    distractorPool.push(d.mainWord);
                    d.synonyms.forEach(s => distractorPool.push(s));
                }
            });
            // Unique set filter
            distractorPool = [...new Set(distractorPool)];
            
            // Draw random distractors
            let absoluteDistractors = [];
            while (absoluteDistractors.length < (totalTrayCards - correctTrayCount)) {
                let randomVal = distractorPool[Math.floor(Math.random() * distractorPool.length)];
                if (!absoluteDistractors.includes(randomVal) && !currentSingleItem.validTargets.includes(randomVal) && randomVal !== currentSingleItem.displayAnchor) {
                    absoluteDistractors.push(randomVal);
                }
            }

            // Mix candidates completely
            const unifiedPool = [...currentSingleItem.validTargets, ...absoluteDistractors];
            for (let i = unifiedPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [unifiedPool[i], unifiedPool[j]] = [unifiedPool[j], unifiedPool[i]];
            }

            renderCandidateTray(unifiedPool);
        }

        function updateSingleStatusTracker() {
            document.getElementById('completionStatus').innerText = 
                `${singleDiscoveredCount} of ${currentSingleItem.validTargets.length} शब्द मिले`;
        }

        function renderCandidateTray(words) {
            const tray = document.getElementById('candidateTrayZone');
            tray.innerHTML = '';
            words.forEach(word => {
                const card = createMovableCard(word);
                tray.appendChild(card);
            });
        }

        function createMovableCard(word) {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerText = word;
            card.setAttribute('draggable', 'true');
            card.setAttribute('data-word', word);
            
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', word);
                selectedFallbackCard = null;
                document.querySelectorAll('.word-card').forEach(c => c.classList.remove('selected-fallback'));
            });

            // Comprehensive classroom smartboard support via responsive interaction fallback
            card.addEventListener('click', () => {
                handleCardInteractionFallback(card, word);
            });

            return card;
        }

        function handleCardInteractionFallback(card, word) {
            if (appMode === 'single') {
                // If it is in the active Mat, return it to the common tray
                if (card.parentElement.id === 'matchedSynonymsZone') {
                    returnCardToTray(card);
                    singleDiscoveredCount--;
                    updateSingleStatusTracker();
                    clearFeedback();
                    return;
                }

                // In Single Mode, direct execution evaluates instantly for easier accessibility
                evaluateSingleMatchAttempt(word, card);
            } else {
                // Board Mode Selection Fallback workflow
                if (card.parentElement.className.includes('column-drop-target')) {
                    // Return card directly to the open tray zone
                    returnCardToTray(card);
                    clearFeedback();
                    checkBoardCompletionMetrics();
                    return;
                }

                // Selecting card from tray
                document.querySelectorAll('.word-card').forEach(c => c.classList.remove('selected-fallback'));
                selectedFallbackCard = card;
                card.classList.add('selected-fallback');
                
                const feedback = document.getElementById('boardFeedback');
                feedback.innerText = `"${word}" चुना गया। अब सही समूह के खाली स्थान पर क्लिक करें।`;
                feedback.className = "feedback-message";
            }
        }

        function evaluateSingleMatchAttempt(word, cardElement) {
            const feedback = document.getElementById('singleFeedback');
            
            if (currentSingleItem.validTargets.includes(word)) {
                // Confirm preventing duplicate entries
                const matches = document.querySelectorAll(`#matchedSynonymsZone [data-word="${word}"]`);
                if (matches.length > 0) return;

                document.getElementById('matchedSynonymsZone').appendChild(cardElement);
                cardElement.setAttribute('draggable', 'false'); // Lock position once correctly placed
                singleDiscoveredCount++;
                updateSingleStatusTracker();
                
                feedback.innerText = "बहुत अच्छा!";
                feedback.className = "feedback-message feedback-success";

                if (singleDiscoveredCount === currentSingleItem.validTargets.length) {
                    handleSingleGroupSuccessTrigger();
                }
            } else {
                feedback.innerText = "फिर सोचो";
                feedback.className = "feedback-message";
                // Gentle visual shake animation fallback via style trigger
                cardElement.style.transform = "translateX(5px)";
                setTimeout(() => cardElement.style.transform = "none", 150);
            }
        }

        function handleSingleDropEvent(e) {
            e.preventDefault();
            const word = e.dataTransfer.getData('text/plain');
            const card = document.querySelector(`#candidateTrayZone [data-word="${word}"]`);
            if (card) {
                evaluateSingleMatchAttempt(word, card);
            }
        }

        function returnCardToTray(cardElement) {
            const tray = document.getElementById('candidateTrayZone');
            cardElement.classList.remove('selected-fallback');
            cardElement.setAttribute('draggable', 'true');
            tray.appendChild(cardElement);
        }

        function handleSingleGroupSuccessTrigger() {
            const feedback = document.getElementById('singleFeedback');
            feedback.innerText = "बहुत अच्छा! शब्द समूह पूरा हुआ।";
            feedback.className = "feedback-message feedback-success";
            
            const contextBox = document.getElementById('contextSentenceDisplay');
            contextBox.innerText = `वाक्य प्रयोग: “${currentSingleItem.context}”`;
            contextBox.style.display = 'block';

            appendSetToSessionHistory(currentSingleItem.displayAnchor, currentSingleItem.validTargets);
        }


        // ================= MULTI-GROUP BOARD SORTING LOGIC =================
        function changeBoardSize(size) {
            boardSize = size;
            for (let i = 2; i <= 4; i++) {
                document.getElementById(`sizeBtn${i}`).classList.toggle('active', i === size);
            }
            loadNextSessionSet();
        }

        function setupMultiGroupBoardView() {
            // Select distinct groups from currently filtered database sets
            let availablePool = [];
            paryayvachiDatabase.forEach(item => {
                if (currentCategory === 'सभी' || item.category === currentCategory) {
                    availablePool.push(item);
                }
            });

            if (availablePool.length < boardSize) {
                // Fallback protection if specific category pool runs low
                availablePool = [...paryayvachiDatabase];
            }

            // Shuffle pool to draw unique anchors
            for (let i = availablePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availablePool[i], availablePool[j]] = [availablePool[j], availablePool[i]];
            }

            activeBoardItems = availablePool.slice(0, boardSize);
            
            // Build Grid DOM
            const layout = document.getElementById('multiGroupGridLayout');
            layout.innerHTML = '';
            layout.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;

            let allSynonymsCombined = [];

            activeBoardItems.forEach((group, index) => {
                const bin = document.createElement('div');
                bin.className = 'group-column-bin';
                bin.setAttribute('data-index', index);
                
                bin.innerHTML = `
                    <div class="column-anchor-header">${group.mainWord}</div>
                    <div class="column-drop-target" id="boardTargetColumn-${index}"></div>
                `;

                // Wire Drag events
                const targetZone = bin.querySelector('.column-drop-target');
                bin.addEventListener('dragover', (e) => e.preventDefault());
                bin.addEventListener('drop', (e) => handleBoardColumnDrop(e, index));
                
                // Smartboard Click targets
                bin.addEventListener('click', () => handleBoardColumnClickFallback(index));

                layout.appendChild(bin);

                group.synonyms.forEach(syn => {
                    allSynonymsCombined.push({ text: syn, originGroupIndex: index });
                });
            });

            // Master randomize unified candidate pool
            for (let i = allSynonymsCombined.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allSynonymsCombined[i], allSynonymsCombined[j]] = [allSynonymsCombined[j], allSynonymsCombined[i]];
            }

            // Load cards to the active tray layout
            const tray = document.getElementById('candidateTrayZone');
            tray.innerHTML = '';
            allSynonymsCombined.forEach(item => {
                const card = createMovableCard(item.text);
                card.setAttribute('data-origin-idx', item.originGroupIndex);
                tray.appendChild(card);
            });
        }

        function handleBoardColumnDrop(e, colIdx) {
            e.preventDefault();
            const word = e.dataTransfer.getData('text/plain');
            const card = document.querySelector(`[data-word="${word}"]`);
            if (card) {
                executeBoardPlacementVerification(card, colIdx);
            }
        }

        function handleBoardColumnClickFallback(colIdx) {
            if (selectedFallbackCard) {
                executeBoardPlacementVerification(selectedFallbackCard, colIdx);
                selectedFallbackCard.classList.remove('selected-fallback');
                selectedFallbackCard = null;
            }
        }

        function executeBoardPlacementVerification(cardElement, columnIdx) {
            const expectedOrigin = parseInt(cardElement.getAttribute('data-origin-idx'), 10);
            const feedback = document.getElementById('boardFeedback');

            if (expectedOrigin === columnIdx) {
                const targetColumn = document.getElementById(`boardTargetColumn-${columnIdx}`);
                targetColumn.appendChild(cardElement);
                feedback.innerText = "सही स्थान पर मिलाया!";
                feedback.className = "feedback-message feedback-success";
                checkBoardCompletionMetrics();
            } else {
                feedback.innerText = "फिर सोचो! यह इस शब्द का पर्यायवाची नहीं है।";
                feedback.className = "feedback-message";
            }
        }

        function checkBoardCompletionMetrics() {
            const totalRemaining = document.querySelectorAll('#candidateTrayZone .word-card').length;
            if (totalRemaining === 0) {
                const feedback = document.getElementById('boardFeedback');
                feedback.innerText = "बहुत अच्छा! सभी शब्द समूह पूरे हुए।";
                feedback.className = "feedback-message feedback-success";

                // Map across all successfully finished columns and add to permanent history session logs
                activeBoardItems.forEach(item => {
                    appendSetToSessionHistory(item.mainWord, item.synonyms);
                });
            }
        }


        // ================= SHARED GENERAL TOOL SYSTEM ACTIONS =================
        function clearCurrentWorkspace() {
            clearFeedback();
            selectedFallbackCard = null;
            
            if (appMode === 'single') {
                const matchedCards = document.querySelectorAll('#matchedSynonymsZone .word-card');
                matchedCards.forEach(card => returnCardToTray(card));
                singleDiscoveredCount = 0;
                updateSingleStatusTracker();
            } else {
                const assignedCards = document.querySelectorAll('.column-drop-target .word-card');
                assignedCards.forEach(card => returnCardToTray(card));
            }
        }

        function appendSetToSessionHistory(anchor, synonymsList) {
            const historyContainer = document.getElementById('historyLogCollection');
            const itemKey = `history-${anchor}`;
            
            // Avoid duplicate tracking logs
            if (document.getElementById(itemKey)) return;

            const itemDom = document.createElement('div');
            itemDom.className = 'collection-item';
            itemDom.id = itemKey;
            
            const textString = `${anchor} → ${synonymsList.join(' • ')}`;
            itemDom.innerText = textString;
            
            itemDom.addEventListener('click', () => {
                const speakSequence = [anchor, ...synonymsList];
                executeBrowserSpeechSynthesis(speakSequence);
            });

            historyContainer.appendChild(itemDom);
        }

        function triggerAudioSynthesis() {
            let sequence = [];
            if (appMode === 'single') {
                if (!currentSingleItem) return;
                sequence.push(currentSingleItem.displayAnchor);
                
                // Synthesize discovered correct synonyms sequentially
                const discoveredDOMs = document.querySelectorAll('#matchedSynonymsZone .word-card');
                discoveredDOMs.forEach(c => sequence.push(c.innerText));
                
                if (sequence.length === 1) {
                    // Default fallback announcement to support early engagement
                    sequence.push(...currentSingleItem.validTargets);
                }
            } else {
                // Multi Board sequence collection mapping layout definitions
                activeBoardItems.forEach(item => {
                    sequence.push(item.mainWord);
                    item.synonyms.forEach(s => sequence.push(s));
                });
            }

            executeBrowserSpeechSynthesis(sequence);
        }

        function executeBrowserSpeechSynthesis(wordArray) {
            if (!('speechSynthesis' in window)) {
                alert("आपके ब्राउज़र में ऑडियो सुविधा समर्थित नहीं है।");
                return;
            }

            // Mitigate overlapping running instances gracefully
            window.speechSynthesis.cancel();
            
            if (wordArray.length === 0) return;

            let index = 0;
            
            function speakNextElement() {
                if (index >= wordArray.length) return;
                
                const utterance = new SpeechSynthesisUtterance(wordArray[index]);
                utterance.lang = 'hi-IN';
                utterance.rate = 0.85; // Natural speed cadence tailored for young kids learning language

                utterance.onend = () => {
                    index++;
                    // Short timed pause interval between sequential card utterances
                    setTimeout(speakNextElement, 400);
                };

                utterance.onerror = () => {
                    index++;
                    speakNextElement();
                };

                window.speechSynthesis.speak(utterance);
            }

            speakNextElement();
        }
    </script>
