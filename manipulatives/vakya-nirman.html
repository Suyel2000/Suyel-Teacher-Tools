            padding: 15px;

</head>

            <div class="trays-container" id="trays-container">

            <div class="controls">

            { text: "नदी लगातार बहती है।", cards: ["नदी", "लगातार", "बहती है"] },
            { text: "फूल बगीचे में खिलते हैं।", cards: ["फूल", "बगीचे में", "खिलते हैं"] },
            { text: "हवा धीरे-धीरे चलती है।", cards: ["हवा", "धीरे-धीरे", "चलती है"] },
            { text: "पेड़ हमें छाया देते हैं।", cards: ["पेड़", "हमें", "छाया देते हैं"] },
            { text: "पत्ते हरे रंग के होते हैं।", cards: ["पत्ते", "हरे रंग के", "होते हैं"] },
            { text: "पहाड़ बहुत ऊँचे हैं।", cards: ["पहाड़", "बहुत ऊँचे", "हैं"] },
            { text: "चाँद रात में चमकता है।", cards: ["चाँद", "रात में", "चमकता है"] },
            { text: "तारे टिमटिमाते हैं।", cards: ["तारे", "टिमटिमाते हैं"] },
            { text: "कोयल मीठा गाती है।", cards: ["कोयल", "मीठा", "गाती है"] },
            { text: "इंद्रधनुष में सात रंग होते हैं।", cards: ["इंद्रधनुष में", "सात रंग", "होते हैं"] },
            { text: "घास हरी है।", cards: ["घास", "हरी", "है"] },
            { text: "हवा ठंडी है।", cards: ["हवा", "ठंडी", "है"] },
            { text: "बगीचा सुंदर लगता है।", cards: ["बगीचा", "सुंदर", "लगता है"] },
            { text: "तितली फूल पर बैठती है।", cards: ["तितली", "फूल पर", "बैठती है"] },
            { text: "भौंरा गुनगुनाता है।", cards: ["भौंरा", "गुनगुनाता", "है"] },
            { text: "मिट्टी की खुशबू आती है।", cards: ["मिट्टी की", "खुशबू", "आती है"] },
            { text: "सुबह का समय अच्छा होता है।", cards: ["सुबह का समय", "अच्छा", "होता है"] },

            // पशु-पक्षी (Animals)
            { text: "पक्षी आकाश में उड़ते हैं।", cards: ["पक्षी", "आकाश में", "उड़ते हैं"] },
            { text: "मछली पानी में तैरती है।", cards: ["मछली", "पानी में", "तैरती है"] },
            { text: "गाय घास खाती है।", cards: ["गाय", "घास", "खाती है"] },
            { text: "बिल्ली दूध पीती है।", cards: ["बिल्ली", "दूध", "पीती है"] },
            { text: "कुत्ता तेजी से दौड़ता है।", cards: ["कुत्ता", "तेजी से", "दौड़ता है"] },
            { text: "मोर बारिश में नाचता है।", cards: ["मोर", "बारिश में", "नाचता है"] },
            { text: "बंदर पेड़ पर चढ़ता है।", cards: ["बंदर", "पेड़ पर", "चढ़ता है"] },
            { text: "खरगोश तेजी से दौड़ता है।", cards: ["खरगोश", "तेजी से", "दौड़ता है"] },
            { text: "शेर जंगल का राजा है।", cards: ["शेर", "जंगल का", "राजा है"] },
            { text: "हाथी बहुत बड़ा होता है।", cards: ["हाथी", "बहुत बड़ा", "होता है"] },
            { text: "तोता हरी मिर्च खाता है।", cards: ["तोता", "हरी मिर्च", "खाता है"] },
            { text: "कबूतर गुटरगूँ करता है।", cards: ["कबूतर", "गुटरगूँ", "करता है"] },
            { text: "कौआ काँव-काँव करता है।", cards: ["कौआ", "काँव-काँव", "करता है"] },
            { text: "भैंस काला रंग की होती है।", cards: ["भैंस", "काला रंग की", "होती है"] },
            { text: "बकरी पत्ते खाती है।", cards: ["बकरी", "पत्ते", "खाती है"] },
            { text: "घोड़ा तेज दौड़ता है।", cards: ["घोड़ा", "तेज", "दौड़ता है"] },
            { text: "कछुआ धीरे चलता है।", cards: ["कछुआ", "धीरे", "चलता है"] },
            { text: "भालू शहद खाता है।", cards: ["भालू", "शहद", "खाता है"] },
            { text: "हिरण छलांग लगाता है।", cards: ["हिरण", "छलांग", "लगाता है"] },
            { text: "मेंढक टर्र-टर्र करता है।", cards: ["मेंढक", "टर्र-टर्र", "करता है"] }
        ];

        // Free Build Vocabulary & Grammar Rules
        const freeBuildVocab = {
            subjects: [
                { id: "s1", text: "राम", gender: "m", number: "s", tags: ["person"] },
                { id: "s2", text: "सीता", gender: "f", number: "s", tags: ["person"] },
                { id: "s3", text: "बच्चे", gender: "m", number: "p", tags: ["person"] },
                { id: "s4", text: "लड़कियाँ", gender: "f", number: "p", tags: ["person"] },
                { id: "s5", text: "पक्षी", gender: "m", number: "p", tags: ["animal"] },
                { id: "s6", text: "मछली", gender: "f", number: "s", tags: ["animal"] },
                { id: "s7", text: "कुत्ता", gender: "m", number: "s", tags: ["animal"] }
            ],
            places_objects: [
                { id: "o1", text: "मैदान में", tags: ["place"] },
                { id: "o2", text: "विद्यालय", tags: ["place"] },
                { id: "o3", text: "पानी", tags: ["liquid"] },
                { id: "o4", text: "किताब", tags: ["thing"] },
                { id: "o5", text: "आकाश में", tags: ["sky"] },
                { id: "o6", text: "दूध", tags: ["liquid"] },
                { id: "o7", text: "पानी में", tags: ["water"] }
            ],
            verbs: [
                { id: "v1", text: "खेलता है", gender: "m", number: "s", req: ["person", "animal"] },
                { id: "v2", text: "खेलती है", gender: "f", number: "s", req: ["person", "animal"] },
                { id: "v3", text: "खेलते हैं", gender: "m", number: "p", req: ["person", "animal"] },
                { id: "v4", text: "पढ़ता है", gender: "m", number: "s", req: ["person"] },
                { id: "v5", text: "पढ़ती है", gender: "f", number: "s", req: ["person"] },
                { id: "v6", text: "पीता है", gender: "m", number: "s", req: ["person", "animal"] },
                { id: "v7", text: "पीती है", gender: "f", number: "s", req: ["person", "animal"] },
                { id: "v8", text: "तैरती है", gender: "f", number: "s", req: ["animal"] },
                { id: "v9", text: "उड़ते हैं", gender: "m", number: "p", req: ["animal"] }
            ],
            punctuation: [
                { id: "p1", text: "।", type: "punct" },
                { id: "p2", text: "?", type: "punct" },
                { id: "p3", text: "!", type: "punct" }
            ]
        };

        // 2. STATE MANAGEMENT
        let currentActivity = 'order'; // 'order', 'complete', 'free'
        let currentTargetSentence = null;
        let shuffleBag = [];
        let cardsTray = [];
        let cardsMat = [];
        let mySentences = new Set(); // Prevent duplicates
        let selectedMatCardIndex = null; // For tap-to-swap logic

        // 3. CORE LOGIC
        function init() {
            createShuffleBag();
            setActivity('order');
        }

        function createShuffleBag() {
            shuffleBag = [...sentences];
            shuffleArray(shuffleBag);
        }

        function getNextSentence() {
            if (shuffleBag.length === 0) createShuffleBag();
            return shuffleBag.pop();
        }

        function setActivity(activityName) {
            currentActivity = activityName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            clearMat(false);
            loadNext();
        }

        function loadNext() {
            clearMat(false);
            document.getElementById('feedback').style.opacity = '0';
            document.getElementById('large-display').classList.remove('success-text');
            
            if (currentActivity === 'order') {
                currentTargetSentence = getNextSentence();
                setupOrderActivity();
            } else if (currentActivity === 'complete') {
                currentTargetSentence = getNextSentence();
                setupCompleteActivity();
            } else if (currentActivity === 'free') {
                currentTargetSentence = null;
                setupFreeActivity();
            }
            render();
        }

        function setupOrderActivity() {
            let parts = [...currentTargetSentence.cards];
            // Ensure shuffled is not same as original
            let shuffled;
            let attempts = 0;
            do {
                shuffled = [...parts];
                shuffleArray(shuffled);
                attempts++;
            } while (shuffled.join('') === parts.join('') && attempts < 10);

            cardsTray = shuffled.map((text, i) => ({ id: `c_${i}`, text, type: 'word' }));
            cardsMat = [];
        }

        function setupCompleteActivity() {
            let parts = [...currentTargetSentence.cards];
            // Pick a random part to blank out
            let missingIndex = Math.floor(Math.random() * parts.length);
            let missingWord = parts[missingIndex];
            
            cardsMat = parts.map((text, i) => {
                if (i === missingIndex) return { id: `blank`, text: '_____', type: 'blank' };
                return { id: `m_${i}`, text, type: 'fixed' }; // Fixed on mat
            });

            // Create distractors (simply words from other sentences)
            let distractors = [missingWord];
            while (distractors.length < 4) {
                let randomSent = sentences[Math.floor(Math.random() * sentences.length)];
                let randomWord = randomSent.cards[Math.floor(Math.random() * randomSent.cards.length)];
                if (!distractors.includes(randomWord)) {
                    distractors.push(randomWord);
                }
            }
            shuffleArray(distractors);

            cardsTray = distractors.map((text, i) => ({ id: `c_${i}`, text, type: 'word', isAnswer: text === missingWord }));
        }

        function setupFreeActivity() {
            cardsTray = []; // Trays will be rendered based on categories directly in render()
            cardsMat = [];
        }

        // 4. RENDERING
        function render() {
            renderTrays();
            renderMat();
            updateLargeDisplay();
        }

        function renderTrays() {
            const container = document.getElementById('trays-container');
            container.innerHTML = '';

            if (currentActivity === 'order' || currentActivity === 'complete') {
                const tray = document.createElement('div');
                tray.className = 'tray';
                const title = document.createElement('div');
                title.className = 'tray-title';
                title.innerText = 'शब्द कार्ड (यहाँ से चुनें)';
                tray.appendChild(title);

                cardsTray.forEach(card => {
                    tray.appendChild(createCardElement(card, 'tray'));
                });
                container.appendChild(tray);
            } 
            else if (currentActivity === 'free') {
                // Multi-tray setup
                const categories = [
                    { key: 'subjects', title: 'कौन? (कर्ता)' },
                    { key: 'places_objects', title: 'क्या / कहाँ? (वस्तु/स्थान)' },
                    { key: 'verbs', title: 'क्या करता है? (क्रिया)' },
                    { key: 'punctuation', title: 'चिन्ह' }
                ];

                categories.forEach(cat => {
                    const tray = document.createElement('div');
                    tray.className = 'tray';
                    const title = document.createElement('div');
                    title.className = 'tray-title';
                    title.innerText = cat.title;
                    tray.appendChild(title);

                    // Filter out cards already on mat
                    let matIds = cardsMat.map(c => c.id);
                    freeBuildVocab[cat.key].forEach(word => {
                        if (!matIds.includes(word.id)) {
                            tray.appendChild(createCardElement(word, 'tray'));
                        }
                    });
                    container.appendChild(tray);
                });
            }
        }

        function renderMat() {
            const mat = document.getElementById('sentence-mat');
            // Keep the label
            const label = mat.querySelector('.mat-label');
            mat.innerHTML = '';
            if (label) mat.appendChild(label);

            cardsMat.forEach((card, index) => {
                if (card.type === 'blank') {
                    const blank = document.createElement('div');
                    blank.className = 'blank-slot';
                    blank.innerText = '_____';
                    blank.onclick = () => {
                        if (selectedMatCardIndex !== null) handleMatClick(selectedMatCardIndex);
                    }
                    mat.appendChild(blank);
                } else if (card.type === 'fixed') {
                    const el = document.createElement('div');
                    el.className = 'word-card';
                    el.style.backgroundColor = '#e0e0e0';
                    el.style.borderColor = '#ccc';
                    el.style.cursor = 'default';
                    el.innerText = card.text;
                    mat.appendChild(el);
                } else {
                    const el = createCardElement(card, 'mat', index);
                    mat.appendChild(el);
                }
            });
        }

        function createCardElement(card, location, index = null) {
            const el = document.createElement('div');
            el.className = 'word-card';
            if (card.type === 'punct') el.classList.add('punctuation-card');
            el.innerText = card.text;
            
            // Interaction: Tap/Click
            el.onclick = () => {
                if (location === 'tray') {
                    handleTrayClick(card);
                } else if (location === 'mat') {
                    handleMatClick(index);
                }
            };

            // Interaction: Drag & Drop (Desktop)
            el.draggable = true;
            el.ondragstart = (e) => {
                e.dataTransfer.setData('cardStr', JSON.stringify(card));
                e.dataTransfer.setData('location', location);
                if (location === 'mat') e.dataTransfer.setData('index', index);
                el.classList.add('dragging');
            };
            el.ondragend = () => {
                el.classList.remove('dragging');
            };

            // Highlight if selected
            if (location === 'mat' && index === selectedMatCardIndex) {
                el.classList.add('selected');
            }

            return el;
        }

        // 5. INTERACTION LOGIC (TAP / CLICK)
        function handleTrayClick(card) {
            if (currentActivity === 'complete') {
                // Find blank and replace
                const blankIndex = cardsMat.findIndex(c => c.type === 'blank');
                if (blankIndex !== -1) {
                    cardsMat[blankIndex] = card;
                    cardsTray = cardsTray.filter(c => c.id !== card.id);
                    checkCompleteSuccess(card);
                }
            } 
            else {
                // Order or Free Activity
                if (selectedMatCardIndex !== null) {
                    // Insert before selected card
                    cardsMat.splice(selectedMatCardIndex, 0, card);
                    selectedMatCardIndex = null;
                } else {
                    // Append to end
                    cardsMat.push(card);
                }
                
                if (currentActivity === 'order') {
                    cardsTray = cardsTray.filter(c => c.id !== card.id);
                }
                
                render();
                checkOrderOrFreeSuccess();
            }
        }

        function handleMatClick(index) {
            if (currentActivity === 'complete') {
                // Return card to tray and restore blank
                const card = cardsMat[index];
                if (card.type !== 'fixed') {
                    cardsTray.push(card);
                    cardsMat[index] = { id: 'blank', text: '_____', type: 'blank' };
                    render();
                    updateLargeDisplay();
                }
                return;
            }

            if (selectedMatCardIndex === null) {
                // Select this card
                selectedMatCardIndex = index;
                render();
            } else if (selectedMatCardIndex === index) {
                // Deselect and return to tray
                const card = cardsMat.splice(index, 1)[0];
                if (currentActivity === 'order') {
                    cardsTray.push(card);
                }
                selectedMatCardIndex = null;
                render();
                checkOrderOrFreeSuccess();
            } else {
                // Swap positions
                const temp = cardsMat[selectedMatCardIndex];
                cardsMat[selectedMatCardIndex] = cardsMat[index];
                cardsMat[index] = temp;
                selectedMatCardIndex = null;
                render();
                checkOrderOrFreeSuccess();
            }
        }

        // 6. DRAG AND DROP (HTML5)
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function dropToMat(ev) {
            ev.preventDefault();
            const cardStr = ev.dataTransfer.getData('cardStr');
            if (!cardStr) return;
            const card = JSON.parse(cardStr);
            const location = ev.dataTransfer.getData('location');
            
            if (location === 'tray') {
                handleTrayClick(card); // Reuse logic for adding
            } else if (location === 'mat') {
                const oldIndex = parseInt(ev.dataTransfer.getData('index'));
                // Simple append to end for reorder drop, or swap if dropped exactly on another card
                // For simplicity in vanilla JS, we just append to end if dropped on mat background
                cardsMat.splice(oldIndex, 1);
                cardsMat.push(card);
                selectedMatCardIndex = null;
                render();
                checkOrderOrFreeSuccess();
            }
        }

        // 7. VALIDATION & DISPLAY
        function updateLargeDisplay() {
            const display = document.getElementById('large-display');
            let textStr = cardsMat.map(c => c.text).join(' ');
            if (cardsMat.length === 0) textStr = '...';
            
            // Clean up punctuation spacing
            textStr = textStr.replace(/ (।|\?|\!)/g, '$1');
            display.innerText = textStr;
        }

        function checkCompleteSuccess(card) {
            render(); // render first to show placement
            if (card.isAnswer) {
                showSuccess();
            } else {
                updateLargeDisplay();
            }
        }

        function checkOrderOrFreeSuccess() {
            if (cardsMat.length === 0) return;

            if (currentActivity === 'order') {
                let currentStr = cardsMat.map(c => c.text).join(' ');
                let targetStr = currentTargetSentence.cards.join(' ');
                
                if (currentStr === targetStr && cardsTray.length === 0) {
                    // Auto-add punctuation if not present
                    if (!currentStr.endsWith('।') && !currentStr.endsWith('?') && !currentStr.endsWith('!')) {
                        document.getElementById('large-display').innerText = currentStr + '।';
                    }
                    showSuccess();
                }
            } 
            else if (currentActivity === 'free') {
                // Grammar Checking Logic
                let hasSubject = false;
                let subject = null;
                let hasVerb = false;
                let verb = null;

                cardsMat.forEach(c => {
                    if (freeBuildVocab.subjects.find(s => s.id === c.id)) { hasSubject = true; subject = c; }
                    if (freeBuildVocab.verbs.find(v => v.id === c.id)) { hasVerb = true; verb = c; }
                });

                if (hasSubject && hasVerb) {
                    // Agreement check
                    let genderMatch = (subject.gender === verb.gender);
                    let numberMatch = (subject.number === verb.number);
                    // Exception: Respect 'हैं' for plurals/respect, handle basic mapping
                    
                    let semMatch = subject.tags.some(t => verb.req.includes(t));

                    if (genderMatch && numberMatch && semMatch) {
                        showSuccess();
                    }
                }
            }
        }

        function showSuccess() {
            const display = document.getElementById('large-display');
            display.classList.add('success-text');
            
            let finalStr = display.innerText;
            if (!finalStr.endsWith('।') && !finalStr.endsWith('?') && !finalStr.endsWith('!')) {
                finalStr += '।';
                display.innerText = finalStr;
            }

            document.getElementById('feedback').style.opacity = '1';
            saveSentence(finalStr);
            playAudio(finalStr);
        }

        function clearMat(clearAll = true) {
            selectedMatCardIndex = null;
            if (currentActivity === 'order' && clearAll) {
                // Return all to tray
                cardsTray = cardsTray.concat(cardsMat);
                cardsMat = [];
                render();
            } else if (currentActivity === 'complete' && clearAll) {
                // reset blank
                let blankIndex = cardsMat.findIndex(c => c.type !== 'fixed' && c.type !== 'blank');
                if (blankIndex !== -1) {
                    let card = cardsMat.splice(blankIndex, 1, { id: 'blank', text: '_____', type: 'blank' })[0];
                    cardsTray.push(card);
                    render();
                }
            } else if (currentActivity === 'free' && clearAll) {
                cardsMat = [];
                render();
            }
        }

        // 8. MY SENTENCES & AUDIO
        function saveSentence(text) {
            if (!mySentences.has(text) && !text.includes('_____')) {
                mySentences.add(text);
                const list = document.getElementById('saved-sentences');
                const li = document.createElement('li');
                li.className = 'saved-sentence';
                li.innerText = text;
                li.onclick = () => playAudio(text);
                list.appendChild(li);
            }
        }

        function playAudio(text = null) {
            const textToSpeak = text || document.getElementById('large-display').innerText.replace('...', '');
            if (!textToSpeak || textToSpeak.includes('_____')) return;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Prevent overlap
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'hi-IN';
                window.speechSynthesis.speak(utterance);
            }
        }

        // Utility: Fisher-Yates Shuffle
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Initialize App
        window.onload = init;

    </script>
