<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विलोम शब्द - प्राथमिक कक्षा के लिए इंटरैक्टिव डिजिटल टीएलएम</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="प्राथमिक कक्षाओं के लिए एक सरल और शक्तिशाली विलोम शब्द इंटरैक्टिव डिजिटल मैनिपुलेटिव। कार्ड्स को मिलाकर आसानी से विपरीत शब्द सीखें।">
    <meta name="keywords" content="विलोम शब्द, Vilom Shabd, Hindi opposite words, विलोम शब्द activity, Hindi antonyms for kids, interactive Hindi learning tool, Hindi TLM, विलोम शब्द game, primary Hindi learning tool">
    <meta property="og:title" content="विलोम शब्द - इंटरैक्टिव डिजिटल मैनिपुलेटिव">
    <meta property="og:description" content="शब्दों को छूकर और खींचकर विलोम शब्द सीखने का आसान और मजेदार क्लासरूम टूल।">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --success: #2ecc71;
            --accent: #e67e22;
            --border-radius: 16px;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Noto Sans Devanagari', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        header {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .title-area h1 {
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 700;
        }

        .teacher-prompt-wrap {
            flex: 1;
            min-width: 260px;
            display: flex;
            align-items: center;
            background: #edf2f7;
            padding: 6px 12px;
            border-radius: 10px;
        }

        .teacher-prompt-wrap label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #4a5568;
            margin-right: 8px;
            white-space: nowrap;
        }

        .teacher-prompt-input {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            width: 100%;
        }

        .controls-top {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .filter-select {
            font-family: inherit;
            font-size: 0.95rem;
            padding: 8px 14px;
            border-radius: 10px;
            border: 2px solid #cbd5e0;
            background-color: white;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
        }

        .filter-select:focus {
            border-color: var(--primary);
        }

        .btn {
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-accent { background-color: var(--accent); color: white; }
        .btn-accent:hover { opacity: 0.9; }
        .btn-outline { background-color: white; border: 2px solid #cbd5e0; color: var(--text-main); }
        .btn-outline:hover { background-color: #f7fafc; }
        .btn-active { background-color: var(--text-main); color: white; border-color: var(--text-main); }

        /* Workspace setup */
        .workspace-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .view-panel {
            display: none;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .view-panel.active {
            display: flex;
        }

        /* View A: Single Mode Setup */
        .single-mode-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            flex: 1;
        }

        @media (min-width: 992px) {
            .single-mode-grid {
                grid-template-columns: 3fr 1fr;
            }
        }

        .mat-and-tray-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            justify-content: space-between;
        }

        .matching-mat-zone {
            border: 3px dashed #cbd5e0;
            border-radius: var(--border-radius);
            background: #fcfdfe;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            position: relative;
        }

        .matching-mat-zone.drag-over {
            background: #ebf8ff;
            border-color: var(--primary);
        }

        .mat-title {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a0aec0;
            font-weight: bold;
        }

        .pair-display-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
        }

        .arrow-connector {
            font-size: 2.5rem;
            color: #a0aec0;
            font-weight: bold;
            transition: color 0.3s;
        }

        .arrow-connector.connected {
            color: var(--success);
        }

        /* Card styles */
        .word-card {
            background: var(--card-bg);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 28px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            cursor: grab;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-width: 130px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background-color 0.2s;
            position: relative;
        }

        .word-card:active { cursor: grabbing; }
        .word-card.selected {
            border-color: var(--primary);
            background-color: #ebf8ff;
            transform: scale(1.03);
        }
        .word-card.target-fixed {
            cursor: default;
            border-color: #cbd5e0;
            background: #f7fafc;
        }
        .word-card.matched {
            border-color: var(--success);
            background-color: #f0fff4;
            animation: bounce 0.4s ease;
        }

        .mat-slot {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            min-width: 140px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            font-size: 1.1rem;
            padding: 10px;
            background: #f7fafc;
            transition: all 0.2s;
        }
        .mat-slot.active-select {
            border-color: var(--accent);
            background: #fffaf0;
            color: var(--accent);
        }

        .context-sentence-box {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #4a5568;
            background: #f7fafc;
            padding: 10px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            display: none;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .movable-word-tray {
            background: #edf2f7;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            min-height: 90px;
        }

        .bottom-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        /* Collection bar */
        .collection-panel {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            max-height: 400px;
        }

        .collection-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #4a5568;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 5px;
        }

        .collection-list {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            padding-right: 4px;
        }

        .collection-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
            font-weight: 500;
        }
        .collection-item:hover {
            background: #edf2f7;
            border-color: var(--primary);
        }

        /* View B: Board Mode Layout */
        .board-mode-panel {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .board-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 12px;
        }

        .board-modes-selector {
            display: flex;
            background: #edf2f7;
            padding: 4px;
            border-radius: 8px;
            gap: 4px;
        }

        .board-mode-btn {
            font-family: inherit;
            border: none;
            background: transparent;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            color: #718096;
        }

        .board-mode-btn.active {
            background: white;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .board-interactive-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            flex: 1;
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .board-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .board-column-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .board-word-card {
            width: 100%;
            max-width: 180px;
            padding: 12px 20px;
            font-size: 1.4rem;
            font-weight: 700;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .board-word-card.selected {
            border-color: var(--accent);
            background-color: #fffaf0;
            transform: scale(1.02);
        }

        .board-word-card.matched {
            border-color: var(--success);
            background-color: #f0fff4;
            color: #27ae60;
            cursor: default;
        }

        .board-message {
            grid-column: span 2;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--success);
            padding: 15px;
            background: #f0fff4;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive handling */
        @media (max-width: 600px) {
            .word-card { font-size: 1.4rem; padding: 12px 20px; min-width: 110px; }
            .arrow-connector { font-size: 1.8rem; }
            .board-interactive-area { gap: 15px; }
            .board-word-card { font-size: 1.1rem; padding: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>विलोम शब्द मैनिपुलेटिव</h1>
        </div>
        
        <div class="teacher-prompt-wrap">
            <label for="teacherPrompt">आज का अभ्यास:</label>
            <input type="text" id="teacherPrompt" class="teacher-prompt-input" value="शब्द का सही विलोम शब्द खोजकर जोड़ी बनाओ।" placeholder="शिक्षकों के लिए निर्देश यहाँ लिखें...">
        </div>

        <div class="controls-top">
            <select id="categoryFilter" class="filter-select" aria-label="श्रेणी चुनें">
                <option value="सभी">सभी श्रेणियाँ</option>
                <option value="स्थान">स्थान</option>
                <option value="समय">समय</option>
                <option value="आकार">आकार</option>
                <option value="मात्रा">मात्रा</option>
                <option value="गुण">गुण</option>
                <option value="अवस्था">अवस्था</option>
                <option value="भावना">भावना</option>
                <option value="क्रिया">क्रिया</option>
            </select>
            
            <button id="toggleViewBtn" class="btn btn-outline">सभी जोड़ियाँ बोर्ड</button>
        </div>
    </header>

    <main class="workspace-container">
        
        <!-- VIEW A: Single Pair practice panel -->
        <div id="singleModePanel" class="view-panel active">
            <div class="single-mode-grid">
                
                <div class="mat-and-tray-container">
                    <div class="matching-mat-zone" id="dropZone">
                        <span class="mat-title">विलोम जोड़ी बनाओ</span>
                        
                        <div class="pair-display-row">
                            <div id="targetCardSlot">
                                <!-- Target Word Card Generated Here -->
                            </div>
                            
                            <div class="arrow-connector" id="matArrow">↔</div>
                            
                            <div id="matchCardSlot">
                                <div class="mat-slot" id="targetMatchSlot">कार्ड यहाँ लाएँ</div>
                            </div>
                        </div>

                        <div class="context-sentence-box" id="contextSentence">
                            <!-- Optional context descriptive line -->
                        </div>
                    </div>

                    <div class="movable-word-tray" id="optionsTray">
                        <!-- Shuffled candidate word cards -->
                    </div>

                    <div class="bottom-action-bar">
                        <button id="speakBtn" class="btn btn-outline">🔊 सुनें</button>
                        <div style="display: flex; gap: 10px;">
                            <button id="clearBtn" class="btn btn-outline">साफ करें</button>
                            <button id="nextPairBtn" class="btn btn-primary">नई जोड़ी</button>
                        </div>
                    </div>
                </div>

                <div class="collection-panel">
                    <div class="collection-title">मेरी जोड़ियाँ</div>
                    <div class="collection-list" id="collectionList">
                        <!-- Successfully discovered pairs recorded here -->
                    </div>
                </div>

            </div>
        </div>

        <!-- VIEW B: All Pairs classroom board panel -->
        <div id="boardModePanel" class="view-panel">
            <div class="board-mode-panel">
                <div class="board-header">
                    <div style="font-weight: bold; color: var(--text-main);">एक साथ कई जोड़ियाँ मिलाएँ:</div>
                    <div class="board-modes-selector">
                        <button class="board-mode-btn" data-count="4">4 जोड़ियाँ</button>
                        <button class="board-mode-btn active" data-count="6">6 जोड़ियाँ</button>
                        <button class="board-mode-btn" data-count="10">10 जोड़ियाँ</button>
                    </div>
                    <button id="resetBoardBtn" class="btn btn-outline">बोर्ड बदलें</button>
                </div>

                <div class="board-interactive-area" id="boardInteractiveArea">
                    <div class="board-message" id="boardCompleteMessage">बहुत अच्छा! सभी जोड़ियाँ पूरी हुईं।</div>
                    
                    <div class="board-column" id="boardLeftColumn">
                        <div class="board-column-title">शब्द</div>
                        <!-- Left cards -->
                    </div>
                    
                    <div class="board-column" id="boardRightColumn">
                        <div class="board-column-title">विलोम शब्द</div>
                        <!-- Right cards -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Verified Comprehensive Native Antonym Pairs Database
        const vilomPairs = [
            { word1: "दिन", word2: "रात", category: "समय", sentence: "दिन में उजाला होता है। रात में अँधेरा होता है।" },
            { word1: "सुबह", word2: "शाम", category: "समय", sentence: "सुबह सूरज उगता है। शाम को ढलता है।" },
            { word1: "पहले", word2: "बाद", category: "समय", sentence: "पहले हाथ धोओ, बाद में खाना खाओ।" },
            { word1: "जल्दी", word2: "देर", category: "समय", sentence: "जल्दी उठना अच्छा है, देर करना बुरा है।" },
            
            { word1: "ऊपर", word2: "नीचे", category: "स्थान", sentence: "पंखा ऊपर है। मेज नीचे है।" },
            { word1: "अंदर", word2: "बाहर", category: "स्थान", sentence: "घड़ा अंदर है। कुत्ता बाहर है।" },
            { word1: "पास", word2: "दूर", category: "स्थान", sentence: "घर पास है। पेड़ दूर है।" },
            { word1: "आगे", word2: "पीछे", category: "स्थान", sentence: "मोहन आगे है। सोहन पीछे है।" },
            
            { word1: "बड़ा", word2: "छोटा", category: "आकार", sentence: "हाथी बड़ा है। चूहा छोटा है।" },
            { word1: "ऊँचा", word2: "नीचा", category: "आकार", sentence: "पहाड़ ऊँचा है। खाई नीची है।" },
            { word1: "मोटा", word2: "पतला", category: "आकार", sentence: "लड़का मोटा है। तीर पतला है।" },
            
            { word1: "भारी", word2: "हल्का", category: "मात्रा", sentence: "पत्थर भारी है। पत्ता हल्का है।" },
            { word1: "कम", word2: "अधिक", category: "मात्रा", sentence: "गिलास में पानी कम है, जग में अधिक है।" },
            { word1: "एक", word2: "अनेक", category: "मात्रा", sentence: "यहाँ एक तारा है, वहाँ अनेक तारे हैं।" },
            { word1: "खाली", word2: "भरा", category: "मात्रा", sentence: "टोकरी खाली है। घड़ा भरा है।" },
            
            { word1: "अच्छा", word2: "बुरा", category: "गुण", sentence: "अच्छा काम करो, बुरा काम मत करो।" },
            { word1: "साफ", word2: "गंदा", category: "गुण", sentence: "साफ कपड़े पहनो, गंदे कपड़े नहीं।" },
            { word1: "मीठा", word2: "कड़वा", category: "गुण", sentence: "आम मीठा है। नीम कड़वा है।" },
            { word1: "कठिन", word2: "सरल", category: "गुण", sentence: "सवाल कठिन है, जवाब सरल है।" },
            { word1: "सही", word2: "गलत", category: "गुण", sentence: "सच बोलना सही है, झूठ बोलना गलत है।" },
            { word1: "सस्ता", word2: "महँगा", category: "गुण", sentence: "आलू सस्ता है। सोना महँगा है।" },
            
            { word1: "गर्म", word2: "ठंडा", category: "अवस्था", sentence: "चाय गर्म है। पानी ठंडा है।" },
            { word1: "गीला", word2: "सूखा", category: "अवस्था", sentence: "तौलिया गीला है, कपड़ा सूखा है।" },
            { word1: "नया", word2: "पुराना", category: "अवस्था", sentence: "नया जूता सुंदर है, पुराना जूता पुराना है।" },
            { word1: "धनी", word2: "गरीब", category: "अवस्था", sentence: "राजा धनी है। भिखारी गरीब है।" },
            { word1: "बलवान", word2: "कमजोर", category: "अवस्था", sentence: "पहलवान बलवान है, बीमार आदमी कमजोर है।" },
            { word1: "स्वस्थ", word2: "अस्वस्थ", category: "अवस्था", sentence: "फल खाने से शरीर स्वस्थ रहता है।" },
            
            { word1: "सुख", word2: "दुख", category: "भावना" },
            { word1: "जीत", word2: "हार", category: "भावना" },
            { word1: "आशा", word2: "निराशा", category: "भावना" },
            { word1: "प्रेम", word2: "घृणा", category: "भावना" },
            { word1: "मित्र", word2: "शत्रु", category: "भावना" },
            
            { word1: "आना", word2: "जाना", category: "क्रिया" },
            { word1: "हँसना", word2: "रोना", category: "क्रिया" },
            { word1: "उठना", word2: "बैठना", category: "क्रिया" },
            { word1: "देना", word2: "लेना", category: "क्रिया" },
            { word1: "खरीदना", word2: "बेचना", category: "क्रिया" },
            { word1: "जागना", word2: "सोना", category: "क्रिया" },
            { word1: "शुरू", word2: "समाप्त", category: "क्रिया" }
        ];

        // Core App State Architecture
        let currentCategory = "सभी";
        let activeView = "single"; // 'single' or 'board'
        
        // Single Mode Pool Mechanics
        let singleShuffleBag = [];
        let currentPair = null;
        let targetIsWord1 = true; 
        let matchedCollection = new Set();
        let selectedTrayCardElement = null;

        // Board Mode Management
        let boardPairCount = 6;
        let selectedBoardLeftCard = null;
        let selectedBoardRightCard = null;

        // Dom Elements Cached
        const categoryFilter = document.getElementById('categoryFilter');
        const toggleViewBtn = document.getElementById('toggleViewBtn');
        const singleModePanel = document.getElementById('singleModePanel');
        const boardModePanel = document.getElementById('boardModePanel');
        
        // Single Panel Dom Elements
        const targetCardSlot = document.getElementById('targetCardSlot');
        const targetMatchSlot = document.getElementById('targetMatchSlot');
        const optionsTray = document.getElementById('optionsTray');
        const contextSentence = document.getElementById('contextSentence');
        const matArrow = document.getElementById('matArrow');
        const collectionList = document.getElementById('collectionList');
        const dropZone = document.getElementById('dropZone');
        
        const nextPairBtn = document.getElementById('nextPairBtn');
        const clearBtn = document.getElementById('clearBtn');
        const speakBtn = document.getElementById('speakBtn');

        // Board Panel Dom Elements
        const boardLeftColumn = document.getElementById('boardLeftColumn');
        const boardRightColumn = document.getElementById('boardRightColumn');
        const resetBoardBtn = document.getElementById('resetBoardBtn');
        const boardCompleteMessage = document.getElementById('boardCompleteMessage');
        const boardModeButtons = document.querySelectorAll('.board-mode-btn');

        // Speech Safety Controls
        function speakWords(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Prevent stacking overlapping audios
                const utterance = new SimpleSpeechUtterance(text);
                utterance.lang = 'hi-IN';
                utterance.rate = 0.85; // Natural child friendly slower pace
                window.speechSynthesis.speak(utterance);
            }
        }

        // Feature Fallback for Speech Engine
        const SimpleSpeechUtterance = window.SpeechSynthesisUtterance || function(text) { this.text = text; };

        // Helper: Utility Array Shuffler
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Filter Database Based on Current Context Settings
        function getFilteredPairs() {
            if (currentCategory === "सभी") return vilomPairs;
            return vilomPairs.filter(p => p.category === currentCategory);
        }

        /* --- SINGLE WORKSPACE LOGIC ENGINE --- */
        function initSingleShuffleBag() {
            const pool = getFilteredPairs();
            singleShuffleBag = shuffleArray(pool);
        }

        function loadNextSinglePair() {
            if (singleShuffleBag.length === 0) {
                initSingleShuffleBag();
                if (singleShuffleBag.length === 0) return; // Fail gracefully if empty category
            }

            // Pop item from pool context
            currentPair = singleShuffleBag.pop();
            
            // Randomize visual alignment representation orientation direction
            targetIsWord1 = Math.random() > 0.5;
            
            resetSingleWorkspaceUI();
            
            // Build target card element structure
            const targetWord = targetIsWord1 ? currentPair.word1 : currentPair.word2;
            targetCardSlot.innerHTML = `<div class="word-card target-fixed">${targetWord}</div>`;
            
            // Generate non conflicting unambiguous distractor items
            const poolForDistractors = vilomPairs.filter(p => p.word1 !== currentPair.word1);
            const shuffledDistractors = shuffleArray(poolForDistractors);
            
            const dynamicTrayOptions = [];
            const correctSolutionText = targetIsWord1 ? currentPair.word2 : currentPair.word1;
            dynamicTrayOptions.push(correctSolutionText);

            // Extract distinct words from fallback items ensuring uniqueness
            for (let i = 0; i < shuffledDistractors.length && dynamicTrayOptions.length < 5; i++) {
                const candidate = Math.random() > 0.5 ? shuffledDistractors[i].word1 : shuffledDistractors[i].word2;
                if (!dynamicTrayOptions.includes(candidate) && candidate !== targetWord) {
                    dynamicTrayOptions.push(candidate);
                }
            }

            const randomizedTrayList = shuffleArray(dynamicTrayOptions);
            optionsTray.innerHTML = '';
            
            randomizedTrayList.forEach(wordText => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = wordText;
                card.setAttribute('draggable', 'true');
                
                // Attach Native Desktop Drag capability
                card.addEventListener('dragstart', (e) => {
                    selectedTrayCardElement = card;
                    e.dataTransfer.setData('text/plain', wordText);
                    card.classList.add('selected');
                });
                
                card.addEventListener('dragend', () => {
                    card.classList.remove('selected');
                });

                // Dual Mode Native Interaction Interface Tap Smartboard Alternative
                card.addEventListener('click', () => {
                    handleTrayCardSelection(card);
                });

                optionsTray.appendChild(card);
            });
        }

        function resetSingleWorkspaceUI() {
            targetMatchSlot.className = 'mat-slot';
            targetMatchSlot.innerText = 'कार्ड यहाँ लाएँ';
            matArrow.className = 'arrow-connector';
            contextSentence.style.display = 'none';
            selectedTrayCardElement = null;
        }

        function handleTrayCardSelection(cardElement) {
            // Unset current tracking selection profiles
            optionsTray.querySelectorAll('.word-card').forEach(c => c.classList.remove('selected'));
            
            selectedTrayCardElement = cardElement;
            cardElement.classList.add('selected');
            targetMatchSlot.classList.add('active-select');
            
            // Instant execution implementation validation pattern for robust Smart Board tap execution
            evaluateMatchExecution(cardElement.innerText, cardElement);
        }

        function evaluateMatchExecution(chosenText, optionalCardEl) {
            const correctSolutionText = targetIsWord1 ? currentPair.word2 : currentPair.word1;
            
            if (chosenText === correctSolutionText) {
                // Correct Match Event Triggered
                targetMatchSlot.innerHTML = `<div class="word-card matched">${correctSolutionText}</div>`;
                targetMatchSlot.className = '';
                matArrow.className = 'arrow-connector connected';
                
                // Play explicit pronunciation feedback
                const targetText = targetIsWord1 ? currentPair.word1 : currentPair.word2;
                speakWords(`${targetText} — ${correctSolutionText}`);

                // Context display line enablement condition checking
                if (currentPair.sentence) {
                    contextSentence.innerText = currentPair.sentence;
                    contextSentence.style.display = 'block';
                }

                // Remove matched object safely from presentation options tray UI array if active
                if (optionalCardEl && optionalCardEl.parentNode === optionsTray) {
                    optionalCardEl.style.visibility = 'hidden';
                } else {
                    // Safety check scan when drop events lack references
                    optionsTray.querySelectorAll('.word-card').forEach(c => {
                        if (c.innerText === correctSolutionText) c.style.visibility = 'hidden';
                    });
                }

                // Archive inside permanent storage array list log compilation 
                savePairToCollection(currentPair.word1, currentPair.word2);

            } else {
                // Erroneous Card Match attempt interaction handling
                if (optionalCardEl) {
                    optionalCardEl.classList.remove('selected');
                    // Simple shake response animation template definition logic placeholder safely bypassed for clean minimal UI
                }
                targetMatchSlot.classList.remove('active-select');
                alert("यह सही विलोम शब्द नहीं है। फिर से सोचो!");
            }
        }

        function savePairToCollection(w1, w2) {
            const serializationKey = `${w1} ↔ ${w2}`;
            if (matchedCollection.has(serializationKey)) return;

            matchedCollection.add(serializationKey);
            
            const collectionItem = document.createElement('div');
            collectionItem.className = 'collection-item';
            collectionItem.innerText = serializationKey;
            
            // Action trigger oral recitation for historic review boards
            collectionItem.addEventListener('click', () => {
                speakWords(`${w1} — ${w2}`);
            });

            collectionList.appendChild(collectionItem);
        }

        /* --- Drag and Drop Standard Desktop Implementation Routing Event Configurations --- */
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const dataText = e.dataTransfer.getData('text/plain');
            if (dataText) {
                evaluateMatchExecution(dataText, selectedTrayCardElement);
            }
        });


        /* --- VIEW B: WHOLE-CLASS MULTI SORTING BOARD GENERATION --- */
        function loadMultiPairBoardMode() {
            boardLeftColumn.innerHTML = '<div class="board-column-title">शब्द</div>';
            boardRightColumn.innerHTML = '<div class="board-column-title">विलोम शब्द</div>';
            boardCompleteMessage.style.display = 'none';
            selectedBoardLeftCard = null;
            selectedBoardRightCard = null;

            const basePool = shuffleArray(getFilteredPairs());
            const activeSliceCount = Math.min(boardPairCount, basePool.length);
            if (activeSliceCount === 0) return;

            const selectedPairsList = basePool.slice(0, activeSliceCount);
            
            // Construct mapping arrangements arrays
            const leftWordsList = selectedPairsList.map((p, idx) => ({ text: p.word1, pairId: idx }));
            const rightWordsList = selectedPairsList.map((p, idx) => ({ text: p.word2, pairId: idx }));

            // High entropy array mixing transformation executions
            const mixedLeftCards = shuffleArray(leftWordsList);
            const mixedRightCards = shuffleArray(rightWordsList);

            // Populating UI Grid system left column boards
            mixedLeftCards.forEach(item => {
                const card = document.createElement('div');
                card.className = 'board-word-card';
                card.innerText = item.text;
                card.dataset.pairId = item.pairId;
                card.addEventListener('click', () => handleBoardCardClick(card, 'left'));
                boardLeftColumn.appendChild(card);
            });

            // Populating UI Grid system right column boards
            mixedRightCards.forEach(item => {
                const card = document.createElement('div');
                card.className = 'board-word-card';
                card.innerText = item.text;
                card.dataset.pairId = item.pairId;
                card.addEventListener('click', () => handleBoardCardClick(card, 'right'));
                boardRightColumn.appendChild(card);
            });
        }

        function handleBoardCardClick(cardElement, columnSide) {
            if (cardElement.classList.contains('matched')) return;

            if (columnSide === 'left') {
                boardLeftColumn.querySelectorAll('.board-word-card').forEach(c => c.classList.remove('selected'));
                if (selectedBoardLeftCard === cardElement) {
                    selectedBoardLeftCard = null;
                } else {
                    selectedBoardLeftCard = cardElement;
                    cardElement.classList.add('selected');
                }
            } else {
                boardRightColumn.querySelectorAll('.board-word-card').forEach(c => c.classList.remove('selected'));
                if (selectedBoardRightCard === cardElement) {
                    selectedBoardRightCard = null;
                } else {
                    selectedBoardRightCard = cardElement;
                    cardElement.classList.add('selected');
                }
            }

            // Verify logic state criteria if matching elements are both selected concurrently
            if (selectedBoardLeftCard && selectedBoardRightCard) {
                const leftId = selectedBoardLeftCard.dataset.pairId;
                const rightId = selectedBoardRightCard.dataset.pairId;

                if (leftId === rightId) {
                    // Valid correlation discovered successfully
                    selectedBoardLeftCard.classList.remove('selected');
                    selectedBoardRightCard.classList.remove('selected');
                    
                    selectedBoardLeftCard.classList.add('matched');
                    selectedBoardRightCard.classList.add('matched');
                    
                    speakWords(`${selectedBoardLeftCard.innerText} — ${selectedBoardRightCard.innerText}`);
                    
                    selectedBoardLeftCard = null;
                    selectedBoardRightCard = null;

                    checkBoardCompletionStatus();
                } else {
                    // Reset selected items on failure mismatch criteria configuration
                    setTimeout(() => {
                        if (selectedBoardLeftCard) selectedBoardLeftCard.classList.remove('selected');
                        if (selectedBoardRightCard) selectedBoardRightCard.classList.remove('selected');
                        selectedBoardLeftCard = null;
                        selectedBoardRightCard = null;
                    }, 400);
                }
            }
        }

        function checkBoardCompletionStatus() {
            const outstandingUnmatchedCards = boardLeftColumn.querySelectorAll('.board-word-card:not(.matched)');
            if (outstandingUnmatchedCards.length === 0) {
                boardCompleteMessage.style.display = 'block';
            }
        }


        /* --- APPLICATION CONTROLS ROUTING ASSIGNMENTS --- */
        categoryFilter.addEventListener('change', (e) => {
            currentCategory = e.target.value;
            initSingleShuffleBag();
            loadNextSinglePair();
            if (activeView === 'board') loadMultiPairBoardMode();
        });

        toggleViewBtn.addEventListener('click', () => {
            if (activeView === 'single') {
                activeView = 'board';
                toggleViewBtn.innerText = 'एकल जोड़ी मोड';
                toggleViewBtn.classList.add('btn-active');
                singleModePanel.classList.remove('active');
                boardModePanel.classList.add('active');
                loadMultiPairBoardMode();
            } else {
                activeView = 'single';
                toggleViewBtn.innerText = 'सभी जोड़ियाँ बोर्ड';
                toggleViewBtn.classList.remove('btn-active');
                boardModePanel.classList.remove('active');
                singleModePanel.classList.add('active');
            }
        });

        nextPairBtn.addEventListener('click', loadNextSinglePair);
        
        clearBtn.addEventListener('click', resetSingleWorkspaceUI);

        speakBtn.addEventListener('click', () => {
            if (currentPair) {
                const targetText = targetIsWord1 ? currentPair.word1 : currentPair.word2;
                const matchCard = targetMatchSlot.querySelector('.word-card');
                if (matchCard) {
                    speakWords(`${currentPair.word1} — ${currentPair.word2}`);
                } else {
                    speakWords(targetText);
                }
            }
        });

        resetBoardBtn.addEventListener('click', loadMultiPairBoardMode);

        boardModeButtons.forEach(button => {
            button.addEventListener('click', () => {
                boardModeButtons.forEach(b => b.classList.remove('active'));
                button.classList.add('active');
                boardPairCount = parseInt(button.dataset.count, 10);
                loadMultiPairBoardMode();
            });
        });

        // Initialize Native Lifecycle Execution State Core Processes
        initSingleShuffleBag();
        loadNextSinglePair();
    </script>
</body>
</html>
