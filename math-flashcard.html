<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Flashcard Challenge</title>
    <style>
        :root {
            --primary: #4cc9f0;
            --secondary: #4895ef;
            --accent: #f72585;
            --success: #4caf50;
            --error: #f44336;
            --bg: #f8f9fa;
            --text: #212529;
            --card-bg: #ffffff;
        }

        [data-theme="space"] {
            --primary: #7209b7;
            --secondary: #3f37c9;
            --bg: #0b090a;
            --card-bg: #161a1d;
            --text: #f5f3f4;
        }

        * { box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #bbb;
        }

        button:active { transform: translateY(3px); box-shadow: none; }

        .op-btn { background: var(--primary); color: white; }
        .op-btn.active { background: var(--accent); box-shadow: 0 4px 0 #a21b56; }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            position: relative;
        }

        .question {
            font-size: 4.5rem;
            margin-bottom: 30px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .opt {
            background: var(--secondary);
            color: white;
            font-size: 2rem;
            padding: 20px;
        }

        .correct-anim { background-color: var(--success) !important; transform: scale(1.05); }
        .wrong-anim { background-color: var(--error) !important; }

        #message {
            height: 30px;
            margin-top: 20px;
            font-size: 1.3rem;
            color: var(--success);
            font-weight: bold;
        }

        .timer-line {
            width: 100%;
            height: 8px;
            background: #eee;
            margin-bottom: 20px;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        #timer-progress {
            width: 100%;
            height: 100%;
            background: var(--accent);
            transition: width 1s linear;
        }

        @media (max-width: 400px) {
            .question { font-size: 3rem; }
            .opt { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Streak: <span id="streak">0</span> <span id="fire"></span></div>
        <div class="stat" id="timer-display">Time: --</div>
    </div>

    <div class="nav-panel">
        <button class="op-btn active" onclick="changeMode('add', this)">Addition (+)</button>
        <button class="op-btn" onclick="changeMode('sub', this)">Subtraction (-)</button>
        <button class="op-btn" onclick="changeMode('mul', this)">Multiplication (×)</button>
        <button class="op-btn" onclick="changeMode('div', this)">Division (÷)</button>
    </div>

    <div class="timer-line" id="timer-container"><div id="timer-progress"></div></div>

    <div class="card">
        <div class="question" id="q-text">Ready?</div>
        <div class="options" id="opt-container">
            <button class="opt" onclick="startGame()">Start</button>
            <button class="opt" onclick="startGame()">Game</button>
        </div>
        <div id="message"></div>
    </div>

    <div class="nav-panel" style="margin-top: 30px;">
        <button onclick="toggleTimer()" id="t-btn" style="background: #fb8500; color: white;">60s Challenge</button>
        <button onclick="resetGame()" style="background: #6c757d; color: white;">Reset Score</button>
        <button onclick="document.body.getAttribute('data-theme') === 'space' ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'space')" style="background: #219ebc; color: white;">Theme</button>
    </div>

    <script>
        let score = 0, streak = 0, total = 0;
        let currentMode = 'add';
        let correctAnswer = 0;
        let isLocked = false;
        let timer = null;
        let timeLeft = 60;

        // Sound Engine (Safe Load)
        const playSfx = (freq, type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch(e) { console.log("Audio blocked"); }
        };

        function changeMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            nextQuestion();
        }

        function startGame() {
            score = 0; streak = 0;
            updateStats();
            nextQuestion();
        }

        function nextQuestion() {
            isLocked = false;
            document.getElementById('message').innerText = "";
            let n1, n2, symbol;

            if (currentMode === 'add') {
                n1 = Math.floor(Math.random() * 20) + 1;
                n2 = Math.floor(Math.random() * 20) + 1;
                correctAnswer = n1 + n2; symbol = '+';
            } else if (currentMode === 'sub') {
                n1 = Math.floor(Math.random() * 20) + 10;
                n2 = Math.floor(Math.random() * n1);
                correctAnswer = n1 - n2; symbol = '-';
            } else if (currentMode === 'mul') {
                n1 = Math.floor(Math.random() * 10) + 1;
                n2 = Math.floor(Math.random() * 10) + 1;
                correctAnswer = n1 * n2; symbol = '×';
            } else {
                n2 = Math.floor(Math.random() * 9) + 2;
                correctAnswer = Math.floor(Math.random() * 10) + 1;
                n1 = n2 * correctAnswer; symbol = '÷';
            }

            document.getElementById('q-text').innerText = `${n1} ${symbol} ${n2}`;
            generateOptions(correctAnswer);
        }

        function generateOptions(correct) {
            let choices = new Set([correct]);
            while(choices.size < 4) {
                let off = Math.floor(Math.random() * 10) - 5;
                let bad = correct + off;
                if(bad >= 0) choices.add(bad);
            }
            
            const btnArea = document.getElementById('opt-container');
            btnArea.innerHTML = "";
            [...choices].sort(() => Math.random() - 0.5).forEach(val => {
                const b = document.createElement('button');
                b.className = 'opt';
                b.innerText = val;
                b.onclick = () => check(val, b);
                btnArea.appendChild(b);
            });
        }

        function check(val, btn) {
            if(isLocked) return;
            isLocked = true;
            
            if(val === correctAnswer) {
                score++; streak++;
                btn.classList.add('correct-anim');
                document.getElementById('message').innerText = "Correct! 🌟";
                playSfx(600, 'sine');
            } else {
                streak = 0;
                btn.classList.add('wrong-anim');
                document.getElementById('message').innerText = `Oops! It was ${correctAnswer}`;
                playSfx(150, 'triangle');
            }

            updateStats();
            setTimeout(nextQuestion, 1200);
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            document.getElementById('fire').innerText = streak >= 5 ? '🔥' : '';
        }

        function toggleTimer() {
            if(timer) {
                clearInterval(timer);
                timer = null;
                document.getElementById('t-btn').innerText = "60s Challenge";
                document.getElementById('timer-container').style.display = 'none';
            } else {
                timeLeft = 60;
                score = 0; streak = 0; updateStats();
                document.getElementById('timer-container').style.display = 'block';
                document.getElementById('t-btn').innerText = "Stop Timer";
                timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = `Time: ${timeLeft}s`;
                    document.getElementById('timer-progress').style.width = (timeLeft/60*100) + "%";
                    if(timeLeft <= 0) {
                        clearInterval(timer);
                        alert("Time up! Final Score: " + score);
                        toggleTimer();
                    }
                }, 1000);
                nextQuestion();
            }
        }

        function resetGame() {
            score = 0; streak = 0;
            updateStats();
            nextQuestion();
        }

        // Auto-start first question
        window.onload = nextQuestion;
    </script>
</body>
</html>
