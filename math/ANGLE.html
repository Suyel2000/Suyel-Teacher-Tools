<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Angle Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #eef2f3; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .angle-viz { position: relative; width: 300px; height: 300px; margin: 30px auto; border-bottom: 4px solid #333; border-left: 4px solid #333; }
        .arm { 
            position: absolute; bottom: 0; left: 0; 
            width: 250px; height: 6px; background: #e74c3c; 
            transform-origin: left center; transition: transform 0.1s; 
            border-radius: 10px;
        }
        .angle-arc {
            position: absolute; bottom: 0; left: 0;
            width: 80px; height: 80px; border: 3px solid #3498db;
            border-radius: 0 100% 0 0; opacity: 0.5;
            background: rgba(52, 152, 219, 0.2);
        }

        #angle-name { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 15px 0; }
        #degree-text { font-size: 24px; color: #7f8c8d; }
        
        input[type=range] { width: 100%; margin: 20px 0; cursor: pointer; }
        
        .fact-card { background: #d5f5e3; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>📐 Angle Explorer</h1>
    <p>Move the slider to rotate the red arm!</p>

    <div class="angle-viz">
        <div class="angle-arc" id="arc"></div>
        <div class="arm" id="moving-arm"></div>
    </div>

    <div id="degree-text">0°</div>
    <div id="angle-name">Zero Angle</div>

    <input type="range" id="angle-slider" min="0" max="180" value="0">

    <div class="fact-card" id="fact-card">
        <strong>Did you know?</strong> <span id="fact-text"></span>
    </div>
</div>

<script>
    const slider = document.getElementById('angle-slider');
    const arm = document.getElementById('moving-arm');
    const degreeText = document.getElementById('degree-text');
    const angleName = document.getElementById('angle-name');
    const factCard = document.getElementById('fact-card');
    const factText = document.getElementById('fact-text');

    function updateAngle() {
        const val = slider.value;
        // We rotate negative because CSS rotation is clockwise
        arm.style.transform = `rotate(-${val}deg)`;
        degreeText.innerText = val + "°";

        let type = "";
        let fact = "";
        factCard.style.display = "block";

        if (val == 0) {
            type = "Zero Angle";
            fact = "The two lines are perfectly on top of each other!";
        } else if (val < 90) {
            type = "Acute Angle";
            fact = "This angle is 'a-cute' because it's small (less than 90°).";
            angleName.style.color = "#27ae60";
        } else if (val == 90) {
            type = "Right Angle";
            fact = "Like the corner of a book or a square. Exactly 90°!";
            angleName.style.color = "#2980b9";
        } else if (val < 180) {
            type = "Obtuse Angle";
            fact = "This is a big, wide angle (between 90° and 180°).";
            angleName.style.color = "#e67e22";
        } else {
            type = "Straight Angle";
            fact = "It looks just like a flat line. Exactly 180°!";
            angleName.style.color = "#c0392b";
        }

        angleName.innerText = type;
        factText.innerText = fact;
    }

    slider.oninput = updateAngle;
    updateAngle(); // Initial call
</script>

</body>
</html>
