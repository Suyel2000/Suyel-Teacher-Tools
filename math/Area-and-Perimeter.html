<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Garden Fence Architect</title>
    <style>
        :root {
            --grass: #78e08f;
            --fence: #63474d;
            --text: #2f3542;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f2f6; color: var(--text); text-align: center; padding: 20px; }
        .app-card { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .controls { display: flex; justify-content: space-around; background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        input[type=range] { cursor: pointer; width: 150px; }
        label { font-weight: bold; color: var(--fence); }

        .garden-plot { 
            height: 320px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #e1e4e8; 
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #garden {
            background-color: var(--grass);
            background-image: 
                linear-gradient(white 1px, transparent 1px),
                linear-gradient(90deg, white 1px, transparent 1px);
            background-size: 20px 20px; /* Each grid square is 20px */
            border: 4px dashed var(--fence);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: rgba(0,0,0,0.3);
        }

        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .result-box { padding: 15px; border-radius: 10px; color: white; }
        .perimeter-box { background: #e67e22; }
        .area-box { background: #27ae60; }
        .value { font-size: 28px; font-weight: bold; display: block; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JSVKBDWEV5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JSVKBDWEV5');
</script>
<body>

<div class="app-card">
    <h1>🏡 Garden Architect</h1>
    <p>Adjust the sliders to build your perfect garden!</p>

    <div class="controls">
        <div class="control-group">
            <label>Length (m): <span id="lenLabel">5</span></label>
            <input type="range" id="lenInput" min="1" max="15" value="5">
        </div>
        <div class="control-group">
            <label>Width (m): <span id="widLabel">5</span></label>
            <input type="range" id="widInput" min="1" max="10" value="5">
        </div>
    </div>

    <div class="garden-plot">
        <div id="garden"></div>
    </div>

    <div class="results">
        <div class="result-box perimeter-box">
            <span>Fence (Perimeter)</span>
            <span class="value" id="periVal">20 m</span>
            <small id="periFormula">2 × (5 + 5)</small>
        </div>
        <div class="result-box area-box">
            <span>Grass (Area)</span>
            <span class="value" id="areaVal">25 m²</span>
            <small id="areaFormula">5 × 5</small>
        </div>
    </div>
</div>

<script>
    const lenInput = document.getElementById('lenInput');
    const widInput = document.getElementById('widInput');
    const garden = document.getElementById('garden');

    function updateGarden() {
        const L = parseInt(lenInput.value);
        const W = parseInt(widInput.value);

        // Update Labels
        document.getElementById('lenLabel').innerText = L;
        document.getElementById('widLabel').innerText = W;

        // Update Visual (Scale 1m = 20px)
        garden.style.width = (L * 20) + "px";
        garden.style.height = (W * 20) + "px";
        garden.innerText = `${L}x${W}`;

        // Calculations
        const perimeter = 2 * (L + W);
        const area = L * W;

        // Update Results
        document.getElementById('periVal').innerText = perimeter + " m";
        document.getElementById('periFormula').innerText = `2 × (${L} + ${W})`;
        
        document.getElementById('areaVal').innerText = area + " m²";
        document.getElementById('areaFormula').innerText = `${L} × ${W}`;
    }

    lenInput.oninput = updateGarden;
    widInput.oninput = updateGarden;

    // Initial Start
    updateGarden();
</script>

</body>
</html>
