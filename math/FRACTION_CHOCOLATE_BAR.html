<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraction Chocolate Bar</title>
    <style>
        :root {
            --bar-color: #7B3F00; /* Chocolate Brown */
            --highlight: #FFD700; /* Gold */
        }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fdf2e9; padding: 20px; }
        .app-container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border: 4px solid var(--bar-color); }
        
        .fraction-ui { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 30px; }
        
        /* The Fraction "Look" */
        .fraction-input { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .fraction-line { width: 60px; height: 4px; background: black; border-radius: 2px; }
        input { width: 70px; font-size: 28px; text-align: center; padding: 5px; border: 2px solid #ccc; border-radius: 8px; }
        
        /* The Chocolate Bar */
        #bar-container { 
            display: grid; 
            width: 100%; 
            height: 120px; 
            background: #eee; 
            border: 4px solid var(--bar-color); 
            border-radius: 10px; 
            overflow: hidden; 
            margin: 20px 0;
        }
        .piece { 
            border: 1px solid rgba(255,255,255,0.3); 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: transparent;
        }
        .piece.filled { background: var(--bar-color); color: white; }
        .piece.empty { background: #d2b48c; }
        .piece:hover { opacity: 0.8; color: black; }

        .info { font-size: 20px; font-weight: bold; margin-top: 15px; color: #5d4037; }
        .decimal-hint { color: #888; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🍫 Fraction Chocolate Bar</h1>
    <p>How many pieces in the whole bar? (Denominator)<br>How many do you want to eat? (Numerator)</p>

    <div class="fraction-ui">
        <div class="fraction-input">
            <input type="number" id="numerator" value="1" min="0">
            <div class="fraction-line"></div>
            <input type="number" id="denominator" value="4" min="1" max="100">
        </div>
        <div style="font-size: 40px;">=</div>
        <div id="percentage-box" style="font-size: 32px; font-weight: bold; color: #2e7d32;">25%</div>
    </div>

    <div id="bar-container"></div>

    <div class="info" id="status-text">1 out of 4 pieces</div>
    <div class="decimal-hint" id="decimal-text">Decimal: 0.25</div>
    
    <button onclick="reset()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">Reset Bar</button>
</div>

<script>
    const nInput = document.getElementById('numerator');
    const dInput = document.getElementById('denominator');
    const container = document.getElementById('bar-container');
    const statusText = document.getElementById('status-text');
    const decimalText = document.getElementById('decimal-text');
    const percBox = document.getElementById('percentage-box');

    function updateBar() {
        let n = parseInt(nInput.value) || 0;
        let d = parseInt(dInput.value) || 1;

        // Validation logic
        if (d < 1) { d = 1; dInput.value = 1; }
        if (n > d) { n = d; nInput.value = d; }
        if (n < 0) { n = 0; nInput.value = 0; }

        // Setup Grid
        container.style.gridTemplateColumns = `repeat(${d}, 1fr)`;
        container.innerHTML = '';

        for (let i = 0; i < d; i++) {
            const piece = document.createElement('div');
            piece.className = 'piece ' + (i < n ? 'filled' : 'empty');
            piece.innerText = '1/' + d;
            
            // Interaction: Clicking a piece sets the numerator
            piece.onclick = () => {
                nInput.value = i + 1;
                updateBar();
            };
            
            container.appendChild(piece);
        }

        // Update Text
        statusText.innerText = `${n} out of ${d} pieces selected`;
        const val = (n / d);
        decimalText.innerText = `Decimal Value: ${val.toFixed(2)}`;
        percBox.innerText = Math.round(val * 100) + "%";
    }

    function reset() {
        nInput.value = 1;
        dInput.value = 4;
        updateBar();
    }

    nInput.oninput = updateBar;
    dInput.oninput = updateBar;

    // Start
    updateBar();
</script>

</body>
</html>
