<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Factor & Multiple Factory</title>
    <style>
        :root {
            --factor-color: #9b59b6;
            --multiple-color: #2ecc71;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .section { margin-bottom: 40px; padding: 20px; border-radius: 15px; border: 2px solid #eee; }
        h2 { margin-top: 0; }
        
        input[type=number] { width: 80px; padding: 10px; font-size: 20px; border-radius: 8px; border: 2px solid #ddd; text-align: center; }
        
        /* Factor Styles */
        #factor-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .array-container { display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; padding: 10px; border-radius: 8px; background: #fafafa; }
        .grid { display: grid; gap: 2px; margin-bottom: 10px; }
        .block { width: 12px; height: 12px; background: var(--factor-color); border-radius: 2px; }
        
        /* Multiple Styles */
        #multiple-line { display: flex; overflow-x: auto; gap: 10px; padding: 20px; white-space: nowrap; }
        .m-box { 
            min-width: 60px; height: 60px; background: var(--multiple-color); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border-radius: 10px; font-size: 20px;
            animation: pop 0.3s ease;
        }
        
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏭 Factor & Multiple Factory</h1>

    <div class="section" style="border-color: var(--factor-color);">
        <h2 style="color: var(--factor-color);">The Factor Breaker</h2>
        <p>Enter a number to see all its "Building Blocks" (Factors):</p>
        <input type="number" id="factorInput" value="12" min="1" max="50">
        <div id="factor-area"></div>
        <p class="label" id="factorList"></p>
    </div>

    <div class="section" style="border-color: var(--multiple-color);">
        <h2 style="color: var(--multiple-color);">The Multiple Grower</h2>
        <p>Enter a number to see it grow:</p>
        <input type="number" id="multipleInput" value="5" min="1" max="20">
        <div id="multiple-line"></div>
    </div>
</div>

<script>
    const fInput = document.getElementById('factorInput');
    const mInput = document.getElementById('multipleInput');
    const fArea = document.getElementById('factor-area');
    const mLine = document.getElementById('multiple-line');

    function calculateFactors() {
        const num = parseInt(fInput.value) || 1;
        fArea.innerHTML = '';
        let factors = [];

        for (let i = 1; i <= num; i++) {
            if (num % i === 0) {
                factors.push(i);
                // Create visual array for the pair (i x num/i)
                const rows = i;
                const cols = num / i;
                
                const container = document.createElement('div');
                container.className = 'array-container';
                container.innerHTML = `<span style="font-size:12px; margin-bottom:5px;">${rows} × ${cols}</span>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid';
                grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                
                for (let j = 0; j < num; j++) {
                    const block = document.createElement('div');
                    block.className = 'block';
                    grid.appendChild(block);
                }
                
                container.appendChild(grid);
                fArea.appendChild(container);
            }
        }
        document.getElementById('factorList').innerText = `Factors of ${num}: ${factors.join(', ')}`;
    }

    function calculateMultiples() {
        const num = parseInt(mInput.value) || 1;
        mLine.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const box = document.createElement('div');
            box.className = 'm-box';
            box.innerText = num * i;
            mLine.appendChild(box);
        }
    }

    fInput.addEventListener('input', calculateFactors);
    mInput.addEventListener('input', calculateMultiples);

    // Initial run
    calculateFactors();
    calculateMultiples();
</script>

</body>
</html>
