<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Interactive Learning Clock</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #f0f7ff;
            --clock-face: #ffffff;
            --hour-hand: #333;
            --min-hand: #4ecdc4;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: none; /* Prevents scrolling while dragging on mobile */
        }

        h1 { color: #2d3436; margin-bottom: 10px; }

        /* Clock Container */
        .clock-container {
            position: relative;
            width: 350px;
            height: 350px;
            background: var(--clock-face);
            border: 15px solid var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            user-select: none;
        }

        /* Clock Markings */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.4rem;
            padding: 15px;
            box-sizing: border-box;
            color: #2d3436;
        }

        .minute-marker {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: #999;
            padding: 2px;
            box-sizing: border-box;
            display: none; /* Hidden by default, toggled by guides */
        }

        /* Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
            cursor: grab;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hour-hand {
            width: 8px;
            height: 25%;
            background: var(--hour-hand);
            z-index: 3;
        }

        .min-hand {
            width: 5px;
            height: 40%;
            background: var(--min-hand);
            z-index: 2;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
        }

        /* Displays */
        .display-area {
            margin-top: 30px;
            text-align: center;
            min-width: 300px;
        }

        .digital-clock {
            font-size: 2.5rem;
            background: #2d3436;
            color: #00ff00;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            font-family: monospace;
            margin-bottom: 10px;
        }

        .time-words {
            font-size: 1.5rem;
            color: #4834d4;
            font-weight: bold;
            height: 1.6em;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #eee; }
        button.active { background: var(--primary-color); color: white; }

        .challenge-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border: 2px dashed #ffc107;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        /* Utility */
        .hidden { display: none !important; }
        .guide-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed #ccc;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Learn to Tell Time!</h1>

    <div class="clock-container" id="clockFace">
        <div class="guide-circle hidden" id="guideHr" style="width: 55%; height: 55%;"></div>
        <div class="guide-circle hidden" id="guideMin" style="width: 85%; height: 85%;"></div>
        
        <div id="numbers-container"></div>
        
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand min-hand" id="minHand"></div>
        <div class="center-dot"></div>
    </div>

    <div class="display-area">
        <div class="digital-clock" id="digitalDisplay">12:00</div>
        <div class="time-words" id="wordsDisplay">12 o'clock</div>
    </div>

    <div class="challenge-box" id="challengeBox">
        <p id="challengeText"></p>
        <button onclick="checkAnswer()">Check Answer</button>
    </div>

    <div class="controls">
        <button onclick="toggleElement('hourHand', this)" class="active">Hour Hand</button>
        <button onclick="toggleElement('minHand', this)" class="active">Minute Hand</button>
        <button onclick="toggleGuides(this)">Guide Circles</button>
        <button onclick="toggleElement('digitalDisplay', this)" class="active">Digital Clock</button>
        <button onclick="toggleElement('wordsDisplay', this)" class="active">Words</button>
        <button onclick="toggleFormat()">12/24 Hour</button>
        <button onclick="resetClock()">Reset Clock</button>
        <button onclick="startChallenge()" id="challengeBtn">Challenge Mode</button>
        <button onclick="changeTheme()" style="background: #e0e0e0;">Change Color</button>
    </div>

    <script>
        let hour = 12;
        let minute = 0;
        let is24Hour = false;
        let targetTime = null;

        // Initialize Clock Numbers
        const numContainer = document.getElementById('numbers-container');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            num.style.transform = `rotate(${i * 30}deg)`;
            num.innerHTML = `<span style="display:inline-block; transform: rotate(-${i * 30}deg)">${i}</span>`;
            numContainer.appendChild(num);
        }

        // Initialize Minute Markers
        for (let i = 1; i <= 60; i++) {
            const mark = document.createElement('div');
            mark.className = 'minute-marker';
            mark.style.transform = `rotate(${i * 6}deg)`;
            mark.innerHTML = `<span style="display:inline-block; transform: rotate(-${i * 6}deg)">.</span>`;
            numContainer.appendChild(mark);
        }

        function updateClockUI() {
            const hrDeg = (hour % 12) * 30 + (minute * 0.5);
            const minDeg = minute * 6;
            
            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hrDeg}deg)`;
            document.getElementById('minHand').style.transform = `translateX(-50%) rotate(${minDeg}deg)`;

            // Digital Display
            let displayHr = hour;
            let ampm = "";
            if (!is24Hour) {
                ampm = hour >= 12 ? " PM" : " AM";
                displayHr = hour % 12 || 12;
            }
            document.getElementById('digitalDisplay').innerText = 
                `${displayHr.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}${ampm}`;

            // Words Display
            document.getElementById('wordsDisplay').innerText = getTimeInWords(hour, minute);
        }

        function getTimeInWords(h, m) {
            const numbers = ["twelve", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve"];
            const h12 = h % 12 || 12;
            const nextH = (h + 1) % 12 || 12;

            if (m === 0) return `${numbers[h12]} o'clock`;
            if (m === 15) return `Quarter past ${numbers[h12]}`;
            if (m === 30) return `Half past ${numbers[h12]}`;
            if (m === 45) return `Quarter to ${numbers[nextH]}`;
            
            if (m < 30) {
                return `${m} minute${m>1?'s':''} past ${numbers[h12]}`;
            } else {
                return `${60 - m} minute${(60-m)>1?'s':''} to ${numbers[nextH]}`;
            }
        }

        // Interaction Logic
        function handleDrag(e) {
            const rect = document.getElementById('clockFace').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const angle = Math.atan2(clientY - centerY, clientX - centerX) * 180 / Math.PI + 90;
            const normalizedAngle = angle < 0 ? angle + 360 : angle;

            if (activeHand === 'minHand') {
                const newMin = Math.round(normalizedAngle / 6) % 60;
                // Detect full rotation to move hour
                if (minute > 45 && newMin < 15) hour = (hour + 1) % 24;
                if (minute < 15 && newMin > 45) hour = (hour + 23) % 24;
                minute = newMin;
            } else {
                hour = Math.floor(normalizedAngle / 30);
            }
            updateClockUI();
        }

        let activeHand = null;
        const clockFace = document.getElementById('clockFace');

        const startDrag = (e) => {
            if (e.target.classList.contains('hand')) {
                activeHand = e.target.id;
                window.addEventListener(e.type === 'touchstart' ? 'touchmove' : 'mousemove', handleDrag);
            }
        };

        const stopDrag = () => {
            activeHand = null;
            window.removeEventListener('mousemove', handleDrag);
            window.removeEventListener('touchmove', handleDrag);
        };

        clockFace.addEventListener('mousedown', startDrag);
        clockFace.addEventListener('touchstart', startDrag);
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);

        // Controls
        function toggleElement(id, btn) {
            document.getElementById(id).classList.toggle('hidden');
            btn.classList.toggle('active');
        }

        function toggleGuides(btn) {
            document.getElementById('guideHr').classList.toggle('hidden');
            document.getElementById('guideMin').classList.toggle('hidden');
            document.querySelectorAll('.minute-marker').forEach(el => el.classList.toggle('hidden'));
            btn.classList.toggle('active');
        }

        function toggleFormat() {
            is24Hour = !is24Hour;
            updateClockUI();
        }

        function resetClock() {
            hour = 12; minute = 0;
            updateClockUI();
        }

        function changeTheme() {
            const colors = ['#ff6b6b', '#4ecdc4', '#ffbe0b', '#a29bfe', '#55efc4'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.documentElement.style.setProperty('--primary-color', randomColor);
        }

        // Challenge Mode
        function startChallenge() {
            const h = Math.floor(Math.random() * 12) + 1;
            const m = [0, 15, 30, 45, 10, 20, 50][Math.floor(Math.random() * 7)];
            targetTime = { h, m };
            
            document.getElementById('challengeBox').style.display = 'block';
            document.getElementById('challengeText').innerText = `Set the clock to: ${getTimeInWords(h, m)}`;
        }

        function checkAnswer() {
            const currentH12 = hour % 12 || 12;
            if (currentH12 === targetTime.h && minute === targetTime.m) {
                alert("🌟 Great job! That is correct!");
                document.getElementById('challengeBox').style.display = 'none';
            } else {
                alert("Not quite right. Try again!");
            }
        }

        // Initial update
        updateClockUI();
    </script>
</body>
</html>
