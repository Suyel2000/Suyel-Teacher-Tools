<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Indian Monuments Quiz</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#fff3e0,#ffffff);text-align:center}
.hero{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff;padding:20px}
.card{max-width:900px;margin:15px auto;background:#fff;padding:20px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.2)}
img{width:340px;max-width:95%;border-radius:16px}
.option{display:block;width:100%;margin:10px 0;padding:15px;border:none;border-radius:12px;font-size:18px;cursor:pointer}
.correct{background:#4caf50!important;color:#fff}
.wrong{background:#f44336!important;color:#fff}
.progress{height:22px;background:#ddd;border-radius:11px;overflow:hidden}
.bar{height:100%;background:#4caf50;width:0%}
.btn{padding:12px 20px;border:none;border-radius:10px;color:#fff;cursor:pointer;margin:5px;font-size:16px}
.next{background:#2196f3}.prev{background:#9c27b0}
#certificate{display:none}
#feedback{font-size:20px;font-weight:bold;margin-top:10px}
</style>
</head>
<body>
<div class="hero"><h1>🏛️ Indian Monuments Quiz</h1><p>Discover India's Heritage</p></div>
<div class="card" id="quizCard">
<div>Score: <span id="score">0</span></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<h3 id="qno"></h3>
<img id="qimg">
<h2 id="question"></h2>
<div id="options"></div>
<div id="feedback"></div>
<button class="btn prev" onclick="prevQuestion()">⬅ Previous</button>
<button class="btn next" onclick="nextQuestion()">Next ➡</button>
</div>

<div class="card" id="certificate">
<h1>🏆 Certificate of Achievement</h1>
<input id="student" placeholder="Student Name" style="padding:10px;width:260px"><br><br>
<div id="result"></div>
<button class="btn next" onclick="window.print()">🖨 Print Certificate</button>
<button class="btn prev" onclick="location.reload()">🔄 Restart Quiz</button>
</div>

<script>
const quiz=[
{q:"Guess the monument.",img:"..quiz-image/taj-mahal.png",a:["Taj Mahal","Red Fort","India Gate","Charminar"],ans:"Taj Mahal",loc:"Agra, Uttar Pradesh"},
{q:"Guess the monument.",img:"..quiz-image/qutub-minar.png",a:["Qutub Minar","India Gate","Gateway of India","Red Fort"],ans:"Qutub Minar",loc:"Delhi"},
{q:"Guess the monument.",img:"..quiz-image/india-gate.png",a:["India Gate","Red Fort","Qutub Minar","Charminar"],ans:"India Gate",loc:"Delhi"},
{q:"Guess the monument.",img:"..quiz-image/red-fort.png",a:["Red Fort","India Gate","Agra Fort","Charminar"],ans:"Red Fort",loc:"Delhi"},
{q:"Guess the monument.",img:"..quiz-image/charminar.png",a:["Charminar","Gateway of India","Red Fort","Qutub Minar"],ans:"Charminar",loc:"Hyderabad, Telangana"},
{q:"Guess the monument.",img:"..quiz-image/gateway-of-india.png",a:["Gateway of India","India Gate","Red Fort","Charminar"],ans:"Gateway of India",loc:"Mumbai, Maharashtra"},
{q:"Guess the monument.",img:"..quiz-image/konark-sun-temple.png",a:["Konark Sun Temple","Lotus Temple","Golden Temple","Jagannath Temple"],ans:"Konark Sun Temple",loc:"Konark, Odisha"},
{q:"Guess the monument.",img:"..quiz-image/hawa-mahal.png",a:["Hawa Mahal","City Palace","Mysore Palace","Red Fort"],ans:"Hawa Mahal",loc:"Jaipur, Rajasthan"},
{q:"Guess the monument.",img:"..quiz-image/sanchi-stupa.png",a:["Sanchi Stupa","Ajanta Caves","Ellora Caves","Red Fort"],ans:"Sanchi Stupa",loc:"Sanchi, Madhya Pradesh"},
{q:"Guess the monument.",img:"..quiz-image/mysore-palace.png",a:["Mysore Palace","City Palace","Red Fort","India Gate"],ans:"Mysore Palace",loc:"Mysuru, Karnataka"}
{q:"Guess the monument.",img:"..quiz-image/lotus-temple.png",a:["Lotus Temple","Golden Temple","India Gate","Charminar"],ans:"Lotus Temple",loc:"Delhi"},
{q:"Guess the monument.",img:"..quiz-image/golden-temple.png",a:["Golden Temple","Lotus Temple","Konark Sun Temple","Red Fort"],ans:"Golden Temple",loc:"Amritsar, Punjab"},
{q:"Guess the monument.",img:"..quiz-image/victoria-memorial.png",a:["Victoria Memorial","India Gate","Mysore Palace","Red Fort"],ans:"Victoria Memorial",loc:"Kolkata, West Bengal"},
{q:"Guess the monument.",img:"..quiz-image/ajanta-caves.png",a:["Ajanta Caves","Ellora Caves","Sanchi Stupa","Red Fort"],ans:"Ajanta Caves",loc:"Aurangabad, Maharashtra"},
{q:"Guess the monument.",img:"..quiz-image/ellora-caves.png",a:["Ellora Caves","Ajanta Caves","Sanchi Stupa","India Gate"],ans:"Ellora Caves",loc:"Aurangabad, Maharashtra"},
{q:"Guess the monument.",img:"..quiz-image/gol-gumbaz.png",a:["Gol Gumbaz","Qutub Minar","Charminar","India Gate"],ans:"Gol Gumbaz",loc:"Vijayapura, Karnataka"},
{q:"Guess the monument.",img:"..quiz-image/brihadeeswara-temple.png",a:["Brihadeeswara Temple","Konark Sun Temple","Golden Temple","Lotus Temple"],ans:"Brihadeeswara Temple",loc:"Thanjavur, Tamil Nadu"},
{q:"Guess the monument.",img:"..quiz-image/jagannath-temple.png",a:["Jagannath Temple","Golden Temple","Lotus Temple","Konark Sun Temple"],ans:"Jagannath Temple",loc:"Puri, Odisha"},
{q:"Guess the monument.",img:"..quiz-image/city-palace.png",a:["City Palace","Mysore Palace","Red Fort","India Gate"],ans:"City Palace",loc:"Jaipur, Rajasthan"},
{q:"Guess the monument.",img:"..quiz-image/meenakshi-temple.png",a:["Meenakshi Temple","Jagannath Temple","Golden Temple","Lotus Temple"],ans:"Meenakshi Temple",loc:"Madurai, Tamil Nadu"}
];
let current=0,score=0,answered=false;
function beep(freq,dur){let a=new(window.AudioContext||window.webkitAudioContext)();let o=a.createOscillator();o.frequency.value=freq;o.connect(a.destination);o.start();setTimeout(()=>{o.stop();a.close();},dur);}
function load(){
answered=false;
let q=quiz[current];
qno.innerHTML=`Question ${current+1} of ${quiz.length}`;
question.innerText=q.q;
qimg.src=q.img;
bar.style.width=((current+1)/quiz.length*100)+'%';
feedback.innerHTML='';
options.innerHTML='';
q.a.forEach(x=>{
let b=document.createElement('button');
b.className='option'; b.innerText=x;
b.onclick=()=>check(b,x);
options.appendChild(b);
});
}
function check(btn,val){
if(answered)return;
answered=true;
let q=quiz[current];
document.querySelectorAll('.option').forEach(b=>{
if(b.innerText===q.ans)b.classList.add('correct');
if(b.innerText===val && val!==q.ans)b.classList.add('wrong');
});
if(val===q.ans){score++;scoreEl();beep(700,200);feedback.innerHTML=`✅ Correct!<br>📍 ${q.loc}`;}
else{beep(250,300);feedback.innerHTML=`❌ Correct Answer: ${q.ans}<br>📍 ${q.loc}`;}
}
function scoreEl(){document.getElementById('score').innerText=score;}
function nextQuestion(){if(current<quiz.length-1){current++;load();}else finish();}
function prevQuestion(){if(current>0){current--;load();}}
function finish(){
quizCard.style.display='none';
certificate.style.display='block';
let pct=Math.round(score/quiz.length*100);
let badge=pct>=90?'🏆 Heritage Master':pct>=70?'🌟 Monument Explorer':pct>=50?'👍 History Learner':'📚 Keep Practicing';
result.innerHTML=`<h2>Score: ${score}/${quiz.length}</h2><h3>${pct}%</h3><h2>${badge}</h2>`;
for(let i=0;i<60;i++){let e=document.createElement('div');e.innerHTML='🎉';e.style.position='fixed';e.style.left=Math.random()*100+'vw';e.style.top='-20px';e.style.fontSize='24px';document.body.appendChild(e);setTimeout(()=>e.style.top='100vh',50);}
beep(900,400);
}
load();
</script>
</body></html>
