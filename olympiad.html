<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympiad Prep - Coming Soon!</title>
    <!-- Friendly, rounded font perfect for primary learners -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #che2ff 50%, #f3e8ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #334155;
            position: relative;
        }

        /* Playful floating background shapes */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: float-around 20s infinite linear;
        }

        .bubble:nth-child(1) { width: 80px; height: 80px; top: 15%; left: 10%; animation-duration: 25s; }
        .bubble:nth-child(2) { width: 120px; height: 120px; bottom: 15%; right: 10%; animation-duration: 30s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; top: 70%; left: 15%; animation-duration: 18s; }

        .container {
            max-width: 650px;
            width: 90%;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(148, 163, 184, 0.15);
            border: 4px solid #ffffff;
            text-align: center;
            z-index: 10;
            transform: translateY(0);
            animation: fade-in 1.2s ease-out;
        }

        .rocket-container {
            font-size: 5rem;
            display: inline-block;
            margin-bottom: 20px;
            animation: rocket-launch 3s ease-in-out infinite alternate;
        }

        h1 {
            font-size: 3rem;
            color: #4f46e5;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 1.35rem;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .tagline-box {
            background: linear-gradient(135deg, #ffedd5 0%, #fef3c7 100%);
            padding: 20px 25px;
            border-radius: 20px;
            border: 2px dashed #f59e0b;
            display: inline-block;
            box-shadow: 0 8px 16px rgba(245, 158, 11, 0.05);
        }

        .tagline {
            font-size: 1.25rem;
            color: #b45309;
            font-weight: 600;
        }

        .star-emoji {
            display: inline-block;
            animation: twist 2s infinite linear;
        }

        /* Animations */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rocket-launch {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
            100% { transform: translateY(0) rotate(-3deg); }
        }

        @keyframes twist {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.15) rotate(15deg); }
        }

        @keyframes float-around {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            50% { transform: translateY(-30px) translateX(20px) rotate(180deg); }
            100% { transform: translateY(0px) translateX(0px) rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            h1 { font-size: 2.3rem; }
            .description { font-size: 1.15rem; }
            .tagline { font-size: 1.1rem; }
            .rocket-container { font-size: 4rem; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Decorative background elements -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <!-- Main Content Card -->
    <div class="container">
        <div class="rocket-container">🚀</div>
        <h1>Coming Soon</h1>
        
        <p class="description">
            We are working on creating a fun, interactive, and student-friendly Olympiad preparation experience for primary learners.
        </p>
        
        <div class="tagline-box">
            <p class="tagline">
                Keep learning. Keep practising. Keep challenging yourself! <span class="star-emoji">🌟</span>
            </p>
        </div>
    </div>

</body>
</html>
