<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Festivals of India Quiz</title>
    <style>
        :root {
            --primary: #4e54c8;
            --primary-light: #8f94fb;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --bg-color: #f0f3f4;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --font-size-base: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Classroom Mode adjustment scaling */
        body.classroom-mode {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            --card-bg: #223147;
            --text-color: #ffffff;
        }

        .quiz-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            padding: 30px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--primary-light);
        }

        body.classroom-mode .quiz-container {
            border-color: var(--warning);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* Top Header Stats */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-box {
            background: rgba(78, 84, 200, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--primary-light);
        }

        body.classroom-mode .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }

        /* Toolbar/Controls */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: #fff;
            border: 2px solid #ccc;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .tool-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .tool-btn.active {
            background: var(--warning);
            border-color: #d4ac0d;
            color: #000;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            transition: width 0.4s ease;
            border-radius: 20px;
        }

        /* Question Section */
        .question-card {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 30px;
            padding: 10px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .question-text {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: var(--card-bg);
            border: 4px solid #dcdde1;
            border-radius: 16px;
            padding: 22px 15px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--text-color);
            box-shadow: 0 6px 0 #dcdde1;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            border-color: var(--primary-light);
            box-shadow: 0 10px 0 var(--primary-light);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--primary-light);
        }

        .option-btn.correct {
            background-color: var(--success) !important;
            border-color: #27ae60 !important;
            color: white !important;
            box-shadow: 0 6px 0 #1e7e43 !important;
            animation: pulse 0.5s ease;
        }

        .option-btn.wrong {
            background-color: var(--danger) !important;
            border-color: #c0392b !important;
            color: white !important;
            box-shadow: 0 6px 0 #8e281c !important;
            animation: shake 0.5s ease;
        }

        /* Badges/Indicators */
        .feedback-badge {
            position: absolute;
            top: -15px;
            right: 15px;
            background: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            color: #000;
        }

        /* Navigation Controls */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 18px 30px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
        }

        .prev-btn {
            background-color: #95a5a6;
            color: white;
        }

        .prev-btn:hover:not(:disabled) { background-color: #a6b5b6; }

        .next-btn {
            background-color: var(--primary);
            color: white;
        }

        .next-btn:hover:not(:disabled) { background-color: #5b62d3; }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Results Screen */
        .results-screen {
            display: none;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .trophy-container {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite alternate;
        }

        .score-big {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
        }

        body.classroom-mode .score-big {
            color: var(--warning);
        }

        .motivation-msg {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .stats-summary-table {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px auto;
            border-collapse: collapse;
            font-size: 1.2rem;
        }

        .stats-summary-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .stats-summary-table td:last-child {
            text-align: right;
            font-weight: bold;
        }

        /* Timer Indicator Styling */
        .timer-accent {
            color: var(--danger);
            animation: blink 1s infinite alternate;
        }

        /* Canvas for confetti overlay */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }

        /* Responsive Breakpoints for Smart Board vs Mobile devices */
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .option-btn {
                font-size: 1.1rem;
                padding: 15px;
            }
            .nav-btn {
                font-size: 1.1rem;
                padding: 12px 20px;
            }
            .quiz-container {
                padding: 15px;
            }
        }

        /* High Visibility Accessibility class override toggleable if needed */
        .high-contrast {
            --primary: #0000ff;
            --success: #008000;
            --danger: #ff0000;
            --text-color: #000000;
            background: #ffffff !important;
        }
    </style>

<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="quiz-container" id="main-card">
        
        <div class="toolbar">
            <button class="tool-btn" id="classroom-toggle" onclick="toggleClassroomMode()">📺 Classroom Mode</button>
            <button class="tool-btn" id="timer-toggle" onclick="toggleTimerOption()">⏱️ Timer: OFF</button>
            <button class="tool-btn" onclick="shuffleQuestionsHandler()">🔀 Shuffle</button>
            <button class="tool-btn" onclick="restartQuiz()">🔄 Restart</button>
        </div>

        <div id="quiz-play-view">
            <div class="quiz-header">
                <div class="stat-box" id="question-tracker">Question: 1 of 20</div>
                <div class="stat-box" id="live-timer" style="display: none;">⏱️ <span id="timer-sec">30</span>s</div>
                <div class="stat-box" id="score-tracker">Score: ⭐ 0</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="completion-progress"></div>
            </div>

            <div class="question-card">
                <div class="question-text" id="question-label">Loading question text...</div>
            </div>

            <div class="options-grid" id="options-box">
                </div>

            <div class="nav-controls">
                <button class="nav-btn prev-btn" id="prev-btn" onclick="navigateQuestion(-1)" disabled>⬅️ Previous</button>
                <button class="nav-btn next-btn" id="next-btn" onclick="navigateQuestion(1)">Next ➡️</button>
            </div>
        </div>

        <div id="quiz-results-view" class="results-screen">
            <div class="trophy-container" id="trophy-sprite">🏆</div>
            <h1 id="result-greeting">Quiz Completed!</h1>
            <div class="score-big" id="final-percentage">0%</div>
            <div class="motivation-msg" id="motivation-banner">Keep Practicing!</div>
            
            <table class="stats-summary-table">
                <tr>
                    <td>Total Questions:</td>
                    <td id="total-q-summary">20</td>
                </tr>
                <tr>
                    <td>Correct Answers:</td>
                    <td id="correct-summary" style="color: var(--success);">0</td>
                </tr>
                <tr>
                    <td>Incorrect Answers:</td>
                    <td id="incorrect-summary" style="color: var(--danger);">0</td>
                </tr>
                <tr>
                    <td>Final Score Total:</td>
                    <td id="score-summary">0</td>
                </tr>
            </table>

            <button class="nav-btn next-btn" style="max-width: 300px; margin: 0 auto;" onclick="restartQuiz()">🔄 Play Again</button>
        </div>

    </div>

    <script>
        // Immutably structured base question array
        const originalQuestions = [
            { id: 1, question: "Which festival is known as the Festival of Lights?", answers: ["Holi", "Diwali", "Eid", "Onam"], correct: 1 },
            { id: 2, question: "During which festival do people throw colourful powders on each other?", answers: ["Christmas", "Dussehra", "Holi", "Pongal"], correct: 2 },
            { id: 3, question: "Which festival is celebrated with a Christmas tree and Santa Claus?", answers: ["Eid", "Christmas", "Onam", "Baisakhi"], correct: 1 },
            { id: 4, question: "Which festival is celebrated after the month of Ramadan?", answers: ["Diwali", "Eid", "Holi", "Lohri"], correct: 1 },
            { id: 5, question: "Which festival celebrates Lord Rama's victory over Ravana?", answers: ["Dussehra", "Holi", "Pongal", "Raksha Bandhan"], correct: 0 },
            { id: 6, question: "In which festival does a sister tie a sacred thread on her brother's wrist?", answers: ["Janmashtami", "Raksha Bandhan", "Eid", "Onam"], correct: 1 },
            { id: 7, question: "Which festival celebrates Lord Ganesha?", answers: ["Navratri", "Ganesh Chaturthi", "Holi", "Baisakhi"], correct: 1 },
            { id: 8, question: "Which festival celebrates the birth of Lord Krishna?", answers: ["Janmashtami", "Diwali", "Christmas", "Onam"], correct: 0 },
            { id: 9, question: "Which festival is famous for the grand flower carpets called Pookalam?", answers: ["Pongal", "Onam", "Lohri", "Eid"], correct: 1 },
            { id: 10, question: "Which festival is known as the harvest festival of Tamil Nadu?", answers: ["Pongal", "Holi", "Christmas", "Dussehra"], correct: 0 },
            { id: 11, question: "During which festival do people enjoy flying kites?", answers: ["Makar Sankranti", "Christmas", "Eid", "Onam"], correct: 0 },
            { id: 12, question: "Which festival is celebrated around a bonfire in Punjab?", answers: ["Lohri", "Holi", "Diwali", "Raksha Bandhan"], correct: 0 },
            { id: 13, question: "Which festival is an important harvest festival of Punjab?", answers: ["Baisakhi", "Eid", "Christmas", "Janmashtami"], correct: 0 },
            { id: 14, question: "Which festival celebrates the birth of Guru Nanak Dev Ji?", answers: ["Onam", "Guru Nanak Jayanti", "Lohri", "Pongal"], correct: 1 },
            { id: 15, question: "During which festival is Goddess Durga worshipped?", answers: ["Durga Puja", "Eid", "Holi", "Christmas"], correct: 0 },
            { id: 16, question: "Which festival is celebrated for nine nights with dance and music?", answers: ["Navratri", "Baisakhi", "Onam", "Lohri"], correct: 0 },
            { id: 17, question: "Which festival is dedicated to the worship of the Sun God?", answers: ["Chhath Puja", "Christmas", "Raksha Bandhan", "Holi"], correct: 0 },
            { id: 18, question: "On which national festival do we celebrate India's Independence?", answers: ["Republic Day", "Independence Day", "Gandhi Jayanti", "Children's Day"], correct: 1 },
            { id: 19, question: "On which day do we celebrate the Constitution of India?", answers: ["Independence Day", "Republic Day", "Diwali", "Eid"], correct: 1 },
            { id: 20, question: "Which festival celebrates the birth of Gautama Buddha?", answers: ["Buddha Purnima", "Holi", "Christmas", "Onam"], correct: 0 }
        ];

        // System state variables
        let questions = JSON.parse(JSON.stringify(originalQuestions));
        let currentIndex = 0;
        let score = 0;
        let userSelections = {}; // Tracks selection state: {questionIndex: selectedOptionIndex}
        
        // Timer configuration variables
        let isTimerActive = false;
        let timerCountdown = null;
        let remainingSeconds = 30;
        const TIME_LIMIT_PER_QUESTION = 30;

        // Web Audio API Synthesis Engine for reliable completely zero-dependency SFX
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            try {
                initAudio();
                if (!audioCtx) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.25);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'cheer') {
                    // Quick multi-tone musical arpeggio fan-fare for end rewards
                    [440, 554, 659, 880].forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(freq, now + (idx * 0.1));
                        g.gain.setValueAtTime(0.2, now + (idx * 0.1));
                        g.gain.exponentialRampToValueAtTime(0.01, now + (idx * 0.1) + 0.4);
                        o.start(now + (idx * 0.1));
                        o.stop(now + (idx * 0.1) + 0.4);
                    });
                }
            } catch (e) {
                console.log("Audio presentation skipped due to interaction security restrictions.", e);
            }
        }

        // Main app initialization lifecycle
        window.addEventListener('DOMContentLoaded', () => {
            renderQuestion();
            setupKeyboardNavigation();
        });

        // Main Question Renderer
        function renderQuestion() {
            resetTimerCounter();
            
            const currentQ = questions[currentIndex];
            
            // Elements UI update tracking state
            document.getElementById("question-tracker").innerText = `Question: ${currentIndex + 1} of ${questions.length}`;
            document.getElementById("score-tracker").innerText = `Score: ⭐ ${score}`;
            
            const progressPercent = ((currentIndex) / questions.length) * 100;
            document.getElementById("completion-progress").style.width = `${progressPercent}%`;

            const questionLabel = document.getElementById("question-label");
            questionLabel.style.opacity = 0;
            
            setTimeout(() => {
                questionLabel.innerText = currentQ.question;
                questionLabel.style.opacity = 1;
            }, 150);

            // Populate options container content setup
            const optionsBox = document.getElementById("options-box");
            optionsBox.innerHTML = "";

            const hasBeenAnswered = userSelections.hasOwnProperty(currentIndex);

            currentQ.answers.forEach((ansText, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = ansText;
                btn.setAttribute("role", "button");
                btn.setAttribute("aria-label", `Option: ${ansText}`);
                
                // If question already resolved state history exists, show right/wrong colors instantly
                if (hasBeenAnswered) {
                    btn.disabled = true;
                    if (index === currentQ.correct) {
                        btn.classList.add("correct");
                        btn.innerHTML += ` <span class="feedback-badge">✓</span>`;
                    }
                    if (userSelections[currentIndex] === index && index !== currentQ.correct) {
                        btn.classList.add("wrong");
                        btn.innerHTML += ` <span class="feedback-badge">✗</span>`;
                    }
                } else {
                    btn.onclick = () => selectOption(index);
                }

                optionsBox.appendChild(btn);
            });

            // Adjust navigation control configurations
            document.getElementById("prev-btn").disabled = (currentIndex === 0);
            
            const nextBtn = document.getElementById("next-btn");
            if (currentIndex === questions.length - 1) {
                nextBtn.innerText = "🏁 Finish Quiz";
            } else {
                nextBtn.innerText = "Next Question ➡️";
            }

            if (isTimerActive && !hasBeenAnswered) {
                startTimer();
            }
        }

        // Action when option chosen by clicking or automation engines
        function selectOption(selectedIdx) {
            stopTimer();
            const currentQ = questions[currentIndex];
            userSelections[currentIndex] = selectedIdx;

            const optionsBox = document.getElementById("options-box");
            const buttons = optionsBox.getElementsByClassName("option-btn");

            // Stop further user inputs on this question instantly
            for (let btn of buttons) {
                btn.disabled = true;
            }

            if (selectedIdx === currentQ.correct) {
                buttons[selectedIdx].classList.add("correct");
                buttons[selectedIdx].innerHTML += ` <span class="feedback-badge">✓</span>`;
                score += 5; 
                document.getElementById("score-tracker").innerText = `Score: ⭐ ${score}`;
                playSound('correct');
            } else {
                if (selectedIdx !== -1) {
                    buttons[selectedIdx].classList.add("wrong");
                    buttons[selectedIdx].innerHTML += ` <span class="feedback-badge">✗</span>`;
                }
                // Auto-highlight correct choice path to user
                buttons[currentQ.correct].classList.add("correct");
                buttons[currentQ.correct].innerHTML += ` <span class="feedback-badge">✓</span>`;
                playSound('wrong');
            }
            
            // Smooth immediate advancement preview tracking
            setTimeout(() => {
                const barPercent = ((currentIndex + 1) / questions.length) * 100;
                document.getElementById("completion-progress").style.width = `${barPercent}%`;
            }, 300);
        }

        // Navigation state machine
        function navigateQuestion(direction) {
            stopTimer();
            const targetIndex = currentIndex + direction;

            if (targetIndex >= 0 && targetIndex < questions.length) {
                currentIndex = targetIndex;
                renderQuestion();
            } else if (targetIndex >= questions.length) {
                displayResultsSummary();
            }
        }

        // Show analytical summary screen
        function displayResultsSummary() {
            stopTimer();
            document.getElementById("quiz-play-view").style.display = "none";
            const resultsView = document.getElementById("quiz-results-view");
            resultsView.style.display = "block";

            let totalCorrect = 0;
            let totalIncorrect = 0;

            questions.forEach((q, idx) => {
                if (userSelections.hasOwnProperty(idx)) {
                    if (userSelections[idx] === q.correct) totalCorrect++;
                    else totalIncorrect++;
                } else {
                    totalIncorrect++; // un-answered matches down penalty
                }
            });

            const percent = Math.round((totalCorrect / questions.length) * 100);
            document.getElementById("final-percentage").innerText = `${percent}%`;
            
            // Populate metric table content text fields
            document.getElementById("total-q-summary").innerText = questions.length;
            document.getElementById("correct-summary").innerText = totalCorrect;
            document.getElementById("incorrect-summary").innerText = totalIncorrect;
            document.getElementById("score-summary").innerText = `⭐ ${score}`;

            const banner = document.getElementById("motivation-banner");
            const trophy = document.getElementById("trophy-sprite");

            if (percent >= 90) {
                banner.innerText = "🌟 Outstanding!";
                trophy.innerText = "👑🏆👑";
                triggerConfettiShower();
                playSound('cheer');
            } else if (percent >= 70) {
                banner.innerText = "🎉 Great Job!";
                trophy.innerText = "🏆";
                triggerConfettiShower();
                playSound('cheer');
            } else if (percent >= 50) {
                banner.innerText = "👍 Good Effort!";
                trophy.innerText = "🥈";
            } else {
                banner.innerText = "📚 Keep Practicing!";
                trophy.innerText = "📖";
            }
        }

        // Toggle Classroom Presentation View Mode Scaling
        function toggleClassroomMode() {
            const body = document.body;
            body.classList.toggle("classroom-mode");
            
            const btn = document.getElementById("classroom-toggle");
            if(body.classList.contains("classroom-mode")) {
                btn.innerText = "☀️ Normal Mode";
                document.documentElement.style.setProperty('--font-size-base', '20px');
            } else {
                btn.innerText = "📺 Classroom Mode";
                document.documentElement.style.setProperty('--font-size-base', '16px');
            }
        }

        // Timer control systems toggles
        function toggleTimerOption() {
            isTimerActive = !isTimerActive;
            const timerToggleBtn = document.getElementById("timer-toggle");
            const timerBox = document.getElementById("live-timer");

            if (isTimerActive) {
                timerToggleBtn.innerText = "⏱️ Timer: ON";
                timerToggleBtn.classList.add("active");
                timerBox.style.display = "flex";
                startTimer();
            } else {
                timerToggleBtn.innerText = "⏱️ Timer: OFF";
                timerToggleBtn.classList.remove("active");
                timerBox.style.display = "none";
                stopTimer();
            }
        }

        function startTimer() {
            stopTimer();
            remainingSeconds = TIME_LIMIT_PER_QUESTION;
            const secLabel = document.getElementById("timer-sec");
            secLabel.innerText = remainingSeconds;
            secLabel.classList.remove("timer-accent");

            timerCountdown = setInterval(() => {
                remainingSeconds--;
                secLabel.innerText = remainingSeconds;

                if (remainingSeconds <= 10) {
                    secLabel.classList.add("timer-accent");
                }

                if (remainingSeconds <= 0) {
                    stopTimer();
                    selectOption(-1); // Force failure bypass answer
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerCountdown) {
                clearInterval(timerCountdown);
                timerCountdown = null;
            }
        }

        function resetTimerCounter() {
            remainingSeconds = TIME_LIMIT_PER_QUESTION;
            document.getElementById("timer-sec").innerText = remainingSeconds;
            document.getElementById("timer-sec").classList.remove("timer-accent");
        }

        // Question Array Data Shuffle Handler Matrix
        function shuffleQuestionsHandler() {
            // Fisher-Yates native algorithm matrix execution
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            restartQuiz();
        }

        // Fully refresh program environment execution state loops
        function restartQuiz() {
            stopTimer();
            currentIndex = 0;
            score = 0;
            userSelections = {};
            
            // Restore structural framework displays
            document.getElementById("quiz-play-view").style.display = "block";
            document.getElementById("quiz-results-view").style.display = "none";
            
            // Clean active Canvas frames
            const canvas = document.getElementById("confetti-canvas");
            canvas.style.display = "none";
            isConfettiRunning = false;

            renderQuestion();
        }

        // Accessibility Mapping Engine
        function setupKeyboardNavigation() {
            window.addEventListener('keydown', (e) => {
                // Map keyboard options selection keys 1 through 4
                if (e.key >= '1' && e.key <= '4') {
                    const optionIdx = parseInt(e.key) - 1;
                    const buttons = document.getElementById("options-box").getElementsByClassName("option-btn");
                    if (buttons[optionIdx] && !buttons[optionIdx].disabled) {
                        buttons[optionIdx].click();
                    }
                }
                // Arrow navigation handling
                if (e.key === 'ArrowRight' || e.key === 'Enter') {
                    const nextBtn = document.getElementById("next-btn");
                    if (!nextBtn.disabled) nextBtn.click();
                }
                if (e.key === 'ArrowLeft') {
                    const prevBtn = document.getElementById("prev-btn");
                    if (!prevBtn.disabled) prevBtn.click();
                }
            });
        }

        // Zero-Dependency Canvas Confetti Particle Renderer System Engine Matrix
        let isConfettiRunning = false;
        function triggerConfettiShower() {
            const canvas = document.getElementById("confetti-canvas");
            const ctx = canvas.getContext("2d");
            canvas.style.display = "block";
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#f1c40f', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#e67e22'];
            isConfettiRunning = true;

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function drawConfettiLoop() {
                if (!isConfettiRunning) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach((p, idx) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    // Loop reset logic when particle falls out of browser framework viewport bounds
                    if (p.y > canvas.height) {
                        particles[idx] = p;
                        p.x = Math.random() * canvas.width;
                        p.y = -20;
                        p.tilt = Math.random() * 10 - 5;
                    }
                });

                requestAnimationFrame(drawConfettiLoop);
            }

            drawConfettiLoop();
            
            // Automatically safely close canvas stream calculation loop overheads after 6 seconds runtime bursts
            setTimeout(() => {
                isConfettiRunning = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.style.display = "none";
            }, 6000);
        }

        // Maintain full canvas scaling adjustments on runtime viewport resizes automatically
        window.addEventListener('resize', () => {
            const canvas = document.getElementById("confetti-canvas");
            if (canvas && isConfettiRunning) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
