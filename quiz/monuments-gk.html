<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Indian Monuments Quiz</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#fff3e0,#fff);text-align:center}
.hero{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff;padding:20px}
.card{max-width:900px;margin:15px auto;background:#fff;padding:20px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.2)}
img{width:350px;max-width:95%;border-radius:15px}
.option{display:block;width:100%;padding:14px;margin:8px 0;border:none;border-radius:12px;font-size:18px;cursor:pointer}
.correct{background:#4caf50!important;color:#fff}.wrong{background:#f44336!important;color:#fff}
.progress{height:20px;background:#ddd;border-radius:10px;overflow:hidden}
.bar{height:100%;background:#4caf50;width:0%}
.btn{padding:12px 20px;margin:5px;border:none;border-radius:10px;color:#fff;cursor:pointer}
.next{background:#2196f3}.prev{background:#9c27b0}
#certificate{display:none}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JSVKBDWEV5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JSVKBDWEV5');
</script>
<body>
<div class="hero"><h1>🏛️ Indian Monuments Quiz</h1><p>Guess the Monument</p></div>

<div class="card" id="quizCard">
<h3 id="qno"></h3>
<div>Score: <span id="score">0</span></div>
<div class="progress"><div class="bar" id="bar"></div></div><br>
<img id="qimg">
<h2 id="question"></h2>
<div id="options"></div>
<div id="feedback"></div><br>
<button class="btn prev" onclick="prevQuestion()">⬅ Previous</button>
<button class="btn next" onclick="nextQuestion()">Next ➡</button>
</div>

<div class="card" id="certificate">
<h1>🏆 Certificate of Achievement</h1>
<input id="student" placeholder="Student Name" style="padding:10px;width:250px"><br><br>
<div id="result"></div>
<button class="btn next" onclick="window.print()">🖨 Print</button>
<button class="btn prev" onclick="location.reload()">🔄 Restart</button>
</div>

<script>
const quiz=[
["taj-mahal","Taj Mahal","Agra, Uttar Pradesh"],
["qutub-minar","Qutub Minar","Delhi"],
["india-gate","India Gate","Delhi"],
["red-fort","Red Fort","Delhi"],
["charminar","Charminar","Hyderabad, Telangana"],
["gateway-of-india","Gateway of India","Mumbai, Maharashtra"],
["konark-sun-temple","Konark Sun Temple","Konark, Odisha"],
["hawa-mahal","Hawa Mahal","Jaipur, Rajasthan"],
["sanchi-stupa","Sanchi Stupa","Sanchi, Madhya Pradesh"],
["mysore-palace","Mysore Palace","Mysuru, Karnataka"],
["lotus-temple","Lotus Temple","Delhi"],
["golden-temple","Golden Temple","Amritsar, Punjab"],
["victoria-memorial","Victoria Memorial","Kolkata, West Bengal"],
["ajanta-caves","Ajanta Caves","Maharashtra"],
["ellora-caves","Ellora Caves","Maharashtra"],
["gol-gumbaz","Gol Gumbaz","Vijayapura, Karnataka"],
["brihadeeswara-temple","Brihadeeswara Temple","Tamil Nadu"],
["jagannath-temple","Jagannath Temple","Puri, Odisha"],
["city-palace","City Palace","Jaipur, Rajasthan"],
["meenakshi-temple","Meenakshi Temple","Madurai, Tamil Nadu"]
];
let current=0,score=0,answered=false;

function optionsFor(ans){
const all=quiz.map(x=>x[1]);
let opts=[ans];
while(opts.length<4){
let r=all[Math.floor(Math.random()*all.length)];
if(!opts.includes(r)) opts.push(r);
}
return opts.sort(()=>Math.random()-0.5);
}

function load(){
answered=false;
let q=quiz[current];
qno.innerHTML=`Question ${current+1} of ${quiz.length}`;
bar.style.width=((current+1)/quiz.length*100)+'%';
qimg.src="../quiz-image/"+q[0]+".png";
question.innerText="🏛️ Guess the monument.";
feedback.innerHTML="";
options.innerHTML="";
optionsFor(q[1]).forEach(op=>{
let b=document.createElement("button");
b.className="option";
b.innerText=op;
b.onclick=()=>check(op,b);
options.appendChild(b);
});
}

function check(val,btn){
if(answered)return;
answered=true;
let q=quiz[current];
document.querySelectorAll(".option").forEach(b=>{
if(b.innerText===q[1]) b.classList.add("correct");
if(b.innerText===val && val!==q[1]) b.classList.add("wrong");
});
if(val===q[1]){
score++; document.getElementById("score").innerText=score;
feedback.innerHTML=`✅ Correct!<br>📍 ${q[2]}`;
}else{
feedback.innerHTML=`❌ Correct Answer: ${q[1]}<br>📍 ${q[2]}`;
}
}

function nextQuestion(){ if(current<quiz.length-1){current++;load();} else finish();}
function prevQuestion(){ if(current>0){current--;load();}}

function finish(){
quizCard.style.display="none";
certificate.style.display="block";
let pct=Math.round(score/quiz.length*100);
let badge=pct>=90?"🏆 Heritage Master":pct>=70?"🌟 Monument Explorer":pct>=50?"👍 History Learner":"📚 Keep Practicing";
result.innerHTML=`<h2>${score}/${quiz.length}</h2><h3>${pct}%</h3><h2>${badge}</h2>`;
for(let i=0;i<50;i++){
let e=document.createElement("div");
e.innerHTML="🎉";
e.style.position="fixed";
e.style.left=Math.random()*100+"vw";
e.style.top="-20px";
document.body.appendChild(e);
setTimeout(()=>e.style.top="100vh",50);
}
}
load();
</script>
</body>
</html>
