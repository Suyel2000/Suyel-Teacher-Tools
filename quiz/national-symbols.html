<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Symbols Quiz</title>
<style>
body{font-family:Arial;margin:0;text-align:center;background:linear-gradient(to right,#fff8e1,#ffffff);}
.header{background:linear-gradient(135deg,#ff9800,#f57c00);color:white;padding:20px;}
.quiz-box{max-width:750px;margin:20px auto;background:white;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.2);}
.quiz-image{width:280px;max-width:90%;border-radius:15px;margin:10px auto;display:block;}
.progress{font-weight:bold;color:#ff9800;margin-bottom:10px;}
.option{display:block;width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:#f1f1f1;cursor:pointer;font-size:16px;}
.option:hover{background:#e8f4ff;}
.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}
.next-btn{padding:12px 20px;background:#4caf50;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px;}
.next-btn:disabled{background:#999;cursor:not-allowed;}
.back{display:inline-block;margin:20px;padding:10px 20px;background:#333;color:white;text-decoration:none;border-radius:8px;}
.feedback{font-size:20px;font-weight:bold;margin:15px 0;}
</style>
</head>
<body>
<div class="header">
<h1>🇮🇳 National Symbols Quiz</h1>
<p>Test Your Knowledge About India</p>
</div>

<div class="quiz-box">
<div id="question"></div>
<div id="options"></div>
<div id="feedback" class="feedback"></div>
<button id="nextBtn" class="next-btn" onclick="nextQuestion()" disabled>Next Question ➡</button>
</div>

<a href="gk-quiz.html" class="back">⬅ Back to GK Quiz</a>

<script>
const quiz=[
{question:"What is the National Animal of India?",image:"tiger.png",options:["Lion","Tiger","Elephant","Leopard"],answer:"Tiger"},
{question:"Which bird is the National Bird of India?",image:"quiz-image/peacock.png",options:["Parrot","Sparrow","Peacock","Eagle"],answer:"Peacock"},
{question:"What is the National Flower of India?",image:"quiz-image/lotus.png",options:["Rose","Lotus","Lily","Sunflower"],answer:"Lotus"},
{question:"Which is the National Tree of India?",image:"quiz-image/banyan-tree.png",options:["Neem","Banyan","Mango","Coconut"],answer:"Banyan"},
{question:"What is the National Fruit of India?",image:"quiz-image/mango.png",options:["Banana","Apple","Mango","Orange"],answer:"Mango"},
{question:"Which is the National River of India?",image:"quiz-image/ganga-river.png",options:["Yamuna","Ganga","Godavari","Narmada"],answer:"Ganga"},
{question:"What is the National Aquatic Animal of India?",image:"quiz-image/dolphin.png",options:["Whale","Shark","Dolphin","Octopus"],answer:"Dolphin"},
{question:"What is the National Flag of India called?",image:"quiz-image/tiranga.png",options:["Freedom Flag","Tiranga","Ashoka Flag","National Banner"],answer:"Tiranga"},
{question:"What is present at the centre of the National Flag?",image:"quiz-image/ashoka-chakra.png",options:["Lotus","Lion","Ashoka Chakra","Star"],answer:"Ashoka Chakra"},
{question:"What is India's National Emblem?",image:"quiz-image/national-emblem.png",options:["Tiger","Peacock","Lion Capital of Ashoka","Lotus"],answer:"Lion Capital of Ashoka"},
{question:"What is the National Reptile of India?",image:"quiz-image/king-cobra.png",options:["Python","King Cobra","Lizard","Crocodile"],answer:"King Cobra"},
{question:"Which animal is India's National Heritage Animal?",image:"quiz-image/elephant.png",options:["Tiger","Elephant","Camel","Rhino"],answer:"Elephant"},
{question:"Which song is the National Anthem of India?",options:["Vande Mataram","Jana Gana Mana","Saare Jahan Se Achha","Hum Honge Kamyab"],answer:"Jana Gana Mana"},
{question:"What is the National Song of India?",options:["Jana Gana Mana","Vande Mataram","Ae Mere Watan","Saare Jahan Se Achha"],answer:"Vande Mataram"},
{question:"How many colours are there in the National Flag?",options:["2","3","4","5"],answer:"3"},
{question:"How many spokes are there in the Ashoka Chakra?",options:["20","22","24","26"],answer:"24"},
{question:"What is written below the National Emblem?",options:["Jai Hind","Vande Mataram","Satyameva Jayate","Bharat Mata Ki Jai"],answer:"Satyameva Jayate"},
{question:"Which calendar is India's National Calendar?",options:["Gregorian","Vikram Samvat","Saka Calendar","Lunar Calendar"],answer:"Saka Calendar"},
{question:"Which game is commonly recognised in GK quizzes as India's National Game?",options:["Cricket","Football","Kabaddi","Hockey"],answer:"Hockey"},
{question:"Which colour of the flag represents courage and sacrifice?",options:["Green","White","Blue","Saffron"],answer:"Saffron"}
];

let current=0, score=0, answered=false;

function loadQuestion(){
answered=false;
document.getElementById("feedback").innerHTML="";
document.getElementById("nextBtn").disabled=true;

let q=quiz[current];
document.getElementById("question").innerHTML=`
<div class="progress">Question ${current+1} of ${quiz.length}</div>
${q.image ? `<img src="${q.image}" class="quiz-image">` : ""}
<h2>${q.question}</h2>`;

let html="";
q.options.forEach(option=>{
html += `<button class="option" onclick="checkAnswer(this,'${option}')">${option}</button>`;
});
document.getElementById("options").innerHTML=html;
}

function checkAnswer(button, selected){
if(answered) return;

answered=true;
let correct=quiz[current].answer;
let buttons=document.querySelectorAll(".option");

buttons.forEach(btn=>{
if(btn.innerText===correct){
btn.classList.add("correct");
}
if(btn.innerText===selected && selected!==correct){
btn.classList.add("wrong");
}
btn.disabled=true;
});

if(selected===correct){
score++;
document.getElementById("feedback").innerHTML="✅ Correct Answer!";
document.getElementById("feedback").style.color="green";
}else{
document.getElementById("feedback").innerHTML=`❌ Wrong! Correct Answer: <b>${correct}</b>`;
document.getElementById("feedback").style.color="red";
}

document.getElementById("nextBtn").disabled=false;
}

function nextQuestion(){
current++;
if(current<quiz.length){
loadQuestion();
}else{
showResult();
}
}

function showResult(){
let message="";
if(score>=18) message="🏆 Excellent! Outstanding Knowledge!";
else if(score>=14) message="🌟 Very Good!";
else if(score>=10) message="👍 Good Job!";
else message="📚 Keep Learning and Try Again!";

document.querySelector(".quiz-box").innerHTML=`
<h2>🎉 Quiz Completed!</h2>
<h1>${score} / ${quiz.length}</h1>
<h2>${message}</h2>
<p>Certificate Result</p>
<button class="next-btn" onclick="location.reload()">🔄 Play Again</button>
`;
}

loadQuestion();
</script>
</body>
</html>
