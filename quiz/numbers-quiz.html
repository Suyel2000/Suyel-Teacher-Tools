<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 Numbers (1–100) Quiz</title>
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #ff7675, #74b9ff);
            --bg-grad: linear-gradient(135deg, #6c5ce7, #a29bfe, #ffeaa7);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-color: #2d3436;
            --correct-color: #2ecc71;
            --wrong-color: #ff7675;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-grad);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Background Numbers */
        .bg-numbers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .floating-num {
            position: absolute;
            font-size: calc(2rem + 4vw);
            font-weight: bold;
            color: rgba(255, 255, 255, 0.15);
            animation: floatUp 12s linear infinite;
            bottom: -150px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Dashboard Container */
        .quiz-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Typography & Headings */
        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #f5f6fa;
            font-weight: 600;
        }

        /* Top Panel Metrics */
        .metrics-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.4);
            padding: 12px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: var(--text-color);
            font-size: 1.1rem;
        }

        .progress-container {
            width: 100%;
            height: 16px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4cd137, #4bcffa);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Question & Visual Card Area */
        .question-card {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .visual-container {
            margin: 15px auto;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 90%;
        }

        .visual-img {
            max-height: 140px;
            object-fit: contain;
            border-radius: 12px;
        }

        .emoji-item {
            font-size: 2.5rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid transparent;
            border-radius: 18px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .option-btn:hover:not([disabled]) {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #fff;
            border-color: #74b9ff;
        }

        .option-btn:active:not([disabled]) {
            transform: translateY(-1px);
        }

        /* Feedback States */
        .option-btn.correct {
            background: var(--correct-color) !important;
            color: white !important;
            border-color: #27ae60;
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background: var(--wrong-color) !important;
            color: white !important;
            border-color: #c0392b;
        }

        .explanation-box {
            background: rgba(255, 255, 255, 0.95);
            border-left: 8px solid #74b9ff;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            display: none;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        /* Navigation Systems */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .control-btn {
            background: #4a69bd;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover:not([disabled]) {
            background: #1e3799;
            transform: translateY(-2px);
        }

        .control-btn:disabled {
            background: #b2bec3;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .shuffle-btn {
            background: #f1c40f;
            color: #2c3e50;
        }
        .shuffle-btn:hover:not([disabled]) {
            background: #d4ac0d;
        }

        /* Final Certificate View */
        .certificate-screen {
            display: none;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            color: #2c3e50;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .cert-border {
            border: 8px double #f1c40f;
            padding: 30px;
            border-radius: 18px;
            background: #fbfbfb;
        }

        .badge-display {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .badge-title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #d35400;
            margin-bottom: 15px;
        }

        .cert-score {
            font-size: 1.5rem;
            margin: 20px 0;
            font-weight: 600;
        }

        .action-cluster {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .restart-btn { background: #2ecc71; color: white; }
        .restart-btn:hover { background: #27ae60; }
        .print-btn { background: #e67e22; color: white; }
        .print-btn:hover { background: #d35400; }

        /* Canvas Particle Layout */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Screen Board Responsiveness */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .quiz-container { padding: 20px; }
            .option-btn { padding: 16px; font-size: 1.3rem; }
            .control-btn { padding: 12px 20px; font-size: 1rem; }
        }

        @media print {
            body * { visibility: hidden; }
            .certificate-screen, .certificate-screen * { visibility: visible; }
            .certificate-screen { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; padding: 0; }
            .action-cluster { display: none; }
        }
    </style>

        // Web Audio API Synth Engine (Offline Sound Generator)
        const AudioEngine = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'correct') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, now); // A3
                    osc.frequency.linearRampToValueAtTime(110, now + 0.3); // A2
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                    osc.start(now);
                    osc.stop(now + 0.35);
                } else if (type === 'complete') {
                    this.playChord([523.25, 659.25, 783.99, 1046.50], 0.6);
                }
            },
            playChord(freqs, duration) {
                const now = this.ctx.currentTime;
                freqs.forEach(f => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + duration);
                });
            }
        };

            { id: 45, type: 'mixed', q: 'Which number is between 58 and 60?', a: '59', o: ['57', '59', '61', '56'], exp: 'Counting sequentially: 58, 59, 60.' },
            { id: 46, type: 'mixed', q: 'Which number comes after 99?', a: '100', o: ['98', '90', '100', '101'], exp: '100 follows 99 immediately.' },
            { id: 47, type: 'mixed', q: 'Which number comes before 30?', a: '29', o: ['31', '29', '28', '20'], exp: '29 is one less than 30.' },
            { id: 48, type: 'mixed', q: 'Which number is between 74 and 76?', a: '75', o: ['73', '77', '75', '72'], exp: '75 sits directly in the middle of 74 and 76.' },
            { id: 49, type: 'mixed', q: 'Which is the largest?', a: '92', o: ['29', '92', '39', '23'], exp: '92 has 9 tens, making it larger than all the others.' },
            { id: 50, type: 'mixed', q: 'Which is the smallest?', a: '45', o: ['48', '84', '58', '45'], exp: '45 is the lowest total number item choice present.' }
        ];

        let questions = JSON.parse(JSON.stringify(rawQuestionBank));
        let currentIdx = 0;
        let userAnswers = {};
        let score = 0;
        let startTime;
        let timerInterval;

        function generateBgNumbers() {
            const container = document.getElementById('bgNumbersContainer');
            container.innerHTML = '';
            for(let i=0; i<15; i++){
                const div = document.createElement('div');
                div.className = 'floating-num';
                div.innerText = Math.floor(Math.random() * 100) + 1;
                div.style.left = `${Math.random() * 100}%`;
                div.style.animationDelay = `${Math.random() * 12}s`;
                div.style.animationDuration = `${10 + Math.random() * 10}s`;
                container.appendChild(div);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function triggerShuffle() {
            AudioEngine.play('click');
            shuffleArray(questions);
            questions.forEach(q => q._shuffledOptions = null);
            userAnswers = {};
            currentIdx = 0;
            score = 0;
            renderQuestion();
        }

        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsedMs = Date.now() - startTime;
                const totalSecs = Math.floor(elapsedMs / 1000);
                const mins = String(Math.floor(totalSecs / 60)).padStart(2, '0');
                const secs = String(totalSecs % 60).padStart(2, '0');
                document.getElementById('timer-display').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function renderQuestion() {
            const qData = questions[currentIdx];
            
            document.getElementById('current-q-num').innerText = currentIdx + 1;
            document.getElementById('live-score').innerText = score;
            const progressPct = ((currentIdx) / questions.length) * 100;
            document.getElementById('quiz-progress').style.width = `${progressPct}%`;

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === questions.length - 1 && userAnswers[currentIdx] === undefined;

            document.getElementById('question-text').innerText = qData.q;

            const visualBox = document.getElementById('visual-container');
            visualBox.innerHTML = '';
            
            if (qData.type === 'count') {
                const img = document.createElement('img');
                img.className = 'visual-img';
                img.src = `images/${qData.item}.png`;
                img.onerror = () => {
                    visualBox.innerHTML = ''; 
                    for(let k=0; k < qData.count; k++) {
                        const span = document.createElement('span');
                        span.className = 'emoji-item';
                        span.innerText = qData.emoji;
                        visualBox.appendChild(span);
                    }
                };
                visualBox.appendChild(img);
            }

            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            if(!qData._shuffledOptions) {
                let optionsCopy = [...qData.o];
                shuffleArray(optionsCopy);
                qData._shuffledOptions = optionsCopy;
            }

            qData._shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt);
                optionsGrid.appendChild(btn);
            });

            const expBox = document.getElementById('explanation-box');
            if (userAnswers[currentIdx] !== undefined) {
                const selected = userAnswers[currentIdx];
                Array.from(optionsGrid.children).forEach(b => {
                    b.disabled = true;
                    if(b.innerText === qData.a) b.classList.add('correct');
                    if(b.innerText === selected && selected !== qData.a) b.classList.add('wrong');
                });
                expBox.innerText = qData.exp;
                expBox.style.display = 'block';
            } else {
                expBox.style.display = 'none';
            }
        }

        function selectOption(btn, selection) {
            const qData = questions[currentIdx];
            userAnswers[currentIdx] = selection;
            
            const optionsGrid = document.getElementById('options-grid');
            Array.from(optionsGrid.children).forEach(b => b.disabled = true);

            const expBox = document.getElementById('explanation-box');
            expBox.innerText = qData.exp;
            expBox.style.display = 'block';

            if (selection === qData.a) {
                btn.classList.add('correct');
                score++;
                document.getElementById('live-score').innerText = score;
                AudioEngine.play('correct');
            } else {
                btn.classList.add('wrong');
                AudioEngine.play('wrong');
                Array.from(optionsGrid.children).forEach(b => {
                    if(b.innerText === qData.a) b.classList.add('correct');
                });
            }

            document.getElementById('next-btn').disabled = false;
            
            if(Object.keys(userAnswers).length === questions.length) {
                setTimeout(showCertificate, 1500);
            }
        }

        function navigateQuestion(step) {
            AudioEngine.play('click');
            currentIdx += step;
            renderQuestion();
        }

        function showCertificate() {
            clearInterval(timerInterval);
            AudioEngine.play('complete');
            
            document.getElementById('quiz-view').style.display = 'none';
            const certView = document.getElementById('certificate-view');
            certView.style.display = 'block';

            const finalPct = Math.round((score / questions.length) * 100);
            
            let badgeEmoji = "📚";
            let badgeTitle = "Keep Practicing";
            
            if(finalPct >= 90) {
                badgeEmoji = "🏆";
                badgeTitle = "Number Champion";
                triggerConfetti();
            } else if(finalPct >= 70) {
                badgeEmoji = "🌟";
                badgeTitle = "Number Explorer";
                triggerConfetti();
            } else if(finalPct >= 50) {
                badgeEmoji = "👍";
                badgeTitle = "Good Learner";
            }

            document.getElementById('cert-badge').innerText = badgeEmoji;
            document.getElementById('cert-title').innerText = badgeTitle;
            document.getElementById('cert-score-text').innerText = `Score: ${finalPct}% (${score}/${questions.length} Correct)`;
            document.getElementById('cert-time').innerText = document.getElementById('timer-display').innerText;
        }

        function resetQuiz() {
            questions = JSON.parse(JSON.stringify(rawQuestionBank));
            userAnswers = {};
            currentIdx = 0;
            score = 0;
            document.getElementById('certificate-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            startTimer();
            renderQuestion();
        }

        function triggerConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const colors = ['#f1c40f', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#e67e22'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, idx) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();
                });

                if (particles.some(p => p.y < canvas.height)) {
                    requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            draw();
        }

        window.onload = () => {
            generateBgNumbers();
            startTimer();
            renderQuestion();
        };

        window.onresize = () => {
            const canvas = document.getElementById('confetti-canvas');
            if(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        };
    </script>
</body>
</html>
