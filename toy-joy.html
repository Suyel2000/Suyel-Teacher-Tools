<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TOY JOY</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
    color: #333;
}
.container {
    background: white;
    width: 90%;
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
h1 { color: #0077b6; }
.question { font-size: 20px; margin-bottom: 15px; }
.option {
    display: block;
    background: #caf0f8;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}
.option:hover { background: #90e0ef; }
.correct { background: #90ee90 !important; }
.wrong { background: #ff7b7b !important; }
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #0077b6;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
button:hover { background: #023e8a; }
</style>
</head>
<body>

<div class="container">
    <h1>TOY JOY</h1>
    <div id="questionBox" class="question"></div>
    <div id="optionsBox"></div>
    <button onclick="nextQuestion()">Next</button>
    <h3 id="scoreBox"></h3>
</div>

<script>
const quiz = [
{q:"Riya has a dice in her hand. Which 3D shape is it?", o:["Cylinder","Sphere","Cube","Cone"], a:2},
{q:"Which object can roll easily on the ground?", o:["Book","Ball","Brick","Box"], a:1},
{q:"Which shape has only curved surface and no edges?", o:["Cube","Cone","Sphere","Cuboid"], a:2},
{q:"A water bottle is usually shaped like a:", o:["Cone","Cube","Cylinder","Sphere"], a:2},
{q:"Which shape has a circular base and one curved surface?", o:["Cone","Cylinder","Cube","Cuboid"], a:0},
{q:"Which of these objects is NOT a cuboid?", o:["Book","Matchbox","Dice","Brick"], a:2},
{q:"Meena wants to make an ice-cream model. Which shape is used?", o:["Cylinder","Cone","Cube","Sphere"], a:1},
{q:"Which 3D shape has 6 equal square faces?", o:["Cube","Cuboid","Cylinder","Cone"], a:0},
{q:"A gas cylinder is an example of:", o:["Cone","Sphere","Cylinder","Cube"], a:2},
{q:"Which shape has both flat and curved surfaces?", o:["Cube","Sphere","Cylinder","Cuboid"], a:2},
{q:"Which of these can both roll and slide?", o:["Sphere","Cube","Cylinder","Cuboid"], a:2},
{q:"Shape with 1 vertex and 1 circular base?", o:["Cone","Cylinder","Sphere","Cube"], a:0},
{q:"Which shape has 8 vertices?", o:["Cube","Cylinder","Cone","Sphere"], a:0},
{q:"Which shape is best to make a football?", o:["Cube","Cone","Sphere","Cylinder"], a:2},
{q:"Shape with 2 circular faces and 1 curved surface?", o:["Cone","Cube","Cylinder","Sphere"], a:2},
{q:"Which shape cannot roll?", o:["Sphere","Cylinder","Cone","Cube"], a:3},
{q:"A tent is usually shaped like a:", o:["Cube","Cone","Sphere","Cuboid"], a:1}
];

let current = 0;
let score = 0;

function loadQuestion() {
    let q = quiz[current];
    document.getElementById("questionBox").innerText = q.q;
    let optionsHTML = "";
    q.o.forEach((opt, i) => {
        optionsHTML += `<div class="option" onclick="checkAnswer(${i})">${opt}</div>`;
    });
    document.getElementById("optionsBox").innerHTML = optionsHTML;
}

function checkAnswer(selected) {
    let correct = quiz[current].a;
    let options = document.getElementsByClassName("option");

    if(selected === correct) {
        options[selected].classList.add("correct");
        score++;
    } else {
        options[selected].classList.add("wrong");
        options[correct].classList.add("correct");
    }

    Array.from(options).forEach(opt => opt.onclick = null);
}

function nextQuestion() {
    current++;
    if(current < quiz.length) {
        loadQuestion();
    } else {
        document.getElementById("questionBox").innerText = "Quiz Finished 🎉";
        document.getElementById("optionsBox").innerHTML = "";
        document.getElementById("scoreBox").innerText = "Your Score: " + score + "/" + quiz.length;
    }
}

loadQuestion();
</script>

</body>
</html>
