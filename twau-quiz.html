<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 TWAU Quiz Zone</title>
    <style>
        /* --- NATURE-INSPIRED DESIGN SYSTEM --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 40%, #fef9c3 80%, #ffedd5 100%);
            --primary-green: #15803d;
            --sky-blue: #0284c7;
            --earth-brown: #7c2d12;
            --sunshine-yellow: #ca8a04;
            --text-dark: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.65);
            --glass-shadow: 0 10px 30px -5px rgba(21, 128, 61, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- GLOBAL RESETS & STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 25s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 90px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LIGHTWEIGHT ECO ANIMATED BACKGROUND --- */
        .floating-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 2.2rem;
            opacity: 0.25;
            animation: floatUpDown 15s linear infinite;
        }

        @keyframes floatUpDown {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); }
            50% { transform: translateY(50vh) translateX(60px) rotate(180deg); }
            100% { transform: translateY(-10vh) translateX(0) rotate(360deg); }
        }

        /* --- STRUCTURAL WRAPPERS --- */
        .container {
            width: 92%;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding: 4rem 1rem 2.5rem;
            animation: fadeIn 1.2s ease-out;
        }

        .hero h1 {
            font-size: 3.8rem;
            color: var(--primary-green);
            text-shadow: 2px 3px 0px rgba(255, 255, 255, 0.9);
            margin-bottom: 0.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 1.5rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 2rem;
        }

        .hero-illustration {
            font-size: 4rem;
            display: inline-block;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            padding: 1rem 3rem;
            border-radius: 60px;
            box-shadow: var(--glass-shadow);
            animation: bounceSoft 4s ease-in-out infinite;
        }

        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STATISTICS SECTIONS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stat-card:hover {
            transform: translateY(-6px);
        }

        .stat-icon {
            font-size: 2.6rem;
            margin-bottom: 0.4rem;
        }

        .stat-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* --- CATEGORIES & HEADERS --- */
        .category-section {
            margin-bottom: 4.5rem;
        }

        .category-title {
            font-size: 2.1rem;
            margin-bottom: 1.8rem;
            padding-left: 1.2rem;
            border-left: 6px solid var(--sky-blue);
            color: var(--earth-brown);
            display: flex;
            align-items: center;
            font-weight: 800;
        }

        /* --- RESPONSIVE CARD GRID --- */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 2.5rem;
        }

        .quiz-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Lift & Glow Animations */
        .quiz-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 22px 40px rgba(21, 128, 61, 0.18);
            border-color: rgba(255, 255, 255, 0.9);
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0; left: -75%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 100%);
            transform: skewX(-25deg);
            transition: 0.8s;
        }

        .quiz-card:hover::before {
            left: 125%;
        }

        /* Image Display Box */
        .media-container {
            width: 100%;
            height: 145px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .media-container .fallback-emoji {
            font-size: 4.2rem;
            transition: transform 0.3s ease;
        }

        .quiz-card:hover .fallback-emoji {
            transform: scale(1.22) rotate(6deg);
        }

        .quiz-details h3 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .quiz-details p {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        /* Quiz Buttons */
        .start-btn {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 14px rgba(21, 128, 61, 0.25);
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
        }

        .quiz-card:hover .start-btn {
            background: linear-gradient(135deg, #0284c7 0%, #1e40af 100%);
            box-shadow: 0 6px 18px rgba(2, 132, 199, 0.35);
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        /* --- FOOTER REGION --- */
        footer {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 2px solid var(--glass-border);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -6px 30px rgba(0,0,0,0.04);
        }

        .footer-branding h4 {
            font-size: 1.15rem;
            color: var(--primary-green);
            font-weight: 700;
        }
        .footer-branding p {
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-nav {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 0.6rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
            transform: translateY(-2px);
        }

        /* --- MEDIA QUERIES FOR SMARTBOARDS & MOBILE --- */
        @media (max-width: 1024px) {
            .hero h1 { font-size: 3rem; }
            .quiz-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.4rem; }
            .hero p { font-size: 1.15rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            footer {
                flex-direction: column;
                gap: 0.8rem;
                text-align: center;
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .quiz-grid { grid-template-columns: 1fr; }
            .hero-illustration { font-size: 2.6rem; padding: 0.6rem 1.6rem; }
        }
    </style>

    <script>
        const AudioDriver = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                if (type === 'hover') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(550, now + 0.06);
                    gain.gain.setValueAtTime(0.03, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                    osc.start(now);
                    osc.stop(now + 0.06);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.1); // A5
                    gain.gain.setValueAtTime(0.18, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'load') {
                    // Nature-themed harmonic major-chord welcome sweep
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(261.63, now); // C4
                    osc.frequency.setValueAtTime(329.63, now + 0.08); // E4
                    osc.frequency.setValueAtTime(392.00, now + 0.16); // G4
                    osc.frequency.setValueAtTime(523.25, now + 0.24); // C5
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
                    osc.start(now);
                    osc.stop(now + 0.55);
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { AudioDriver.play('load'); }, 400);
        });
    </script>

    <script>
        // Generate Atmospheric Moving Ecosystem Icons
        function buildAtmosphere() {
            const container = document.getElementById('floatingContainer');
            const elements = ['🌍', '🍃', '☁️', '🦋', '🐦', '☀️', '🌸', '🍂'];
            const quantity = window.innerWidth < 600 ? 10 : 22;

            for (let i = 0; i < quantity; i++) {
                const node = document.createElement('div');
                node.className = 'floating-item';
                node.innerText = elements[Math.floor(Math.random() * elements.length)];
                node.style.left = `${Math.random() * 100}vw`;
                node.style.top = `${Math.random() * 100}vh`;
                node.style.animationDelay = `${Math.random() * 8}s`;
                node.style.animationDuration = `${12 + Math.random() * 16}s`;
                container.appendChild(node);
            }
        }

        // Render Cards Matrix Layout
        function constructUI() {
            const target = document.getElementById('quizHub');

            twauDataset.forEach(block => {
                const layer = document.createElement('section');
                layer.className = 'category-section';

                const sectionHeader = document.createElement('h2');
                sectionHeader.className = 'category-title';
                sectionHeader.innerText = block.category;
                layer.appendChild(sectionHeader);

                const grid = document.createElement('div');
                grid.className = 'quiz-grid';

                block.topics.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'quiz-card';
                    card.setAttribute('onclick', `AudioDriver.play('click'); setTimeout(() => { window.location.href='${item.file}'; }, 150);`);
                    card.setAttribute('onmouseenter', "AudioDriver.play('hover')");

                    // Media Wrapper with error boundary verification
                    const mediaBox = document.createElement('div');
                    mediaBox.className = 'media-container';

                    const rawImg = document.createElement('img');
                    rawImg.src = `images/${item.img}`;
                    rawImg.alt = item.name;

                    const substitute = document.createElement('span');
                    substitute.className = 'fallback-emoji';
                    substitute.innerText = item.emoji;

                    // Fallback router loops if local files are detached or offline
                    rawImg.onload = () => { rawImg.style.display = 'block'; substitute.style.display = 'none'; };
                    rawImg.onerror = () => { rawImg.style.display = 'none'; substitute.style.display = 'inline-block'; };

                    mediaBox.appendChild(rawImg);
                    mediaBox.appendChild(substitute);

                    // Descriptions context
                    const detailsBox = document.createElement('div');
                    detailsBox.className = 'quiz-details';

                    const elementTitle = document.createElement('h3');
                    elementTitle.innerText = item.name;

                    const elementDesc = document.createElement('p');
                    elementDesc.innerText = item.desc;

                    detailsBox.appendChild(elementTitle);
                    detailsBox.appendChild(elementDesc);

                    const actionBtn = document.createElement('button');
                    actionBtn.className = 'start-btn';
                    actionBtn.innerText = 'Start Quiz';

                    card.appendChild(mediaBox);
                    card.appendChild(detailsBox);
                    card.appendChild(actionBtn);

                    grid.appendChild(card);
                });

                layer.appendChild(grid);
                target.appendChild(layer);
            });
        }

        // Execution
        buildAtmosphere();
        constructUI();
    </script>
